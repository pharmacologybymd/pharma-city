y CYP1A2/2C9/3A4 and renally excreted, with a short half-life ~2.5 hours requiring frequent dosing.","moa":"5-lipoxygenase inhibitor that blocks synthesis of leukotrienes, reducing bronchoconstriction and inflammation.","uses":"Chronic asthma prophylaxis.","adr":"Hepatotoxicity (raised transaminases), headache, nausea, dyspepsia."},"Sodium cromoglicate":{"adme":"Inhaled with very poor oral absorption and low systemic bioavailability, not metabolised, excreted unchanged in bile and urine, short half-life ~1-1.5 hours.","moa":"Mast cell stabiliser that inhibits degranulation and mediator release to prevent allergic bronchospasm.","uses":"Prophylaxis of allergic asthma, allergic rhinitis, allergic conjunctivitis.","adr":"Cough, throat irritation, bronchospasm, bad taste."},"Nedocromil":{"adme":"Inhaled with low systemic absorption and bioavailability, not significantly metabolised, excreted unchanged in urine and bile, short half-life ~1.5-3 hours.","moa":"Mast cell stabiliser inhibiting inflammatory cell activation and mediator release to prevent bronchoconstriction.","uses":"Prophylaxis of mild-to-moderate asthma.","adr":"Unpleasant taste, cough, throat irritation, headache, nausea."},"Roflumilast":{"adme":"Oral with high bioavailability (~80%), highly protein bound (~99%), metabolised by CYP3A4/1A2 to active roflumilast N-oxide and renally excreted, with long half-lives (~17 h parent, ~30 h metabolite).","moa":"Selective phosphodiesterase-4 inhibitor that raises cAMP in inflammatory cells to reduce airway inflammation.","uses":"Severe COPD with chronic bronchitis to reduce exacerbations.","adr":"Diarrhoea, weight loss, nausea, headache, insomnia, psychiatric effects."},"Omalizumab":{"adme":"Given subcutaneously with slow absorption (bioavailability ~62%), distributed in plasma, cleared by reticuloendothelial degradation and as IgE complexes, with a long half-life ~26 days.","moa":"Anti-IgE monoclonal antibody binding free IgE to prevent its attachment to mast cells and basophils.","uses":"Severe allergic asthma, chronic spontaneous urticaria, nasal polyps.","adr":"Injection-site reactions, headache, anaphylaxis (rare), arthralgia."},"Mepolizumab":{"adme":"Given subcutaneously with good bioavailability (~80%), catabolised by proteolysis, with a long half-life ~16-22 days allowing 4-weekly dosing.","moa":"Anti-IL-5 monoclonal antibody that reduces eosinophil production and survival.","uses":"Severe eosinophilic asthma, EGPA, hypereosinophilic syndrome.","adr":"Injection-site reactions, headache, back pain, hypersensitivity reactions."},"Reslizumab":{"adme":"Given intravenously with full bioavailability, cleared by proteolytic catabolism, with a half-life ~24 days.","moa":"Anti-IL-5 monoclonal antibody reducing eosinophil maturation and survival.","uses":"Add-on therapy for severe eosinophilic asthma.","adr":"Anaphylaxis, myalgia, raised creatine kinase, oropharyngeal pain."},"Benralizumab":{"adme":"Given subcutaneously with good bioavailability (~58%), cleared by proteolytic catabolism, with a half-life ~15 days allowing 8-weekly maintenance dosing.","moa":"Anti-IL-5 receptor-alpha monoclonal antibody that depletes eosinophils by antibody-dependent cell-mediated cytotoxicity.","uses":"Add-on therapy for severe eosinophilic asthma.","adr":"Headache, pharyngitis, injection-site reactions, hypersensitivity."},"Dupilumab":{"adme":"Given subcutaneously with good bioavailability, eliminated by target-mediated and proteolytic clearance, with a non-linear half-life of around 2-3 weeks.","moa":"Anti-IL-4 receptor-alpha monoclonal antibody blocking IL-4 and IL-13 signalling to reduce type 2 inflammation.","uses":"Severe type 2/eosinophilic asthma, atopic dermatitis, nasal polyps.","adr":"Injection-site reactions, conjunctivitis, eosinophilia, oropharyngeal pain."},"N-acetylcysteine":{"adme":"Oral (low bioavailability ~10% due to first-pass), inhaled or IV, moderately protein bound, deacetylated to cysteine and incorporated into glutathione, renally excreted with half-life ~5-6 hours.","moa":"Mucolytic that splits disulfide bonds in mucus and a glutathione precursor providing antioxidant activity.","uses":"Mucolysis in COPD/cystic fibrosis, paracetamol overdose antidote.","adr":"Nausea, vomiting, bronchospasm, anaphylactoid reactions (IV), bad odour."},"Carbocisteine":{"adme":"Oral with good absorption, low protein binding, partly metabolised and excreted in urine, half-life ~1.3 hours.","moa":"Mucolytic that alters mucin sialic acid content to reduce sputum viscosity and improve clearance.","uses":"Productive cough in chronic bronchitis and COPD.","adr":"GI upset, nausea, rash, rarely GI bleeding."},"Bromhexine":{"adme":"Oral with low bioavailability due to extensive first-pass metabolism, highly protein bound, hepatically metabolised to ambroxol and renally excreted, half-life ~6-12 hours.","moa":"Mucolytic that depolymerises mucopolysaccharide fibres to reduce sputum viscosity.","uses":"Productive cough, bronchitis with viscid secretions.","adr":"GI upset, nausea, headache, dizziness, rash."},"Ambroxol":{"adme":"Oral with good absorption (bioavailability ~70-80% with first-pass effect), highly protein bound (~90%), hepatically glucuronidated and renally excreted, half-life ~7-12 hours.","moa":"Mucolytic and surfactant-stimulating agent (active metabolite of bromhexine) that reduces mucus viscosity and aids clearance.","uses":"Productive cough, bronchitis, mucus clearance disorders.","adr":"GI upset, nausea, dysgeusia, rash, rarely hypersensitivity."},"Dornase alfa":{"adme":"Administered by inhalation (nebulised) with minimal systemic absorption, acts locally in airway secretions and is not measurably systemic.","moa":"Recombinant human DNase that cleaves extracellular DNA in purulent sputum to reduce its viscosity.","uses":"Cystic fibrosis to improve mucus clearance and lung function.","adr":"Voice changes, pharyngitis, laryngitis, chest pain, rash."},"Ipratropium bromide":{"adme":"Inhaled quaternary ammonium compound with very low systemic absorption and poor oral bioavailability, minimal protein binding, partly metabolised and excreted in urine/faeces, half-life ~2 hours.","moa":"Short-acting non-selective muscarinic antagonist reducing vagally-mediated bronchoconstriction and secretions.","uses":"COPD, acute severe asthma (adjunct), rhinorrhoea.","adr":"Dry mouth, cough, urinary retention, blurred vision, paradoxical bronchospasm."},"Tiotropium bromide":{"adme":"Inhaled with low systemic absorption, highly protein bound (~72%), minimally metabolised (CYP2D6/3A4) and largely renally excreted, with a long half-life ~25 hours.","moa":"Long-acting muscarinic antagonist with kinetic M3 selectivity giving prolonged bronchodilation.","uses":"Maintenance of COPD and severe asthma.","adr":"Dry mouth, constipation, urinary retention, blurred vision, glaucoma precipitation."},"Ketotifen":{"adme":"Oral with good absorption (bioavailability ~50% after first-pass), highly protein bound (~75%), hepatically metabolised and renally excreted, with a long half-life ~12-22 hours.","moa":"H1 antihistamine and mast cell stabiliser inhibiting mediator release to prevent allergic bronchospasm.","uses":"Prophylaxis of allergic asthma, allergic conjunctivitis, atopy.","adr":"Sedation, weight gain, dry mouth, dizziness."},"Codeine":{"adme":"Oral with good bioavailability, moderately protein bound, metabolised by CYP2D6 to morphine (genetically variable) and glucuronidated, renally excreted, half-life ~3-4 hours.","moa":"Opioid agonist that suppresses the medullary cough centre via mu-receptor action.","uses":"Dry cough suppression, mild-to-moderate pain, antidiarrhoeal.","adr":"Constipation, sedation, respiratory depression, nausea, dependence."},"Pholcodine":{"adme":"Oral with good absorption, widely distributed, slowly metabolised and renally excreted, with a long half-life (~30-50 hours).","moa":"Opioid-related central antitussive that suppresses the cough reflex with little analgesic or addictive effect.","uses":"Symptomatic relief of dry, non-productive cough.","adr":"Drowsiness, constipation, nausea, dizziness, rare allergic sensitisation."},"Dextromethorphan":{"adme":"Oral with variable bioavailability, metabolised by CYP2D6 to dextrorphan (polymorphic) and renally excreted, half-life ~2-4 hours (longer in poor metabolisers).","moa":"Non-opioid central antitussive (NMDA antagonist/sigma agonist) that raises the cough threshold in the medulla.","uses":"Symptomatic relief of dry, non-productive cough.","adr":"Drowsiness, dizziness, nausea, serotonin syndrome risk with SSRIs, abuse at high doses."},"Noscapine":{"adme":"Oral with variable absorption and extensive first-pass metabolism, hepatically metabolised and renally excreted, half-life a few hours.","moa":"Non-opioid benzylisoquinoline alkaloid with central antitussive action and no analgesic or addictive properties.","uses":"Symptomatic relief of dry cough.","adr":"Nausea, headache, drowsiness, rarely bronchospasm."},"Prenoxdiazine":{"adme":"Oral with absorption from the gut, acting partly locally with peripheral antitussive effect, hepatically metabolised and excreted.","moa":"Peripherally-acting antitussive that anaesthetises airway stretch receptors and has bronchodilator/antispasmodic action to suppress cough.","uses":"Symptomatic relief of non-productive cough.","adr":"Dry mouth, transient oral numbness, GI upset, drowsiness."},"Guaifenesin":{"adme":"Oral with rapid absorption, low protein binding, hepatically metabolised and renally excreted, with a short half-life ~1 hour.","moa":"Expectorant that increases respiratory tract secretion volume and reduces sputum viscosity to aid clearance.","uses":"Productive cough to loosen mucus.","adr":"Nausea, vomiting, dizziness, headache, rash."},"Ammonium chloride":{"adme":"Oral with good absorption, metabolised in the liver to urea with the chloride causing systemic acidification, renally excreted.","moa":"Expectorant that irritates the gastric mucosa to reflexly increase bronchial secretions and liquefy mucus.","uses":"Productive cough as expectorant, urinary acidification, metabolic alkalosis correction.","adr":"Nausea, vomiting, gastric irritation, metabolic acidosis on overdose."},"Potassium iodide":{"adme":"Oral with rapid and near-complete absorption, distributed to thyroid and secretions, renally excreted.","moa":"Expectorant that stimulates bronchial secretion (partly via vagal gastric reflex) to liquefy and aid clearance of mucus.","uses":"Expectorant in chronic bronchitis, thyroid blockade, sporotrichosis.","adr":"Iodism (metallic taste, rhinitis), GI upset, hypothyroidism/goitre, hypersensitivity."}},"diagrams":[{"title":"Airway tone & asthma drugs","caption":"β2 agonists (SABA/LABA) relax bronchial smooth muscle → bronchodilation; muscarinic M3 antagonists (ipratropium/tiotropium) block constriction; methylxanthines also dilate. Inflammation is controlled by ICS, leukotriene modifiers, mast-cell stabilisers and biologics.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Airway tone in asthma\">\n      <circle cx=\"150\" cy=\"120\" r=\"64\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"10\" opacity=\"0.35\"/>\n      <circle cx=\"150\" cy=\"120\" r=\"30\" fill=\"#2e7be0\" opacity=\"0.10\"/>\n      <text x=\"120\" y=\"124\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">lumen</text>\n      <text x=\"120\" y=\"40\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">bronchial smooth muscle</text>\n      <text x=\"240\" y=\"80\" fill=\"#14a06a\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">β2 agonists → relax</text>\n      <text x=\"240\" y=\"104\" fill=\"#2e7be0\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">M3 block → relax</text>\n      <text x=\"240\" y=\"128\" fill=\"#d98c00\" font-size=\"11\" font-family=\"sans-serif\">methylxanthines</text>\n      <text x=\"240\" y=\"160\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">inflammation:</text>\n      <text x=\"240\" y=\"178\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">ICS, LTRA, anti-IgE/IL5</text>\n    </svg>"}]},{"id":"git","name":"GIT","theme_line":"Market row · stalls and digestion","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 49–51","groups":[{"heading":"A. Drugs for acid-peptic disease","groups":[{"heading":"Proton pump inhibitors","drugs":["Omeprazole","Pantoprazole","Esomeprazole","Lansoprazole","Rabeprazole"]},{"heading":"H2-receptor antagonists","drugs":["Famotidine","Ranitidine","Cimetidine","Nizatidine"]},{"heading":"Antacids","drugs":["Aluminium hydroxide","Magnesium hydroxide","Sodium bicarbonate"]},{"heading":"Mucosal protectives","drugs":["Sucralfate","Bismuth subsalicylate/subcitrate","Misoprostol"]},{"heading":"Anti-H. pylori regimens (combination)","drugs":["PPI + Amoxicillin + Clarithromycin (triple)","PPI + Bismuth + Metronidazole + Tetracycline (quadruple)"]}]},{"heading":"B. Prokinetics","drugs":["Metoclopramide","Domperidone","Itopride","Mosapride","Prucalopride","Erythromycin"]},{"heading":"C. Antiemetics","groups":[{"heading":"5-HT3 antagonists","drugs":["Ondansetron","Granisetron","Palonosetron"]},{"heading":"D2 antagonists","drugs":["Metoclopramide","Domperidone","Prochlorperazine"]},{"heading":"H1 antihistamines","drugs":["Cyclizine","Cinnarizine","Promethazine","Doxylamine"]},{"heading":"Antimuscarinic","drugs":["Hyoscine"]},{"heading":"NK1 antagonists","drugs":["Aprepitant"]},{"heading":"Corticosteroids / cannabinoids","drugs":["Dexamethasone","Nabilone"]}]},{"heading":"D. Antidiarrhoeals","groups":[{"heading":"Opioid agonists","drugs":["Loperamide","Diphenoxylate"]},{"heading":"Adsorbents","drugs":["Kaolin-pectin"]},{"heading":"Oral rehydration & others","drugs":["ORS","Racecadotril"]}]},{"heading":"E. Laxatives","groups":[{"heading":"Bulk-forming","drugs":["Ispaghula","Methylcellulose"]},{"heading":"Osmotic","drugs":["Lactulose","Polyethylene glycol","Magnesium salts"]},{"heading":"Stimulant","drugs":["Bisacodyl","Senna","Sodium picosulfate"]},{"heading":"Stool softeners","drugs":["Docusate"]},{"heading":"Lubricant","drugs":["Liquid paraffin"]}]},{"heading":"F. Drugs for inflammatory bowel disease","groups":[{"heading":"Aminosalicylates","drugs":["Mesalazine","Sulfasalazine"]},{"heading":"Corticosteroids","drugs":["Budesonide","Prednisolone"]},{"heading":"Immunomodulators","drugs":["Azathioprine","Methotrexate"]},{"heading":"Biologics","drugs":["Infliximab (anti-TNF)","Adalimumab (anti-TNF)","Vedolizumab (anti-integrin)","Ustekinumab"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 47–51","groups":[{"heading":"A. Drugs for peptic ulcer & GORD (anti-ulcer)","groups":[{"heading":"Proton pump inhibitors","drugs":["Omeprazole","Esomeprazole","Pantoprazole","Lansoprazole","Rabeprazole"]},{"heading":"H2 receptor antagonists","drugs":["Famotidine","Ranitidine","Cimetidine","Nizatidine"]},{"heading":"Antacids","drugs":["Aluminium hydroxide","Magnesium hydroxide","Sodium bicarbonate"]},{"heading":"Ulcer protectives","drugs":["Sucralfate","Colloidal bismuth subcitrate","Bismuth subsalicylate"]},{"heading":"Prostaglandin analogue","drugs":["Misoprostol"]},{"heading":"Anti-H. pylori (combination regimens)","drugs":["PPI + Amoxicillin + Clarithromycin (triple)","PPI + Bismuth + Metronidazole + Tetracycline (quadruple)"]}]},{"heading":"B. Prokinetics & antiemetics","groups":[{"heading":"Prokinetics","drugs":["Metoclopramide","Domperidone","Itopride","Mosapride","Prucalopride","Erythromycin"]},{"heading":"5-HT3 antagonists","drugs":["Ondansetron","Granisetron","Palonosetron"]},{"heading":"D2 antagonists (antiemetic)","drugs":["Metoclopramide","Domperidone","Prochlorperazine"]},{"heading":"H1 antihistaminics","drugs":["Cyclizine","Cinnarizine","Promethazine","Doxylamine"]},{"heading":"Antimuscarinic","drugs":["Hyoscine"]},{"heading":"NK1 antagonists","drugs":["Aprepitant"]},{"heading":"Adjuvant antiemetics","drugs":["Dexamethasone","Nabilone"]}]},{"heading":"C. Antidiarrhoeals","groups":[{"heading":"Opioid agonists","drugs":["Loperamide","Diphenoxylate"]},{"heading":"Adsorbents","drugs":["Kaolin-pectin"]},{"heading":"Oral rehydration & others","drugs":["ORS","Racecadotril"]}]},{"heading":"D. Laxatives","groups":[{"heading":"Bulk-forming","drugs":["Ispaghula","Methylcellulose"]},{"heading":"Osmotic","drugs":["Lactulose","Polyethylene glycol","Magnesium salts"]},{"heading":"Stimulant","drugs":["Bisacodyl","Senna","Sodium picosulfate"]},{"heading":"Stool softeners","drugs":["Docusate"]},{"heading":"Lubricant","drugs":["Liquid paraffin"]}]},{"heading":"E. Drugs for inflammatory bowel disease","groups":[{"heading":"Aminosalicylates","drugs":["Mesalazine","Sulfasalazine"]},{"heading":"Corticosteroids","drugs":["Budesonide","Prednisolone"]},{"heading":"Immunomodulators","drugs":["Azathioprine","Methotrexate"]},{"heading":"Biologics","drugs":["Infliximab (anti-TNF)","Adalimumab (anti-TNF)","Vedolizumab (anti-integrin)","Ustekinumab"]}]}]}]},"details":{"Omeprazole":{"adme":"Oral bioavailability ~40% (acid-labile, enteric-coated), ~95% protein bound, extensively hepatic via CYP2C19/CYP3A4 with a short ~1 h plasma half-life but long-lasting effect from irreversible pump binding.","moa":"Irreversibly inhibits the gastric H+/K+-ATPase (proton pump) in parietal cells, blocking the final step of acid secretion.","uses":"GERD, peptic ulcer disease, H. pylori eradication, Zollinger-Ellison syndrome, NSAID ulcer prophylaxis.","adr":"Headache, diarrhoea, hypomagnesaemia, B12 deficiency, increased fracture risk, C. difficile infection."},"Pantoprazole":{"adme":"Oral bioavailability ~77%, ~98% protein bound, hepatically metabolised by CYP2C19 (less CYP-interaction prone) with a ~1 h half-life.","moa":"Irreversibly inhibits the parietal-cell H+/K+-ATPase, suppressing basal and stimulated gastric acid secretion.","uses":"GERD, peptic ulcer disease, erosive oesophagitis, H. pylori eradication, stress-ulcer prophylaxis.","adr":"Headache, diarrhoea, hypomagnesaemia, B12 deficiency, increased fracture risk."},"Esomeprazole":{"adme":"S-isomer of omeprazole with higher oral bioavailability (~64-90%), ~97% protein bound, hepatic CYP2C19/CYP3A4 metabolism and a ~1.5 h half-life.","moa":"Irreversibly inhibits the gastric H+/K+-ATPase to block the final common step of acid secretion.","uses":"GERD, erosive oesophagitis, peptic ulcer disease, H. pylori eradication, NSAID ulcer prophylaxis.","adr":"Headache, diarrhoea, hypomagnesaemia, B12 deficiency, increased fracture risk."},"Lansoprazole":{"adme":"Oral bioavailability ~80%, ~97% protein bound, hepatic CYP2C19/CYP3A4 metabolism with a ~1.5 h half-life.","moa":"Irreversibly inhibits the parietal-cell H+/K+-ATPase, suppressing gastric acid secretion.","uses":"GERD, peptic ulcer disease, erosive oesophagitis, H. pylori eradication.","adr":"Headache, diarrhoea, hypomagnesaemia, B12 deficiency, increased fracture risk."},"Rabeprazole":{"adme":"Oral bioavailability ~52%, ~96% protein bound, partly non-enzymatic plus CYP2C19/CYP3A4 metabolism with a ~1 h half-life.","moa":"Irreversibly inhibits the gastric H+/K+-ATPase, blocking the final step of acid production.","uses":"GERD, peptic ulcer disease, H. pylori eradication, Zollinger-Ellison syndrome.","adr":"Headache, diarrhoea, hypomagnesaemia, B12 deficiency, increased fracture risk."},"Famotidine":{"adme":"Oral bioavailability ~40%, low (~15-20%) protein binding, predominantly renal elimination with a ~3 h half-life.","moa":"Competitively and reversibly blocks histamine H2 receptors on parietal cells, reducing acid secretion.","uses":"GERD, peptic ulcer disease, dyspepsia, stress-ulcer prophylaxis.","adr":"Headache, dizziness, constipation or diarrhoea, rarely confusion in renal impairment."},"Ranitidine":{"adme":"Oral bioavailability ~50%, ~15% protein bound, predominantly renal elimination with a ~2-3 h half-life.","moa":"Competitively blocks parietal-cell histamine H2 receptors, decreasing gastric acid secretion.","uses":"GERD, peptic ulcer disease, dyspepsia (now largely withdrawn over NDMA contamination).","adr":"Headache, dizziness, constipation, rarely thrombocytopenia; NDMA-contamination concern."},"Cimetidine":{"adme":"Oral bioavailability ~60-70%, ~20% protein bound, mainly renal elimination with a ~2 h half-life and notable CYP inhibition.","moa":"Competitively blocks histamine H2 receptors on parietal cells to reduce acid secretion.","uses":"GERD, peptic ulcer disease, dyspepsia.","adr":"Gynaecomastia, antiandrogen effects, confusion in elderly, many CYP-mediated drug interactions."},"Nizatidine":{"adme":"High oral bioavailability (~90%), ~35% protein bound, predominantly renal elimination with a ~1-2 h half-life.","moa":"Competitively blocks parietal-cell histamine H2 receptors, lowering gastric acid secretion.","uses":"GERD, peptic ulcer disease, dyspepsia.","adr":"Headache, dizziness, diarrhoea or constipation."},"Aluminium hydroxide":{"adme":"Acts locally in the gut lumen with minimal systemic absorption; absorbed aluminium is renally excreted.","moa":"Chemically neutralises gastric hydrochloric acid and binds phosphate, raising intragastric pH.","uses":"Dyspepsia, hyperacidity symptomatic relief, hyperphosphataemia.","adr":"Constipation, hypophosphataemia, aluminium accumulation in renal failure."},"Magnesium hydroxide":{"adme":"Acts locally in the gut; small amounts of absorbed magnesium are renally excreted.","moa":"Neutralises gastric acid and osmotically draws water into the bowel.","uses":"Dyspepsia, hyperacidity, occasional constipation (laxative).","adr":"Diarrhoea, hypermagnesaemia in renal impairment."},"Sodium bicarbonate":{"adme":"Rapidly absorbed and systemically distributed; excess bicarbonate and sodium are renally eliminated.","moa":"Directly neutralises gastric acid, generating CO2 and rapidly raising gastric pH.","uses":"Rapid symptomatic relief of heartburn/indigestion, urinary alkalinisation, metabolic acidosis.","adr":"Belching, metabolic alkalosis, sodium/fluid overload, acid rebound."},"Sucralfate":{"adme":"Minimally absorbed (<5%) and acts locally in the GI tract; requires an acidic environment for activation.","moa":"In acid forms a viscous, adherent gel that coats ulcer craters, providing a physical protective barrier.","uses":"Peptic ulcer disease, stress-ulcer prophylaxis, mucosal protection.","adr":"Constipation, reduced absorption of co-administered drugs, aluminium toxicity in renal failure."},"Bismuth subsalicylate/subcitrate":{"adme":"Minimal systemic absorption of bismuth (renally excreted); the salicylate moiety is absorbed and hepatically/renally handled.","moa":"Coats and protects ulcer/mucosa, has direct bactericidal action against H. pylori, and reduces secretions.","uses":"H. pylori eradication regimens, dyspepsia, diarrhoea, ulcer mucosal protection.","adr":"Black stools and tongue, constipation, salicylate toxicity, rare neurotoxicity with chronic use."},"Misoprostol":{"adme":"Rapidly absorbed orally, rapidly de-esterified to the active misoprostol acid (~85% protein bound) with a short ~20-40 min half-life and renal elimination.","moa":"Synthetic prostaglandin E1 analogue that stimulates mucus/bicarbonate secretion and inhibits acid secretion.","uses":"NSAID-induced ulcer prophylaxis, peptic ulcer, (obstetric uses elsewhere).","adr":"Diarrhoea, abdominal cramps, uterine contractions; contraindicated in pregnancy."},"PPI + Amoxicillin + Clarithromycin (triple)":{"note":"Combination H. pylori eradication regimen (standard triple therapy): a proton-pump inhibitor with the antibiotics amoxicillin and clarithromycin, given together for 10-14 days to suppress acid and eradicate the bacterium; not a single drug."},"PPI + Bismuth + Metronidazole + Tetracycline (quadruple)":{"note":"Combination H. pylori eradication regimen (bismuth quadruple therapy): a proton-pump inhibitor plus bismuth and the antibiotics metronidazole and tetracycline, used especially where clarithromycin resistance is likely; not a single drug."},"Metoclopramide":{"adme":"Oral bioavailability ~80% (variable), ~30% protein bound, partly hepatic and substantial renal elimination with a ~5-6 h half-life.","moa":"Central and peripheral D2-receptor antagonist with 5-HT4 agonism, enhancing gut motility and gastric emptying and providing antiemetic action.","uses":"Nausea/vomiting, gastroparesis, GERD, prokinetic for procedures.","adr":"Extrapyramidal reactions, tardive dyskinesia, drowsiness, hyperprolactinaemia."},"Domperidone":{"adme":"Low oral bioavailability (~15%, high first-pass), ~90% protein bound, hepatic CYP3A4 metabolism with a ~7 h half-life; poorly crosses the blood-brain barrier.","moa":"Peripheral D2-receptor antagonist that enhances gastric motility and emptying and triggers antiemesis via the area postrema.","uses":"Nausea/vomiting, gastroparesis, dyspepsia, prokinetic.","adr":"Hyperprolactinaemia/galactorrhoea, QT prolongation, dry mouth."},"Itopride":{"adme":"Rapidly absorbed orally, metabolised mainly by flavin-containing monooxygenase (not CYP) with a short half-life and renal excretion.","moa":"Dopamine D2 antagonist plus acetylcholinesterase inhibitor, increasing acetylcholine to promote gastric motility.","uses":"Functional dyspepsia, gastroparesis, GERD-related dysmotility.","adr":"Diarrhoea, abdominal pain, headache, occasional hyperprolactinaemia."},"Mosapride":{"adme":"Well absorbed orally, hepatically metabolised by CYP3A4 with a short half-life.","moa":"Selective 5-HT4 receptor agonist that enhances acetylcholine release to stimulate upper-GI motility.","uses":"Functional dyspepsia, GERD, diabetic gastroparesis.","adr":"Diarrhoea, abdominal discomfort, headache, rare hepatic enzyme rise."},"Prucalopride":{"adme":"High oral bioavailability (>90%), low protein binding, predominantly renal excretion largely unchanged with a long ~24-30 h half-life.","moa":"Highly selective 5-HT4 receptor agonist that stimulates colonic peristalsis and transit.","uses":"Chronic constipation, especially when laxatives fail.","adr":"Headache, nausea, diarrhoea, abdominal pain."},"Erythromycin":{"adme":"Variable oral bioavailability (acid-labile), ~70-90% protein bound, hepatic CYP3A4 metabolism and biliary excretion with a ~1.5-2 h half-life.","moa":"As a prokinetic it acts as a motilin-receptor agonist stimulating gastric contractions (antibiotic action via 50S ribosomal binding).","uses":"Gastroparesis (prokinetic), bacterial infections.","adr":"Nausea, abdominal cramps, QT prolongation, many CYP3A4 drug interactions, tachyphylaxis as prokinetic."},"Ondansetron":{"adme":"Oral bioavailability ~60%, ~70-75% protein bound, hepatic CYP3A4/CYP2D6 metabolism with a ~3-4 h half-life.","moa":"Selective 5-HT3 receptor antagonist blocking central (CTZ) and peripheral vagal serotonin signalling that triggers vomiting.","uses":"Chemotherapy- and radiotherapy-induced nausea/vomiting, postoperative nausea, hyperemesis.","adr":"Headache, constipation, QT prolongation, dizziness."},"Granisetron":{"adme":"Oral bioavailability ~60%, ~65% protein bound, hepatic CYP3A4 metabolism with a ~9 h half-life (longer than ondansetron).","moa":"Selective 5-HT3 receptor antagonist blocking serotonin-mediated emetogenic signalling.","uses":"Chemotherapy/radiotherapy-induced and postoperative nausea and vomiting.","adr":"Headache, constipation, QT prolongation, asthenia."},"Palonosetron":{"adme":"High oral bioavailability (~97%), ~62% protein bound, partly CYP2D6 metabolism with a very long ~40 h half-life.","moa":"Second-generation selective 5-HT3 antagonist with high receptor affinity and prolonged action.","uses":"Prevention of acute and delayed chemotherapy-induced nausea and vomiting.","adr":"Headache, constipation, QT prolongation, dizziness."},"Prochlorperazine":{"adme":"Low and variable oral bioavailability, highly protein bound, extensive hepatic metabolism with a ~6-8 h half-life.","moa":"Phenothiazine that antagonises D2 receptors in the chemoreceptor trigger zone, producing antiemetic effect.","uses":"Nausea/vomiting, vertigo, migraine-associated nausea.","adr":"Extrapyramidal reactions, sedation, hypotension, anticholinergic effects."},"Cyclizine":{"adme":"Well absorbed orally, hepatically metabolised with a ~20 h half-life.","moa":"H1-antihistamine with anticholinergic action that blocks vestibular and vomiting-centre signalling.","uses":"Motion sickness, vertigo, nausea/vomiting.","adr":"Drowsiness, dry mouth, blurred vision, urinary retention."},"Cinnarizine":{"adme":"Well absorbed orally, highly protein bound, hepatically metabolised with a ~3-4 h half-life.","moa":"H1-antihistamine with calcium-channel and vestibular-suppressant activity reducing labyrinthine excitability.","uses":"Motion sickness, vertigo, vestibular disorders, peripheral vascular disease.","adr":"Drowsiness, weight gain, extrapyramidal effects (especially in elderly), GI upset."},"Promethazine":{"adme":"Oral bioavailability ~25% (high first-pass), highly protein bound, hepatic CYP2D6 metabolism with a long ~10-14 h half-life.","moa":"Phenothiazine H1-antihistamine with anticholinergic and central antiemetic (vomiting-centre) action.","uses":"Nausea/vomiting, motion sickness, allergy, sedation.","adr":"Marked sedation, dry mouth, dizziness, extrapyramidal effects, respiratory depression in children."},"Doxylamine":{"adme":"Well absorbed orally, hepatically metabolised with a ~10 h half-life.","moa":"Sedating H1-antihistamine with central antiemetic action (often combined with pyridoxine).","uses":"Nausea and vomiting of pregnancy, insomnia, allergy.","adr":"Drowsiness, dry mouth, dizziness, constipation."},"Hyoscine":{"adme":"Variable oral bioavailability, hepatically metabolised with a short half-life; available transdermally for sustained effect.","moa":"Antimuscarinic (anticholinergic) that blocks vestibular input to the vomiting centre and reduces GI spasm.","uses":"Motion sickness, bowel/colic spasm, perioperative secretions.","adr":"Dry mouth, blurred vision, urinary retention, tachycardia, confusion in elderly."},"Aprepitant":{"adme":"Oral bioavailability ~60-65%, >95% protein bound, hepatic CYP3A4 metabolism (and a moderate CYP3A4 inhibitor) with a ~9-13 h half-life.","moa":"Neurokinin-1 (NK1) receptor antagonist that blocks substance P-mediated emetogenic signalling centrally.","uses":"Prevention of acute and delayed chemotherapy-induced nausea and vomiting.","adr":"Fatigue, hiccups, constipation, headache, CYP3A4 drug interactions."},"Dexamethasone":{"adme":"High oral bioavailability (~80%), ~70% protein bound, hepatic CYP3A4 metabolism with a long biological half-life (~36-54 h).","moa":"Potent glucocorticoid with uncertain antiemetic mechanism (central and anti-inflammatory effects), often adjunctive.","uses":"Antiemetic adjunct in chemotherapy, inflammatory and immune conditions, cerebral oedema.","adr":"Hyperglycaemia, insomnia, mood changes, immunosuppression, with chronic use Cushingoid effects."},"Nabilone":{"adme":"Well absorbed orally, highly protein bound, extensive hepatic metabolism with a multi-hour half-life.","moa":"Synthetic cannabinoid CB1-receptor agonist acting centrally to suppress the vomiting centre.","uses":"Refractory chemotherapy-induced nausea and vomiting unresponsive to other agents.","adr":"Drowsiness, dizziness, dysphoria/euphoria, dry mouth, orthostatic hypotension."},"Loperamide":{"adme":"Very low systemic bioavailability (extensive first-pass and P-glycoprotein efflux), highly protein bound, hepatic metabolism; minimal CNS penetration.","moa":"Peripheral mu-opioid receptor agonist on the gut that slows motility and increases transit time.","uses":"Acute and chronic diarrhoea, ileostomy output reduction.","adr":"Constipation, abdominal cramps; cardiac arrhythmia and CNS effects in overdose."},"Diphenoxylate":{"adme":"Well absorbed orally, hepatically metabolised to active difenoxin; combined with atropine to deter abuse.","moa":"Opioid agonist acting on intestinal mu-receptors to reduce peristalsis and slow transit.","uses":"Acute and chronic diarrhoea (as diphenoxylate/atropine).","adr":"Constipation, drowsiness, anticholinergic effects from atropine, dependence/CNS effects at high doses."},"Kaolin-pectin":{"adme":"Not systemically absorbed; acts locally within the gut lumen and is excreted in faeces.","moa":"Adsorbent that binds toxins/fluid and adds bulk to stool, providing symptomatic antidiarrhoeal effect.","uses":"Symptomatic relief of mild diarrhoea.","adr":"Constipation, reduced absorption of co-administered drugs."},"ORS":{"note":"Oral rehydration solution, not a single drug: a balanced mixture of glucose and electrolytes (sodium, potassium, chloride, citrate) in water that exploits intestinal sodium-glucose co-transport to replace fluid and electrolyte losses in diarrhoeal dehydration."},"Racecadotril":{"adme":"Oral prodrug rapidly hydrolysed to active thiorphan (highly protein bound) with a short half-life; acts mainly within the gut.","moa":"Intestinal enkephalinase inhibitor that reduces hypersecretion of water and electrolytes without slowing transit.","uses":"Acute secretory diarrhoea (adjunct to rehydration), especially in children.","adr":"Generally well tolerated; rarely rash, angioedema, drowsiness."},"Ispaghula":{"adme":"Not absorbed; acts locally in the gut and is excreted unchanged.","moa":"Soluble fibre (psyllium) that absorbs water to form a gel, increasing stool bulk and stimulating peristalsis.","uses":"Chronic constipation, IBS, diverticular disease, adjunct in dyslipidaemia.","adr":"Bloating, flatulence, bowel obstruction if taken without adequate fluid."},"Methylcellulose":{"adme":"Not absorbed from the gut; acts locally and passes unchanged in faeces.","moa":"Synthetic bulk-forming agent that absorbs water to soften and increase stool mass, promoting peristalsis.","uses":"Chronic constipation, IBS, stool bulking.","adr":"Bloating, flatulence, obstruction if fluid intake is inadequate."},"Lactulose":{"adme":"Negligibly absorbed; reaches the colon intact where it is fermented by bacteria.","moa":"Non-absorbable osmotic disaccharide drawing water into the bowel; colonic fermentation also traps ammonia.","uses":"Chronic constipation, hepatic encephalopathy.","adr":"Flatulence, abdominal cramps, diarrhoea, electrolyte disturbance with overuse."},"Polyethylene glycol":{"adme":"Essentially not absorbed; acts osmotically within the bowel lumen and is excreted unchanged.","moa":"Inert osmotic agent that retains water in the bowel to soften stool and increase volume.","uses":"Chronic constipation, faecal impaction, bowel preparation.","adr":"Bloating, nausea, abdominal cramps, electrolyte/fluid shifts with high-volume use."},"Magnesium salts":{"adme":"Act largely locally as osmotic agents; a small absorbed fraction of magnesium is renally excreted.","moa":"Osmotically draw water into the bowel and stimulate cholecystokinin-mediated motility.","uses":"Constipation, bowel preparation, acute laxation.","adr":"Diarrhoea, abdominal cramps, hypermagnesaemia in renal impairment."},"Bisacodyl":{"adme":"Minimally absorbed, hydrolysed to its active metabolite in the gut by bacterial/mucosal enzymes; any absorbed drug is conjugated.","moa":"Stimulant laxative that directly irritates colonic mucosa to increase peristalsis and reduce water absorption.","uses":"Constipation, bowel evacuation/preparation.","adr":"Abdominal cramps, diarrhoea, electrolyte loss, atonic colon with chronic use."},"Senna":{"adme":"Sennosides are not absorbed but are activated by colonic bacteria to active anthraquinones acting locally.","moa":"Stimulant (anthraquinone) laxative that increases colonic motility and reduces fluid absorption.","uses":"Constipation, bowel preparation.","adr":"Abdominal cramps, diarrhoea, electrolyte loss, melanosis coli with chronic use."},"Sodium picosulfate":{"adme":"Poorly absorbed, activated by colonic bacteria to its active form acting locally in the colon.","moa":"Stimulant laxative whose active metabolite increases colonic peristalsis and fluid secretion.","uses":"Constipation, bowel preparation (often with magnesium citrate).","adr":"Abdominal cramps, diarrhoea, fluid and electrolyte disturbance."},"Docusate":{"adme":"Minimally absorbed and acts largely locally within the gut as a surfactant.","moa":"Stool softener (surfactant) that lets water and fat penetrate stool, easing passage.","uses":"Prevention of straining, soft-stool maintenance, mild constipation.","adr":"Abdominal cramps, diarrhoea; generally mild and well tolerated."},"Liquid paraffin":{"adme":"Minimally absorbed mineral oil that acts locally as a lubricant within the gut.","moa":"Lubricant laxative that coats stool and bowel wall, softening faeces and easing passage.","uses":"Constipation, prevention of straining.","adr":"Anal seepage, lipoid (aspiration) pneumonia, impaired fat-soluble vitamin absorption."},"Mesalazine":{"adme":"Topically active 5-aminosalicylic acid delivered to the colon in modified-release/enema forms; absorbed fraction is acetylated and renally excreted.","moa":"Acts locally on bowel mucosa with anti-inflammatory effects (inhibits prostaglandins/leukotrienes, scavenges free radicals).","uses":"Ulcerative colitis (induction and maintenance), mild Crohn's disease.","adr":"Headache, nausea, diarrhoea, rare nephrotoxicity and pancreatitis."},"Sulfasalazine":{"adme":"Poorly absorbed prodrug split by colonic bacteria into 5-ASA (active in bowel) and sulfapyridine (absorbed, hepatically acetylated).","moa":"Delivers anti-inflammatory 5-ASA to the colon; the sulfapyridine carrier provides systemic immunomodulation.","uses":"Ulcerative colitis, Crohn's disease, rheumatoid arthritis.","adr":"Nausea, headache, rash, reversible oligospermia, blood dyscrasias, sulfa hypersensitivity."},"Budesonide":{"adme":"High first-pass metabolism gives low systemic bioavailability, ~90% protein bound, hepatic CYP3A4 metabolism providing largely topical/local action.","moa":"Potent glucocorticoid acting locally on gut mucosa to suppress inflammation with limited systemic exposure.","uses":"Crohn's disease, ulcerative colitis, microscopic colitis.","adr":"Fewer systemic steroid effects, but possible adrenal suppression, hyperglycaemia, mood changes with prolonged use."},"Prednisolone":{"adme":"High oral bioavailability (~80%), protein bound to albumin/transcortin, hepatic metabolism with a biological half-life of ~18-36 h.","moa":"Glucocorticoid that broadly suppresses inflammatory and immune responses via cytosolic receptor gene modulation.","uses":"Flares of inflammatory bowel disease, many inflammatory and autoimmune conditions.","adr":"Hyperglycaemia, osteoporosis, immunosuppression, weight gain, Cushingoid features, adrenal suppression."},"Azathioprine":{"adme":"Oral prodrug converted to 6-mercaptopurine then active thioguanine nucleotides; metabolism depends on TPMT activity, with slow onset over weeks.","moa":"Purine antimetabolite that inhibits DNA synthesis in proliferating lymphocytes, producing immunosuppression.","uses":"Maintenance of remission in IBD, autoimmune disease, transplant immunosuppression.","adr":"Bone-marrow suppression, hepatotoxicity, pancreatitis, infection risk, increased malignancy risk."},"Methotrexate":{"adme":"Variable oral bioavailability (saturable), ~50% protein bound, predominantly renal excretion with a ~3-10 h half-life and long tissue retention.","moa":"Inhibits dihydrofolate reductase, blocking folate-dependent DNA synthesis and exerting immunosuppression.","uses":"Crohn's disease, rheumatoid arthritis, psoriasis, malignancy.","adr":"Myelosuppression, hepatotoxicity, mucositis, pneumonitis; teratogenic."},"Infliximab (anti-TNF)":{"adme":"Chimeric monoclonal antibody given intravenously, cleared by the reticuloendothelial system with a half-life of ~8-10 days.","moa":"Binds and neutralises tumour necrosis factor-alpha, suppressing the inflammatory cascade in IBD.","uses":"Moderate-to-severe Crohn's disease and ulcerative colitis, other immune diseases.","adr":"Infusion reactions, serious infections, reactivation of TB, infliximab antibodies, lymphoma risk."},"Adalimumab (anti-TNF)":{"adme":"Fully human monoclonal antibody given subcutaneously, cleared by reticuloendothelial proteolysis with a half-life of ~14 days.","moa":"Binds tumour necrosis factor-alpha and blocks its pro-inflammatory signalling.","uses":"Crohn's disease, ulcerative colitis, rheumatoid arthritis, psoriasis.","adr":"Injection-site reactions, serious infections, TB reactivation, malignancy risk."},"Vedolizumab (anti-integrin)":{"adme":"Humanised monoclonal antibody given intravenously, gut-selective, cleared by proteolysis with a half-life of ~25 days.","moa":"Blocks the alpha4-beta7 integrin, preventing lymphocyte trafficking into gut mucosa with gut-selective immunosuppression.","uses":"Moderate-to-severe ulcerative colitis and Crohn's disease.","adr":"Nasopharyngitis, headache, arthralgia, infusion reactions, infection risk."},"Ustekinumab":{"adme":"Human monoclonal antibody given intravenously then subcutaneously, cleared by proteolysis with a half-life of ~3 weeks.","moa":"Binds the shared p40 subunit of interleukin-12 and IL-23, blocking these pro-inflammatory pathways.","uses":"Crohn's disease, ulcerative colitis, psoriasis, psoriatic arthritis.","adr":"Nasopharyngitis, headache, injection-site reactions, infection risk."},"Colloidal bismuth subcitrate":{"adme":"Minimal systemic absorption of bismuth (renally excreted); acts locally in an acidic gastric environment.","moa":"Forms a protective coating over ulcer base and exerts direct bactericidal action against H. pylori.","uses":"H. pylori eradication regimens, peptic ulcer mucosal protection.","adr":"Black stools and tongue, constipation, rare neurotoxicity (encephalopathy) with prolonged use."},"Bismuth subsalicylate":{"adme":"Minimal bismuth absorption (renally excreted); the salicylate component is absorbed and hepatically/renally handled.","moa":"Coats and protects mucosa, has antisecretory and direct antibacterial action against H. pylori and enteric pathogens.","uses":"Dyspepsia, diarrhoea, H. pylori eradication regimens.","adr":"Black stools and tongue, constipation, salicylate toxicity, tinnitus with high doses."}},"diagrams":[{"title":"Gastric parietal cell & acid suppression","caption":"Histamine (H2), gastrin (CCK2) and ACh (M3) stimulate the parietal cell; all converge on the H⁺/K⁺-ATPase (proton pump) that secretes acid. H2 blockers and antimuscarinics act upstream; PPIs irreversibly block the final pump; misoprostol (PGE1) is protective.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Gastric parietal cell\">\n      <rect x=\"120\" y=\"40\" width=\"200\" height=\"170\" rx=\"16\" fill=\"#2e7be0\" opacity=\"0.06\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <text x=\"150\" y=\"34\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">parietal cell</text>\n      <circle cx=\"120\" cy=\"70\" r=\"6\" fill=\"#14a06a\"/><text x=\"20\" y=\"74\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">Histamine → H2</text>\n      <circle cx=\"120\" cy=\"110\" r=\"6\" fill=\"#d98c00\"/><text x=\"34\" y=\"114\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">Gastrin → CCK2</text>\n      <circle cx=\"120\" cy=\"150\" r=\"6\" fill=\"#8b5cf6\"/><text x=\"52\" y=\"154\" fill=\"#8b5cf6\" font-size=\"10\" font-family=\"sans-serif\">ACh → M3</text>\n      <line x1=\"126\" y1=\"70\" x2=\"280\" y2=\"120\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.5\"/>\n      <line x1=\"126\" y1=\"110\" x2=\"280\" y2=\"124\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.5\"/>\n      <line x1=\"126\" y1=\"150\" x2=\"280\" y2=\"128\" stroke=\"currentColor\" stroke-width=\"1\" opacity=\"0.5\"/>\n      <rect x=\"280\" y=\"112\" width=\"40\" height=\"30\" rx=\"5\" fill=\"#c0392b\" opacity=\"0.8\"/>\n      <text x=\"246\" y=\"160\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">H⁺/K⁺-ATPase</text>\n      <text x=\"324\" y=\"128\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\">H⁺ →</text>\n      <text x=\"200\" y=\"200\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\" font-weight=\"600\">PPIs ✕ pump · H2RAs/antimuscarinics upstream</text>\n    </svg>"}]},{"id":"renal","name":"Renal","theme_line":"Waterworks · the city's plumbing","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 25–26","groups":[{"heading":"A. High-ceiling (loop) diuretics","drugs":["Furosemide","Bumetanide","Torsemide","Ethacrynic acid"]},{"heading":"B. Thiazide & thiazide-like diuretics","drugs":["Hydrochlorothiazide","Chlortalidone","Indapamide","Metolazone"]},{"heading":"C. Potassium-sparing diuretics","groups":[{"heading":"Aldosterone (mineralocorticoid) receptor antagonists","drugs":["Spironolactone","Eplerenone"]},{"heading":"Epithelial Na-channel (ENaC) blockers","drugs":["Amiloride","Triamterene"]}]},{"heading":"D. Osmotic diuretics","drugs":["Mannitol","Glycerol","Isosorbide","Urea"]},{"heading":"E. Carbonic anhydrase inhibitors","drugs":["Acetazolamide","Dorzolamide","Brinzolamide"]},{"heading":"F. Vasopressin (ADH) V2 antagonists / aquaretics","drugs":["Tolvaptan","Conivaptan"]}]},{"label":"KDT 8e/9e","cite":"ch. 41–42","groups":[{"heading":"A. High-ceiling (loop) diuretics","drugs":["Furosemide","Bumetanide","Torsemide","Ethacrynic acid"]},{"heading":"B. Thiazide & thiazide-like diuretics","drugs":["Hydrochlorothiazide","Chlortalidone","Indapamide","Metolazone"]},{"heading":"C. Potassium-sparing diuretics","groups":[{"heading":"Aldosterone antagonists","drugs":["Spironolactone","Eplerenone"]},{"heading":"Epithelial Na-channel (ENaC) blockers / inhibitors of renal Na channel","drugs":["Amiloride","Triamterene"]}]},{"heading":"D. Osmotic diuretics","drugs":["Mannitol","Glycerol","Isosorbide","Urea"]},{"heading":"E. Carbonic anhydrase inhibitors","drugs":["Acetazolamide","Dorzolamide","Brinzolamide"]},{"heading":"F. Vasopressin (ADH) V2 antagonists / aquaretics","drugs":["Tolvaptan","Conivaptan"]},{"heading":"G. Antidiuretics","drugs":["Antidiuretic hormone (vasopressin)","Desmopressin","Thiazides (in diabetes insipidus)"]}]}]},"details":{"Furosemide":{"adme":"Oral bioavailability ~60% and variable, highly (>95%) protein-bound, secreted by the organic-acid transporter into the proximal tubule to reach its luminal site, eliminated mainly unchanged renally with some hepatic glucuronidation, half-life ~1.5 h.","moa":"Inhibits the Na'-K'-2Cl' (NKCC2) cotransporter in the thick ascending limb of the loop of Henle.","uses":"Acute pulmonary oedema, CHF, oedema of renal/hepatic disease, hypertension, hypercalcaemia, forced diuresis.","adr":"Hypokalaemia, hyponatraemia, hypovolaemia, metabolic alkalosis, ototoxicity, hyperuricaemia, hyperglycaemia."},"Bumetanide":{"adme":"Oral bioavailability ~80% (more reliable than furosemide), highly protein-bound, secreted into the tubular lumen via organic-acid transporters, eliminated by renal and hepatic routes, half-life ~1 h.","moa":"Inhibits the Na'-K'-2Cl' (NKCC2) cotransporter in the thick ascending limb of the loop of Henle.","uses":"Oedema in CHF, hepatic and renal disease, acute pulmonary oedema, when furosemide absorption is poor.","adr":"Hypokalaemia, hypovolaemia, metabolic alkalosis, hyperuricaemia, myalgia, less ototoxicity than furosemide."},"Torsemide":{"adme":"Oral bioavailability ~80-90%, highly protein-bound, secreted into the proximal tubule lumen, mostly hepatically metabolised (CYP2C9) with ~20% renal excretion, longer half-life ~3-4 h.","moa":"Inhibits the Na'-K'-2Cl' (NKCC2) cotransporter in the thick ascending limb of the loop of Henle.","uses":"CHF, oedema, hypertension (longer-acting, smoother diuresis).","adr":"Hypokalaemia, hypovolaemia, metabolic alkalosis, hyperuricaemia, dizziness."},"Ethacrynic acid":{"adme":"Orally absorbed, highly protein-bound, secreted into the tubular lumen via organic-acid transporters, eliminated by renal and biliary routes, half-life ~1 h.","moa":"Inhibits the Na'-K'-2Cl' (NKCC2) cotransporter in the thick ascending limb; the only non-sulfonamide loop diuretic.","uses":"Loop diuresis in patients with sulfonamide allergy.","adr":"Pronounced ototoxicity, hypokalaemia, hypovolaemia, GI bleeding, metabolic alkalosis."},"Hydrochlorothiazide":{"adme":"Oral bioavailability ~70%, moderately protein-bound, secreted into the proximal tubule via the organic-acid transporter to reach its luminal site, eliminated unchanged in urine, half-life ~6-15 h.","moa":"Inhibits the Na'-Cl' (NCC) cotransporter in the early distal convoluted tubule.","uses":"Hypertension, mild-to-moderate oedema, CHF, nephrolithiasis (hypercalciuria), nephrogenic diabetes insipidus.","adr":"Hypokalaemia, hyponatraemia, hyperuricaemia, hyperglycaemia, hyperlipidaemia, hypercalcaemia, erectile dysfunction."},"Chlortalidone":{"adme":"Orally absorbed, extensively bound to red-cell carbonic anhydrase prolonging action, secreted into the proximal tubule, excreted largely unchanged renally, long half-life ~40-60 h.","moa":"Inhibits the Na'-Cl' (NCC) cotransporter in the early distal convoluted tubule.","uses":"Hypertension (preferred long-acting thiazide-like agent), oedema, CHF.","adr":"Hypokalaemia, hyponatraemia, hyperuricaemia, hyperglycaemia, hyperlipidaemia."},"Indapamide":{"adme":"Oral bioavailability nearly complete, highly protein-bound and lipophilic, secreted into the tubule, extensively hepatically metabolised, half-life ~15-25 h.","moa":"Inhibits the Na'-Cl' (NCC) cotransporter in the distal convoluted tubule with additional vasodilator action.","uses":"Hypertension, oedema (favoured for additional vasodilatation and minimal metabolic effect).","adr":"Hypokalaemia, hyponatraemia, hyperuricaemia, mild metabolic disturbance."},"Metolazone":{"adme":"Orally absorbed (slow, variable), highly protein-bound, secreted into the proximal tubule, eliminated mainly renally, long half-life ~14-20 h.","moa":"Inhibits the Na'-Cl' (NCC) cotransporter in the distal convoluted tubule, retaining efficacy in renal impairment.","uses":"Oedema/CHF including in renal impairment, synergistic combination with loop diuretics (sequential nephron blockade).","adr":"Profound hypokalaemia and hypovolaemia (especially with loop diuretics), hyponatraemia, hyperuricaemia."},"Spironolactone":{"adme":"Oral bioavailability ~65% (improved with food), highly protein-bound, acts from the blood side on the cytoplasmic mineralocorticoid receptor, extensively hepatically metabolised to active canrenone, half-life of metabolites prolonged.","moa":"Competitively antagonises aldosterone at the mineralocorticoid receptor in the cortical collecting duct principal cells.","uses":"Primary hyperaldosteronism, resistant hypertension, CHF, hepatic ascites, hypokalaemia prophylaxis, hirsutism/PCOS.","adr":"Hyperkalaemia, gynaecomastia, menstrual irregularity, impotence, GI upset, metabolic acidosis."},"Eplerenone":{"adme":"Orally absorbed, moderately protein-bound, acts on the cytoplasmic mineralocorticoid receptor, metabolised by CYP3A4, half-life ~4-6 h.","moa":"Selectively antagonises aldosterone at the mineralocorticoid receptor in the cortical collecting duct, with low affinity for sex-steroid receptors.","uses":"Hypertension, heart failure post-MI (fewer endocrine effects than spironolactone).","adr":"Hyperkalaemia, dizziness, raised triglycerides; minimal gynaecomastia."},"Amiloride":{"adme":"Oral bioavailability ~15-25%, minimal protein binding, secreted into the tubular lumen to block apical channels, excreted unchanged in urine, half-life ~6-9 h.","moa":"Blocks the apical epithelial sodium channel (ENaC) in the collecting duct principal cells.","uses":"Potassium-sparing adjunct with thiazides/loops, lithium-induced nephrogenic diabetes insipidus, Liddle syndrome.","adr":"Hyperkalaemia, nausea, headache; metabolic acidosis."},"Triamterene":{"adme":"Oral bioavailability ~50%, highly protein-bound, secreted into the tubule, hepatically metabolised to an active metabolite then renally excreted, half-life ~2-4 h.","moa":"Blocks the apical epithelial sodium channel (ENaC) in the collecting duct principal cells.","uses":"Potassium-sparing adjunct with thiazides/loops to counter hypokalaemia.","adr":"Hyperkalaemia, nephrolithiasis (triamterene stones), megaloblastosis, nausea."},"Mannitol":{"adme":"Not absorbed orally so given IV, not protein-bound, freely filtered at the glomerulus and not reabsorbed, excreted unchanged in urine, half-life ~1-2 h.","moa":"Osmotic diuretic that raises tubular fluid osmolarity (chiefly proximal tubule and descending limb) limiting water reabsorption.","uses":"Raised intracranial/intraocular pressure, prophylaxis of acute renal failure, forced diuresis in poisoning.","adr":"Acute volume expansion (pulmonary oedema/CHF), hyponatraemia then dehydration, headache, nausea."},"Glycerol":{"adme":"Given orally (and absorbed), not protein-bound, distributes osmotically and is largely metabolised, providing osmotic effect of short duration.","moa":"Osmotic agent that raises plasma osmolarity to draw fluid from tissues, also exerting tubular osmotic diuresis.","uses":"Acute reduction of intraocular pressure (acute glaucoma) and intracranial pressure.","adr":"Hyperglycaemia, nausea, vomiting, headache, dehydration."},"Isosorbide":{"adme":"Given orally and well absorbed, not protein-bound, distributes as an osmotic agent and excreted renally largely unchanged.","moa":"Oral osmotic agent that raises plasma osmolarity to reduce intraocular fluid volume.","uses":"Short-term reduction of intraocular pressure in acute glaucoma.","adr":"Nausea, headache, thirst; less caloric load than glycerol."},"Urea":{"adme":"Given IV (poorly palatable orally), not protein-bound, freely filtered and partly reabsorbed, distributed in total body water and excreted renally.","moa":"Osmotic diuretic raising tubular osmolarity to reduce water reabsorption; also reduces intracranial/intraocular pressure.","uses":"Reduction of raised intracranial and intraocular pressure (largely superseded by mannitol).","adr":"Rebound rise in pressure, thrombophlebitis/tissue necrosis on extravasation, headache, nausea."},"Acetazolamide":{"adme":"Oral bioavailability good, highly protein-bound, secreted into the proximal tubule, excreted unchanged renally, half-life ~6-9 h.","moa":"Inhibits carbonic anhydrase in the proximal convoluted tubule, reducing bicarbonate (and Na') reabsorption.","uses":"Glaucoma, acute mountain sickness, alkalinisation of urine, periodic paralysis, adjunct in epilepsy.","adr":"Metabolic acidosis, hypokalaemia, paraesthesia, drowsiness, renal stones, sulfonamide hypersensitivity."},"Dorzolamide":{"adme":"Applied topically to the eye with minimal systemic absorption, the absorbed fraction binds carbonic anhydrase in red cells, eliminated renally.","moa":"Topically inhibits carbonic anhydrase (II) in the ciliary body, reducing aqueous humour formation.","uses":"Open-angle glaucoma and ocular hypertension (topical).","adr":"Ocular stinging/burning, bitter taste, superficial punctate keratitis, conjunctival reactions."},"Brinzolamide":{"adme":"Applied topically to the eye with minimal systemic absorption, the absorbed fraction binds carbonic anhydrase in red cells, eliminated renally.","moa":"Topically inhibits carbonic anhydrase (II) in the ciliary body, reducing aqueous humour formation.","uses":"Open-angle glaucoma and ocular hypertension (topical, suspension; less stinging than dorzolamide).","adr":"Blurred vision, bitter taste, ocular discomfort, transient ocular hyperaemia."},"Tolvaptan":{"adme":"Orally absorbed, highly protein-bound, metabolised by CYP3A4, acts at the basolateral receptor of collecting duct cells, half-life ~6-8 h.","moa":"Selectively antagonises the vasopressin V2 receptor in the collecting duct, promoting free-water excretion (aquaresis).","uses":"Euvolaemic/hypervolaemic hyponatraemia (SIADH, CHF), slowing autosomal dominant polycystic kidney disease.","adr":"Thirst, dry mouth, polyuria, rapid overcorrection of sodium (osmotic demyelination), hepatotoxicity."},"Conivaptan":{"adme":"Given IV, highly protein-bound, metabolised by CYP3A4 (also a potent CYP3A4 inhibitor), half-life ~5-8 h.","moa":"Non-selectively antagonises vasopressin V1a and V2 receptors, promoting free-water excretion (aquaresis).","uses":"Euvolaemic and hypervolaemic hyponatraemia (hospital IV use).","adr":"Infusion-site reactions, thirst, hypokalaemia, hypotension, rapid sodium overcorrection."},"Antidiuretic hormone (vasopressin)":{"adme":"A peptide hormone given parenterally (degraded orally), short plasma half-life of ~10-20 min, metabolised by tissue peptidases and excreted renally.","moa":"Acts on collecting duct V2 receptors to insert aquaporin-2 channels (antidiuresis) and on vascular V1 receptors to cause vasoconstriction.","uses":"Central diabetes insipidus, vasodilatory/septic shock, vasopressor in cardiac arrest, oesophageal variceal bleeding.","adr":"Hyponatraemia/water intoxication, hypertension, coronary and mesenteric ischaemia, abdominal cramps."},"Desmopressin":{"adme":"A synthetic vasopressin analogue given intranasally, oral, or parenteral with low bioavailability, minimal protein binding, longer half-life ~1.5-3.5 h with prolonged antidiuretic action.","moa":"Selective vasopressin V2-receptor agonist that inserts aquaporin-2 channels in the collecting duct (and raises factor VIII/vWF).","uses":"Central diabetes insipidus, nocturnal enuresis, mild haemophilia A and von Willebrand disease.","adr":"Hyponatraemia/water intoxication, headache, nasal irritation, flushing."},"Thiazides (in diabetes insipidus)":{"adme":"Orally absorbed thiazide (e.g. hydrochlorothiazide), moderately protein-bound, secreted into the proximal tubule, excreted unchanged renally, half-life ~6-15 h.","moa":"Inhibits the distal Na'-Cl' cotransporter causing mild volume contraction, which enhances proximal sodium/water reabsorption and paradoxically reduces urine volume in diabetes insipidus.","uses":"Nephrogenic diabetes insipidus (paradoxical antidiuretic effect), also lithium-induced DI with caution.","adr":"Hypokalaemia, hyponatraemia, hyperuricaemia, hyperglycaemia, volume depletion."}},"diagrams":[{"title":"Nephron — sites of diuretic action","caption":"PCT: carbonic-anhydrase inhibitors. Thick ascending limb: loop diuretics (NKCC2). DCT: thiazides (NCC). Collecting duct: K-sparing (ENaC blockers / aldosterone antagonists); ADH V2 antagonists (vaptans). Osmotic diuretics act along water-permeable segments.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Nephron diuretic sites\">\n      <path d=\"M70,30 C70,90 90,110 120,150 C150,190 110,210 150,210\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"/>\n      <path d=\"M150,210 C190,210 150,150 175,110 C195,78 210,70 230,40\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"/>\n      <path d=\"M230,40 H300 C340,40 340,210 300,210 H280\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"/>\n      <circle cx=\"70\" cy=\"36\" r=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"/><text x=\"40\" y=\"40\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">glom.</text>\n      <circle cx=\"95\" cy=\"120\" r=\"5\" fill=\"#8b5cf6\"/><text x=\"104\" y=\"118\" fill=\"#8b5cf6\" font-size=\"10\" font-family=\"sans-serif\">CA inhibitors (PCT)</text>\n      <circle cx=\"150\" cy=\"200\" r=\"5\" fill=\"#c0392b\"/><text x=\"160\" y=\"204\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">loop diuretics (NKCC2)</text>\n      <circle cx=\"200\" cy=\"70\" r=\"5\" fill=\"#2e7be0\"/><text x=\"210\" y=\"68\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">thiazides (DCT, NCC)</text>\n      <circle cx=\"320\" cy=\"120\" r=\"5\" fill=\"#14a06a\"/><text x=\"332\" y=\"118\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">K-sparing (ENaC / aldo)</text>\n      <text x=\"332\" y=\"170\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">vaptans (ADH V2)</text>\n      <text x=\"240\" y=\"244\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">collecting duct →</text>\n    </svg>"}]},{"id":"autacoids","name":"Autacoids","theme_line":"Messenger lane · post office, histamine bells, 5-HT couriers","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 39–42","groups":[{"heading":"A. Histamine & antihistamines","groups":[{"heading":"H1 antagonists","groups":[{"heading":"First-generation (sedating)","drugs":["Chlorpheniramine","Diphenhydramine","Promethazine","Hydroxyzine","Cyclizine"]},{"heading":"Second-generation (non-sedating)","drugs":["Cetirizine","Loratadine","Fexofenadine","Desloratadine","Levocetirizine"]}]},{"heading":"H2 antagonists","drugs":["Famotidine","Ranitidine","Cimetidine"]}]},{"heading":"B. 5-HT (serotonin) drugs","groups":[{"heading":"5-HT1B/1D agonists (triptans)","drugs":["Sumatriptan","Rizatriptan","Zolmitriptan"]},{"heading":"5-HT3 antagonists","drugs":["Ondansetron","Granisetron"]},{"heading":"5-HT antagonists","drugs":["Cyproheptadine","Ketanserin","Methysergide"]}]},{"heading":"C. Prostaglandins & analogues","drugs":["Misoprostol (PGE1)","Latanoprost (PGF2α — ophthalmic)","Alprostadil","Dinoprostone","Epoprostenol/Iloprost"]},{"heading":"D. NSAIDs (prostaglandin-synthesis inhibitors)","groups":[{"heading":"Non-selective COX inhibitors","drugs":["Aspirin","Ibuprofen","Naproxen","Diclofenac","Indomethacin","Ketorolac","Piroxicam"]},{"heading":"Preferential COX-2","drugs":["Meloxicam","Nimesulide","Etodolac"]},{"heading":"Selective COX-2 inhibitors (coxibs)","drugs":["Celecoxib","Etoricoxib","Parecoxib"]},{"heading":"Analgesic-antipyretic (poor anti-inflammatory)","drugs":["Paracetamol (acetaminophen)","Metamizol"]}]},{"heading":"E. Leukotriene modifiers","drugs":["Montelukast (LTRA)","Zafirlukast (LTRA)","Zileuton (5-LOX inhibitor)"]}]},{"label":"KDT 8e/9e","cite":"ch. 11–15, 25","groups":[{"heading":"A. Histamine & antihistaminics","groups":[{"heading":"H1 antagonists","groups":[{"heading":"First-generation (sedating)","drugs":["Chlorpheniramine","Diphenhydramine","Promethazine","Hydroxyzine","Cyclizine"]},{"heading":"Second-generation (non-sedating)","drugs":["Cetirizine","Loratadine","Fexofenadine","Desloratadine","Levocetirizine"]}]},{"heading":"H2 antagonists","drugs":["Famotidine","Ranitidine","Cimetidine"]}]},{"heading":"B. 5-HT (serotonin) drugs","groups":[{"heading":"5-HT1B/1D agonists (triptans)","drugs":["Sumatriptan","Rizatriptan","Zolmitriptan"]},{"heading":"5-HT3 antagonists","drugs":["Ondansetron","Granisetron"]},{"heading":"5-HT antagonists","drugs":["Cyproheptadine","Ketanserin","Methysergide"]}]},{"heading":"C. Prostaglandins & analogues","drugs":["Misoprostol (PGE1)","Latanoprost (PGF2α — ophthalmic)","Alprostadil","Dinoprostone","Epoprostenol/Iloprost"]},{"heading":"D. NSAIDs (prostaglandin-synthesis inhibitors)","groups":[{"heading":"Non-selective COX inhibitors","drugs":["Aspirin","Ibuprofen","Naproxen","Diclofenac","Indomethacin","Ketorolac","Piroxicam"]},{"heading":"Preferential COX-2","drugs":["Meloxicam","Nimesulide","Etodolac"]},{"heading":"Selective COX-2 inhibitors (coxibs)","drugs":["Celecoxib","Etoricoxib","Parecoxib"]},{"heading":"Analgesic-antipyretic (poor anti-inflammatory)","drugs":["Paracetamol (acetaminophen)","Metamizol"]}]},{"heading":"E. Leukotriene modifiers","drugs":["Montelukast (LTRA)","Zafirlukast (LTRA)","Zileuton (5-LOX inhibitor)"]}]}]},"details":{"Chlorpheniramine":{"adme":"Well absorbed orally with low-moderate bioavailability due to first-pass metabolism, ~70% protein bound, hepatic CYP metabolism, renally excreted, and readily crosses the BBB causing sedation, half-life ~20 h.","moa":"First-generation reversible competitive H1-receptor antagonist with anticholinergic activity.","uses":"Allergic rhinitis, urticaria, common cold combinations, pruritus","adr":"Sedation, dry mouth, blurred vision, urinary retention, constipation"},"Diphenhydramine":{"adme":"Orally absorbed with ~40-60% bioavailability from first-pass metabolism, ~80% protein bound, extensively hepatic (CYP2D6) metabolized, renally excreted, and crosses the BBB causing marked sedation, half-life ~8 h.","moa":"First-generation competitive H1-receptor antagonist with strong anticholinergic and antiemetic actions.","uses":"Allergy, motion sickness, insomnia, antiparkinsonian/dystonia, antitussive","adr":"Marked sedation, dry mouth, dizziness, urinary retention, paradoxical excitation in children"},"Promethazine":{"adme":"Orally absorbed with ~25% bioavailability from extensive first-pass metabolism, highly protein bound (~90%), hepatic CYP metabolism, renal excretion of metabolites, and crosses the BBB, half-life ~10-14 h.","moa":"First-generation phenothiazine H1-antagonist with antimuscarinic, antidopaminergic and antiemetic properties.","uses":"Allergy, motion sickness, nausea/vomiting, sedation, preanesthetic medication","adr":"Sedation, anticholinergic effects, extrapyramidal symptoms, respiratory depression in infants"},"Hydroxyzine":{"adme":"Well absorbed orally, highly protein bound, hepatically metabolized to active cetirizine, renally excreted, and crosses the BBB causing sedation, half-life ~20 h.","moa":"First-generation piperazine H1-antagonist with anxiolytic and antiemetic activity.","uses":"Pruritus/urticaria, anxiety, sedation, premedication, nausea","adr":"Sedation, dry mouth, headache, QT prolongation at high doses"},"Cyclizine":{"adme":"Orally absorbed, hepatically metabolized to norcyclizine, renally excreted, and crosses the BBB, half-life ~20 h.","moa":"First-generation piperazine H1-antagonist with antimuscarinic and central antiemetic actions on the vestibular apparatus.","uses":"Motion sickness, nausea and vomiting, vertigo","adr":"Drowsiness, dry mouth, blurred vision, tachycardia"},"Cetirizine":{"adme":"Rapidly and well absorbed orally (~70% bioavailability), highly protein bound (~93%), minimally metabolized, largely excreted unchanged renally, and poorly crosses the BBB giving low sedation, half-life ~8-10 h.","moa":"Second-generation selective peripheral H1-receptor antagonist (carboxylated metabolite of hydroxyzine).","uses":"Allergic rhinitis, chronic urticaria, conjunctivitis","adr":"Mild sedation, dry mouth, headache, fatigue"},"Loratadine":{"adme":"Well absorbed orally, highly protein bound, extensively metabolized by CYP3A4/2D6 to active desloratadine, renally and biliary excreted, and poorly crosses the BBB (non-sedating), half-life ~8 h (metabolite longer).","moa":"Second-generation selective peripheral H1-receptor antagonist.","uses":"Allergic rhinitis, chronic urticaria","adr":"Headache, dry mouth, fatigue, rare sedation"},"Fexofenadine":{"adme":"Orally absorbed with ~33% bioavailability, ~65% protein bound, minimally metabolized, mostly excreted unchanged in feces and urine, and does not cross the BBB (non-sedating); a P-glycoprotein substrate, half-life ~14 h.","moa":"Second-generation selective peripheral H1-receptor antagonist (active metabolite of terfenadine).","uses":"Allergic rhinitis, chronic urticaria","adr":"Headache, nausea, dizziness, minimal sedation"},"Desloratadine":{"adme":"Well absorbed orally, highly protein bound (~85%), hepatically metabolized to 3-hydroxydesloratadine, renally and biliary excreted, and poorly crosses the BBB (non-sedating), half-life ~27 h.","moa":"Second-generation selective peripheral H1-receptor antagonist (active metabolite of loratadine).","uses":"Allergic rhinitis, chronic urticaria","adr":"Headache, dry mouth, fatigue, rare sedation"},"Levocetirizine":{"adme":"Rapidly and almost completely absorbed orally (~85-90% bioavailability), highly protein bound (~90%), minimally metabolized, excreted largely unchanged renally, and poorly crosses the BBB (low sedation), half-life ~7-8 h.","moa":"Second-generation selective peripheral H1-antagonist (active R-enantiomer of cetirizine).","uses":"Allergic rhinitis, chronic urticaria","adr":"Mild sedation, dry mouth, headache, fatigue"},"Famotidine":{"adme":"Orally absorbed with ~40-45% bioavailability, low protein binding (~15-20%), minimal hepatic metabolism, mostly excreted unchanged renally, half-life ~3 h.","moa":"Competitive H2-receptor antagonist that reduces gastric acid secretion.","uses":"Peptic ulcer, GERD, dyspepsia, stress ulcer prophylaxis","adr":"Headache, dizziness, constipation/diarrhea, rare confusion in elderly"},"Ranitidine":{"adme":"Orally absorbed with ~50% bioavailability, ~15% protein bound, partial hepatic metabolism, mostly renally excreted, half-life ~2-3 h.","moa":"Competitive H2-receptor antagonist that reduces gastric acid secretion.","uses":"Peptic ulcer, GERD, dyspepsia (largely withdrawn over NDMA contamination)","adr":"Headache, dizziness, constipation, rare hepatotoxicity"},"Cimetidine":{"adme":"Orally absorbed with ~60-70% bioavailability, ~20% protein bound, partial hepatic metabolism, largely renally excreted, half-life ~2 h.","moa":"Competitive H2-receptor antagonist that reduces gastric acid; also inhibits hepatic CYP enzymes.","uses":"Peptic ulcer, GERD, Zollinger-Ellison syndrome","adr":"Gynecomastia, antiandrogenic effects, confusion in elderly, multiple CYP drug interactions"},"Sumatriptan":{"adme":"Poor oral bioavailability (~15%), low protein binding (~15%), metabolized by MAO-A, renally excreted, and poorly crosses the BBB, half-life ~2 h.","moa":"Selective 5-HT1B/1D receptor agonist causing cranial vasoconstriction and inhibition of trigeminal neuropeptide release.","uses":"Acute migraine, cluster headache","adr":"Chest tightness, paresthesia, flushing, dizziness, coronary vasospasm"},"Rizatriptan":{"adme":"Orally absorbed with ~45% bioavailability, low protein binding (~14%), metabolized by MAO-A, renally excreted, half-life ~2-3 h.","moa":"Selective 5-HT1B/1D receptor agonist causing cranial vasoconstriction and trigeminal inhibition.","uses":"Acute migraine","adr":"Chest tightness, dizziness, somnolence, paresthesia, dry mouth"},"Zolmitriptan":{"adme":"Orally absorbed with ~40% bioavailability, ~25% protein bound, hepatically metabolized (CYP1A2) to an active metabolite, renally excreted, half-life ~3 h.","moa":"Selective 5-HT1B/1D receptor agonist causing cranial vasoconstriction and trigeminal inhibition.","uses":"Acute migraine, cluster headache","adr":"Chest tightness, paresthesia, dizziness, dry mouth, nausea"},"Ondansetron":{"adme":"Orally absorbed with ~60% bioavailability, ~70-75% protein bound, extensively hepatic (CYP3A4/1A2/2D6) metabolized, renally excreted, half-life ~3-5 h.","moa":"Selective 5-HT3 receptor antagonist at central and peripheral (vagal) sites blocking the emetic reflex.","uses":"Chemotherapy/radiotherapy-induced and postoperative nausea/vomiting","adr":"Headache, constipation, QT prolongation, dizziness"},"Granisetron":{"adme":"Orally absorbed with ~60% bioavailability, ~65% protein bound, hepatically (CYP3A4) metabolized, renally and biliary excreted, half-life ~9 h.","moa":"Selective 5-HT3 receptor antagonist blocking the emetic reflex centrally and peripherally.","uses":"Chemotherapy/radiotherapy-induced and postoperative nausea/vomiting","adr":"Headache, constipation, QT prolongation, asthenia"},"Cyproheptadine":{"adme":"Well absorbed orally, hepatically metabolized, renally excreted, and crosses the BBB causing sedation, half-life ~8 h.","moa":"H1-antihistamine with antiserotonergic (5-HT2) and antimuscarinic activity that stimulates appetite.","uses":"Allergy, pruritus, appetite stimulation, serotonin syndrome, carcinoid-related symptoms","adr":"Sedation, increased appetite/weight gain, dry mouth, dizziness"},"Ketanserin":{"adme":"Orally absorbed with high bioavailability, highly protein bound, extensively hepatically metabolized, renally and fecally excreted, half-life ~13-18 h.","moa":"Selective 5-HT2A (and alpha-1 adrenergic) receptor antagonist producing vasodilation.","uses":"Hypertension, vasospastic disorders (Raynaud phenomenon)","adr":"Dizziness, fatigue, dry mouth, QT prolongation, orthostatic hypotension"},"Methysergide":{"adme":"Orally absorbed, hepatically metabolized to active methylergometrine, renally excreted, half-life ~1 h (metabolite longer).","moa":"Ergot derivative and 5-HT2 receptor antagonist used for migraine prophylaxis.","uses":"Migraine and cluster headache prophylaxis, carcinoid diarrhea","adr":"Retroperitoneal/pleural/cardiac fibrosis (with prolonged use), nausea, vasoconstriction, drowsiness"},"Misoprostol (PGE1)":{"adme":"Rapidly absorbed orally, rapidly de-esterified to active misoprostol acid (~85% protein bound), hepatically metabolized, renally excreted, half-life ~20-40 min.","moa":"Synthetic PGE1 analogue that stimulates gastric mucus/bicarbonate, inhibits acid secretion, and induces uterine contraction.","uses":"NSAID-induced ulcer prevention, medical abortion (with mifepristone), labor induction, postpartum hemorrhage","adr":"Diarrhea, abdominal cramps, uterine contractions, miscarriage (contraindicated in pregnancy for ulcers)"},"Latanoprost (PGF2α — ophthalmic)":{"adme":"Administered topically to the eye as a prodrug, hydrolyzed by corneal esterases to active acid, systemically minimal absorption with rapid hepatic clearance, half-life ~17 min systemically.","moa":"Prostaglandin F2alpha analogue that increases uveoscleral aqueous outflow, lowering intraocular pressure.","uses":"Open-angle glaucoma, ocular hypertension","adr":"Iris hyperpigmentation, eyelash growth, conjunctival hyperemia, periorbital pigmentation"},"Alprostadil":{"adme":"Given by injection or intraurethral/intracavernosal route, ~80% metabolized in a single lung pass, metabolites renally excreted, very short half-life (~30 sec-10 min).","moa":"Synthetic PGE1 that causes vasodilation, smooth muscle relaxation, and maintains ductus arteriosus patency.","uses":"Erectile dysfunction, maintaining patent ductus arteriosus in neonates, peripheral vascular disease","adr":"Penile pain/priapism, apnea in neonates, hypotension, flushing, fever"},"Dinoprostone":{"adme":"Administered intravaginally or as a cervical gel, rapidly metabolized locally and in lung/liver, metabolites renally excreted, very short half-life.","moa":"Synthetic PGE2 that induces cervical ripening and uterine contractions.","uses":"Cervical ripening, labor induction, termination of pregnancy","adr":"Uterine hyperstimulation, nausea, vomiting, diarrhea, fever"},"Epoprostenol/Iloprost":{"adme":"Epoprostenol given by continuous IV infusion (half-life ~3-5 min, rapidly hydrolyzed in blood); iloprost inhaled or IV with half-life ~20-30 min, hepatically metabolized and renally excreted.","moa":"Prostacyclin (PGI2) analogues causing potent pulmonary/systemic vasodilation and inhibition of platelet aggregation.","uses":"Pulmonary arterial hypertension","adr":"Flushing, headache, hypotension, jaw pain, cough (inhaled iloprost)"},"Aspirin":{"adme":"Rapidly absorbed orally, ~80-90% protein bound, hydrolyzed to salicylate then hepatically conjugated, renally excreted (alkalinization enhances clearance), half-life dose-dependent (~15 min for aspirin, hours for salicylate).","moa":"Irreversibly acetylates COX-1 and COX-2, inhibiting prostaglandin and thromboxane synthesis.","uses":"Pain, fever, inflammation, antiplatelet (MI/stroke prophylaxis)","adr":"GI bleeding/ulcer, tinnitus, bronchospasm, Reye syndrome in children, bleeding"},"Ibuprofen":{"adme":"Well absorbed orally with high bioavailability, highly protein bound (~99%), hepatically (CYP2C9) metabolized, renally excreted, half-life ~2 h.","moa":"Reversible non-selective COX-1/COX-2 inhibitor reducing prostaglandin synthesis.","uses":"Pain, fever, inflammation, dysmenorrhea, patent ductus arteriosus closure","adr":"Dyspepsia, GI bleeding, renal impairment, fluid retention, cardiovascular risk"},"Naproxen":{"adme":"Well absorbed orally with near-complete bioavailability, highly protein bound (~99%), hepatically metabolized, renally excreted, long half-life ~12-17 h.","moa":"Reversible non-selective COX inhibitor reducing prostaglandin synthesis.","uses":"Pain, inflammation, rheumatoid/osteoarthritis, gout, dysmenorrhea","adr":"Dyspepsia, GI bleeding, renal impairment, fluid retention"},"Diclofenac":{"adme":"Well absorbed orally with ~50% bioavailability due to first-pass metabolism, highly protein bound (~99%), hepatically (CYP2C9) metabolized, renally and biliary excreted, half-life ~1-2 h.","moa":"Reversible non-selective COX inhibitor with relative COX-2 preference reducing prostaglandin synthesis.","uses":"Pain, inflammation, arthritis, postoperative analgesia, topical use","adr":"Dyspepsia, GI bleeding, hepatotoxicity, cardiovascular risk, renal impairment"},"Indomethacin":{"adme":"Well absorbed orally with high bioavailability, highly protein bound (~90%), hepatically metabolized, renally and biliary excreted, half-life ~4-5 h.","moa":"Potent reversible non-selective COX inhibitor reducing prostaglandin synthesis.","uses":"Acute gout, ankylosing spondylitis, patent ductus arteriosus closure, severe inflammation","adr":"Severe GI irritation/bleeding, headache, dizziness, renal impairment, CNS effects"},"Ketorolac":{"adme":"Well absorbed orally and parenterally with high bioavailability, highly protein bound (~99%), hepatically metabolized, renally excreted, half-life ~5-6 h.","moa":"Potent reversible non-selective COX inhibitor with strong analgesic activity.","uses":"Short-term moderate-severe acute pain, postoperative analgesia","adr":"GI bleeding/ulcer, renal impairment, bleeding (limited to <5 days use)"},"Piroxicam":{"adme":"Well absorbed orally, highly protein bound (~99%), hepatically metabolized, renally excreted, very long half-life ~50 h (once-daily dosing).","moa":"Reversible non-selective COX inhibitor (oxicam) reducing prostaglandin synthesis.","uses":"Rheumatoid/osteoarthritis, acute gout, musculoskeletal pain","adr":"High GI bleeding risk, serious skin reactions, renal impairment, edema"},"Meloxicam":{"adme":"Well absorbed orally with high bioavailability, highly protein bound (~99%), hepatically (CYP2C9) metabolized, renally and fecally excreted, half-life ~15-20 h.","moa":"Preferential COX-2 inhibitor reducing prostaglandin synthesis with relative COX-1 sparing.","uses":"Osteoarthritis, rheumatoid arthritis","adr":"Dyspepsia, GI bleeding (lower than non-selective), edema, renal impairment, cardiovascular risk"},"Nimesulide":{"adme":"Well absorbed orally with high bioavailability, highly protein bound (~99%), hepatically (CYP2C9) metabolized, renally and fecally excreted, half-life ~2-5 h.","moa":"Preferential COX-2 inhibitor reducing prostaglandin synthesis.","uses":"Pain, fever, inflammation (restricted in many countries)","adr":"Hepatotoxicity (notable), dyspepsia, GI effects, skin reactions"},"Etodolac":{"adme":"Well absorbed orally with high bioavailability, highly protein bound (~99%), hepatically metabolized, renally excreted, half-life ~6-7 h.","moa":"Preferential COX-2 inhibitor reducing prostaglandin synthesis.","uses":"Osteoarthritis, rheumatoid arthritis, pain","adr":"Dyspepsia, GI bleeding, renal impairment, edema"},"Celecoxib":{"adme":"Orally absorbed with good bioavailability, highly protein bound (~97%), hepatically (CYP2C9) metabolized, fecally and renally excreted, half-life ~11 h.","moa":"Selective COX-2 inhibitor reducing prostaglandin synthesis while sparing COX-1.","uses":"Osteoarthritis, rheumatoid arthritis, acute pain, familial adenomatous polyposis","adr":"Cardiovascular/thrombotic risk, renal impairment, sulfonamide hypersensitivity, dyspepsia"},"Etoricoxib":{"adme":"Well absorbed orally with ~100% bioavailability, highly protein bound (~92%), hepatically (CYP3A4) metabolized, renally excreted, long half-lif
