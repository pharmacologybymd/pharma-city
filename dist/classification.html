<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pharmacology Classification Flowchart</title>
  <style>/* ── Pharmacology Classification Flowchart — standalone page ───────────── */
:root {
  --bg: #eef5fb;
  --panel: #ffffff;
  --ink: #16203a;
  --muted: #5d6883;
  --accent: #2e7be0;
  --accent-soft: rgba(46, 123, 224, 0.10);
  --border: rgba(15, 22, 42, 0.12);
  --line: #b9c6d8;
  --gng: #2e7be0;
  --kdt: #14a06a;
  --shadow: 0 6px 22px rgba(15, 22, 42, 0.12);
}
body.cf-night {
  --bg: #0f1626;
  --panel: #182238;
  --ink: #e8eefb;
  --muted: #93a0bd;
  --accent: #6aa6ff;
  --accent-soft: rgba(106, 166, 255, 0.14);
  --border: rgba(255, 255, 255, 0.12);
  --line: #3a4a66;
  --shadow: 0 6px 22px rgba(0, 0, 0, 0.45);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
.cf-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 15px; }

/* layout */
.cf-app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
.cf-sidebar { background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 14px 10px; }
.cf-brand { font-size: 15px; font-weight: 700; padding: 6px 10px 12px; letter-spacing: 0.01em; }
.cf-brand small { display: block; font-weight: 400; color: var(--muted); font-size: 11px; margin-top: 3px; }
.cf-dlist { list-style: none; margin: 0; padding: 0; }
.cf-dlist li { padding: 9px 12px; border-radius: 9px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--ink); margin-bottom: 2px; transition: background 0.12s ease; }
.cf-dlist li:hover { background: var(--accent-soft); }
.cf-dlist li.active { background: var(--accent); color: #fff; }
.cf-dlist li small { display: block; font-weight: 400; font-size: 10.5px; opacity: 0.75; margin-top: 1px; }

.cf-main { overflow-y: auto; padding: 0 26px 60px; }
.cf-topbar { position: sticky; top: 0; z-index: 5; background: var(--bg); padding: 18px 0 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.cf-title { font-size: 21px; font-weight: 700; margin: 0; flex: 1 1 auto; }
.cf-tabs { display: inline-flex; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.cf-tab { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); }
.cf-tab.active.gng { background: var(--gng); color: #fff; }
.cf-tab.active.kdt { background: var(--kdt); color: #fff; }
.cf-btn { background: var(--panel); border: 1px solid var(--border); color: var(--ink); padding: 8px 12px; border-radius: 9px; font-size: 12.5px; font-weight: 600; cursor: pointer; }
.cf-btn:hover { background: var(--accent-soft); }
.cf-search { background: var(--panel); border: 1px solid var(--border); color: var(--ink); padding: 8px 12px; border-radius: 9px; font-size: 13px; outline: none; min-width: 180px; }
.cf-search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.cf-cite { font-size: 12px; color: var(--muted); margin: 2px 0 14px; }

/* diagrams section */
.cf-diagrams { margin: 4px 0 18px; }
.cf-diagrams:empty { display: none; }
.cf-diagrams-head { display: inline-flex; align-items: center; gap: 7px; font-size: 13.5px; font-weight: 650; cursor: pointer; padding: 7px 12px; background: var(--panel); border: 1px solid var(--border); border-left: 4px solid #d98c00; border-radius: 9px; box-shadow: var(--shadow); }
.cf-diagrams.cf-collapsed .cf-diagrams-head .cf-caret { transform: rotate(-90deg); }
.cf-diagrams.cf-collapsed .cf-diagrams-grid { display: none; }
.cf-diagrams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; margin-top: 12px; }
.cf-fig { margin: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px 10px; box-shadow: var(--shadow); color: var(--ink); }
.cf-fig-title { font-size: 13px; font-weight: 650; margin-bottom: 6px; }
.cf-fig-svg svg { width: 100%; height: auto; display: block; }
.cf-fig figcaption { font-size: 11.5px; color: var(--muted); line-height: 1.45; margin-top: 8px; }

/* tree flowchart */
.cf-tree, .cf-tree ul { list-style: none; margin: 0; padding: 0; }
.cf-tree ul { margin-left: 18px; padding-left: 16px; border-left: 2px solid var(--line); }
.cf-tree li { position: relative; margin: 6px 0; }
.cf-tree ul > li::before { content: ""; position: absolute; left: -16px; top: 16px; width: 14px; height: 2px; background: var(--line); }

.cf-group > .cf-node { display: inline-flex; align-items: center; gap: 7px; background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 9px; padding: 7px 12px; font-weight: 650; font-size: 13.5px; cursor: pointer; box-shadow: var(--shadow); }
.cf-group.gng > .cf-node { border-left-color: var(--gng); }
.cf-group.kdt > .cf-node { border-left-color: var(--kdt); }
.cf-caret { font-size: 10px; color: var(--muted); transition: transform 0.15s ease; }
.cf-collapsed > .cf-node .cf-caret { transform: rotate(-90deg); }
.cf-collapsed > ul { display: none; }

.cf-drug > .cf-node { display: inline-flex; align-items: center; gap: 6px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; font-size: 13px; cursor: pointer; transition: background 0.12s ease, border-color 0.12s ease; }
.cf-drug > .cf-node:hover { background: var(--accent-soft); border-color: var(--accent); }
.cf-drug.open > .cf-node { background: var(--accent); color: #fff; border-color: var(--accent); }
.cf-drug .cf-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.cf-drug.open .cf-dot { background: #fff; }
.cf-drug.nodata > .cf-node { color: var(--muted); font-style: italic; cursor: default; }
.cf-hit > .cf-node { outline: 2px solid #f5a623; outline-offset: 1px; }

/* detail card */
.cf-card { margin: 8px 0 4px; max-width: 720px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
.cf-card-head { padding: 11px 16px; font-weight: 700; font-size: 14.5px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
.cf-card-head .cf-klass { font-weight: 400; font-size: 11.5px; color: var(--muted); text-align: right; }
.cf-row { display: grid; grid-template-columns: 132px 1fr; gap: 10px; padding: 9px 16px; border-top: 1px solid var(--border); font-size: 13px; line-height: 1.5; }
.cf-row:first-child { border-top: none; }
.cf-row .cf-k { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--muted); padding-top: 2px; }
.cf-row.adme .cf-k { color: #b06f00; }
.cf-row.moa  .cf-k { color: var(--accent); }
.cf-row.uses .cf-k { color: var(--kdt); }
.cf-row.adr  .cf-k { color: #c0392b; }
.cf-note { padding: 9px 16px; font-size: 13px; color: var(--muted); line-height: 1.5; }

@media (max-width: 760px) {
  .cf-app { grid-template-columns: 1fr; }
  .cf-sidebar { position: fixed; z-index: 20; width: 240px; height: 100%; transform: translateX(-100%); transition: transform 0.2s ease; }
  .cf-sidebar.open { transform: translateX(0); }
  .cf-row { grid-template-columns: 1fr; gap: 2px; }
}
</style>
</head>

,"Partial agonist","Inverse agonist","Competitive antagonist","Non-competitive antagonist"]}]},{"heading":"C. Drug interactions","groups":[{"heading":"Pharmacokinetic interactions","drugs":["Absorption","Protein-binding displacement","Enzyme induction/inhibition","Altered excretion"]},{"heading":"Pharmacodynamic interactions","drugs":["Synergism / additive","Antagonism"]}]},{"heading":"D. Pharmacology in special populations","groups":[{"heading":"Pregnancy & lactation","drugs":["FDA pregnancy categories","Teratogens (Thalidomide, Warfarin, Isotretinoin, Valproate)"]},{"heading":"Geriatric pharmacology","drugs":["Reduced clearance","Altered Vd","Polypharmacy"]},{"heading":"Paediatric pharmacology","drugs":["Weight/BSA-based dosing","Immature metabolism & excretion"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 1–5","groups":[{"heading":"A. Pharmacokinetics","groups":[{"heading":"Absorption","drugs":["Bioavailability","First-pass (presystemic) metabolism"]},{"heading":"Distribution","drugs":["Volume of distribution","Plasma protein binding"]},{"heading":"Metabolism (biotransformation)","drugs":["Phase I (microsomal CYP450)","Phase II (conjugation)","Inducers: Rifampin, Phenytoin, Carbamazepine","Inhibitors: Ketoconazole, Erythromycin, Cimetidine"]},{"heading":"Excretion","groups":[{"heading":"Clearance (CL)","drugs":["CL = rate of elimination ÷ plasma concentration","Total (systemic) clearance = renal + hepatic + other","Renal clearance (filtration + secretion − reabsorption)","Hepatic clearance & extraction ratio (ER)","Flow-limited vs capacity-limited clearance","Maintenance dose rate = CL × target Css","Clearance, Vd & half-life (t½ = 0.693·Vd ÷ CL)","Creatinine clearance (Cockcroft–Gault; renal dose adjustment)"]}],"drugs":["Plasma half-life","Zero-order & first-order kinetics"]}]},{"heading":"B. Pharmacodynamics","groups":[{"heading":"Dose–response & efficacy/potency","drugs":["Graded & quantal curves","ED50 / TD50"]},{"heading":"Therapeutic index & NTI drugs","drugs":["Warfarin","Digoxin","Lithium","Phenytoin","Theophylline"]},{"heading":"Receptors & transducers","drugs":["GPCRs","Ion channels","Enzymatic receptors","Nuclear receptors"]},{"heading":"Agonists & antagonists","drugs":["Full/partial agonist","Inverse agonist","Competitive & non-competitive antagonist"]}]},{"heading":"C. Drug interactions","groups":[{"heading":"Pharmacokinetic","drugs":["Absorption","Protein binding","Metabolism","Excretion"]},{"heading":"Pharmacodynamic","drugs":["Synergism","Antagonism"]}]},{"heading":"D. Special populations","groups":[{"heading":"Pregnancy & lactation","drugs":["Teratogenic drugs","Drug transfer in milk"]},{"heading":"Geriatric","drugs":["Altered kinetics & dynamics"]},{"heading":"Paediatric","drugs":["Dose calculation","Immature organ function"]}]}]}]},"details":{"Bioavailability (F)":{"note":"Fraction of an administered dose that reaches the systemic circulation unchanged; 100% for IV, reduced orally by incomplete absorption and first-pass metabolism."},"First-pass metabolism":{"note":"Pre-systemic metabolism of an orally absorbed drug in gut wall and liver before it reaches systemic circulation, lowering oral bioavailability."},"Routes bypassing first-pass (sublingual, IV, rectal)":{"note":"Sublingual, IV and (partly) rectal routes drain into systemic veins, avoiding hepatic first-pass and giving higher, faster bioavailability."},"Volume of distribution (Vd)":{"note":"Apparent volume (dose / plasma concentration) relating amount of drug in body to plasma level; high Vd indicates extensive tissue distribution."},"Plasma protein binding (albumin, α1-acid glycoprotein)":{"note":"Acidic drugs bind albumin and basic drugs bind α1-acid glycoprotein; only the free fraction is pharmacologically active and eliminated."},"CYP3A4":{"note":"Most abundant hepatic and intestinal CYP isoenzyme, metabolising ~50% of drugs; induced by rifampicin and inhibited by ketoconazole, causing many interactions."},"CYP2D6":{"note":"Hepatic CYP isoenzyme with genetic polymorphism (poor/ultra-rapid metabolisers) handling many antidepressants, antipsychotics, beta-blockers and codeine activation."},"CYP2C9":{"note":"Polymorphic CYP isoenzyme metabolising warfarin, phenytoin and many NSAIDs; variant alleles increase bleeding/toxicity risk."},"Glucuronidation":{"note":"Major phase II conjugation reaction adding glucuronic acid via UGT enzymes to make drugs water-soluble for excretion; immature in neonates."},"Sulfation":{"note":"Phase II conjugation transferring a sulfate group, important for paracetamol and steroid metabolism but easily saturated."},"Acetylation":{"note":"Phase II conjugation by N-acetyltransferase with genetic fast/slow acetylator polymorphism affecting isoniazid, hydralazine and sulfonamides."},"Rifampicin":{"adme":"Well absorbed orally (food reduces absorption), highly protein bound, deacetylated in liver and excreted in bile with enterohepatic recycling, half-life ~2-3 h.","moa":"Inhibits bacterial DNA-dependent RNA polymerase, blocking RNA synthesis; bactericidal against mycobacteria.","uses":"Tuberculosis, leprosy, meningococcal/H. influenzae prophylaxis, MRSA combinations.","adr":"Hepatotoxicity, orange discoloration of secretions, flu-like syndrome, potent CYP enzyme induction."},"Phenytoin":{"adme":"Variable oral absorption, highly albumin bound, hepatic CYP2C9/2C19 metabolism showing zero-order (saturable) kinetics, half-life ~6-24 h.","moa":"Blocks voltage-gated sodium channels in their inactivated state, stabilising neuronal membranes.","uses":"Generalised tonic-clonic and partial seizures, status epilepticus, trigeminal neuralgia.","adr":"Gum hyperplasia, hirsutism, nystagmus, ataxia, megaloblastic anaemia, teratogenicity, enzyme induction."},"Carbamazepine":{"adme":"Slowly absorbed orally, ~75% protein bound, hepatic CYP3A4 metabolism with autoinduction shortening its own half-life, active epoxide metabolite.","moa":"Blocks voltage-gated sodium channels, reducing high-frequency repetitive neuronal firing.","uses":"Partial and tonic-clonic seizures, trigeminal neuralgia, bipolar disorder.","adr":"Diplopia, ataxia, hyponatraemia (SIADH), aplastic anaemia, Stevens-Johnson syndrome, enzyme induction."},"Ketoconazole":{"adme":"Oral absorption needs gastric acid, highly protein bound, hepatic metabolism, poor CNS penetration, half-life ~8 h.","moa":"Inhibits fungal CYP-dependent 14-α-demethylase, blocking ergosterol synthesis; also inhibits human CYP3A4.","uses":"Topical dermatophyte/candidal infections, seborrhoeic dermatitis, Cushing syndrome (off-label); systemic use largely abandoned.","adr":"Hepatotoxicity, gynaecomastia, adrenal suppression, potent CYP3A4 inhibition causing drug interactions."},"Erythromycin":{"adme":"Acid-labile (enteric-coated), well distributed, hepatic metabolism, biliary excretion, half-life ~1.5 h.","moa":"Binds 50S ribosomal subunit, inhibiting bacterial protein synthesis; bacteriostatic.","uses":"Atypical pneumonia, pertussis, penicillin-allergic streptococcal infections, gastroparesis (prokinetic).","adr":"GI upset (motilin agonism), cholestatic hepatitis, QT prolongation, CYP3A4 inhibition."},"Cimetidine":{"adme":"Well absorbed orally, partly hepatically metabolised and partly renally excreted, crosses placenta, half-life ~2 h.","moa":"Competitively blocks histamine H2 receptors on gastric parietal cells, reducing acid secretion.","uses":"Peptic ulcer disease, GERD, Zollinger-Ellison syndrome (largely superseded by PPIs).","adr":"Gynaecomastia, antiandrogenic effects, confusion in elderly, potent CYP inhibition raising levels of warfarin/phenytoin/theophylline."},"Clearance (CL)":{"note":"Volume of plasma cleared of drug per unit time by all routes; key determinant of maintenance dosing at steady state."},"CL = rate of elimination ÷ plasma concentration":{"note":"Clearance is the proportionality constant linking rate of elimination to plasma concentration: CL = rate of elimination / C. Units are volume/time (mL/min or L/h) — the notional volume of plasma completely freed of drug per unit time. For first-order drugs CL is constant and independent of concentration."},"Total (systemic) clearance = renal + hepatic + other":{"note":"Total body clearance is the sum of all organ clearances: CL(total) = CL(renal) + CL(hepatic) + CL(other, e.g. pulmonary/biliary). Each organ clearance = blood flow to that organ × its extraction ratio."},"Renal clearance (filtration + secretion − reabsorption)":{"note":"Renal clearance = (glomerular filtration + active tubular secretion) − tubular reabsorption. GFR is estimated by inulin or creatinine clearance; secretion (e.g. penicillin, methotrexate) is competed by probenecid; reabsorption is pH-dependent and altered by urinary alkalinisation/acidification."},"Hepatic clearance & extraction ratio (ER)":{"note":"Hepatic clearance = hepatic blood flow (Q) × extraction ratio (ER), where ER = (Ca − Cv)/Ca. High-ER drugs (>0.7: propranolol, lignocaine, morphine, GTN) undergo extensive first-pass metabolism; low-ER drugs (<0.3: warfarin, phenytoin, theophylline) do not."},"Flow-limited vs capacity-limited clearance":{"note":"High-extraction (flow-limited) drugs: clearance tracks hepatic blood flow, marked first-pass, low oral bioavailability — affected by cardiac output/liver disease. Low-extraction (capacity-limited) drugs: clearance depends on enzyme activity and free fraction — sensitive to enzyme induction/inhibition and protein binding."},"Maintenance dose rate = CL × target Css":{"note":"At steady state, dosing rate = rate of elimination = CL × Css. Therefore maintenance dose rate = (CL × target steady-state concentration) / bioavailability (F). Clearance — not half-life — is the parameter that sets the maintenance dose."},"Clearance, Vd & half-life (t½ = 0.693·Vd ÷ CL)":{"note":"Half-life is a derived (dependent) parameter: t½ = 0.693 × Vd / CL. It lengthens with a larger volume of distribution and shortens with greater clearance. Steady state and ~94–97% elimination are reached in 4–5 half-lives."},"Creatinine clearance (Cockcroft–Gault; renal dose adjustment)":{"note":"Creatinine clearance estimates GFR to guide dose reduction of renally-eliminated drugs. Cockcroft–Gault: CrCl = [(140 − age) × weight(kg) × (0.85 if female)] / (72 × serum creatinine). Applied to aminoglycosides, vancomycin, digoxin, DOACs, etc."},"Half-life (t½)":{"note":"Time for plasma concentration to fall by half; determines dosing interval and time to reach (and decay from) steady state (~4-5 half-lives)."},"Zero-order vs first-order kinetics":{"note":"First-order eliminates a constant fraction per unit time (most drugs); zero-order eliminates a constant amount when enzymes saturate (e.g. phenytoin, ethanol, aspirin)."},"Graded dose–response":{"note":"Continuous individual response increasing with dose, defining potency (EC50), efficacy (Emax) and the slope of the curve."},"Quantal dose–response":{"note":"All-or-none population response plotted as cumulative percent responding, yielding ED50, TD50 and the therapeutic index."},"ED50 / TD50":{"note":"ED50 is the dose producing the effect in 50% of a population and TD50 the toxic dose in 50%; their ratio (TD50/ED50) gives the therapeutic index."},"Warfarin":{"adme":"Almost completely absorbed orally, ~99% albumin bound, hepatic CYP2C9 metabolism, narrow therapeutic index, half-life ~36-42 h.","moa":"Inhibits vitamin K epoxide reductase, reducing synthesis of clotting factors II, VII, IX, X and proteins C/S.","uses":"Atrial fibrillation, venous thromboembolism prophylaxis and treatment, mechanical heart valves.","adr":"Bleeding, skin necrosis, teratogenicity, numerous interactions via protein binding and CYP2C9."},"Digoxin":{"adme":"Good oral absorption, low protein binding, large Vd, predominantly renal excretion unchanged, narrow therapeutic index, half-life ~36-40 h.","moa":"Inhibits the myocardial Na+/K+-ATPase, raising intracellular calcium for positive inotropy; increases vagal tone.","uses":"Heart failure with reduced ejection fraction, rate control in atrial fibrillation.","adr":"Nausea, visual disturbances, arrhythmias, toxicity potentiated by hypokalaemia and reduced renal function."},"Lithium":{"adme":"Completely absorbed orally, not protein bound or metabolised, excreted unchanged renally (handled like sodium), narrow therapeutic index, half-life ~18-24 h.","moa":"Modulates inositol and GABA/glutamate signalling and inhibits GSK-3, stabilising mood.","uses":"Acute mania and maintenance of bipolar disorder, augmentation in resistant depression.","adr":"Tremor, polyuria (nephrogenic DI), hypothyroidism, toxicity (ataxia, seizures) worsened by dehydration, NSAIDs, thiazides."},"Theophylline":{"adme":"Well absorbed orally, ~40% protein bound, hepatic CYP1A2 metabolism, narrow therapeutic index, half-life affected by smoking and interacting drugs.","moa":"Nonselective phosphodiesterase inhibition and adenosine receptor antagonism causing bronchodilation.","uses":"Chronic asthma and COPD, occasionally apnoea of prematurity.","adr":"Nausea, tremor, insomnia, tachyarrhythmias and seizures at toxic levels; interacts with CYP1A2 inhibitors."},"G-protein-coupled receptors":{"note":"Seven-transmembrane receptors that activate heterotrimeric G proteins to modulate second messengers (cAMP, IP3/DAG); the largest druggable receptor family."},"Ion channels":{"note":"Ligand- or voltage-gated transmembrane pores whose opening alters ion flux; targets of local anaesthetics, anticonvulsants and benzodiazepines."},"Enzyme-linked receptors":{"note":"Single-transmembrane receptors with intrinsic or associated enzyme (e.g. tyrosine kinase) activity, mediating insulin and growth factor signalling."},"Nuclear (intracellular) receptors":{"note":"Intracellular receptors for lipophilic ligands (steroids, thyroid hormone) that act as transcription factors with a slow, sustained genomic response."},"Full agonist":{"note":"Ligand that binds and produces the maximal possible tissue response (full efficacy) at receptor saturation."},"Partial agonist":{"note":"Ligand that produces a submaximal response even at full occupancy and can antagonise a full agonist by competing for the receptor."},"Inverse agonist":{"note":"Ligand that binds a constitutively active receptor and produces the opposite effect, reducing basal activity below baseline."},"Competitive antagonist":{"note":"Reversibly binds the agonist site, producing a parallel rightward shift of the dose-response curve that is surmountable by higher agonist concentrations."},"Non-competitive antagonist":{"note":"Binds irreversibly or at an allosteric site, lowering maximal response in a way that cannot be overcome by increasing agonist."},"Absorption":{"note":"Movement of drug from the site of administration into the bloodstream, governed by route, lipid solubility, ionisation and surface area."},"Protein-binding displacement":{"note":"A drug displacing another from plasma protein binding raises the free fraction of the displaced drug, transiently increasing its effect (e.g. on warfarin)."},"Enzyme induction/inhibition":{"note":"Inducers increase metabolising enzyme activity (lowering levels of co-administered drugs) while inhibitors reduce it (raising levels and toxicity risk)."},"Altered excretion":{"note":"Interactions changing renal clearance via competition for tubular transport or urinary pH changes (e.g. probenecid, alkalinisation)."},"Synergism / additive":{"note":"Combined drug effect that equals (additive) or exceeds (synergistic, supra-additive) the sum of individual effects."},"Antagonism":{"note":"One drug reducing or abolishing the effect of another by chemical, physiological, pharmacokinetic or receptor-level mechanisms."},"FDA pregnancy categories":{"note":"Former A/B/C/D/X risk classification of drugs in pregnancy by evidence of fetal harm, since replaced by the narrative PLLR labelling."},"Teratogens (Thalidomide, Warfarin, Isotretinoin, Valproate)":{"note":"Drugs causing structural fetal malformations, classically thalidomide (phocomelia), warfarin (embryopathy), isotretinoin and valproate (neural tube defects)."},"Reduced clearance":{"note":"Decline in hepatic and renal drug elimination (notably in elderly and organ impairment) that prolongs half-life and risks accumulation."},"Altered Vd":{"note":"Changes in volume of distribution from altered body composition (fat, water, muscle, protein) affecting loading dose and drug levels at the extremes of age."},"Polypharmacy":{"note":"Concurrent use of multiple drugs, common in the elderly, increasing risk of interactions, adverse effects and poor adherence."},"Weight/BSA-based dosing":{"note":"Adjusting paediatric and chemotherapy doses to body weight or body surface area to account for size-related pharmacokinetic differences."},"Immature metabolism & excretion":{"note":"Neonatal immaturity of hepatic enzymes (especially glucuronidation) and renal function prolongs drug half-life and predisposes to toxicity."},"Bioavailability":{"note":"Fraction of an administered dose reaching the systemic circulation unchanged; complete for IV, reduced orally by incomplete absorption and first-pass effect."},"First-pass (presystemic) metabolism":{"note":"Metabolism of an orally absorbed drug in gut wall and liver before reaching the systemic circulation, reducing oral bioavailability."},"Volume of distribution":{"note":"Apparent volume relating total drug in the body to its plasma concentration; high values indicate extensive tissue or fat distribution."},"Plasma protein binding":{"note":"Reversible binding of drug to albumin (acids) or α1-acid glycoprotein (bases); only the unbound fraction is active and eliminated."},"Phase I (microsomal CYP450)":{"note":"Functionalisation reactions (oxidation, reduction, hydrolysis) mainly by hepatic microsomal cytochrome P450 enzymes that introduce or expose a reactive group."},"Phase II (conjugation)":{"note":"Synthetic conjugation reactions (glucuronidation, sulfation, acetylation, glutathione) that attach endogenous groups to produce water-soluble, excretable metabolites."},"Inducers: Rifampin, Phenytoin, Carbamazepine":{"note":"Classic enzyme inducers that upregulate CYP450 activity, accelerating metabolism and lowering plasma levels of co-administered drugs."},"Inhibitors: Ketoconazole, Erythromycin, Cimetidine":{"note":"Classic enzyme inhibitors that suppress CYP450 activity, slowing metabolism and raising plasma levels and toxicity of co-administered drugs."},"Clearance":{"note":"Volume of plasma cleared of drug per unit time by all eliminating organs; the key determinant of maintenance dose at steady state."},"Plasma half-life":{"note":"Time for the plasma drug concentration to fall by half; governs dosing frequency and time to reach or decay from steady state."},"Zero-order & first-order kinetics":{"note":"First-order removes a constant fraction per unit time (most drugs); zero-order removes a constant amount once enzymes saturate (phenytoin, ethanol, aspirin)."},"Graded & quantal curves":{"note":"Graded curves plot continuous individual response (potency, efficacy) while quantal curves plot all-or-none population response (ED50, TD50, therapeutic index)."},"GPCRs":{"note":"Seven-transmembrane G-protein-coupled receptors signalling through second messengers like cAMP and IP3/DAG; the largest family of drug targets."},"Enzymatic receptors":{"note":"Membrane receptors with intrinsic or linked enzyme activity (e.g. receptor tyrosine kinases) mediating insulin and growth factor responses."},"Nuclear receptors":{"note":"Intracellular receptors for lipophilic ligands (steroids, thyroid hormone, vitamin D) that act as transcription factors with slow genomic effects."},"Full/partial agonist":{"note":"Full agonists evoke the maximal tissue response; partial agonists give a submaximal response and can antagonise full agonists by competing for the receptor."},"Competitive & non-competitive antagonist":{"note":"Competitive antagonists cause a surmountable rightward curve shift; non-competitive antagonists irreversibly or allosterically lower the maximal response."},"Protein binding":{"note":"Reversible association of drug with plasma proteins; only the free fraction is active, distributes and is eliminated, and displacement can raise drug effect."},"Metabolism":{"note":"Enzymatic biotransformation (phase I and II), chiefly hepatic, that converts drugs into more water-soluble metabolites for excretion."},"Excretion":{"note":"Elimination of drugs and metabolites from the body, mainly via renal (filtration, secretion, reabsorption) and biliary routes."},"Synergism":{"note":"Combined drug effect that exceeds the sum of the individual effects (supra-additive interaction)."},"Teratogenic drugs":{"note":"Agents that cause structural or functional fetal malformations when given in pregnancy (e.g. thalidomide, warfarin, isotretinoin, valproate, ACE inhibitors)."},"Drug transfer in milk":{"note":"Passage of maternal drugs into breast milk, favoured by lipid solubility, low protein binding and basic drugs, potentially exposing the infant."},"Altered kinetics & dynamics":{"note":"Age- or disease-related changes in absorption, distribution, metabolism, excretion and receptor sensitivity that modify drug response."},"Dose calculation":{"note":"Determining appropriate doses using body weight, body surface area, age or renal function, especially in paediatric and special populations."},"Immature organ function":{"note":"Neonatal immaturity of hepatic metabolising enzymes and renal excretion that prolongs drug half-life and increases toxicity risk."}},"diagrams":[{"title":"Graded dose–response curve","caption":"Response rises sigmoidally with log dose. EC50 = potency (left = more potent); plateau height = efficacy (Emax). Drug A is more potent than B; both reach the same Emax.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Graded dose-response curve\">\n      <line x1=\"62\" y1=\"26\" x2=\"62\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"62\" y1=\"212\" x2=\"418\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"62\" y1=\"118\" x2=\"250\" y2=\"118\" stroke=\"currentColor\" stroke-width=\"1\" stroke-dasharray=\"4 4\" opacity=\"0.5\"/>\n      <line x1=\"250\" y1=\"212\" x2=\"250\" y2=\"118\" stroke=\"#2e7be0\" stroke-width=\"1\" stroke-dasharray=\"4 4\" opacity=\"0.7\"/>\n      <path d=\"M62,208 C150,208 175,202 210,128 C238,66 292,42 418,40\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"2.6\"/>\n      <path d=\"M120,208 C212,208 238,202 274,128 C302,66 352,46 418,44\" fill=\"none\" stroke=\"#d98c00\" stroke-width=\"2.2\" stroke-dasharray=\"6 4\"/>\n      <text x=\"30\" y=\"40\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">100%</text>\n      <text x=\"38\" y=\"122\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">50%</text>\n      <text x=\"232\" y=\"228\" fill=\"#2e7be0\" font-size=\"11\" font-family=\"sans-serif\">EC50</text>\n      <text x=\"150\" y=\"58\" fill=\"#2e7be0\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">A</text>\n      <text x=\"330\" y=\"74\" fill=\"#d98c00\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">B</text>\n      <text x=\"300\" y=\"34\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Emax (efficacy)</text>\n      <text x=\"190\" y=\"244\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">log [Dose] →</text>\n      <text x=\"14\" y=\"150\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\" transform=\"rotate(-90 14 150)\">Response →</text>\n    </svg>"},{"title":"Quantal curves & therapeutic index","caption":"Cumulative % of population responding vs log dose. Therapeutic index TI = TD50 / ED50; the wider the gap between the green (therapeutic) and red (lethal) curves, the safer the drug.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Quantal dose-response and therapeutic index\">\n      <line x1=\"56\" y1=\"26\" x2=\"56\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"56\" y1=\"212\" x2=\"420\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <path d=\"M56,208 C108,208 120,200 142,120 C160,58 196,44 236,42\" fill=\"none\" stroke=\"#14a06a\" stroke-width=\"2.4\"/>\n      <path d=\"M150,208 C202,208 214,200 236,120 C254,58 290,44 330,42\" fill=\"none\" stroke=\"#d98c00\" stroke-width=\"2.4\"/>\n      <path d=\"M236,208 C288,208 300,200 322,120 C340,58 376,44 416,42\" fill=\"none\" stroke=\"#c0392b\" stroke-width=\"2.4\"/>\n      <text x=\"120\" y=\"36\" fill=\"#14a06a\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">ED (effective)</text>\n      <text x=\"226\" y=\"34\" fill=\"#d98c00\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">TD (toxic)</text>\n      <text x=\"330\" y=\"36\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">LD (lethal)</text>\n      <line x1=\"142\" y1=\"120\" x2=\"142\" y2=\"212\" stroke=\"#14a06a\" stroke-dasharray=\"3 3\" opacity=\"0.6\"/>\n      <line x1=\"322\" y1=\"120\" x2=\"322\" y2=\"212\" stroke=\"#c0392b\" stroke-dasharray=\"3 3\" opacity=\"0.6\"/>\n      <text x=\"126\" y=\"226\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">ED50</text>\n      <text x=\"306\" y=\"226\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">LD50</text>\n      <text x=\"150\" y=\"246\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">log [Dose] →</text>\n      <text x=\"14\" y=\"160\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\" transform=\"rotate(-90 14 160)\">% responding →</text>\n    </svg>"},{"title":"Competitive vs non-competitive antagonism","caption":"Competitive antagonist → parallel RIGHT shift of the agonist curve, Emax unchanged (surmountable by more agonist). Non-competitive/irreversible → DEPRESSED Emax, not surmountable.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Competitive versus non-competitive antagonism\">\n      <line x1=\"58\" y1=\"26\" x2=\"58\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"58\" y1=\"212\" x2=\"420\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <path d=\"M58,206 C120,206 140,200 168,120 C190,58 232,44 300,42\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\"/>\n      <path d=\"M150,206 C212,206 232,200 260,120 C282,58 324,44 392,42\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"2.4\" stroke-dasharray=\"6 4\"/>\n      <path d=\"M58,206 C120,206 140,176 168,150 C190,128 232,120 300,118\" fill=\"none\" stroke=\"#c0392b\" stroke-width=\"2.4\" stroke-dasharray=\"6 4\"/>\n      <text x=\"92\" y=\"38\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">agonist alone</text>\n      <text x=\"312\" y=\"38\" fill=\"#2e7be0\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">+ competitive</text>\n      <text x=\"250\" y=\"138\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">+ non-competitive</text>\n      <text x=\"170\" y=\"244\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">log [Agonist] →</text>\n      <text x=\"14\" y=\"150\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\" transform=\"rotate(-90 14 150)\">Response →</text>\n    </svg>"},{"title":"Zero- vs first-order kinetics","caption":"First-order: a constant FRACTION is eliminated per unit time → exponential decay, constant half-life (most drugs). Zero-order: a constant AMOUNT is eliminated → straight-line fall, saturable (ethanol, phenytoin, aspirin in overdose).","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Zero order versus first order elimination\">\n      <line x1=\"58\" y1=\"26\" x2=\"58\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"58\" y1=\"212\" x2=\"420\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <path d=\"M58,40 C150,150 230,196 410,208\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"2.6\"/>\n      <line x1=\"58\" y1=\"40\" x2=\"300\" y2=\"208\" stroke=\"#c0392b\" stroke-width=\"2.6\"/>\n      <text x=\"250\" y=\"120\" fill=\"#2e7be0\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">first-order (exponential)</text>\n      <text x=\"120\" y=\"100\" fill=\"#c0392b\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">zero-order</text>\n      <text x=\"190\" y=\"244\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Time →</text>\n      <text x=\"14\" y=\"170\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\" transform=\"rotate(-90 14 170)\">Plasma conc →</text>\n    </svg>"},{"title":"Plasma concentration–time curve","caption":"Single oral dose. Effect appears once conc crosses the MEC (onset) and lasts until it falls below it (duration); above the MTC = toxicity. The band between MEC and MTC is the therapeutic window; AUC reflects total exposure (bioavailability).","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Plasma concentration time curve\">\n      <line x1=\"58\" y1=\"26\" x2=\"58\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"58\" y1=\"212\" x2=\"420\" y2=\"212\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <rect x=\"58\" y=\"78\" width=\"362\" height=\"66\" fill=\"#14a06a\" opacity=\"0.10\"/>\n      <line x1=\"58\" y1=\"78\" x2=\"420\" y2=\"78\" stroke=\"#c0392b\" stroke-width=\"1.2\" stroke-dasharray=\"5 4\"/>\n      <line x1=\"58\" y1=\"144\" x2=\"420\" y2=\"144\" stroke=\"#14a06a\" stroke-width=\"1.2\" stroke-dasharray=\"5 4\"/>\n      <path d=\"M58,210 C110,210 120,70 168,64 C235,56 300,150 416,196\" fill=\"#2e7be0\" opacity=\"0.10\"/>\n      <path d=\"M58,210 C110,210 120,70 168,64 C235,56 300,150 416,196\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"2.6\"/>\n      <line x1=\"168\" y1=\"64\" x2=\"168\" y2=\"212\" stroke=\"currentColor\" stroke-dasharray=\"3 3\" opacity=\"0.5\"/>\n      <text x=\"424\" y=\"82\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">MTC</text>\n      <text x=\"424\" y=\"148\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">MEC</text>\n      <text x=\"150\" y=\"56\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">Cmax</text>\n      <text x=\"150\" y=\"228\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Tmax</text>\n      <text x=\"250\" y=\"120\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">therapeutic window (AUC)</text>\n      <text x=\"200\" y=\"244\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Time →</text>\n    </svg>"}]},{"id":"ans_hub","name":"ANS hub","theme_line":"Switchboard plaza · receptors are the city dispatcher","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 8–11","groups":[{"heading":"A. Ganglionic stimulants","drugs":["Nicotine","Lobeline","Varenicline","Cytisine","Dimethylphenylpiperazinium (DMPP)"]},{"heading":"B. Ganglionic blockers","drugs":["Hexamethonium","Trimethaphan","Mecamylamine","Pempidine"]},{"heading":"C. Skeletal muscle relaxants (neuromuscular blockers)","groups":[{"heading":"Depolarizing (non-competitive)","drugs":["Succinylcholine (suxamethonium)","Decamethonium"]},{"heading":"Non-depolarizing (competitive)","drugs":["Tubocurarine","Pancuronium","Vecuronium","Rocuronium","Atracurium","Cisatracurium","Mivacurium"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 7, 16","groups":[{"heading":"A. Ganglionic stimulants (ANS, ch. 7)","drugs":["Nicotine","Lobeline","Varenicline","Cytisine","Dimethylphenylpiperazinium (DMPP)"]},{"heading":"B. Ganglionic blockers (ANS, ch. 7)","drugs":["Hexamethonium","Trimethaphan","Mecamylamine","Pempidine"]},{"heading":"C. Skeletal muscle relaxants (ch. 16)","groups":[{"heading":"Peripherally acting — Depolarizing (non-competitive)","drugs":["Succinylcholine (suxamethonium)","Decamethonium"]},{"heading":"Peripherally acting — Non-depolarizing (competitive)","drugs":["Tubocurarine","Pancuronium","Vecuronium","Rocuronium","Atracurium","Cisatracurium","Mivacurium"]},{"heading":"Centrally-acting muscle relaxants","drugs":["Baclofen","Diazepam","Tizanidine","Methocarbamol","Chlorzoxazone"]}]}]}]},"details":{"Nicotine":{"adme":"Well absorbed orally, buccally and transdermally (subject to first-pass metabolism orally), ~5% plasma protein bound, extensively metabolised by hepatic CYP2A6 to cotinine with renal excretion and a half-life of about 2 hours.","moa":"Agonist at nicotinic acetylcholine receptors causing initial stimulation then depolarising blockade of autonomic ganglia, adrenal medulla and CNS.","uses":"Smoking cessation (gum, patch, lozenge, nasal spray), nicotine dependence.","adr":"Nausea, dizziness, palpitations, hypertension, insomnia, dependence."},"Lobeline":{"adme":"Absorbed orally and across mucosa, hepatically metabolised with renal excretion and a relatively short duration of action.","moa":"Partial agonist at nicotinic receptors with peripheral chemoreceptor (carotid body) stimulant and respiratory stimulant actions.","uses":"Formerly a smoking-cessation aid and respiratory stimulant.","adr":"Nausea, vomiting, cough, dizziness, tachycardia."},"Varenicline":{"adme":"Almost completely absorbed orally with high bioavailability unaffected by food, low (<20%) protein binding, minimal metabolism, and excreted largely unchanged in urine with a half-life of about 24 hours.","moa":"Partial agonist at the alpha4-beta2 neuronal nicotinic receptor, reducing craving and withdrawal while blunting the reward of smoking.","uses":"Smoking cessation.","adr":"Nausea, abnormal/vivid dreams, insomnia, headache, neuropsychiatric symptoms."},"Cytisine":{"adme":"Absorbed orally, minimally metabolised and excreted largely unchanged in the urine with a short half-life of a few hours.","moa":"Partial agonist at the alpha4-beta2 nicotinic receptor (the natural prototype for varenicline).","uses":"Smoking cessation.","adr":"Nausea, dyspepsia, dry mouth, headache, sleep disturbance."},"Dimethylphenylpiperazinium (DMPP)":{"adme":"A quaternary experimental agent, poorly absorbed orally and largely confined to the extracellular compartment with renal elimination.","moa":"Selective nicotinic ganglionic (NN) receptor agonist used as a pharmacological tool to stimulate autonomic ganglia.","uses":"Experimental/research ganglionic stimulant (not therapeutic).","adr":"Autonomic stimulation, hypertension, tachycardia (experimental setting)."},"Hexamethonium":{"adme":"A quaternary ammonium compound, poorly and erratically absorbed orally, not protein bound or metabolised, and excreted unchanged by the kidney.","moa":"Competitive nicotinic ganglion (NN) blocker that non-selectively blocks both sympathetic and parasympathetic ganglia.","uses":"Historical antihypertensive (now obsolete), pharmacological tool.","adr":"Postural hypotension, constipation, urinary retention, dry mouth, blurred vision, impotence."},"Trimethaphan":{"adme":"A quaternary compound given by IV infusion with rapid onset and very short duration, metabolised by plasma cholinesterase and renally excreted.","moa":"Competitive ganglionic (NN) blocker that also causes direct vasodilatation and histamine release.","uses":"Controlled hypotension during surgery, hypertensive emergencies/aortic dissection (historical).","adr":"Hypotension, tachycardia, ileus, urinary retention, mydriasis, histamine release."},"Mecamylamine":{"adme":"A secondary amine that is well absorbed orally, crosses the blood-brain barrier, undergoes minimal metabolism and is excreted slowly unchanged in urine (pH-dependent).","moa":"Non-competitive (channel-blocking) nicotinic ganglion blocker with central actions.","uses":"Historical antihypertensive; investigated for smoking cessation and Tourette syndrome.","adr":"Postural hypotension, constipation, tremor, confusion, dry mouth, urinary retention."},"Pempidine":{"adme":"A lipid-soluble tertiary amine, well absorbed orally, crosses into the CNS and excreted largely unchanged in the urine.","moa":"Competitive nicotinic ganglion blocker.","uses":"Historical oral antihypertensive (now obsolete).","adr":"Postural hypotension, constipation, dry mouth, blurred vision, CNS disturbances."},"Succinylcholine (suxamethonium)":{"adme":"Given IV with very rapid onset and brief (~5-10 min) action, rapidly hydrolysed by plasma pseudocholinesterase with prolonged effect in atypical-cholinesterase or deficient patients.","moa":"Depolarising neuromuscular blocker that persistently activates the nicotinic (NM) receptor causing initial fasciculations then phase I depolarising block.","uses":"Rapid-sequence intubation, brief muscle relaxation for short procedures.","adr":"Hyperkalaemia, malignant hyperthermia, muscle pain, bradycardia, raised intraocular/intragastric pressure, prolonged apnoea."},"Decamethonium":{"adme":"A quaternary compound given IV, not metabolised and excreted unchanged by the kidney, giving a longer action than succinylcholine.","moa":"Depolarising neuromuscular blocker producing sustained depolarisation of the motor end-plate nicotinic receptor.","uses":"Historical muscle relaxant (now obsolete).","adr":"Prolonged paralysis, fasciculations, hyperkalaemia, apnoea."},"Tubocurarine":{"adme":"A quaternary alkaloid given IV with intermediate-to-long duration, moderately protein bound, minimally metabolised and excreted mainly unchanged in urine and bile.","moa":"Non-depolarising competitive antagonist at the nicotinic (NM) receptor of the motor end-plate.","uses":"Historical surgical muscle relaxation (now largely obsolete).","adr":"Hypotension and bronchospasm from histamine release, ganglion block, prolonged paralysis."},"Pancuronium":{"adme":"A long-acting aminosteroid given IV, partly metabolised in the liver to active metabolites and excreted mainly renally with prolonged action in renal impairment.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist with vagolytic (antimuscarinic) activity.","uses":"Long-duration surgical muscle relaxation, ICU paralysis.","adr":"Tachycardia, hypertension, prolonged block in renal/hepatic impairment."},"Vecuronium":{"adme":"An intermediate-acting aminosteroid given IV, undergoes hepatic metabolism to active metabolites with biliary and some renal excretion.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist that is essentially cardiovascularly stable.","uses":"Intraoperative and ICU muscle relaxation.","adr":"Prolonged block in hepatic dysfunction, rare anaphylaxis, minimal cardiovascular effects."},"Rocuronium":{"adme":"An intermediate-acting aminosteroid given IV with rapid onset, minimal metabolism, and excretion mainly in bile with some renal clearance.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist; reversible by sugammadex.","uses":"Rapid-sequence intubation alternative to succinylcholine, surgical relaxation.","adr":"Prolonged block in hepatic impairment, anaphylaxis, injection pain."},"Atracurium":{"adme":"An intermediate-acting benzylisoquinolinium given IV, eliminated organ-independently by Hofmann elimination and ester hydrolysis, useful in hepatic/renal failure.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist.","uses":"Surgical muscle relaxation, especially in renal or hepatic impairment.","adr":"Histamine release causing hypotension, flushing and bronchospasm; seizures from laudanosine metabolite."},"Cisatracurium":{"adme":"An intermediate-acting benzylisoquinolinium isomer given IV, eliminated mainly by organ-independent Hofmann elimination with little histamine release.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist.","uses":"Surgical and ICU muscle relaxation, preferred in organ dysfunction.","adr":"Minimal histamine release, prolonged block with high doses, laudanosine accumulation."},"Mivacurium":{"adme":"A short-acting benzylisoquinolinium given IV, rapidly hydrolysed by plasma pseudocholinesterase giving brief action prolonged in cholinesterase deficiency.","moa":"Non-depolarising competitive nicotinic (NM) receptor antagonist.","uses":"Short surgical procedures requiring brief muscle relaxation.","adr":"Histamine release with hypotension and flushing, prolonged block in pseudocholinesterase deficiency."},"Baclofen":{"adme":"Well absorbed orally, low protein binding, minimally metabolised and excreted largely unchanged by the kidney with a half-life of about 3-4 hours.","moa":"GABA-B receptor agonist that inhibits spinal mono- and polysynaptic reflexes reducing spasticity.","uses":"Spasticity in multiple sclerosis and spinal cord injury, intrathecal for severe spasticity.","adr":"Drowsiness, weakness, dizziness, hypotonia; abrupt withdrawal causes seizures and rebound spasticity."},"Diazepam":{"adme":"Well absorbed orally with high lipid solubility, highly (~98%) protein bound, hepatically metabolised by CYP to active metabolites (desmethyldiazepam) with a long half-life and renal excretion.","moa":"Benzodiazepine that enhances GABA-A receptor chloride conductance, producing central muscle relaxation via spinal and supraspinal action.","uses":"Spasticity and muscle spasm, anxiety, status epilepticus, alcohol withdrawal, sedation.","adr":"Sedation, drowsiness, dependence, respiratory depression, tolerance, ataxia."},"Tizanidine":{"adme":"Well absorbed orally but extensive first-pass metabolism gives low bioavailability, ~30% protein bound, metabolised by hepatic CYP1A2 with renal excretion and a short half-life.","moa":"Central alpha-2 adrenergic agonist that reduces spasticity by inhibiting spinal polysynaptic reflexes via reduced excitatory amino-acid release.","uses":"Spasticity in multiple sclerosis, spinal injury and stroke.","adr":"Drowsiness, hypotension, dry mouth, dizziness, hepatotoxicity (raised transaminases)."},"Methocarbamol":{"adme":"Well absorbed orally, hepatically metabolised by dealkylation and conjugation with renal excretion and a half-life of 1-2 hours.","moa":"Centrally acting skeletal muscle relaxant (carbamate) that depresses polysynaptic spinal reflexes, mechanism not fully defined.","uses":"Acute musculoskeletal pain and muscle spasm.","adr":"Drowsiness, dizziness, lightheadedness, nausea, urine discolouration."},"Chlorzoxazone":{"adme":"Well absorbed orally, hepatically metabolised by CYP2E1 (a probe substrate) to a glucuronide conjugate excreted renally with a short half-life.","moa":"Centrally acting skeletal muscle relaxant that depresses spinal and supraspinal polysynaptic reflexes.","uses":"Acute painful musculoskeletal conditions and muscle spasm.","adr":"Drowsiness, dizziness, gastrointestinal upset, rare hepatotoxicity, orange-red urine discolouration."}},"diagrams":[{"title":"Cholinergic synapse","caption":"Choline + acetyl-CoA →(ChAT)→ ACh, stored via VAChT, released to act on muscarinic (M) & nicotinic (N) receptors; acetylcholinesterase (AChE) terminates the signal. Anti-AChE drugs raise ACh; antimuscarinics block M; choline reuptake blocked by hemicholinium.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Cholinergic synapse\">\n      <path d=\"M40,30 H300 V120 Q300,150 250,150 H40 Z\" fill=\"#2e7be0\" opacity=\"0.07\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <rect x=\"40\" y=\"186\" width=\"360\" height=\"44\" rx=\"8\" fill=\"#14a06a\" opacity=\"0.08\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <text x=\"52\" y=\"48\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Choline + AcCoA</text>\n      <text x=\"120\" y=\"70\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">ChAT</text>\n      <text x=\"70\" y=\"92\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">ACh</text>\n      <circle cx=\"150\" cy=\"120\" r=\"5\" fill=\"#2e7be0\"/><circle cx=\"178\" cy=\"132\" r=\"5\" fill=\"#2e7be0\"/><circle cx=\"206\" cy=\"124\" r=\"5\" fill=\"#2e7be0\"/>\n      <line x1=\"150\" y1=\"125\" x2=\"150\" y2=\"186\" stroke=\"#2e7be0\" stroke-width=\"1\" opacity=\"0.6\"/>\n      <rect x=\"120\" y=\"186\" width=\"40\" height=\"10\" fill=\"#14a06a\"/><text x=\"124\" y=\"216\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">M / N</text>\n      <text x=\"250\" y=\"120\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">AChE</text>\n      <text x=\"250\" y=\"136\" fill=\"currentColor\" font-size=\"9\" font-family=\"sans-serif\">→ choline + acetate</text>\n      <text x=\"300\" y=\"208\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">postsynaptic effector cell</text>\n      <text x=\"44\" y=\"22\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">cholinergic nerve terminal</text>\n    </svg>"}]},{"id":"cholinergic","name":"Cholinergic","theme_line":"Flooded swamp-town · SLUDGE","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 11–13","groups":[{"heading":"A. Cholinergic agonists (cholinomimetics)","groups":[{"heading":"I. Direct-acting","groups":[{"heading":"Choline esters","drugs":["Acetylcholine","Methacholine","Carbachol","Bethanechol"]},{"heading":"Natural alkaloids & analogues","drugs":["Pilocarpine","Muscarine","Cevimeline"]}]},{"heading":"II. Indirect-acting (anticholinesterases)","groups":[{"heading":"Reversible","drugs":["Edrophonium","Neostigmine","Pyridostigmine","Physostigmine","Donepezil","Rivastigmine","Galantamine"]},{"heading":"Irreversible (organophosphates)","drugs":["Echothiophate","Parathion","Malathion","Sarin","Soman"]},{"heading":"Cholinesterase reactivator","drugs":["Pralidoxime (2-PAM)"]}]}]},{"heading":"B. Muscarinic antagonists (antimuscarinics)","groups":[{"heading":"Belladonna alkaloids","drugs":["Atropine","Hyoscine (scopolamine)"]},{"heading":"Semisynthetic / synthetic","drugs":["Homatropine","Tropicamide","Cyclopentolate","Ipratropium","Tiotropium","Glycopyrrolate","Oxybutynin","Tolterodine","Solifenacin","Trihexyphenidyl","Benztropine"]}]},{"heading":"C. Inhibitor of ACh release","drugs":["Botulinum toxin"]}]},{"label":"KDT 8e/9e","cite":"ch. 7–9","groups":[{"heading":"A. Cholinergic drugs","groups":[{"heading":"I. Directly acting","groups":[{"heading":"Choline esters","drugs":["Acetylcholine","Methacholine","Carbachol","Bethanechol"]},{"heading":"Cholinomimetic alkaloids","drugs":["Pilocarpine","Muscarine","Arecoline"]}]},{"heading":"II. Indirectly acting (anticholinesterases)","groups":[{"heading":"Reversible","drugs":["Physostigmine","Neostigmine","Pyridostigmine","Edrophonium","Rivastigmine","Donepezil","Galantamine","Tacrine"]},{"heading":"Irreversible (organophosphates & carbamates)","drugs":["Dyflos","Echothiophate","Parathion","Malathion","Carbaryl","Propoxur"]}]}]},{"heading":"B. Anticholinergic (antimuscarinic) drugs","groups":[{"heading":"Natural alkaloids","drugs":["Atropine","Hyoscine"]},{"heading":"Semisynthetic derivatives","drugs":["Homatropine","Atropine methonitrate","Hyoscine butylbromide","Ipratropium bromide","Tiotropium bromide"]},{"heading":"Synthetic — mydriatics","drugs":["Cyclopentolate","Tropicamide"]},{"heading":"Synthetic — antisecretory / antispasmodic","drugs":["Propantheline","Glycopyrrolate","Clidinium","Pirenzepine","Dicyclomine"]},{"heading":"Synthetic — vesicoselective (urinary)","drugs":["Oxybutynin","Tolterodine","Solifenacin","Darifenacin"]},{"heading":"Synthetic — antiparkinsonian","drugs":["Trihexyphenidyl (benzhexol)","Procyclidine","Biperiden","Benztropine"]}]}]}]},"details":{"Acetylcholine":{"adme":"Quaternary ammonium ester with negligible oral absorption, not protein bound, hydrolysed within seconds by plasma and tissue cholinesterases so no renal role and no CNS penetration.","moa":"Endogenous agonist that directly activates all muscarinic and nicotinic receptors.","uses":"Intraocular miosis during surgery, research tool","adr":"Bradycardia, hypotension, bronchospasm, flushing, salivation"},"Methacholine":{"adme":"Quaternary choline ester poorly absorbed orally, hydrolysed slowly by acetylcholinesterase and resistant to butyrylcholinesterase, minimal CNS penetration.","moa":"Selective muscarinic agonist with predominant cardiovascular and airway effects.","uses":"Bronchial provocation testing for asthma","adr":"Bronchospasm, cough, chest tightness, bradycardia"},"Carbachol":{"adme":"Quaternary carbamic acid ester, not absorbed orally and resistant to cholinesterase hydrolysis giving prolonged action, no significant CNS penetration.","moa":"Direct agonist of both muscarinic and nicotinic receptors.","uses":"Intraoperative and topical miosis, glaucoma","adr":"Miosis, brow ache, sweating, GI cramps, bradycardia"},"Bethanechol":{"adme":"Quaternary choline carbamate variably absorbed orally, resistant to cholinesterase so longer acting, minimal protein binding and no CNS entry, excreted renally.","moa":"Selective muscarinic agonist acting mainly on bladder and gut smooth muscle.","uses":"Postoperative urinary retention, neurogenic atony, GI atony","adr":"Abdominal cramps, diarrhoea, urinary urgency, sweating, hypotension"},"Pilocarpine":{"adme":"Tertiary amine alkaloid well absorbed and lipid soluble, partly metabolised by plasma esterases with renal excretion, crosses the blood-brain barrier.","moa":"Direct muscarinic agonist, especially on exocrine glands and the eye.","uses":"Glaucoma, xerostomia, Sjogren dry mouth","adr":"Sweating, salivation, miosis, blurred vision, GI upset"},"Muscarine":{"adme":"Quaternary toxin from Inocybe and Clitocybe mushrooms, poorly absorbed but ingested, not hydrolysed by cholinesterase, does not cross the blood-brain barrier.","moa":"Pure muscarinic receptor agonist.","uses":"Toxicological reference agent (no therapeutic use)","adr":"SLUDGE syndrome, miosis, bradycardia, bronchospasm"},"Cevimeline":{"adme":"Tertiary amine well absorbed orally, moderately protein bound, metabolised by hepatic CYP2D6 and CYP3A with renal excretion, has some CNS penetration.","moa":"Muscarinic agonist with relative selectivity for M3 receptors on salivary glands.","uses":"Xerostomia of Sjogren syndrome","adr":"Sweating, nausea, rhinitis, diarrhoea, visual disturbance"},"Edrophonium":{"adme":"Quaternary alcohol with poor oral absorption, no cholinesterase metabolism, rapid renal excretion giving very short action, no CNS penetration.","moa":"Short-acting reversible acetylcholinesterase inhibitor binding the anionic site.","uses":"Diagnosis of myasthenia gravis, reversal of curare block","adr":"Bradycardia, salivation, bronchospasm, cholinergic crisis"},"Neostigmine":{"adme":"Quaternary carbamate poorly and erratically absorbed orally, hydrolysed by cholinesterases and partly hepatic, renally excreted, does not cross the blood-brain barrier.","moa":"Reversible acetylcholinesterase inhibitor that also directly stimulates nicotinic receptors at the neuromuscular junction.","uses":"Myasthenia gravis, reversal of non-depolarising block, postoperative ileus and urinary retention","adr":"Salivation, cramps, diarrhoea, bradycardia, bronchospasm"},"Pyridostigmine":{"adme":"Quaternary carbamate with poor and variable oral absorption but longer action than neostigmine, hydrolysed by cholinesterases and renally excreted, no CNS entry.","moa":"Reversible acetylcholinesterase inhibitor at neuromuscular and autonomic sites.","uses":"Chronic myasthenia gravis, nerve agent pretreatment prophylaxis","adr":"GI cramps, diarrhoea, salivation, muscle fasciculations"},"Physostigmine":{"adme":"Tertiary amine carbamate well absorbed and lipid soluble, hydrolysed by cholinesterases, short acting and renally excreted, crosses the blood-brain barrier.","moa":"Reversible acetylcholinesterase inhibitor active centrally and peripherally.","uses":"Antimuscarinic and anticholinergic poisoning, glaucoma","adr":"Seizures, bradycardia, salivation, bronchospasm, vomiting"},"Donepezil":{"adme":"Tertiary amine well absorbed with high oral bioavailability, highly protein bound, long half-life, hepatic CYP2D6 and CYP3A4 metabolism with renal excretion, crosses the blood-brain barrier.","moa":"Reversible centrally selective acetylcholinesterase inhibitor.","uses":"Alzheimer disease dementia","adr":"Nausea, diarrhoea, insomnia, bradycardia, muscle cramps"},"Rivastigmine":{"adme":"Tertiary carbamate well absorbed orally and transdermally, low protein binding, metabolised by cholinesterase-mediated hydrolysis with renal excretion, crosses the blood-brain barrier.","moa":"Pseudo-irreversible inhibitor of both acetylcholinesterase and butyrylcholinesterase.","uses":"Alzheimer and Parkinson disease dementia","adr":"Nausea, vomiting, anorexia, weight loss, dizziness"},"Galantamine":{"adme":"Tertiary alkaloid well absorbed orally, moderately protein bound, hepatic CYP2D6 and CYP3A4 metabolism with renal excretion, crosses the blood-brain barrier.","moa":"Reversible acetylcholinesterase inhibitor and allosteric potentiator of nicotinic receptors.","uses":"Mild to moderate Alzheimer disease","adr":"Nausea, vomiting, anorexia, bradycardia, dizziness"},"Echothiophate":{"adme":"Quaternary organophosphate with poor systemic absorption used topically, irreversibly binds cholinesterase giving very long duration, no CNS penetration.","moa":"Irreversible organophosphate acetylcholinesterase inhibitor.","uses":"Open-angle glaucoma, accommodative esotropia","adr":"Miosis, brow ache, cataract, systemic cholinergic toxicity"},"Parathion":{"adme":"Lipophilic organophosphate well absorbed by skin, lungs and gut, bioactivated by hepatic CYP to paraoxon, irreversibly binds cholinesterase, crosses the blood-brain barrier.","moa":"Irreversible acetylcholinesterase inhibitor after metabolic activation.","uses":"Agricultural insecticide (no therapeutic use)","adr":"SLUDGE, miosis, fasciculations, paralysis, seizures, respiratory failure"},"Malathion":{"adme":"Lipophilic organophosphate absorbed across skin and gut, bioactivated by CYP to malaoxon but rapidly detoxified by mammalian carboxylesterases, can cross the blood-brain barrier.","moa":"Irreversible acetylcholinesterase inhibitor after activation, with low mammalian toxicity.","uses":"Pediculosis and scabies, insecticide","adr":"Skin irritation, and in overdose cholinergic crisis"},"Sarin":{"adme":"Volatile lipophilic organophosphate rapidly absorbed by inhalation and skin, irreversibly phosphorylates cholinesterase and undergoes aging, readily crosses the blood-brain barrier.","moa":"Irreversible acetylcholinesterase inhibitor nerve agent.","uses":"Chemical warfare agent (no therapeutic use)","adr":"Miosis, copious secretions, fasciculations, convulsions, respiratory paralysis, death"},"Soman":{"adme":"Highly lipophilic organophosphate rapidly absorbed by inhalation and skin, irreversibly inhibits cholinesterase with extremely rapid aging, crosses the blood-brain barrier.","moa":"Irreversible acetylcholinesterase inhibitor nerve agent with very fast aging.","uses":"Chemical warfare agent (no therapeutic use)","adr":"Miosis, secretions, seizures, paralysis, rapid respiratory death"},"Pralidoxime (2-PAM)":{"adme":"Quaternary oxime with poor oral absorption given parenterally, not protein bound, rapidly excreted unchanged by the kidney, does not effectively cross the blood-brain barrier.","moa":"Reactivates organophosphate-inhibited acetylcholinesterase before aging occurs.","uses":"Organophosphate and nerve agent poisoning with atropine","adr":"Dizziness, blurred vision, tachycardia, injection-site pain, hypertension"},"Atropine":{"adme":"Tertiary amine well absorbed orally and across mucosa, partly hepatic metabolism with renal excretion of unchanged drug, crosses the blood-brain barrier.","moa":"Competitive non-selective muscarinic receptor antagonist.","uses":"Bradycardia, organophosphate poisoning, preanaesthetic antisecretory, mydriasis","adr":"Dry mouth, blurred vision, tachycardia, urinary retention, delirium"},"Hyoscine (scopolamine)":{"adme":"Tertiary amine well absorbed orally and transdermally, hepatic metabolism with renal excretion, readily crosses the blood-brain barrier.","moa":"Competitive non-selective muscarinic antagonist with prominent central action.","uses":"Motion sickness, postoperative nausea, preanaesthetic sedation","adr":"Sedation, dry mouth, blurred vision, amnesia, confusion"},"Homatropine":{"adme":"Tertiary amine ester absorbed across the conjunctiva, hydrolysed by esterases giving shorter ocular action than atropine, limited CNS penetration.","moa":"Competitive muscarinic antagonist producing mydriasis and cycloplegia.","uses":"Refraction mydriasis, anterior uveitis","adr":"Blurred vision, photophobia, raised intraocular pressure, dry mouth"},"Tropicamide":{"adme":"Tertiary amine absorbed across the cornea with rapid onset and short duration, metabolised systemically, minimal clinically relevant CNS effects.","moa":"Short-acting competitive muscarinic antagonist of the eye.","uses":"Diagnostic mydriasis and cycloplegia for fundoscopy","adr":"Transient stinging, blurred vision, photophobia, raised intraocular pressure"},"Cyclopentolate":{"adme":"Tertiary amine absorbed across the cornea with intermediate duration, systemically metabolised, can cause CNS effects in children.","moa":"Competitive muscarinic antagonist producing mydriasis and cycloplegia.","uses":"Cycloplegic refraction, uveitis","adr":"Blurred vision, photophobia, CNS disturbance in children, raised intraocular pressure"},"Ipratropium":{"adme":"Quaternary amine poorly absorbed from airways and gut acting locally after inhalation, minimal systemic exposure, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist causing bronchodilation.","uses":"COPD, acute asthma bronchodilation, rhinorrhoea","adr":"Dry mouth, cough, throat irritation, rarely urinary retention"},"Tiotropium":{"adme":"Quaternary amine minimally absorbed after inhalation acting locally with long airway dwell time, renal excretion, no CNS penetration.","moa":"Long-acting muscarinic antagonist with prolonged M3 receptor occupancy.","uses":"Maintenance bronchodilation in COPD and asthma","adr":"Dry mouth, constipation, urinary retention, glaucoma risk"},"Glycopyrrolate":{"adme":"Quaternary amine poorly absorbed orally, minimally metabolised and renally excreted, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist with strong antisecretory action.","uses":"Preanaesthetic antisialagogue, reversal cover with neostigmine, sialorrhoea","adr":"Dry mouth, tachycardia, constipation, urinary retention"},"Oxybutynin":{"adme":"Tertiary amine well absorbed orally with extensive first-pass CYP3A4 metabolism, available transdermally, crosses the blood-brain barrier.","moa":"Muscarinic antagonist with antispasmodic action on bladder detrusor.","uses":"Overactive bladder, urge incontinence","adr":"Dry mouth, constipation, blurred vision, confusion in elderly"},"Tolterodine":{"adme":"Tertiary amine well absorbed orally, highly protein bound, hepatic CYP2D6 and CYP3A4 metabolism to active metabolite with renal excretion, limited CNS penetration.","moa":"Competitive muscarinic antagonist with bladder selectivity.","uses":"Overactive bladder, urge incontinence","adr":"Dry mouth, constipation, blurred vision, headache"},"Solifenacin":{"adme":"Tertiary amine well absorbed orally with high bioavailability, highly protein bound, hepatic CYP3A4 metabolism and long half-life with renal excretion, limited CNS entry.","moa":"M3-selective muscarinic antagonist relaxing the detrusor.","uses":"Overactive bladder, urge incontinence","adr":"Dry mouth, constipation, blurred vision, QT prolongation"},"Trihexyphenidyl":{"adme":"Tertiary amine well absorbed orally, hepatic metabolism with renal excretion, readily crosses the blood-brain barrier.","moa":"Central muscarinic antagonist restoring dopamine-acetylcholine balance.","uses":"Parkinson disease tremor, drug-induced extrapyramidal symptoms","adr":"Dry mouth, blurred vision, confusion, memory impairment, constipation"},"Benztropine":{"adme":"Tertiary amine well absorbed orally and parenterally, hepatic metabolism, long acting, crosses the blood-brain barrier.","moa":"Central muscarinic antagonist with antihistaminic activity.","uses":"Parkinsonism, acute dystonia and drug-induced extrapyramidal symptoms","adr":"Dry mouth, blurred vision, sedation, confusion, constipation"},"Botulinum toxin":{"adme":"Large protein injected locally with no systemic absorption or oral activity, acts at the injection site with effects lasting months, no CNS penetration.","moa":"Cleaves SNAP-25 to block acetylcholine release at nerve terminals.","uses":"Dystonia, spasticity, hyperhidrosis, cosmetic wrinkles, chronic migraine","adr":"Local weakness, ptosis, dysphagia, rarely systemic botulism"},"Arecoline":{"adme":"Tertiary alkaloid from areca nut well absorbed across oral mucosa and gut, hydrolysed by esterases, crosses the blood-brain barrier.","moa":"Direct muscarinic and nicotinic receptor agonist.","uses":"Traditional masticatory stimulant, research tool (no approved use)","adr":"Salivation, sweating, bronchospasm, oral submucous fibrosis with chronic use"},"Tacrine":{"adme":"Tertiary amine well absorbed orally with low and variable bioavailability, hepatic CYP1A2 metabolism with renal excretion, crosses the blood-brain barrier.","moa":"Reversible acetylcholinesterase inhibitor acting centrally.","uses":"Alzheimer disease (largely withdrawn due to hepatotoxicity)","adr":"Hepatotoxicity, nausea, diarrhoea, dizziness, bradycardia"},"Dyflos":{"adme":"Highly lipophilic organophosphate readily absorbed across skin and mucosa, irreversibly phosphorylates cholinesterase with very long action, crosses the blood-brain barrier.","moa":"Irreversible organophosphate acetylcholinesterase inhibitor.","uses":"Glaucoma (historical), research tool","adr":"Miosis, brow ache, lacrimation, systemic cholinergic toxicity"},"Carbaryl":{"adme":"Carbamate insecticide absorbed across skin, lungs and gut, hydrolysed with renal excretion, can cross the blood-brain barrier producing transient inhibition.","moa":"Reversible carbamate acetylcholinesterase inhibitor.","uses":"Agricultural and veterinary insecticide, pediculosis","adr":"Salivation, miosis, nausea, fasciculations in overdose"},"Propoxur":{"adme":"Carbamate insecticide rapidly absorbed by all routes, spontaneously hydrolysed from cholinesterase giving reversible short action, crosses the blood-brain barrier.","moa":"Reversible carbamate acetylcholinesterase inhibitor.","uses":"Household and agricultural insecticide","adr":"Miosis, salivation, sweating, cramps, fasciculations in overdose"},"Hyoscine":{"adme":"Tertiary amine well absorbed orally and transdermally, hepatic metabolism with renal excretion, readily crosses the blood-brain barrier.","moa":"Competitive non-selective muscarinic antagonist with central action.","uses":"Motion sickness, antiemesis, preanaesthetic medication","adr":"Sedation, dry mouth, blurred vision, confusion, amnesia"},"Atropine methonitrate":{"adme":"Quaternary derivative of atropine poorly absorbed orally with minimal systemic exposure, renally excreted, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist with peripheral antispasmodic and antisecretory action.","uses":"GI spasm, infantile pyloric spasm, antisecretory","adr":"Dry mouth, blurred vision, tachycardia, constipation"},"Hyoscine butylbromide":{"adme":"Quaternary amine poorly absorbed orally acting peripherally, minimally metabolised and renally excreted, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist with smooth muscle antispasmodic action.","uses":"Abdominal and renal colic, GI and genitourinary spasm","adr":"Dry mouth, tachycardia, blurred vision, urinary retention"},"Ipratropium bromide":{"adme":"Quaternary amine poorly absorbed after inhalation acting locally on airways, minimal systemic exposure, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist producing bronchodilation.","uses":"COPD, acute asthma, rhinorrhoea","adr":"Dry mouth, cough, throat irritation, rarely glaucoma"},"Tiotropium bromide":{"adme":"Quaternary amine minimally absorbed after inhalation with prolonged airway action, renal excretion, no CNS penetration.","moa":"Long-acting muscarinic antagonist with slow M3 dissociation.","uses":"Maintenance therapy of COPD and asthma","adr":"Dry mouth, constipation, urinary retention, glaucoma risk"},"Propantheline":{"adme":"Quaternary amine incompletely and erratically absorbed orally, hydrolysed in the gut with renal excretion, does not cross the blood-brain barrier.","moa":"Non-selective muscarinic antagonist with antisecretory and antispasmodic action.","uses":"Peptic ulcer adjunct, GI spasm, hyperhidrosis","adr":"Dry mouth, blurred vision, tachycardia, constipation, urinary retention"},"Clidinium":{"adme":"Quaternary amine poorly absorbed orally acting peripherally on the gut, minimal CNS penetration, renally excreted.","moa":"Non-selective muscarinic antagonist with GI antispasmodic action.","uses":"Irritable bowel syndrome and peptic ulcer (often with chlordiazepoxide)","adr":"Dry mouth, blurred vision, constipation, urinary hesitancy"},"Pirenzepine":{"adme":"Quaternary-like amine poorly absorbed orally, minimally metabolised and largely renally excreted, does not cross the blood-brain barrier.","moa":"Selective M1 muscarinic antagonist reducing gastric acid secretion.","uses":"Peptic ulcer disease (acid reduction)","adr":"Dry mouth, blurred vision, constipation"},"Dicyclomine":{"adme":"Tertiary amine well absorbed orally, hepatic metabolism with renal excretion, can cross the blood-brain barrier.","moa":"Muscarinic antagonist with direct smooth muscle relaxant action.","uses":"Irritable bowel syndrome, infantile colic, GI spasm","adr":"Dry mouth, blurred vision, drowsiness, dizziness, constipation"},"Darifenacin":{"adme":"Tertiary amine well absorbed orally with low bioavailability due to first pass, highly protein bound, hepatic CYP2D6 and CYP3A4 metabolism, limited CNS penetration.","moa":"M3-selective muscarinic antagonist relaxing the detrusor.","uses":"Overactive bladder, urge incontinence","adr":"Dry mouth, constipation, blurred vision, dyspepsia"},"Trihexyphenidyl (benzhexol)":{"adme":"Tertiary amine well absorbed orally, hepatic metabolism with renal excretion, readily crosses the blood-brain barrier.","moa":"Central muscarinic antagonist correcting striatal dopamine-acetylcholine imbalance.","uses":"Parkinson disease tremor, drug-induced extrapyramidal symptoms","adr":"Dry mouth, blurred vision, confusion, memory impairment, constipation"},"Procyclidine":{"adme":"Tertiary amine well absorbed orally and parenterally, hepatic metabolism, crosses the blood-brain barrier.","moa":"Central muscarinic antagonist restoring dopamine-acetylcholine balance.","uses":"Parkinsonism, acute dystonia and drug-induced extrapyramidal symptoms","adr":"Dry mouth, blurred vision, confusion, constipation, urinary retention"},"Biperiden":{"adme":"Tertiary amine well absorbed orally and parenterally, hepatic metabolism with renal excretion, crosses the blood-brain barrier.","moa":"Central muscarinic antagonist with relative M1 selectivity.","uses":"Parkinsonism, drug-induced extrapyramidal symptoms and acute dystonia","adr":"Dry mouth, blurred vision, confusion, constipation, urinary retention"}},"diagrams":[{"title":"Cholinergic synapse","caption":"Choline + acetyl-CoA →(ChAT)→ ACh, stored via VAChT, released to act on muscarinic (M) & nicotinic (N) receptors; acetylcholinesterase (AChE) terminates the signal. Anti-AChE drugs raise ACh; antimuscarinics block M; choline reuptake blocked by hemicholinium.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Cholinergic synapse\">\n      <path d=\"M40,30 H300 V120 Q300,150 250,150 H40 Z\" fill=\"#2e7be0\" opacity=\"0.07\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <rect x=\"40\" y=\"186\" width=\"360\" height=\"44\" rx=\"8\" fill=\"#14a06a\" opacity=\"0.08\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <text x=\"52\" y=\"48\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Choline + AcCoA</text>\n      <text x=\"120\" y=\"70\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">ChAT</text>\n      <text x=\"70\" y=\"92\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">ACh</text>\n      <circle cx=\"150\" cy=\"120\" r=\"5\" fill=\"#2e7be0\"/><circle cx=\"178\" cy=\"132\" r=\"5\" fill=\"#2e7be0\"/><circle cx=\"206\" cy=\"124\" r=\"5\" fill=\"#2e7be0\"/>\n      <line x1=\"150\" y1=\"125\" x2=\"150\" y2=\"186\" stroke=\"#2e7be0\" stroke-width=\"1\" opacity=\"0.6\"/>\n      <rect x=\"120\" y=\"186\" width=\"40\" height=\"10\" fill=\"#14a06a\"/><text x=\"124\" y=\"216\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">M / N</text>\n      <text x=\"250\" y=\"120\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">AChE</text>\n      <text x=\"250\" y=\"136\" fill=\"currentColor\" font-size=\"9\" font-family=\"sans-serif\">→ choline + acetate</text>\n      <text x=\"300\" y=\"208\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">postsynaptic effector cell</text>\n      <text x=\"44\" y=\"22\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">cholinergic nerve terminal</text>\n    </svg>"}]},{"id":"adrenergic","name":"Adrenergic","theme_line":"Power plant with stacks, lightning · fight-or-flight","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 14–15","groups":[{"heading":"A. Adrenergic agonists (sympathomimetics)","groups":[{"heading":"By mechanism","groups":[{"heading":"Direct-acting","drugs":["Adrenaline","Noradrenaline","Isoprenaline","Dopamine","Dobutamine","Phenylephrine","Clonidine","Salbutamol"]},{"heading":"Indirect-acting","drugs":["Tyramine","Amphetamine","Cocaine"]},{"heading":"Mixed-acting","drugs":["Ephedrine","Pseudoephedrine"]}]},{"heading":"By receptor selectivity","groups":[{"heading":"α1 agonists","drugs":["Phenylephrine","Methoxamine"]},{"heading":"α2 agonists (central)","drugs":["Clonidine","Methyldopa","Dexmedetomidine"]},{"heading":"β1 agonists","drugs":["Dobutamine"]},{"heading":"β2 agonists","drugs":["Salbutamol","Terbutaline","Salmeterol"]}]}]},{"heading":"B. Adrenergic antagonists (sympatholytics)","groups":[{"heading":"α-blockers","groups":[{"heading":"Non-selective","drugs":["Phenoxybenzamine (irreversible)","Phentolamine (reversible)"]},{"heading":"Selective α1","drugs":["Prazosin","Tamsulosin","Doxazosin"]}]},{"heading":"β-blockers","groups":[{"heading":"Non-selective (β1+β2)","drugs":["Propranolol","Timolol","Pindolol (ISA)"]},{"heading":"Selective β1 (cardioselective)","drugs":["Metoprolol","Atenolol","Esmolol"]},{"heading":"Combined α+β","drugs":["Labetalol","Carvedilol"]}]}]}]},{"label":"KDT 8e/9e","cite":"ch. 9–10","groups":[{"heading":"A. Adrenergic (sympathomimetic) drugs","groups":[{"heading":"Directly acting","groups":[{"heading":"α + β (catecholamines)","drugs":["Adrenaline","Noradrenaline","Dopamine","Dobutamine"]},{"heading":"Predominant α","drugs":["Phenylephrine","Methoxamine","Xylometazoline"]},{"heading":"Predominant β","drugs":["Isoprenaline","Salbutamol","Terbutaline","Salmeterol"]},{"heading":"Central α2","drugs":["Clonidine","Methyldopa"]}]},{"heading":"Indirectly acting","drugs":["Tyramine"]},{"heading":"Mixed acting","drugs":["Ephedrine","Amphetamine","Pseudoephedrine"]}]},{"heading":"B. Antiadrenergic (sympatholytic) drugs","groups":[{"heading":"α-adrenergic blockers","groups":[{"heading":"Non-equilibrium (irreversible)","drugs":["Phenoxybenzamine"]},{"heading":"Equilibrium (reversible) — non-selective","drugs":["
