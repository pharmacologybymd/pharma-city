"heading":"Long-acting","drugs":["Insulin glargine","Insulin detemir","Insulin degludec"]}]},{"heading":"Biguanides","drugs":["Metformin"]},{"heading":"Sulfonylureas","drugs":["Glibenclamide","Glimepiride","Gliclazide"]},{"heading":"Meglitinides / D-phenylalanine analogue","drugs":["Repaglinide","Nateglinide"]},{"heading":"Thiazolidinediones (PPARγ activators)","drugs":["Pioglitazone"]},{"heading":"DPP-4 inhibitors (gliptins)","drugs":["Sitagliptin","Vildagliptin","Linagliptin"]},{"heading":"GLP-1 receptor agonists (incretin mimetics)","drugs":["Liraglutide","Exenatide","Dulaglutide","Semaglutide"]},{"heading":"SGLT2 inhibitors (gliflozins)","drugs":["Empagliflozin","Dapagliflozin","Canagliflozin"]},{"heading":"α-glucosidase inhibitors","drugs":["Acarbose","Miglitol","Voglibose"]},{"heading":"Amylin analogue","drugs":["Pramlintide"]}]},{"heading":"B. Thyroid & antithyroid drugs","groups":[{"heading":"Thyroid hormones","drugs":["Levothyroxine (T4)","Liothyronine (T3)"]},{"heading":"Antithyroid drugs","groups":[{"heading":"Thioamides (inhibit hormone synthesis)","drugs":["Carbimazole","Methimazole","Propylthiouracil"]},{"heading":"Ionic inhibitors / iodides","drugs":["Potassium iodide","Lugol's iodine"]},{"heading":"Radioactive iodine","drugs":["I-131"]},{"heading":"β-adrenergic blockers (symptomatic relief)","drugs":["Propranolol"]}]}]},{"heading":"C. Corticosteroids","groups":[{"heading":"Glucocorticoids","groups":[{"heading":"Short-acting","drugs":["Hydrocortisone","Cortisone"]},{"heading":"Intermediate-acting","drugs":["Prednisolone","Methylprednisolone","Triamcinolone"]},{"heading":"Long-acting","drugs":["Dexamethasone","Betamethasone"]}]},{"heading":"Mineralocorticoids","drugs":["Fludrocortisone","Desoxycorticosterone"]}]},{"heading":"D. Sex hormones & related drugs","groups":[{"heading":"Estrogens & progestins","drugs":["Combined oral contraceptives"]},{"heading":"SERMs (anti-estrogens)","drugs":["Tamoxifen","Raloxifene","Clomiphene"]},{"heading":"Aromatase inhibitors","drugs":["Anastrozole","Letrozole","Exemestane"]},{"heading":"Androgens & anti-androgens","drugs":["Finasteride","Dutasteride","Flutamide","Bicalutamide","Leuprolide (GnRH agonist)"]}]},{"heading":"E. Drugs affecting bone mineral homeostasis (calcium)","groups":[{"heading":"Bisphosphonates","drugs":["Alendronate","Zoledronic acid","Risedronate"]},{"heading":"RANKL inhibitor","drugs":["Denosumab"]},{"heading":"PTH (teriparatide) analogue","drugs":["Teriparatide","Abaloparatide"]},{"heading":"SERM","drugs":["Raloxifene"]},{"heading":"Calcitonin","drugs":["Calcitonin"]},{"heading":"Vitamin D & calcium salts","drugs":["Vitamin D","Calcium"]}]},{"heading":"F. Hypothalamic & pituitary hormones","groups":[{"heading":"Posterior pituitary hormones","drugs":["Desmopressin (vasopressin)","Oxytocin"]},{"heading":"Somatostatin analogue","drugs":["Octreotide","Lanreotide"]},{"heading":"Growth hormone","drugs":["Somatropin"]},{"heading":"Dopamine agonists (prolactin inhibitors)","drugs":["Bromocriptine","Cabergoline"]}]}]}]},"details":{"Insulin lispro":{"adme":"SC (also IV/pump); rapid-acting analogue, onset 5-15 min, peak ~1 h, duration 3-5 h, degraded by insulinase in liver and kidney.","moa":"Binds insulin receptor tyrosine kinase to promote cellular glucose uptake, glycogenesis and lipogenesis while suppressing gluconeogenesis.","uses":"Type 1 and type 2 diabetes, prandial (mealtime) cover, insulin pumps.","adr":"Hypoglycaemia, weight gain, lipohypertrophy, injection-site reactions."},"Insulin aspart":{"adme":"SC (also IV/pump); rapid-acting analogue, onset 10-20 min, peak ~1-3 h, duration 3-5 h, hepatic and renal degradation.","moa":"Activates the insulin receptor tyrosine kinase to drive glucose uptake and anabolic metabolism.","uses":"Mealtime control in type 1 and type 2 diabetes, insulin pumps.","adr":"Hypoglycaemia, weight gain, lipohypertrophy, hypersensitivity."},"Insulin glulisine":{"adme":"SC; rapid-acting analogue, onset ~15 min, peak ~1 h, duration 3-4 h, hepatic and renal clearance.","moa":"Stimulates the insulin receptor to enhance glucose uptake and anabolic effects.","uses":"Prandial cover in type 1 and type 2 diabetes.","adr":"Hypoglycaemia, weight gain, injection-site reactions."},"Regular insulin":{"adme":"SC, IV or IM; short-acting, SC onset ~30 min, peak 2-4 h, duration 5-8 h; only insulin given IV, degraded by liver and kidney.","moa":"Activates the insulin receptor tyrosine kinase promoting glucose uptake, glycogen synthesis and lipogenesis.","uses":"Type 1 and type 2 diabetes, diabetic ketoacidosis, hyperkalaemia, IV infusions.","adr":"Hypoglycaemia, weight gain, lipodystrophy, hypokalaemia."},"NPH (isophane) insulin":{"adme":"SC; intermediate-acting protamine suspension, onset 1-2 h, peak 4-10 h, duration 10-16 h, hepatic/renal degradation.","moa":"Insulin complexed with protamine for delayed absorption, activating the insulin receptor for basal glucose control.","uses":"Basal insulin in type 1 and type 2 diabetes.","adr":"Hypoglycaemia (nocturnal), weight gain, lipohypertrophy."},"Insulin glargine":{"adme":"SC; long-acting analogue forming a microprecipitate, peakless, duration ~24 h, hepatic/renal degradation.","moa":"Slowly released insulin analogue activating the insulin receptor for steady basal glucose lowering.","uses":"Basal insulin in type 1 and type 2 diabetes.","adr":"Hypoglycaemia, weight gain, injection-site reactions."},"Insulin detemir":{"adme":"SC; long-acting analogue, acylated to bind albumin, duration 12-24 h (dose-dependent), hepatic/renal degradation.","moa":"Albumin-bound insulin analogue with prolonged receptor activation for basal control.","uses":"Basal insulin in type 1 and type 2 diabetes.","adr":"Hypoglycaemia, weight gain, injection-site reactions."},"Insulin degludec":{"adme":"SC; ultra-long-acting analogue forming multihexamers, duration >42 h, half-life ~25 h, hepatic/renal degradation.","moa":"Forms soluble depot of multihexamers releasing monomers that activate the insulin receptor for very stable basal control.","uses":"Basal insulin in type 1 and type 2 diabetes.","adr":"Hypoglycaemia (less nocturnal), weight gain, injection-site reactions."},"Metformin":{"adme":"Oral, bioavailability ~50-60%, not protein bound, not metabolised, excreted unchanged renally, half-life ~5 h.","moa":"Activates AMPK to reduce hepatic gluconeogenesis and improve peripheral insulin sensitivity and glucose uptake.","uses":"First-line type 2 diabetes, prediabetes, PCOS.","adr":"GI upset, diarrhoea, metallic taste, B12 deficiency, lactic acidosis (rare)."},"Glibenclamide":{"adme":"Oral, well absorbed, highly protein bound, hepatic metabolism with renal/biliary excretion, long-acting.","moa":"Blocks pancreatic beta-cell K-ATP channels to depolarise the cell and stimulate insulin secretion.","uses":"Type 2 diabetes.","adr":"Hypoglycaemia (prolonged), weight gain."},"Glimepiride":{"adme":"Oral, completely absorbed, highly protein bound, hepatic metabolism (CYP2C9), renal and biliary excretion.","moa":"Closes beta-cell K-ATP channels to trigger insulin release.","uses":"Type 2 diabetes.","adr":"Hypoglycaemia, weight gain."},"Gliclazide":{"adme":"Oral, well absorbed, highly protein bound, extensively hepatically metabolised, renal excretion of metabolites.","moa":"Closes beta-cell K-ATP channels stimulating insulin secretion.","uses":"Type 2 diabetes.","adr":"Hypoglycaemia (lower risk), weight gain."},"Repaglinide":{"adme":"Oral, rapid onset, highly protein bound, hepatic metabolism (CYP3A4/2C8), biliary excretion, short half-life ~1 h.","moa":"Meglitinide that closes beta-cell K-ATP channels at a distinct site for rapid, short insulin release.","uses":"Postprandial glucose control in type 2 diabetes.","adr":"Hypoglycaemia, weight gain."},"Nateglinide":{"adme":"Oral, rapid absorption, highly protein bound, hepatic metabolism (CYP2C9/3A4), short half-life ~1.5 h.","moa":"Meglitinide closing beta-cell K-ATP channels for rapid prandial insulin secretion.","uses":"Postprandial glucose control in type 2 diabetes.","adr":"Hypoglycaemia, weight gain."},"Pioglitazone":{"adme":"Oral, well absorbed, highly protein bound, hepatic metabolism (CYP2C8), biliary excretion, active metabolites.","moa":"PPAR-gamma agonist that enhances insulin sensitivity in fat, muscle and liver.","uses":"Type 2 diabetes, especially with insulin resistance.","adr":"Fluid retention, oedema, weight gain, heart failure, bladder cancer risk, fractures."},"Sitagliptin":{"adme":"Oral, bioavailability ~87%, low protein binding, minimal metabolism, excreted unchanged renally, half-life ~12 h.","moa":"Inhibits DPP-4, prolonging incretins GLP-1/GIP to boost glucose-dependent insulin and suppress glucagon.","uses":"Type 2 diabetes.","adr":"Nasopharyngitis, headache, pancreatitis (rare), arthralgia."},"Vildagliptin":{"adme":"Oral, good bioavailability, low protein binding, hydrolysed (partly renal), twice-daily dosing.","moa":"DPP-4 inhibitor that increases incretin levels enhancing insulin and reducing glucagon.","uses":"Type 2 diabetes.","adr":"Headache, nasopharyngitis, hepatic enzyme rise, pancreatitis (rare)."},"Linagliptin":{"adme":"Oral, low bioavailability, highly protein bound, predominantly biliary/faecal excretion (no renal dose adjustment), long half-life.","moa":"DPP-4 inhibitor prolonging incretin action to raise insulin and lower glucagon.","uses":"Type 2 diabetes, useful in renal impairment.","adr":"Nasopharyngitis, pancreatitis (rare), arthralgia."},"Liraglutide":{"adme":"SC once daily; GLP-1 analogue, highly albumin bound, endogenous peptide degradation, half-life ~13 h.","moa":"GLP-1 receptor agonist enhancing glucose-dependent insulin, suppressing glucagon, slowing gastric emptying and reducing appetite.","uses":"Type 2 diabetes, obesity (higher dose).","adr":"Nausea, vomiting, pancreatitis, gallstones, thyroid C-cell tumour risk."},"Exenatide":{"adme":"SC twice daily or weekly (extended-release); GLP-1 mimetic, renally eliminated, short half-life ~2.4 h.","moa":"GLP-1 receptor agonist boosting glucose-dependent insulin, suppressing glucagon and slowing gastric emptying.","uses":"Type 2 diabetes.","adr":"Nausea, vomiting, pancreatitis, injection-site nodules."},"Dulaglutide":{"adme":"SC once weekly; GLP-1 Fc-fusion, degraded by proteolysis, long half-life ~5 days.","moa":"GLP-1 receptor agonist enhancing insulin secretion and reducing glucagon and appetite.","uses":"Type 2 diabetes, cardiovascular risk reduction.","adr":"Nausea, vomiting, diarrhoea, pancreatitis, thyroid tumour risk."},"Semaglutide":{"adme":"SC once weekly or oral daily; GLP-1 analogue, highly albumin bound, half-life ~7 days.","moa":"GLP-1 receptor agonist increasing glucose-dependent insulin, suppressing glucagon, delaying gastric emptying and reducing appetite.","uses":"Type 2 diabetes, obesity, cardiovascular risk reduction.","adr":"Nausea, vomiting, diarrhoea, pancreatitis, gallstones, thyroid C-cell tumour risk."},"Empagliflozin":{"adme":"Oral, good absorption, highly protein bound, hepatic glucuronidation, renal and faecal excretion, half-life ~12 h.","moa":"Inhibits SGLT2 in the proximal tubule to block glucose reabsorption and increase urinary glucose excretion.","uses":"Type 2 diabetes, heart failure, chronic kidney disease.","adr":"Genital mycotic and urinary infections, volume depletion, euglycaemic ketoacidosis."},"Dapagliflozin":{"adme":"Oral, bioavailability ~78%, highly protein bound, hepatic glucuronidation, renal excretion, half-life ~12 h.","moa":"SGLT2 inhibitor reducing renal glucose reabsorption and increasing glucosuria.","uses":"Type 2 diabetes, heart failure, chronic kidney disease.","adr":"Genital infections, UTIs, volume depletion, euglycaemic ketoacidosis."},"Canagliflozin":{"adme":"Oral, bioavailability ~65%, highly protein bound, glucuronidation, renal and faecal excretion, half-life ~11-13 h.","moa":"SGLT2 inhibitor (some SGLT1 effect) lowering renal glucose reabsorption.","uses":"Type 2 diabetes, diabetic kidney disease.","adr":"Genital infections, volume depletion, ketoacidosis, amputation and fracture risk."},"Acarbose":{"adme":"Oral, minimal systemic absorption, acts in gut lumen, metabolised by intestinal bacteria/enzymes.","moa":"Inhibits intestinal alpha-glucosidase to delay carbohydrate digestion and blunt postprandial glucose rise.","uses":"Postprandial hyperglycaemia in type 2 diabetes.","adr":"Flatulence, diarrhoea, abdominal bloating."},"Miglitol":{"adme":"Oral, well absorbed but acts locally in gut, excreted unchanged renally.","moa":"Alpha-glucosidase inhibitor slowing intestinal carbohydrate breakdown and absorption.","uses":"Postprandial hyperglycaemia in type 2 diabetes.","adr":"Flatulence, diarrhoea, abdominal discomfort."},"Voglibose":{"adme":"Oral, minimal absorption, acts within the gut lumen.","moa":"Alpha-glucosidase inhibitor reducing postprandial glucose by delaying carbohydrate digestion.","uses":"Postprandial hyperglycaemia in type 2 diabetes.","adr":"Flatulence, diarrhoea, abdominal distension."},"Pramlintide":{"adme":"SC before meals; amylin analogue, renally metabolised/excreted, short half-life ~48 min.","moa":"Amylin mimetic that slows gastric emptying, suppresses glucagon and promotes satiety.","uses":"Adjunct to insulin in type 1 and type 2 diabetes.","adr":"Nausea, hypoglycaemia (with insulin), anorexia."},"Levothyroxine":{"adme":"Oral, variable absorption (best fasting), >99% protein bound, deiodinated to T3 peripherally, very long half-life ~7 days.","moa":"Synthetic T4 (prohormone) converted to T3 acting on nuclear thyroid receptors to regulate metabolism.","uses":"Hypothyroidism, myxoedema, TSH suppression in thyroid cancer/goitre.","adr":"With excess: palpitations, tremor, weight loss, arrhythmia, osteoporosis."},"Liothyronine":{"adme":"Oral, well absorbed, highly protein bound, rapid onset, short half-life ~1 day.","moa":"Synthetic active T3 binding nuclear thyroid receptors to drive metabolic gene transcription.","uses":"Myxoedema coma, severe hypothyroidism needing rapid effect.","adr":"Palpitations, tachycardia, tremor, angina, arrhythmia."},"Carbimazole":{"adme":"Oral, prodrug rapidly converted to methimazole, hepatic metabolism, renal excretion.","moa":"Inhibits thyroid peroxidase, blocking iodination and coupling of thyroglobulin to reduce thyroid hormone synthesis.","uses":"Hyperthyroidism, Graves disease, pre-thyroidectomy.","adr":"Rash, agranulocytosis, hepatotoxicity, teratogenicity (aplasia cutis)."},"Methimazole":{"adme":"Oral, well absorbed, low protein binding, hepatic metabolism, half-life ~4-6 h, concentrates in thyroid.","moa":"Inhibits thyroid peroxidase preventing iodide organification and coupling.","uses":"Hyperthyroidism, Graves disease.","adr":"Rash, agranulocytosis, hepatotoxicity, teratogenicity."},"Propylthiouracil":{"adme":"Oral, well absorbed, highly protein bound, short half-life ~1-2 h, hepatic metabolism.","moa":"Inhibits thyroid peroxidase and blocks peripheral T4-to-T3 conversion.","uses":"Hyperthyroidism, thyroid storm, first-trimester pregnancy.","adr":"Hepatotoxicity (severe), agranulocytosis, ANCA vasculitis, rash."},"Potassium iodide":{"adme":"Oral, well absorbed, concentrated by thyroid, renal excretion.","moa":"High iodide inhibits hormone release and synthesis (Wolff-Chaikoff effect) and reduces gland vascularity.","uses":"Pre-thyroidectomy preparation, thyroid storm, radiation protection.","adr":"Metallic taste, iodism, hypersensitivity, escape with prolonged use."},"Lugol's iodine":{"adme":"Oral (iodine/potassium iodide solution), absorbed and concentrated in thyroid, renal excretion.","moa":"Excess iodide transiently inhibits thyroid hormone release and synthesis and reduces gland vascularity.","uses":"Preoperative thyroidectomy preparation, thyroid storm.","adr":"Metallic taste, iodism, GI upset, hypersensitivity."},"I-131":{"adme":"Oral radioactive iodine, concentrated by thyroid, physical half-life ~8 days, renal excretion of unbound.","moa":"Beta emission destroys thyroid follicular cells, ablating overactive or malignant tissue.","uses":"Hyperthyroidism, thyroid cancer ablation.","adr":"Hypothyroidism, radiation thyroiditis, sialadenitis, contraindicated in pregnancy."},"Propranolol":{"adme":"Oral, high first-pass metabolism (bioavailability ~25%), highly protein bound, lipophilic, hepatic metabolism.","moa":"Non-selective beta-blocker controlling adrenergic symptoms and inhibiting peripheral T4-to-T3 conversion.","uses":"Symptom control in hyperthyroidism/thyroid storm, also angina, hypertension, tremor.","adr":"Bradycardia, bronchospasm, fatigue, hypoglycaemia masking."},"Hydrocortisone":{"adme":"Oral, IV, IM or topical; well absorbed, ~90% protein bound (CBG/albumin), hepatic metabolism, short half-life.","moa":"Glucocorticoid (with mineralocorticoid activity) binding cytosolic receptors to modulate gene transcription, anti-inflammatory and immunosuppressive.","uses":"Adrenal insufficiency, shock, inflammatory and allergic conditions.","adr":"Hyperglycaemia, fluid retention, immunosuppression, Cushingoid features."},"Cortisone":{"adme":"Oral; prodrug converted to hydrocortisone by 11-beta-HSD in liver, protein bound, hepatic metabolism.","moa":"Converted to active cortisol, a glucocorticoid with mineralocorticoid activity acting via intracellular receptors.","uses":"Replacement therapy in adrenal insufficiency.","adr":"Hyperglycaemia, fluid retention, Cushingoid effects."},"Prednisolone":{"adme":"Oral or IV, well absorbed, protein bound, hepatic metabolism, intermediate-acting (half-life ~2-4 h, biologic longer).","moa":"Synthetic glucocorticoid with low mineralocorticoid activity, anti-inflammatory and immunosuppressive via gene modulation.","uses":"Asthma, autoimmune disease, allergy, inflammatory conditions, immunosuppression.","adr":"Hyperglycaemia, osteoporosis, weight gain, infection risk, adrenal suppression."},"Methylprednisolone":{"adme":"Oral, IV or IM, protein bound, hepatic metabolism, intermediate-acting with minimal mineralocorticoid effect.","moa":"Synthetic glucocorticoid acting via cytosolic receptors to suppress inflammation and immunity.","uses":"Acute inflammation, severe asthma, transplant rejection, MS relapse, pulse therapy.","adr":"Hyperglycaemia, immunosuppression, osteoporosis, mood changes."},"Triamcinolone":{"adme":"Oral, IM, intra-articular or topical; protein bound, hepatic metabolism, intermediate-acting, no mineralocorticoid effect.","moa":"Synthetic glucocorticoid binding intracellular receptors with potent anti-inflammatory action.","uses":"Inflammatory joint and skin disease, allergic conditions, intra-articular injection.","adr":"Local atrophy, hyperglycaemia, immunosuppression, adrenal suppression."},"Dexamethasone":{"adme":"Oral, IV or IM, well absorbed, protein bound, hepatic metabolism, long-acting (biologic half-life 36-72 h), negligible mineralocorticoid effect.","moa":"Potent long-acting glucocorticoid suppressing inflammation and immunity via gene transcription.","uses":"Cerebral oedema, croup, antiemesis, COVID, dexamethasone suppression test, inflammation.","adr":"Hyperglycaemia, immunosuppression, psychosis, osteoporosis, adrenal suppression."},"Betamethasone":{"adme":"Oral, IM, topical; protein bound, hepatic metabolism, long-acting, negligible mineralocorticoid effect.","moa":"Potent long-acting glucocorticoid with strong anti-inflammatory action via intracellular receptors.","uses":"Antenatal fetal lung maturation, severe inflammation, dermatoses.","adr":"Hyperglycaemia, immunosuppression, skin atrophy, adrenal suppression."},"Fludrocortisone":{"adme":"Oral, well absorbed, protein bound, hepatic metabolism, long-acting mineralocorticoid.","moa":"Potent mineralocorticoid binding renal receptors to promote sodium retention and potassium excretion.","uses":"Addison disease (mineralocorticoid replacement), orthostatic hypotension, salt-wasting CAH.","adr":"Hypertension, oedema, hypokalaemia, heart failure."},"Combined oral contraceptives":{"adme":"Oral oestrogen plus progestin, well absorbed, highly protein bound (SHBG/albumin), hepatic metabolism, enterohepatic recycling.","moa":"Suppress hypothalamic-pituitary axis inhibiting LH/FSH and ovulation, thicken cervical mucus and thin endometrium.","uses":"Contraception, menstrual disorders, acne, PCOS, endometriosis.","adr":"Venous thromboembolism, hypertension, nausea, breakthrough bleeding, breast tenderness."},"Tamoxifen":{"adme":"Oral, well absorbed, highly protein bound, hepatic activation via CYP2D6 to endoxifen, long half-life ~5-7 days.","moa":"Selective oestrogen receptor modulator antagonising breast tissue ER while agonising bone and endometrium.","uses":"ER-positive breast cancer (treatment and prevention).","adr":"Hot flushes, VTE, endometrial cancer, cataracts."},"Raloxifene":{"adme":"Oral, low bioavailability, highly protein bound, extensive glucuronidation, faecal excretion.","moa":"SERM agonising bone ER (preserving density) while antagonising breast and endometrial ER.","uses":"Postmenopausal osteoporosis, breast cancer risk reduction.","adr":"Hot flushes, leg cramps, VTE."},"Clomiphene":{"adme":"Oral, well absorbed, hepatic metabolism, enterohepatic recycling, long half-life.","moa":"SERM blocking hypothalamic oestrogen receptors to increase GnRH and FSH/LH, inducing ovulation.","uses":"Anovulatory infertility, PCOS.","adr":"Hot flushes, ovarian enlargement, multiple pregnancy, visual disturbance."},"Anastrozole":{"adme":"Oral, well absorbed, moderately protein bound, hepatic metabolism, half-life ~50 h.","moa":"Non-steroidal aromatase inhibitor blocking peripheral conversion of androgens to oestrogen.","uses":"ER-positive breast cancer in postmenopausal women.","adr":"Hot flushes, arthralgia, osteoporosis, dyslipidaemia."},"Letrozole":{"adme":"Oral, well absorbed, weakly protein bound, hepatic metabolism (CYP), half-life ~2 days.","moa":"Non-steroidal aromatase inhibitor suppressing oestrogen synthesis.","uses":"ER-positive breast cancer (postmenopausal), ovulation induction.","adr":"Hot flushes, arthralgia, osteoporosis, fatigue."},"Exemestane":{"adme":"Oral (take with food), well absorbed, highly protein bound, hepatic metabolism.","moa":"Steroidal irreversible aromatase inactivator blocking oestrogen production.","uses":"ER-positive breast cancer in postmenopausal women.","adr":"Hot flushes, arthralgia, fatigue, osteoporosis."},"Finasteride":{"adme":"Oral, well absorbed, highly protein bound, hepatic metabolism (CYP3A4), half-life ~6 h.","moa":"Inhibits 5-alpha-reductase type 2, reducing conversion of testosterone to dihydrotestosterone.","uses":"Benign prostatic hyperplasia, male-pattern baldness.","adr":"Decreased libido, erectile dysfunction, gynaecomastia, lowered PSA."},"Dutasteride":{"adme":"Oral, well absorbed, highly protein bound, hepatic metabolism, very long half-life ~5 weeks.","moa":"Inhibits 5-alpha-reductase types 1 and 2, lowering dihydrotestosterone.","uses":"Benign prostatic hyperplasia.","adr":"Decreased libido, erectile dysfunction, gynaecomastia."},"Flutamide":{"adme":"Oral, well absorbed, protein bound, hepatic metabolism to active hydroxyflutamide, renal excretion.","moa":"Non-steroidal androgen receptor antagonist blocking testosterone/DHT action.","uses":"Prostate cancer (with GnRH agonist).","adr":"Hepatotoxicity, gynaecomastia, hot flushes, diarrhoea."},"Bicalutamide":{"adme":"Oral, well absorbed, highly protein bound, hepatic metabolism, long half-life ~6 days.","moa":"Non-steroidal androgen receptor antagonist blocking androgen signalling.","uses":"Prostate cancer (with GnRH agonist).","adr":"Gynaecomastia, hot flushes, hepatotoxicity, breast tenderness."},"Leuprolide (GnRH agonist)":{"adme":"SC or IM depot; peptide, short native half-life, depot gives weeks-to-months action, peptidase degradation.","moa":"GnRH receptor agonist causing initial surge then downregulation, suppressing LH/FSH and sex hormones.","uses":"Prostate cancer, endometriosis, precocious puberty, fibroids.","adr":"Tumour flare, hot flushes, osteoporosis, decreased libido."},"Alendronate":{"adme":"Oral, very low bioavailability (<1%, take fasting upright), not metabolised, bound to bone, renal excretion of unbound.","moa":"Nitrogen-containing bisphosphonate inhibiting farnesyl pyrophosphate synthase to impair osteoclast resorption.","uses":"Osteoporosis, Paget disease, glucocorticoid-induced bone loss.","adr":"Oesophagitis, GI upset, osteonecrosis of jaw, atypical femoral fractures."},"Zoledronic acid":{"adme":"IV infusion, not metabolised, bound to bone, renal excretion, prolonged skeletal retention.","moa":"Potent nitrogen-containing bisphosphonate inhibiting osteoclast-mediated bone resorption.","uses":"Osteoporosis (annual), Paget disease, malignant hypercalcaemia, bone metastases.","adr":"Acute-phase flu-like reaction, hypocalcaemia, renal impairment, osteonecrosis of jaw."},"Risedronate":{"adme":"Oral, very low bioavailability (take fasting), not metabolised, bound to bone, renal excretion.","moa":"Nitrogen-containing bisphosphonate inhibiting osteoclastic bone resorption.","uses":"Osteoporosis, Paget disease, glucocorticoid-induced bone loss.","adr":"Oesophagitis, GI upset, osteonecrosis of jaw, atypical fractures."},"Denosumab":{"adme":"SC every 6 months; monoclonal antibody, reticuloendothelial clearance, half-life ~26 days.","moa":"Anti-RANKL monoclonal antibody inhibiting osteoclast formation and bone resorption.","uses":"Osteoporosis, bone metastases, giant cell tumour of bone.","adr":"Hypocalcaemia, infections, osteonecrosis of jaw, rebound fractures on discontinuation."},"Teriparatide":{"adme":"SC daily; recombinant PTH(1-34), rapid absorption, peptidase degradation, short half-life ~1 h.","moa":"Recombinant parathyroid hormone fragment; intermittent dosing stimulates osteoblastic bone formation.","uses":"Severe osteoporosis at high fracture risk.","adr":"Hypercalcaemia, dizziness, leg cramps, osteosarcoma risk (animal data)."},"Abaloparatide":{"adme":"SC daily; PTHrP analogue, rapid absorption, peptidase degradation, short half-life ~1 h.","moa":"PTHrP analogue stimulating osteoblastic bone formation via PTH1 receptor.","uses":"Postmenopausal osteoporosis at high fracture risk.","adr":"Hypercalcaemia, dizziness, palpitations, injection-site reactions."},"Calcitonin":{"adme":"SC, IM or intranasal; peptide, renal and tissue degradation, short half-life.","moa":"Inhibits osteoclast activity and promotes renal calcium excretion, lowering serum calcium.","uses":"Hypercalcaemia, Paget disease, osteoporosis (limited).","adr":"Nausea, flushing, nasal irritation, possible malignancy risk with long-term use."},"Vitamin D":{"adme":"Oral, fat-soluble absorption, hydroxylated in liver (25-OH) then kidney (1,25-OH active), stored in fat, long half-life.","moa":"Activated to calcitriol acting on nuclear VDR to increase intestinal calcium/phosphate absorption and bone mineralisation.","uses":"Vitamin D deficiency, rickets, osteomalacia, osteoporosis, hypoparathyroidism.","adr":"Hypercalcaemia, hypercalciuria, nephrocalcinosis with excess."},"Calcium":{"adme":"Oral, absorption vitamin-D dependent (carbonate needs acid/food, citrate does not), renal regulation.","moa":"Provides substrate for bone mineralisation, neuromuscular function and clotting.","uses":"Hypocalcaemia, osteoporosis, dietary supplementation, hyperkalaemia (IV).","adr":"Constipation, hypercalcaemia, kidney stones, milk-alkali syndrome."},"Desmopressin (vasopressin)":{"adme":"Intranasal, oral, SC or IV; synthetic ADH analogue, minimal V1 activity, renal metabolism, half-life ~3 h.","moa":"V2 receptor agonist increasing renal water reabsorption and releasing factor VIII/von Willebrand factor.","uses":"Central diabetes insipidus, nocturnal enuresis, mild haemophilia A and von Willebrand disease.","adr":"Hyponatraemia, water intoxication, headache, flushing."},"Oxytocin":{"adme":"IV or IM; peptide, rapidly degraded by oxytocinase, very short half-life ~3-5 min.","moa":"Activates uterine and mammary oxytocin receptors causing uterine contraction and milk ejection.","uses":"Labour induction/augmentation, postpartum haemorrhage, milk let-down.","adr":"Uterine hyperstimulation, fetal distress, hyponatraemia/water intoxication, hypotension."},"Octreotide":{"adme":"SC or IV (also depot IM); somatostatin analogue, longer half-life than native (~1.5 h), hepatic/renal elimination.","moa":"Somatostatin analogue inhibiting GH, glucagon, insulin and gut hormone secretion.","uses":"Acromegaly, carcinoid and VIPomas, variceal bleeding, secretory diarrhoea.","adr":"Gallstones, GI upset, hyperglycaemia/hypoglycaemia, bradycardia."},"Lanreotide":{"adme":"Deep SC depot every 4 weeks; somatostatin analogue, slow release, half-life prolonged by formulation.","moa":"Somatostatin analogue suppressing GH and gut hormone secretion.","uses":"Acromegaly, neuroendocrine tumours.","adr":"Gallstones, GI upset, glucose dysregulation, bradycardia."},"Somatropin":{"adme":"SC; recombinant human growth hormone, peptide, hepatic/renal degradation, short half-life ~3-4 h.","moa":"Recombinant GH binding GH receptors to stimulate IGF-1 production and growth/anabolic effects.","uses":"GH deficiency, Turner syndrome, growth disorders, short bowel.","adr":"Oedema, arthralgia, insulin resistance, intracranial hypertension."},"Bromocriptine":{"adme":"Oral, low bioavailability (high first-pass), protein bound, hepatic metabolism, biliary excretion.","moa":"Dopamine D2 receptor agonist (ergot) inhibiting prolactin and GH secretion.","uses":"Hyperprolactinaemia, acromegaly, Parkinson disease, type 2 diabetes.","adr":"Nausea, orthostatic hypotension, fibrosis, psychiatric effects."},"Cabergoline":{"adme":"Oral, well absorbed, protein bound, hepatic metabolism, very long half-life (~65 h) allowing twice-weekly dosing.","moa":"Long-acting dopamine D2 receptor agonist suppressing prolactin secretion.","uses":"Hyperprolactinaemia, prolactinoma, acromegaly.","adr":"Nausea, orthostatic hypotension, cardiac valve fibrosis (high dose), headache."},"Regular (soluble) insulin":{"adme":"SC, IV or IM; short-acting, SC onset ~30 min, peak 2-4 h, duration 5-8 h; only insulin given IV, hepatic/renal degradation.","moa":"Activates the insulin receptor tyrosine kinase promoting glucose uptake, glycogenesis and lipogenesis.","uses":"Type 1 and type 2 diabetes, diabetic ketoacidosis, hyperkalaemia, IV infusions.","adr":"Hypoglycaemia, weight gain, lipodystrophy, hypokalaemia."},"Levothyroxine (T4)":{"adme":"Oral, variable absorption (best fasting), >99% protein bound, peripherally deiodinated to T3, very long half-life ~7 days.","moa":"Synthetic T4 prohormone converted to active T3 acting on nuclear thyroid receptors.","uses":"Hypothyroidism, myxoedema, TSH suppression.","adr":"With excess: palpitations, tremor, weight loss, arrhythmia, osteoporosis."},"Liothyronine (T3)":{"adme":"Oral, well absorbed, highly protein bound, rapid onset, short half-life ~1 day.","moa":"Synthetic active T3 binding nuclear thyroid receptors to regulate metabolic gene expression.","uses":"Myxoedema coma, severe hypothyroidism needing rapid action.","adr":"Palpitations, tachycardia, tremor, angina, arrhythmia."},"Desoxycorticosterone":{"adme":"IM or implant (poor oral activity); protein bound, hepatic metabolism.","moa":"Mineralocorticoid binding renal receptors to promote sodium retention and potassium excretion.","uses":"Mineralocorticoid replacement in adrenal insufficiency (historical).","adr":"Hypertension, oedema, hypokalaemia, heart failure."}},"diagrams":[{"title":"Pancreatic β-cell insulin secretion","caption":"Glucose enters (GLUT) → ATP rises → closes K-ATP channel → depolarisation → voltage-gated Ca²⁺ influx → insulin release. Sulfonylureas & meglitinides close the K-ATP channel; incretins (GLP-1 agonists, DPP-4 inhibitors) amplify glucose-dependent release.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Insulin secretion from beta cell\">\n      <rect x=\"90\" y=\"40\" width=\"240\" height=\"170\" rx=\"18\" fill=\"#d98c00\" opacity=\"0.07\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <text x=\"120\" y=\"34\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">pancreatic β-cell</text>\n      <text x=\"40\" y=\"80\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Glucose</text>\n      <line x1=\"86\" y1=\"76\" x2=\"140\" y2=\"84\" stroke=\"currentColor\" stroke-width=\"1.2\" marker-end=\"url(#ah4)\"/>\n      <text x=\"120\" y=\"100\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">↑ ATP</text>\n      <text x=\"120\" y=\"124\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">close K-ATP ✕ sulfonylureas</text>\n      <text x=\"120\" y=\"148\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">depolarise → Ca²⁺ influx</text>\n      <circle cx=\"300\" cy=\"120\" r=\"10\" fill=\"#14a06a\"/><text x=\"250\" y=\"180\" fill=\"#14a06a\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">Insulin release</text>\n      <line x1=\"240\" y1=\"148\" x2=\"290\" y2=\"128\" stroke=\"currentColor\" stroke-width=\"1.2\" marker-end=\"url(#ah4)\"/>\n      <text x=\"120\" y=\"200\" fill=\"#2e7be0\" font-size=\"9\" font-family=\"sans-serif\">incretins (GLP-1, DPP-4i) amplify</text>\n      <defs><marker id=\"ah4\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"currentColor\"/></marker></defs>\n    </svg>"}]},{"id":"chemotherapy","name":"Chemotherapy","theme_line":"War fortress · ABx, antifungals, antivirals, anticancer","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 56–69","groups":[{"heading":"A. Antibacterials","groups":[{"heading":"Cell-wall synthesis inhibitors","groups":[{"heading":"β-Lactams — Penicillins","drugs":["Penicillin G","Amoxicillin","Piperacillin"]},{"heading":"β-Lactams — Cephalosporins","drugs":["Ceftriaxone", "heading":"Echinocandins","drugs":["Caspofungin","Micafungin"]},{"heading":"Allylamines","drugs":["Terbinafine"]},{"heading":"Antimetabolite","drugs":["Flucytosine"]},{"heading":"Others","drugs":["Griseofulvin"]}]},{"heading":"D. Antivirals","groups":[{"heading":"Anti-herpes","drugs":["Acyclovir","Valacyclovir","Ganciclovir"]},{"heading":"Anti-influenza","drugs":["Oseltamivir","Zanamivir","Baloxavir"]},{"heading":"Anti-HIV — NRTIs","drugs":["Tenofovir","Zidovudine","Lamivudine","Abacavir"]},{"heading":"Anti-HIV — NNRTIs","drugs":["Efavirenz","Nevirapine"]},{"heading":"Anti-HIV — Integrase inhibitors","drugs":["Dolutegravir","Raltegravir"]},{"heading":"Anti-HIV — Protease inhibitors","drugs":["Ritonavir","Lopinavir","Atazanavir"]},{"heading":"Anti-HCV","drugs":["Sofosbuvir","Ledipasvir"]}]},{"heading":"E. Antimalarials","drugs":["Chloroquine","Artemether-lumefantrine","Primaquine","Quinine","Mefloquine","Atovaquone-proguanil"]},{"heading":"F. Anthelmintics & Antiprotozoals","groups":[{"heading":"Anthelmintics","drugs":["Albendazole","Mebendazole","Praziquantel","Ivermectin","Diethylcarbamazine"]},{"heading":"Antiprotozoals","drugs":["Metronidazole","Tinidazole"]}]},{"heading":"G. Anticancer drugs","groups":[{"heading":"Alkylating agents","drugs":["Cyclophosphamide","Cisplatin","Carboplatin"]},{"heading":"Antimetabolites","drugs":["Methotrexate","5-Fluorouracil","Cytarabine","Gemcitabine"]},{"heading":"Antitumour antibiotics","drugs":["Doxorubicin","Bleomycin"]},{"heading":"Plant alkaloids / microtubule agents","drugs":["Vincristine","Vinblastine","Paclitaxel","Docetaxel"]},{"heading":"Topoisomerase inhibitors","drugs":["Etoposide","Irinotecan"]},{"heading":"Targeted therapy — tyrosine-kinase inhibitors","drugs":["Imatinib","Erlotinib"]},{"heading":"Targeted therapy — monoclonal antibodies","drugs":["Rituximab","Trastuzumab","Bevacizumab"]},{"heading":"Hormonal agents","drugs":["Tamoxifen","Leuprolide","Anastrozole"]}]},{"heading":"H. Immunosuppressants","groups":[{"heading":"Calcineurin inhibitors","drugs":["Cyclosporine","Tacrolimus"]},{"heading":"Antiproliferatives","drugs":["Mycophenolate","Azathioprine"]},{"heading":"mTOR inhibitors","drugs":["Sirolimus","Everolimus"]},{"heading":"Glucocorticoids","drugs":["Prednisolone"]},{"heading":"Biologics","drugs":["Infliximab","Adalimumab","Basiliximab"]}]}]}]},"details":{"Penicillin G":{"adme":"Poor oral bioavailability so given IV/IM, ~50% protein bound, short half-life ~30 min, eliminated unchanged by renal tubular secretion (reduce dose in renal failure).","moa":"Binds penicillin-binding proteins inhibiting bacterial cell wall transpeptidation (peptidoglycan cross-linking).","uses":"Streptococci, pneumococci, meningococci, syphilis, Clostridium.","adr":"Hypersensitivity/anaphylaxis, rash, Jarisch-Herxheimer reaction, seizures at high doses."},"Amoxicillin":{"adme":"Good oral bioavailability (~75%), low protein binding (~20%), mainly renal excretion unchanged, half-life ~1 hr.","moa":"Inhibits PBP-mediated cell wall transpeptidation; aminopenicillin with extended gram-negative cover.","uses":"Otitis media, sinusitis, H. pylori, enterococci, Listeria, endocarditis prophylaxis.","adr":"Rash (esp. in EBV/mononucleosis), diarrhea, hypersensitivity, C. difficile colitis."},"Piperacillin":{"adme":"Parenteral (IV), modest protein binding, predominantly renal elimination (dose-adjust in renal impairment), short half-life.","moa":"Ureidopenicillin inhibiting PBP/cell wall synthesis with antipseudomonal activity, usually combined with tazobactam.","uses":"Pseudomonas, gram-negative bacilli, anaerobes, hospital/intra-abdominal infections.","adr":"Hypersensitivity, platelet dysfunction, hypokalemia, C. difficile, elevated LFTs."},"Ceftriaxone":{"adme":"Parenteral, highly protein bound (~95%), long half-life ~8 hr allowing once-daily dosing, dual biliary and renal elimination (no renal dose adjustment needed).","moa":"Third-generation cephalosporin inhibiting PBP-mediated cell wall synthesis.","uses":"Meningitis, gonorrhea, pneumonia, sepsis, typhoid, Lyme disease.","adr":"Biliary sludging/pseudolithiasis, kernicterus in neonates (avoid with calcium IV), diarrhea, hypersensitivity."},"Cefazolin":{"adme":"Parenteral, ~80% protein bound, renal elimination (dose-adjust in renal failure), half-life ~2 hr.","moa":"First-generation cephalosporin inhibiting cell wall transpeptidation via PBP binding.","uses":"Surgical prophylaxis, MSSA skin/soft tissue, streptococci, UTI.","adr":"Hypersensitivity, phlebitis, rare seizures, C. difficile."},"Cefepime":{"adme":"Parenteral, low protein binding (~20%), renal elimination (dose-adjust; risk of accumulation), half-life ~2 hr.","moa":"Fourth-generation cephalosporin inhibiting PBP/cell wall synthesis, stable to many beta-lactamases.","uses":"Febrile neutropenia, Pseudomonas, nosocomial pneumonia, gram-negative sepsis.","adr":"Neurotoxicity/encephalopathy and seizures (esp. renal impairment), hypersensitivity, C. difficile."},"Meropenem":{"adme":"Parenteral, low protein binding, renal elimination (dose-adjust in renal failure), half-life ~1 hr.","moa":"Carbapenem inhibiting PBPs/cell wall synthesis with very broad spectrum; stable to most beta-lactamases.","uses":"Severe/MDR gram-negative, ESBL producers, intra-abdominal, meningitis, Pseudomonas.","adr":"Lower seizure risk than imipenem, hypersensitivity, diarrhea, C. difficile."},"Imipenem":{"adme":"Parenteral, co-formulated with cilastatin to block renal dehydropeptidase, renal elimination (dose-adjust), short half-life.","moa":"Carbapenem inhibiting PBP-mediated cell wall synthesis, broad spectrum.","uses":"Polymicrobial/intra-abdominal infections, gram-negative bacilli, Pseudomonas, Enterobacter.","adr":"Seizures (highest among carbapenems), hypersensitivity, nausea, C. difficile."},"Aztreonam":{"adme":"Parenteral, moderate protein binding, renal elimination (dose-adjust), half-life ~2 hr.","moa":"Monobactam binding PBP3 inhibiting cell wall synthesis of aerobic gram-negative bacteria only.","uses":"Aerobic gram-negative/Pseudomonas infections; safe alternative in penicillin allergy.","adr":"Generally well tolerated, rash, phlebitis, rare LFT elevation; minimal cross-reactivity with penicillins."},"Vancomycin":{"adme":"Poor oral absorption (oral only for gut C. difficile), IV for systemic use, ~50% protein bound, renal elimination (requires level monitoring and renal dose-adjustment), half-life ~6 hr.","moa":"Binds D-Ala-D-Ala terminus of peptidoglycan precursors inhibiting cell wall synthesis (glycopeptide).","uses":"MRSA, ampicillin-resistant enterococci, oral form for C. difficile colitis.","adr":"Nephrotoxicity, ototoxicity, red man syndrome (infusion-related), DRESS, neutropenia."},"Teicoplanin":{"adme":"Parenteral (IV/IM), very high protein binding (~90%), long half-life allowing once-daily dosing, renal elimination (dose-adjust).","moa":"Glycopeptide binding D-Ala-D-Ala blocking cell wall peptidoglycan synthesis.","uses":"MRSA, gram-positive infections, alternative to vancomycin.","adr":"Less nephrotoxic than vancomycin, hypersensitivity, thrombocytopenia, fever."},"Gentamicin":{"adme":"Poor oral absorption so given IV/IM, minimal protein binding, renal elimination (narrow therapeutic window requiring level monitoring and renal dose-adjustment), half-life ~2-3 hr.","moa":"Aminoglycoside binding 30S ribosomal subunit causing misreading and inhibition of protein synthesis (bactericidal).","uses":"Aerobic gram-negative bacilli, synergy with cell-wall agents in enterococcal/staphylococcal endocarditis.","adr":"Nephrotoxicity (reversible), ototoxicity/vestibular toxicity (often irreversible), neuromuscular blockade."},"Amikacin":{"adme":"IV/IM (poor oral absorption), minimal protein binding, renal elimination (level monitoring and renal dose-adjustment needed).","moa":"Aminoglycoside binding 30S subunit inhibiting protein synthesis; resistant to many aminoglycoside-modifying enzymes.","uses":"Resistant gram-negative bacilli, MDR-TB, Pseudomonas.","adr":"Nephrotoxicity, ototoxicity, neuromuscular blockade."},"Doxycycline":{"adme":"Good oral bioavailability, highly protein bound, eliminated partly via non-renal/fecal routes (safe in renal failure), long half-life ~18 hr.","moa":"Tetracycline binding 30S ribosomal subunit blocking aminoacyl-tRNA binding, inhibiting protein synthesis (bacteriostatic).","uses":"Rickettsia, Chlamydia, Mycoplasma, Lyme, acne, malaria prophylaxis, atypical pneumonia.","adr":"Photosensitivity, esophagitis, tooth discoloration/avoid in children and pregnancy, GI upset."},"Minocycline":{"adme":"Excellent oral bioavailability, highly lipophilic and protein bound, largely hepatic metabolism (safer in renal impairment), long half-life.","moa":"Tetracycline binding 30S subunit inhibiting protein synthesis.","uses":"Acne, MRSA, Nocardia, atypical infections, rheumatoid arthritis.","adr":"Vestibular toxicity (dizziness), skin/mucosal hyperpigmentation, drug-induced lupus, tooth staining."},"Azithromycin":{"adme":"Oral, extensive tissue penetration with high intracellular concentrations, mainly biliary/fecal elimination (no renal adjustment), very long half-life ~68 hr.","moa":"Macrolide binding 50S ribosomal subunit blocking translocation of protein synthesis.","uses":"Atypical pneumonia, Chlamydia, pertussis, MAC, traveler's diarrhea, otitis media.","adr":"QT prolongation, GI upset, cholestatic hepatitis, hearing loss with prolonged use."},"Erythromycin":{"adme":"Variable oral absorption, hepatic metabolism and CYP3A4 inhibition causing many drug interactions, biliary excretion, short half-life.","moa":"Macrolide binding 50S subunit inhibiting protein synthesis by blocking translocation.","uses":"Atypical pneumonia, pertussis, Campylobacter, penicillin-allergic streptococcal infections, prokinetic.","adr":"GI cramps/motilin agonism, QT prolongation, cholestatic hepatitis, CYP3A4 drug interactions."},"Clarithromycin":{"adme":"Good oral bioavailability, hepatic metabolism (potent CYP3A4 inhibitor), partial renal elimination (dose-adjust in severe renal failure).","moa":"Macrolide binding 50S ribosomal subunit blocking protein synthesis.","uses":"H. pylori, MAC, respiratory tract infections, atypicals.","adr":"Metallic taste, QT prolongation, GI upset, CYP3A4 interactions, hepatotoxicity."},"Clindamycin":{"adme":"Good oral bioavailability, highly protein bound, hepatic metabolism (no major renal adjustment), penetrates bone well.","moa":"Lincosamide binding 50S ribosomal subunit inhibiting protein synthesis; suppresses toxin production.","uses":"Anaerobes, gram-positive cocci including MRSA, aspiration pneumonia, toxin suppression in toxic shock/necrotizing fasciitis.","adr":"Pseudomembranous (C. difficile) colitis (classic), diarrhea, rash, hypersensitivity."},"Linezolid":{"adme":"Excellent oral bioavailability (~100%), low protein binding, non-enzymatic and hepatic metabolism (no renal dose adjustment), half-life ~5 hr.","moa":"Oxazolidinone binding 23S rRNA of 50S subunit preventing formation of the 70S initiation complex.","uses":"MRSA, VRE, resistant gram-positive infections, MDR-TB.","adr":"Myelosuppression/thrombocytopenia (prolonged use), serotonin syndrome (MAOI activity), peripheral and optic neuropathy, lactic acidosis."},"Chloramphenicol":{"adme":"Good oral bioavailability, hepatic glucuronidation (caution in hepatic impairment and neonates lacking conjugation), wide distribution including CNS.","moa":"Binds 50S ribosomal subunit inhibiting peptidyl transferase and protein synthesis.","uses":"Typhoid, rickettsial infections, bacterial meningitis (resource-limited), anaerobes.","adr":"Dose-related reversible bone marrow suppression, idiosyncratic aplastic anemia, gray baby syndrome in neonates."},"Ciprofloxacin":{"adme":"Good oral bioavailability (reduced by cations/antacids), moderate protein binding, renal elimination (dose-adjust in renal failure), CYP1A2 inhibitor.","moa":"Fluoroquinolone inhibiting DNA gyrase (topoisomerase II) and topoisomerase IV, blocking DNA replication.","uses":"Gram-negative bacilli, Pseudomonas, UTI, GI infections, anthrax.","adr":"Tendinitis/tendon rupture, QT prolongation, CNS effects/seizures, aortic dissection, dysglycemia, avoid in children."},"Levofloxacin":{"adme":"Excellent oral bioavailability (~99%), moderate protein binding, mainly renal elimination (dose-adjust in renal failure), long half-life allowing once-daily dosing.","moa":"Respiratory fluoroquinolone inhibiting DNA gyrase and topoisomerase IV.","uses":"Community-acquired/atypical pneumonia, sinusitis, UTI, MDR-TB.","adr":"Tendon rupture, QT prolongation, dysglycemia, CNS effects, photosensitivity."},"Moxifloxacin":{"adme":"Good oral bioavailability, hepatic metabolism with biliary elimination (no renal dose adjustment; not for UTI due to low urinary levels).","moa":"Fluoroquinolone inhibiting DNA gyrase and topoisomerase IV with enhanced gram-positive/anaerobic cover.","uses":"Respiratory tract infections, atypicals, intra-abdominal infections, MDR-TB.","adr":"QT prolongation (most among quinolones), tendon rupture, hepatotoxicity, CNS effects."},"Rifampicin":{"adme":"Good oral bioavailability (take on empty stomach), highly protein bound, hepatic metabolism and potent CYP3A4/P-gp inducer (major drug interactions), biliary excretion.","moa":"Inhibits bacterial DNA-dependent RNA polymerase blocking transcription.","uses":"Tuberculosis, leprosy, meningococcal prophylaxis, staphylococcal/prosthetic device infections.","adr":"Hepatotoxicity, orange discoloration of secretions, flu-like syndrome, drug interactions via enzyme induction, thrombocytopenia."},"Metronidazole":{"adme":"Excellent oral bioavailability, low protein binding, hepatic metabolism, good CNS penetration, half-life ~8 hr.","moa":"Reduced ferredoxin generates reactive nitro radicals that damage anaerobic microbial DNA.","uses":"Anaerobes, C. difficile, Bacterial vaginosis, amoebiasis, giardiasis, trichomoniasis, H. pylori.","adr":"Disulfiram-like reaction with alcohol, metallic taste, peripheral neuropathy, GI upset, seizures."},"Co-trimoxazole":{"adme":"Good oral bioavailability of both components, partly renal elimination (dose-adjust in renal failure), trimethoprim with sulfamethoxazole in fixed ratio.","moa":"Sequential folate-pathway blockade: sulfamethoxazole inhibits dihydropteroate synthase, trimethoprim inhibits dihydrofolate reductase.","uses":"Pneumocystis jirovecii (PCP) treatment/prophylaxis, UTI, MRSA, Nocardia, toxoplasmosis.","adr":"Stevens-Johnson syndrome/rash, hyperkalemia, marrow suppression, hemolysis in G6PD deficiency, kernicterus."},"Daptomycin":{"adme":"Parenteral, highly protein bound, renal elimination (dose-adjust by extending interval in renal failure), long half-life allowing once-daily dosing.","moa":"Cyclic lipopeptide inserting into gram-positive cell membrane causing depolarization and cell death.","uses":"MRSA, VRE, bacteremia, right-sided endocarditis (inactivated by pulmonary surfactant so not for pneumonia).","adr":"Myopathy/rhabdomyolysis (monitor CK), eosinophilic pneumonia, peripheral neuropathy."},"Colistin":{"adme":"Parenteral (poor oral absorption), administered as colistimethate prodrug, renal elimination (careful dose-adjustment in renal failure).","moa":"Polymyxin binding lipopolysaccharide and disrupting the gram-negative outer cell membrane.","uses":"Salvage therapy for MDR gram-negative bacilli (Pseudomonas, Acinetobacter, carbapenem-resistant Enterobacteriaceae).","adr":"Nephrotoxicity (dose-limiting), neurotoxicity, neuromuscular blockade."},"Isoniazid":{"adme":"Good oral bioavailability, hepatic acetylation with genetic fast/slow acetylator polymorphism, half-life varies, CYP inhibitor.","moa":"Prodrug activated by mycobacterial catalase-peroxidase (KatG) inhibiting mycolic acid synthesis (InhA).","uses":"Tuberculosis treatment and latent TB prophylaxis.","adr":"Hepatotoxicity, peripheral neuropathy (give pyridoxine), drug-induced lupus, seizures in overdose."},"Pyrazinamide":{"adme":"Good oral bioavailability, hepatic metabolism to pyrazinoic acid, renal excretion of metabolites (caution in renal impairment).","moa":"Prodrug converted by pyrazinamidase to pyrazinoic acid active against semi-dormant bacilli in acidic environment, disrupting membrane/fatty acid synthesis.","uses":"Tuberculosis intensive phase (first 2 months).","adr":"Hepatotoxicity, hyperuricemia/gout, arthralgia, photosensitivity."},"Ethambutol":{"adme":"Good oral bioavailability, renal elimination (dose-adjust in renal failure), half-life ~3-4 hr.","moa":"Inhibits arabinosyl transferase blocking arabinogalactan synthesis of the mycobacterial cell wall.","uses":"Tuberculosis (combination therapy), MAC.","adr":"Dose-dependent optic neuritis with red-green color blindness (reversible), hyperuricemia, peripheral neuropathy."},"Streptomycin":{"adme":"IV/IM (poor oral absorption), minimal protein binding, renal elimination (dose-adjust and monitor levels in renal failure).","moa":"Aminoglycoside binding 30S ribosomal subunit inhibiting protein synthesis.","uses":"TB (second-line/MDR), plague, tularemia, brucellosis, enterococcal endocarditis synergy.","adr":"Ototoxicity (vestibular/auditory), nephrotoxicity, neuromuscular blockade."},"Bedaquiline":{"adme":"Oral with food, very high protein binding, hepatic CYP3A4 metabolism, extremely long terminal half-life (~5 months).","moa":"Inhibits mycobacterial ATP synthase blocking energy production.","uses":"Multidrug-resistant tuberculosis (MDR/XDR-TB).","adr":"QT prolongation, hepatotoxicity, increased mortality signal, nausea, arthralgia."},"Dapsone":{"adme":"Good oral bioavailability, hepatic acetylation and N-hydroxylation, long half-life, enterohepatic recirculation.","moa":"Inhibits dihydropteroate synthase blocking folate synthesis (sulfone).","uses":"Leprosy, dermatitis herpetiformis, PCP prophylaxis (alternative).","adr":"Hemolysis/methemoglobinemia (esp. G6PD deficiency), agranulocytosis, dapsone hypersensitivity syndrome, peripheral neuropathy."},"Clofazimine":{"adme":"Variable oral bioavailability (improved with food), highly lipophilic with massive tissue accumulation, extremely long half-life (~70 days).","moa":"Binds mycobacterial DNA and generates reactive oxygen species; also anti-inflammatory.","uses":"Leprosy (esp. erythema nodosum leprosum), MDR-TB.","adr":"Red-brown skin and conjunctival discoloration, ichthyosis/dry skin, GI/abdominal pain (crystal deposition), QT prolongation."},"Amphotericin B":{"adme":"Parenteral (negligible oral absorption), highly protein bound, slow non-renal clearance with very long half-life; lipid formulations reduce toxicity.","moa":"Binds ergosterol in fungal cell membrane forming pores causing leakage of ions and cell death (polyene).","uses":"Severe systemic mycoses, cryptococcal meningitis, invasive candidiasis/aspergillosis, mucormycosis, leishmaniasis.","adr":"Infusion-related fever/rigors, nephrotoxicity (dose-limiting), hypokalemia/hypomagnesemia, anemia."},"Nystatin":{"adme":"Not absorbed from GI tract or skin so used topically/orally for local effect only, eliminated in feces.","moa":"Polyene binding ergosterol disrupting fungal cell membrane.","uses":"Oral and esophageal/cutaneous candidiasis (topical/oral thrush, diaper rash).","adr":"Generally well tolerated, GI upset with oral use, local irritation."},"Fluconazole":{"adme":"Excellent oral bioavailability (~90%), low protein binding, good CNS penetration, renal elimination (dose-adjust in renal failure), long half-life.","moa":"Triazole inhibiting fungal CYP450 14-alpha-demethylase blocking ergosterol synthesis.","uses":"Candidiasis, cryptococcal meningitis, coccidioidomycosis, prophylaxis in immunocompromised.","adr":"Hepatotoxicity, QT prolongation, CYP2C9/3A4 inhibition (drug interactions), rash, teratogenic in high doses."},"Voriconazole":{"adme":"Good oral bioavailability, hepatic CYP2C19/3A4 metabolism with nonlinear kinetics and genetic variability (level monitoring), many drug interactions.","moa":"Triazole inhibiting 14-alpha-demethylase blocking ergosterol synthesis.","uses":"Invasive aspergillosis (drug of choice), Candida, Scedosporium, Fusarium.","adr":"Visual disturbances/photopsia, hepatotoxicity, photosensitivity/skin cancer, QT prolongation, hallucinations."},"Itraconazole":{"adme":"Variable oral absorption (capsule needs acid/food, solution on empty stomach), highly protein bound, hepatic CYP3A4 metabolism and inhibitor.","moa":"Triazole inhibiting fungal CYP450 14-alpha-demethylase blocking ergosterol synthesis.","uses":"Dermatophytoses/onychomycosis, histoplasmosis, blastomycosis, sporotrichosis, aspergillosis.","adr":"Negative inotropy (avoid in heart failure), hepatotoxicity, hypokalemia, drug interactions."},"Ketoconazole":{"adme":"Oral absorption requires gastric acid, highly protein bound, hepatic CYP3A4 metabolism and potent inhibitor.","moa":"Imidazole inhibiting fungal 14-alpha-demethylase and (at higher doses) human steroidogenesis.","uses":"Topical dermatophytoses/seborrheic dermatitis; limited systemic use; Cushing syndrome (steroid synthesis inhibition).","adr":"Severe hepatotoxicity, adrenal suppression, gynecomastia, QT prolongation, many drug interactions."},"Caspofungin":{"adme":"Parenteral only, highly protein bound, hepatic (non-CYP) degradation (dose-adjust in hepatic impairment, not renal).","moa":"Echinocandin inhibiting beta-(1,3)-D-glucan synthase blocking fungal cell wall synthesis.","uses":"Invasive candidiasis, esophageal candidiasis, salvage therapy for aspergillosis, empiric in febrile neutropenia.","adr":"Infusion reactions/histamine release, hepatotoxicity, hypokalemia, generally well tolerated."},"Micafungin":{"adme":"Parenteral, highly protein bound, hepatic non-CYP metabolism (no renal dose adjustment).","moa":"Echinocandin inhibiting beta-(1,3)-D-glucan synthase blocking fungal cell wall synthesis.","uses":"Invasive/esophageal candidiasis, prophylaxis in stem cell transplant.","adr":"Hepatotoxicity, infusion reactions, hemolysis, generally well tolerated."},"Terbinafine":{"adme":"Good oral bioavailability, highly lipophilic and protein bound, accumulates in skin/nails, hepatic CYP metabolism, very long terminal half-life.","moa":"Allylamine inhibiting squalene epoxidase blocking ergosterol synthesis (causes toxic squalene accumulation).","uses":"Dermatophyte onychomycosis and tinea infections.","adr":"Hepatotoxicity, taste disturbance/loss, rash, rare Stevens-Johnson syndrome."},"Flucytosine":{"adme":"Good oral bioavailability, low protein binding, renal elimination (dose-adjust and monitor levels in renal failure), good CSF penetration.","moa":"Converted by fungal cytosine deaminase to 5-fluorouracil inhibiting DNA/RNA synthesis (thymidylate synthase/protein synthesis).","uses":"Cryptococcal meningitis and severe candidiasis, always combined with amphotericin B (to limit resistance).","adr":"Bone marrow suppression, hepatotoxicity, GI upset, enterocolitis."},"Griseofulvin":{"adme":"Variable oral absorption (improved with fatty meal), deposited in keratin precursor cells, hepatic metabolism and CYP inducer.","moa":"Binds fungal microtubules disrupting mitotic spindle function and inhibiting cell division.","uses":"Dermatophyte infections of skin/hair/nails (tinea capitis).","adr":"Headache, GI upset, photosensitivity, disulfiram-like reaction, hepatotoxicity, CYP induction."},"Acyclovir":{"adme":"Poor oral bioavailability (~15-20%), low protein binding, renal elimination (dose-adjust and hydrate in renal failure), IV for severe disease.","moa":"Guanosine analog phosphorylated by viral thymidine kinase then inhibits/terminates viral DNA polymerase.","uses":"HSV (genital/encephalitis), VZV (chickenpox/shingles).","adr":"Crystalline nephropathy (esp. IV/dehydration), neurotoxicity, phlebitis, GI upset."},"Valacyclovir":{"adme":"Prodrug of acyclovir with much higher oral bioavailability (~55%), rapidly converted to acyclovir, renal elimination (dose-adjust).","moa":"After conversion to acyclovir, viral TK phosphorylation yields a viral DNA polymerase inhibitor/chain terminator.","uses":"HSV (genital herpes, cold sores), herpes zoster.","adr":"Nephrotoxicity, headache, GI upset, thrombotic thrombocytopenic purpura at high doses in immunocompromised."},"Ganciclovir":{"adme":"Poor oral bioavailability so given IV (valganciclovir is the oral prodrug), renal elimination (dose-adjust in renal failure).","moa":"Guanosine analog phosphorylated by viral kinase (UL97) inhibiting viral DNA polymerase.","uses":"Cytomegalovirus (CMV) retinitis, colitis, and prophylaxis in transplant/immunocompromised.","adr":"Myelosuppression (neutropenia/thrombocytopenia), nephrotoxicity, CNS effects, teratogenic/carcinogenic."},"Oseltamivir":{"adme":"Oral prodrug with good bioavailability, converted to active oseltamivir carboxylate, renal elimination (dose-adjust in renal failure).","moa":"Inhibits influenza neuraminidase preventing release of new virions from infected cells.","uses":"Influenza A and B treatment and prophylaxis (start within 48 hr).","adr":"Nausea/vomiting, headache, rare neuropsychiatric events, rash."},"Zanamivir":{"adme":"Inhaled (low oral bioavailability), low systemic absorption, renal excretion of absorbed fraction.","moa":"Inhibits influenza neuraminidase blocking release of virions.","uses":"Influenza A and B treatment and prophylaxis.","adr":"Bronchospasm (avoid in asthma/COPD), cough, throat irritation, headache."},"Baloxavir":{"adme":"Oral prodrug (baloxavir marboxil), single-dose regimen, highly protein bound, hepatic metabolism, very long half-life.","moa":"Inhibits influenza cap-dependent endonuclease (PA protein) blocking viral mRNA synthesis.","uses":"Uncomplicated influenza A and B (single oral dose).","adr":"Diarrhea, bronchitis, headache, emergence of reduced-susceptibility variants."},"Tenofovir":{"adme":"Oral prodrug (TDF or TAF), low protein binding, renal elimination (dose-adjust; TAF has lower renal/bone toxicity).","moa":"Nucleotide reverse transcriptase inhibitor (NtRTI) acting as chain terminator of HIV/HBV DNA.","uses":"HIV (backbone of cART), chronic hepatitis B, HIV PrEP.","adr":"Nephrotoxicity/Fanconi syndrome and decreased bone density (mainly TDF), GI upset, lactic acidosis."},"Zidovudine":{"adme":"Good oral bioavailability, hepatic glucuronidation, partly renal elimination, short half-life, crosses placenta.","moa":"Nucleoside reverse transcriptase inhibitor (NRTI) acting as a thymidine analog chain terminator.","uses":"HIV (historical backbone), prevention of mother-to-child transmission.","adr":"Bone marrow suppression (anemia/neutropenia), myopathy, lactic acidosis/hepatic steatosis, lipoatrophy."},"Lamivudine":{"adme":"Good oral bioavailability, low protein binding, renal elimination (dose-adjust in renal failure), well tolerated.","moa":"Cytidine analog NRTI acting as chain terminator of HIV/HBV reverse transcriptase.","uses":"HIV (cART backbone), chronic hepatitis B.","adr":"Generally well tolerated, headache, fatigue, rare pancreatitis, lactic acidosis."},"Abacavir":{"adme":"Excellent oral bioavailability, hepatic metabolism (alcohol dehydrogenase/glucuronidation, not CYP), low renal involvement.","moa":"Guanosine analog NRTI acting as chain terminator of HIV reverse transcriptase.","uses":"HIV (cART backbone).","adr":"Hypersensitivity reaction (HLA-B*5701 linked, screen before use), possible increased cardiovascular risk, lactic acidosis."},"Efavirenz":{"adme":"Oral, highly protein bound, hepatic CYP2B6/3A4 metabolism with genetic variability and CYP induction, very long half-life, crosses BBB.","moa":"Non-nucleoside reverse transcriptase inhibitor (NNRTI) binding directly to and inhibiting HIV reverse transcriptase.","uses":"HIV (older first-line backbone in combination).","adr":"CNS/neuropsychiatric effects (vivid dreams, dizziness), rash, hepatotoxicity, dyslipidemia, teratogenicity concern."},"Nevirapine":{"adme":"Good oral bioavailability, hepatic CYP3A4/2B6 metabolism and inducer, long half-life.","moa":"NNRTI binding to and inhibiting HIV reverse transcriptase.","uses":"HIV combination therapy, prevention of mother-to-child transmission.","adr":"Severe hepatotoxicity (esp. higher CD4 counts), Stevens-Johnson syndrome/rash, requires lead-in dose escalation."},"Dolutegravir":{"adme":"Good oral bioavailability, highly protein bound, hepatic UGT1A1/CYP3A4 metabolism (chelated by cations), long half-life allowing once-daily dosing.","moa":"Integrase strand transfer inhibitor (INSTI) blocking integration of viral DNA into host genome.","uses":"HIV first-line (preferred) combination therapy.","adr":"Generally well tolerated, headache, insomnia, weight gain, possible neural tube defect signal (early pregnancy), small creatinine rise."},"Raltegravir":{"adme":"Good oral bioavailability, hepatic UGT1A1 glucuronidation (minimal CYP), twice-daily dosing.","moa":"Integrase strand transfer inhibitor blocking integration of viral DNA into host genome.","uses":"HIV combination therapy.","adr":"Generally well tolerated, rare rash/Stevens-Johnson, CK elevation/myopathy, insomnia."},"Ritonavir":{"adme":"Oral, highly protein bound, potent CYP3A4 inhibitor used mainly as a pharmacokinetic booster.","moa":"HIV protease inhibitor (now used chiefly to boost levels of other PIs via CYP3A4 inhibition).","uses":"Pharmacokinetic booster for other protease inhibitors in HIV (and in some COVID antivirals).","adr":"GI intolerance, dyslipidemia, paresthesias, extensive CYP3A4 drug interactions, hepatotoxicity."},"Lopinavir":{"adme":"Oral, highly protein bound, hepatic CYP3A4 metabolism, co-formulated with low-dose ritonavir as booster.","moa":"HIV protease inhibitor preventing cleavage of viral polyprotein into mature functional proteins.","uses":"HIV combination therapy (boosted), prevention of mother-to-child transmission.","adr":"GI upset/diarrhea, dyslipidemia, insulin resistance, lipodystrophy, QT/PR prolongation."},"Atazanavir":{"adme":"Oral (absorption needs gastric acid), highly protein bound, hepatic CYP3A4 metabolism, usually ritonavir-boosted.","moa":"HIV protease inhibitor preventing cleavage of viral polyprotein.","uses":"HIV combination therapy.","adr":"Indirect hyperbilirubinemia/jaundice (benign), nephrolithiasis, PR prolongation, rash, dyslipidemia (less than other PIs)."},"Sofosbuvir":{"adme":"Oral, active metabolite renally eliminated (caution in severe renal impairment), substrate of P-gp, given as fixed-dose combinations.","moa":"Nucleotide inhibitor of HCV NS5B RNA-dependent RNA polymerase acting as chain terminator.","uses":"Chronic hepatitis C (pan-genotypic in combinations).","adr":"Fatigue, headache, bradycardia if combined with amiodarone, generally very well tolerated."},"Ledipasvir":{"adme":"Oral (absorption reduced by acid-suppressing drugs), highly protein bound, mainly biliary/fecal elimination, co-formulated with sofosbuvir.","moa":"Inhibitor of HCV NS5A protein essential for viral replication and assembly.","uses":"Chronic hepatitis C (genotype 1/4/5/6) with sofosbuvir.","adr":"Headache, fatigue, generally very well tolerated."},"Chloroquine":{"adme":"Good oral bioavailability, very large volume of distribution with extensive tissue accumulation, hepatic metabolism, very long half-life (weeks).","moa":"Concentrates in parasite food vacuole inhibiting heme polymerase so toxic free heme accumulates and kills the plasmodium.","uses":"Chloroquine-sensitive malaria, amoebic liver abscess, rheumatoid arthritis/lupus.","adr":"Retinopathy (cumulative), pruritus, QT prolongation, hemolysis in G6PD deficiency, cardiotoxicity in overdose."},"Artemether-lumefantrine":{"adme":"Oral fixed-dose combination, lumefantrine absorption enhanced by fat, both hepatically metabolized (artemether rapidly, lumefantrine long half-life).","moa":"Artemether generates reactive free radicals via cleavage of its endoperoxide bridge damaging parasite proteins; lumefantrine inhibits heme detoxification.","uses":"Uncomplicated Plasmodium falciparum malaria (first-line ACT).","adr":"QT prolongation, headache, dizziness, GI upset, generally well tolerated."},"Primaquine":{"adme":"Good oral bioavailability, hepatic metabolism (active oxidative metabolites), short half-life.","moa":"Generates reactive oxygen metabolites that kill hepatic hypnozoites and gametocytes of Plasmodium.","uses":"Radical cure of P. vivax/ovale (liver hypnozoites), gametocidal for transmission blocking.","adr":"Hemolytic anemia in G6PD deficiency (screen first), methemoglobinemia, GI upset."},"Quinine":{"adme":"Good oral bioavailability, highly protein bound, hepatic CYP3A4 metabolism, narrow therapeutic index.","moa":"Inhibits parasite heme polymerization (similar to chloroquine), toxic heme accumulates.","uses":"Severe/complicated and chloroquine-resistant falciparum malaria, nocturnal leg cramps.","adr":"Cinchonism (tinnitus, headache, nausea), hypoglycemia, QT prolongation, hemolysis (blackwater fever), thrombocytopenia."},"Mefloquine":{"adme":"Good oral bioavailability, highly protein bound, hepatic metabolism, very long half-life (~2-3 weeks).","moa":"Blood schizonticide thought to interfere with parasite heme detoxification.","uses":"Malaria prophylaxis and treatment in chloroquine-resistant areas.","adr":"Neuropsychiatric effects (vivid dreams, anxiety, psychosis, seizures), QT prolongation, GI upset."},"Atovaquone-proguanil":{"adme":"Oral fixed-dose combination (atovaquone absorption enhanced by fat), atovaquone highly protein bound with long half-life, proguanil hepatically activated (CYP2C19).","moa":"Atovaquone inhibits the parasite mitochondrial cytochrome bc1 complex (electron transport); proguanil/cycloguanil inhibits dihydrofolate reductase, acting synergistically.","uses":"Malaria prophylaxis and treatment of uncomplicated falciparum.","adr":"GI upset/abdominal pain, headache, transaminitis, mouth ulcers; generally well tolerated."},"Albendazole":{"adme":"Poor and variable oral absorption (improved with fatty meal), hepatic first-pass to active albendazole sulfoxide, CYP inducer.","moa":"Binds parasite beta-tubulin inhibiting microtubule polymerization and glucose uptake.","uses":"Soil-transmitted helminths, neurocysticercosis, hydatid (echinococcal) disease, strongyloidiasis.","adr":"Hepatotoxicity, bone marrow suppression (prolonged use), GI upset, alopecia, teratogenic."},"Mebendazole":{"adme":"Poor oral absorption (acts mainly in gut lumen), highly protein bound, hepatic metabolism.","moa":"Binds helminth beta-tubulin inhibiting microtubule assembly and glucose uptake.","uses":"Intestinal nematodes (pinworm, roundworm, hookworm, whipworm).","adr":"GI upset, rare hepatotoxicity and neutropenia at high doses, teratogenic."},"Praziquantel":{"adme":"Good oral absorption, extensive hepatic first-pass metabolism, short half-life, CYP3A4 substrate.","moa":"Increases calcium permeability of the worm tegument causing muscular contraction, paralysis and tegumental damage.","uses":"Schistosomiasis, cestode/tapeworm infections, liver flukes.","adr":"Abdominal pain, dizziness, headache, urticaria (from dying worms), drowsiness."},"Ivermectin":{"adme":"Oral, highly protein bound, hepatic CYP3A4 metabolism, long half-life, does not normally cross intact blood-brain barrier.","moa":"Binds invertebrate glutamate-gated chloride channels causing hyperpolarization and parasite paralysis.","uses":"Onchocerciasis, strongyloidiasis, scabies, lymphatic filariasis, lice.","adr":"Mazzotti reaction (in onchocerciasis), dizziness, pruritus; neurotoxicity if BBB compromised (avoid in heavy Loa loa load)."},"Diethylcarbamazine":{"adme":"Good oral bioavailability, renal elimination (alkalinization slows clearance), short half-life.","moa":"Sensitizes microfilariae to host immune clearance and alters arachidonic acid metabolism immobilizing them.","uses":"Lymphatic filariasis (Wuchereria, Brugia), loiasis, tropical pulmonary eosinophilia.","adr":"Mazzotti-type reaction (fever, headache from dying microfilariae), avoid in onchocerciasis (severe ocular reactions), GI upset."},"Tinidazole":{"adme":"Excellent oral bioavailability, low protein binding, hepatic metabolism, longer half-life than metronidazole (~12-14 hr).","moa":"Nitroimidazole whose reduced nitro radical damages microbial/protozoal DNA.","uses":"Trichomoniasis, giardiasis, amoebiasis, bacterial vaginosis.","adr":"Disulfiram-like reaction with alcohol, metallic taste, GI upset, headache, peripheral neuropathy."},"Cyclophosphamide":{"adme":"Good oral bioavailability, prodrug activated by hepatic CYP to phosphoramide mustard and acrolein, renal excretion of metabolites.","moa":"Nitrogen mustard alkylating agent cross-linking DNA strands (cell-cycle nonspecific).","uses":"Lymphomas, leukemias, breast/ovarian cancer, autoimmune disease (lupus nephritis, vasculitis).","adr":"Hemorrhagic cystitis (acrolein; give mesna/hydration), myelosuppression, alopecia, SIADH, infertility, secondary malignancy."},"Cisplatin":{"adme":"Parenteral, highly protein bound, renal elimination (requires aggressive hydration), accumulates in tissues.","moa":"Platinum compound forming intrastrand DNA cross-links (covalent adducts) inhibiting replication.","uses":"Testicular, ovarian, bladder, lung, head and neck cancers.","adr":"Nephrotoxicity (dose-limiting, hydrate), ototoxicity, severe emesis, peripheral neuropathy, hypomagnesemia."},"Carboplatin":{"adme":"Parenteral, lower protein binding than cisplatin, renal elimination (dosed by Calvert formula using GFR).","moa":"Platinum agent forming DNA cross-links inhibiting replication (less reactive than cisplatin).","uses":"Ovarian, lung, and other solid tumors (better tolerated alternative to cisplatin).","adr":"Myelosuppression/thrombocytopenia (dose-limiting), less nephro/oto/neurotoxicity than cisplatin, nausea."},"Methotrexate":{"adme":"Variable oral bioavailability (saturable), partly protein bound, renal elimination (dose-adjust; toxicity in renal failure), enters cells via folate carrier.","moa":"Inhibits dihydrofolate reductase blocking tetrahydrofolate regeneration and thus DNA/purine synthesis (S-phase).","uses":"Leukemias, lymphomas, choriocarcinoma, rheumatoid arthritis, psoriasis, ectopic pregnancy.","adr":"Myelosuppression, mucositis, hepatotoxicity, pneumonitis, nephrotoxicity (rescue with leucovorin), teratogenic."},"5-Fluorouracil":{"adme":"Parenteral (erratic oral absorption), metabolized largely by dihydropyrimidine dehydrogenase (DPD deficiency causes severe toxicity), short half-life.","moa":"Pyrimidine analog whose metabolite inhibits thymidylate synthase and is incorporated into RNA/DNA (S-phase).","uses":"Colorectal, breast, gastric, pancreatic, head and neck cancers; topical for actinic keratoses.","adr":"Myelosuppression, mucositis/diarrhea, hand-foot syndrome, cardiotoxicity/coronary spasm, severe toxicity in DPD deficiency."},"Cytarabine":{"adme":"Parenteral (deaminated rapidly if oral), short plasma half-life, hepatic/tissue deamination, intrathecal use for CNS.","moa":"Pyrimidine (cytidine) analog incorporated into DNA inhibiting DNA polymerase (S-phase specific).","uses":"Acute myeloid leukemia (induction), ALL, lymphomas, CNS leukemia (intrathecal).","adr":"Myelosuppression, cytarabine syndrome (fever/myalgia), cerebellar toxicity (high dose), conjunctivitis, mucositis."},"Gemcitabine":{"adme":"Parenteral, intracellular activation by deoxycytidine kinase, deaminated to inactive metabolite, short half-life.","moa":"Pyrimidine (cytidine) analog incorporated into DNA causing chain termination and inhibiting ribonucleotide reductase.","uses":"Pancreatic, lung, bladder, breast, and ovarian cancers.","adr":"Myelosuppression, flu-like symptoms, hemolytic uremic syndrome, transaminitis, pulmonary toxicity."},"Doxorubicin":{"adme":"Parenteral (vesicant), highly protein bound, extensive hepatic metabolism and biliary excretion (reduce dose in hepatic impairment), long half-life.","moa":"Anthracycline intercalating DNA and inhibiting topoisomerase II, also generates free radicals.","uses":"Breast cancer, lymphomas, leukemias, sarcomas, many solid tumors.","adr":"Dose-dependent cardiotoxicity/cardiomyopathy (cumulative; dexrazoxane cardioprotection), myelosuppression, red urine, alopecia, vesicant extravasation."},"Bleomycin":{"adme":"Parenteral, minimal protein binding, partly renal elimination (dose-adjust in renal failure), inactivated by bleomycin hydrolase (low in lung/skin).","moa":"Glycopeptide generating free radicals that cause DNA strand breaks (G2/M phase).","uses":"Testicular cancer, Hodgkin lymphoma, squamous cell carcinomas, pleurodesis.","adr":"Pulmonary fibrosis/pneumonitis (dose-limiting), mucocutaneous reactions, fever/chills, minimal myelosuppression."},"Vincristine":{"adme":"Parenteral (vesicant, NEVER intrathecal - fatal), highly protein bound, hepatic metabolism and biliary excretion (reduce in hepatic impairment).","moa":"Vinca alkaloid binding tubulin preventing microtubule polymerization and arresting mitosis (M phase).","uses":"ALL, lymphomas, Wilms tumor, neuroblastoma, rhabdomyosarcoma.","adr":"Peripheral neuropathy (dose-limiting), constipation/ileus, SIADH, alopecia, minimal myelosuppression, vesicant."},"Vinblastine":{"adme":"Parenteral (vesicant), highly protein bound, hepatic metabolism and biliary excretion (reduce in hepatic impairment).","moa":"Vinca alkaloid binding tubulin inhibiting microtubule assembly and arresting mitosis (M phase).","uses":"Hodgkin lymphoma, testicular cancer, Kaposi sarcoma.","adr":"Myelosuppression (dose-limiting, unlike vincristine), neuropathy (less), alopecia, vesicant."},"Paclitaxel":{"adme":"Parenteral, highly protein bound, hepatic CYP2C8/3A4 metabolism and biliary excretion, formulated with cremophor (hypersensitivity).","moa":"Taxane that hyperstabilizes microtubules preventing depolymerization and arresting mitosis (M phase).","uses":"Ovarian, breast, lung, and other solid tumors, Kaposi sarcoma.","adr":"Hypersensitivity reactions (premedicate), peripheral neuropathy, myelosuppression, alopecia, bradyarrhythmias."},"Docetaxel":{"adme":"Parenteral, highly protein bound, hepatic CYP3A4 metabolism (caution in hepatic impairment), biliary excretion.","moa":"Taxane stabilizing microtubules preventing depolymerization and arresting mitosis.","uses":"Breast, prostate, lung, gastric, and head and neck cancers.","adr":"Myelosuppression/neutropenia, fluid retention/edema, hypersensitivity, peripheral neuropathy, nail changes."},"Etoposide":{"adme":"Variable oral bioavailability, highly protein bound, partly renal and hepatic elimination (dose-adjust in renal/hepatic impairment).","moa":"Topoisomerase II inhibitor causing DNA double-strand breaks (G2/S phase).","uses":"Testicular and small cell lung cancer, lymphomas, leukemias.","adr":"Myelosuppression, alopecia, hypotension with rapid infusion, secondary AML (11q23/MLL translocation), mucositis."},"Irinotecan":{"adme":"Parenteral, prodrug converted to active SN-38 then glucuronidated by UGT1A1 (genetic polymorphism affects toxicity), biliary excretion.","moa":"Topoisomerase I inhibitor causing DNA single-strand breaks (S phase).","uses":"Metastatic colorectal cancer, pancreatic and lung cancers.","adr":"Severe diarrhea (acute cholinergic and delayed), myelosuppression, alopecia; worse in UGT1A1*28 patients."},"Imatinib":{"adme":"Good oral bioavailability, highly protein bound, hepatic CYP3A4 metabolism (drug interactions), long half-life.","moa":"Inhibits BCR-ABL tyrosine kinase (also c-KIT, PDGFR) blocking proliferation signaling.","uses":"Chronic myeloid leukemia (Philadelphia chromosome positive), gastrointestinal stromal tumors (GIST).","adr":"Edema/fluid retention, myelosuppression, GI upset, muscle cramps, hepatotoxicity, rash."},"Erlotinib":{"adme":"Oral (absorption reduced by acid suppression), highly protein bound, hepatic CYP3A4 metabolism.","moa":"Inhibits EGFR tyrosine kinase blocking downstream growth signaling.","uses":"EGFR-mutant non-small cell lung cancer, pancreatic cancer (with gemcitabine).","adr":"Acneiform rash (correlates with response), diarrhea, interstitial lung disease, hepatotoxicity."},"Rituximab":{"adme":"Parenteral monoclonal antibody (IV), long half-life of weeks, eliminated by reticuloendothelial/target-mediated clearance (no renal/hepatic dosing).","moa":"Anti-CD20 monoclonal antibody depleting B cells via complement/antibody-dependent cytotoxicity and apoptosis.","uses":"Non-Hodgkin lymphoma, CLL, rheumatoid arthritis, ANCA vasculitis, autoimmune disease.","adr":"Infusion reactions, B-cell depletion/infections, hepatitis B reactivation, progressive multifocal leukoencephalopathy (PML), tumor lysis syndrome."},"Trastuzumab":{"adme":"Parenteral monoclonal antibody, long half-life, target-mediated/reticuloendothelial clearance.","moa":"Anti-HER2 monoclonal antibody inhibiting HER2 signaling and triggering antibody-dependent cytotoxicity.","uses":"HER2-positive breast and gastric cancer.","adr":"Cardiotoxicity/reduced ejection fraction (esp. with anthracyclines; monitor cardiac function), infusion reactions, pulmonary toxicity."},"Bevacizumab":{"adme":"Parenteral monoclonal antibody, long half-life of weeks, reticuloendothelial clearance.","moa":"Anti-VEGF monoclonal antibody inhibiting angiogenesis by binding circulating VEGF-A.","uses":"Metastatic colorectal, lung, renal, and ovarian cancers, glioblastoma, neovascular eye disease.","adr":"Hypertension, proteinuria, bleeding/hemorrhage, thromboembolism, impaired wound healing, GI perforation."},"Tamoxifen":{"adme":"Good oral bioavailability, highly protein bound, prodrug activated by hepatic CYP2D6 to endoxifen (interactions/polymorphism), long half-life.","moa":"Selective estrogen receptor modulator antagonizing estrogen in breast tissue (partial agonist in uterus/bone).","uses":"ER-positive breast cancer treatment and p
