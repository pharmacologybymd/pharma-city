Phentolamine","Tolazoline"]},{"heading":"Selective α1","drugs":["Prazosin","Terazosin","Doxazosin","Tamsulosin"]},{"heading":"Selective α2","drugs":["Yohimbine"]},{"heading":"Ergot alkaloids","drugs":["Ergotamine","Ergometrine"]}]},{"heading":"β-adrenergic blockers","groups":[{"heading":"Non-selective","drugs":["Propranolol","Timolol","Pindolol","Sotalol"]},{"heading":"Cardioselective (β1)","drugs":["Metoprolol","Atenolol","Esmolol","Bisoprolol","Nebivolol"]},{"heading":"With additional α-blockade","drugs":["Labetalol","Carvedilol"]}]},{"heading":"Adrenergic neurone blockers","drugs":["Reserpine","Guanethidine"]}]}]}]},"details":{"Adrenaline":{"adme":"Inactive orally (rapid gut/hepatic catabolism), poorly protein-bound, metabolised by MAO and COMT to metanephrine and VMA, renally excreted, plasma half-life only a few minutes.","moa":"Direct non-selective agonist at alpha-1, alpha-2, beta-1 and beta-2 adrenoceptors.","uses":"Anaphylaxis, cardiac arrest, with local anaesthetics, acute asthma, open-angle glaucoma.","adr":"Palpitations, tachycardia, hypertension, anxiety, tremor, arrhythmias, headache."},"Noradrenaline":{"adme":"Inactive orally, low protein binding, degraded by MAO and COMT, excreted renally as VMA/metanephrines, half-life of a few minutes.","moa":"Direct agonist mainly at alpha-1, alpha-2 and beta-1 receptors with little beta-2 action.","uses":"Septic and other distributive shock, hypotension refractory to fluids.","adr":"Reflex bradycardia, severe hypertension, tissue necrosis on extravasation, organ ischaemia."},"Isoprenaline":{"adme":"Poor oral bioavailability, metabolised mainly by COMT (resistant to MAO), renally excreted, short duration of action.","moa":"Direct non-selective beta-1 and beta-2 adrenoceptor agonist with negligible alpha activity.","uses":"Bradyarrhythmias, heart block, AV nodal block, occasionally bronchospasm.","adr":"Tachycardia, palpitations, arrhythmias, flushing, tremor, headache."},"Dopamine":{"adme":"Inactive orally, given by IV infusion, metabolised by MAO and COMT, renally excreted, half-life of a few minutes.","moa":"Dose-dependent agonist at dopamine D1 (low), beta-1 (intermediate) and alpha-1 (high dose) receptors.","uses":"Cardiogenic and septic shock, acute heart failure, hypotension.","adr":"Tachycardia, arrhythmias, hypertension, nausea, tissue necrosis on extravasation."},"Dobutamine":{"adme":"Inactive orally, given by IV infusion, metabolised by COMT, renally excreted, half-life about two minutes.","moa":"Relatively selective beta-1 adrenoceptor agonist (racemate with mild alpha/beta-2 effects).","uses":"Acute heart failure, cardiogenic shock, cardiac stress testing.","adr":"Tachycardia, arrhythmias, hypertension, angina, headache."},"Phenylephrine":{"adme":"Low oral bioavailability due to gut MAO metabolism, metabolised by MAO, renally excreted, half-life of a few hours.","moa":"Selective direct alpha-1 adrenoceptor agonist.","uses":"Nasal decongestion, hypotension, mydriasis without cycloplegia, supraventricular tachycardia.","adr":"Reflex bradycardia, hypertension, headache, rebound nasal congestion."},"Clonidine":{"adme":"Well absorbed orally (high bioavailability ~75%), moderate protein binding, partly hepatic metabolism with significant renal excretion, half-life around 12 hours.","moa":"Central alpha-2 adrenoceptor agonist reducing sympathetic outflow.","uses":"Hypertension, opioid/alcohol withdrawal, ADHD, neuropathic pain.","adr":"Sedation, dry mouth, bradycardia, rebound hypertension on withdrawal, constipation."},"Salbutamol":{"adme":"Oral bioavailability ~50%, given mostly by inhalation, hepatic sulphate conjugation, renally excreted, half-life around 4-6 hours.","moa":"Selective short-acting beta-2 adrenoceptor agonist.","uses":"Acute asthma, bronchospasm, COPD, hyperkalaemia.","adr":"Tremor, tachycardia, palpitations, hypokalaemia, headache, restlessness."},"Tyramine":{"adme":"Normally inactivated by gut and hepatic MAO with high first-pass metabolism, so dietary intake is usually harmless unless MAO is inhibited.","moa":"Indirectly acting sympathomimetic displacing stored noradrenaline from nerve terminals.","uses":"No therapeutic use; research tool and cause of hypertensive crisis with MAO inhibitors.","adr":"Hypertensive crisis with MAO inhibitors, headache, palpitations."},"Amphetamine":{"adme":"Well absorbed orally, low protein binding, partly hepatic (CYP2D6) metabolism, urinary excretion is pH dependent (enhanced when acidic), half-life around 10-12 hours.","moa":"Indirectly acting sympathomimetic releasing noradrenaline and dopamine and inhibiting their reuptake; mild MAO inhibition.","uses":"ADHD, narcolepsy.","adr":"Insomnia, anorexia, hypertension, tachycardia, dependence, psychosis."},"Cocaine":{"adme":"Well absorbed from mucous membranes, plasma and hepatic esterase metabolism, renally excreted, short half-life of about one hour.","moa":"Blocks neuronal reuptake (NET/DAT) of noradrenaline and dopamine; local anaesthetic by sodium channel block.","uses":"Topical local anaesthesia of ENT mucosa; otherwise a drug of abuse.","adr":"Hypertension, tachyarrhythmias, MI, seizures, dependence, mucosal damage."},"Ephedrine":{"adme":"Well absorbed orally and resistant to MAO, minimal metabolism, largely excreted unchanged in urine (pH dependent), half-life around 3-6 hours.","moa":"Mixed-acting sympathomimetic (direct alpha/beta agonist plus noradrenaline release).","uses":"Hypotension during anaesthesia, nasal decongestion, bronchospasm.","adr":"Hypertension, tachycardia, insomnia, tremor, tachyphylaxis."},"Pseudoephedrine":{"adme":"Well absorbed orally, minimal hepatic metabolism, largely excreted unchanged in urine (pH dependent), half-life around 5-8 hours.","moa":"Mixed-acting sympathomimetic acting mainly on alpha-1 receptors with noradrenaline release.","uses":"Nasal and sinus decongestion.","adr":"Insomnia, restlessness, hypertension, tachycardia, palpitations."},"Methoxamine":{"adme":"Inactive orally, resistant to COMT/MAO so longer acting, renally excreted.","moa":"Selective direct alpha-1 adrenoceptor agonist.","uses":"Hypotension, paroxysmal supraventricular tachycardia (historical).","adr":"Reflex bradycardia, hypertension, headache."},"Methyldopa":{"adme":"Variable oral bioavailability (~25%), low protein binding, hepatic and tissue conversion to active metabolite, renally excreted, half-life around 2 hours but effect longer.","moa":"Prodrug converted to alpha-methylnoradrenaline, a central alpha-2 agonist reducing sympathetic outflow.","uses":"Hypertension in pregnancy.","adr":"Sedation, positive Coombs test/haemolytic anaemia, hepatotoxicity, dry mouth, depression."},"Dexmedetomidine":{"adme":"Given IV (poor oral bioavailability), highly protein bound, extensive hepatic glucuronidation and CYP metabolism, renally excreted, half-life around 2 hours.","moa":"Highly selective central alpha-2 adrenoceptor agonist.","uses":"ICU sedation, procedural sedation, anaesthetic adjunct.","adr":"Bradycardia, hypotension, dry mouth, transient hypertension on loading."},"Terbutaline":{"adme":"Oral bioavailability ~15%, partly sulphate-conjugated in liver, renally excreted, half-life around 3-4 hours.","moa":"Selective short-acting beta-2 adrenoceptor agonist.","uses":"Asthma, bronchospasm, tocolysis in premature labour.","adr":"Tremor, tachycardia, palpitations, hypokalaemia, restlessness."},"Salmeterol":{"adme":"Inhaled with negligible systemic bioavailability, highly protein bound, extensive hepatic CYP3A4 metabolism, mainly faecal excretion, long duration ~12 hours.","moa":"Selective long-acting beta-2 adrenoceptor agonist.","uses":"Maintenance therapy of asthma and COPD (with inhaled steroid).","adr":"Tremor, palpitations, tachycardia, hypokalaemia, paradoxical bronchospasm."},"Phenoxybenzamine (irreversible)":{"adme":"Variable oral absorption, hepatic metabolism, renal and biliary excretion, slow onset with long action due to covalent binding.","moa":"Irreversible non-selective alpha-adrenoceptor antagonist (covalent block).","uses":"Phaeochromocytoma preoperative preparation, Raynaud phenomenon.","adr":"Postural hypotension, reflex tachycardia, nasal congestion, miosis, failure of ejaculation."},"Phentolamine (reversible)":{"adme":"Inactive orally, given parenterally, hepatic metabolism, renally excreted, short duration of action.","moa":"Reversible competitive non-selective alpha-adrenoceptor antagonist.","uses":"Phaeochromocytoma hypertensive crisis, extravasation of vasopressors, clonidine withdrawal.","adr":"Hypotension, reflex tachycardia, arrhythmias, nasal congestion, GI stimulation."},"Prazosin":{"adme":"Oral bioavailability ~60%, highly protein bound, extensive hepatic metabolism, mainly biliary excretion, half-life around 2-3 hours.","moa":"Selective competitive alpha-1 adrenoceptor antagonist.","uses":"Hypertension, benign prostatic hyperplasia, Raynaud phenomenon, PTSD nightmares.","adr":"First-dose postural hypotension, dizziness, headache, nasal congestion, palpitations."},"Tamsulosin":{"adme":"Well absorbed orally, highly protein bound, extensive hepatic CYP3A4/2D6 metabolism, mainly renal excretion of metabolites, half-life around 10-13 hours.","moa":"Selective alpha-1A adrenoceptor antagonist (uroselective).","uses":"Benign prostatic hyperplasia, facilitation of ureteric stone passage.","adr":"Postural hypotension, dizziness, retrograde ejaculation, intraoperative floppy iris syndrome."},"Doxazosin":{"adme":"Oral bioavailability ~65%, highly protein bound, extensive hepatic metabolism, mainly faecal excretion, long half-life around 22 hours.","moa":"Selective long-acting competitive alpha-1 adrenoceptor antagonist.","uses":"Hypertension, benign prostatic hyperplasia.","adr":"Postural hypotension, dizziness, headache, oedema, fatigue."},"Propranolol":{"adme":"Well absorbed but high first-pass metabolism (bioavailability ~25%), highly protein bound, extensive hepatic CYP2D6/1A2 metabolism, renal excretion of metabolites, half-life around 3-6 hours.","moa":"Non-selective competitive beta-1 and beta-2 adrenoceptor antagonist.","uses":"Hypertension, angina, arrhythmias, migraine prophylaxis, thyrotoxicosis, tremor, anxiety.","adr":"Bradycardia, bronchospasm, fatigue, cold extremities, masked hypoglycaemia, nightmares."},"Timolol":{"adme":"Well absorbed orally with moderate first-pass effect, partly hepatic CYP2D6 metabolism, renally excreted, half-life around 4 hours.","moa":"Non-selective beta-adrenoceptor antagonist.","uses":"Open-angle glaucoma (topical), hypertension, migraine prophylaxis, post-MI.","adr":"Bradycardia, bronchospasm, fatigue; topical use can cause systemic beta-blockade."},"Pindolol (ISA)":{"adme":"Well absorbed orally (high bioavailability), moderate protein binding, partly hepatic metabolism with significant renal excretion, half-life around 3-4 hours.","moa":"Non-selective beta-blocker with intrinsic sympathomimetic (partial agonist) activity.","uses":"Hypertension, angina (where less bradycardia desired).","adr":"Less bradycardia, insomnia, vivid dreams, fatigue, bronchospasm."},"Metoprolol":{"adme":"Well absorbed but significant first-pass metabolism (bioavailability ~50%), low protein binding, hepatic CYP2D6 metabolism, renal excretion, half-life around 3-7 hours.","moa":"Selective competitive beta-1 (cardioselective) adrenoceptor antagonist.","uses":"Hypertension, angina, post-MI, heart failure, arrhythmias.","adr":"Bradycardia, fatigue, cold extremities, dizziness, depression."},"Atenolol":{"adme":"Incomplete oral absorption (bioavailability ~50%), low protein binding, minimal hepatic metabolism, largely excreted unchanged renally, half-life around 6-9 hours.","moa":"Selective competitive beta-1 (cardioselective) adrenoceptor antagonist.","uses":"Hypertension, angina, post-MI, arrhythmias.","adr":"Bradycardia, fatigue, cold extremities; accumulates in renal impairment."},"Esmolol":{"adme":"Given IV only, rapidly hydrolysed by red-cell esterases, renally excreted, very short half-life of about 9 minutes.","moa":"Ultra-short-acting selective beta-1 adrenoceptor antagonist.","uses":"Intraoperative and perioperative tachycardia/hypertension, acute supraventricular tachycardia.","adr":"Hypotension, bradycardia, infusion-site reactions."},"Labetalol":{"adme":"Oral bioavailability ~25% with high first-pass metabolism, highly protein bound, hepatic glucuronidation, renal/biliary excretion, half-life around 6-8 hours.","moa":"Combined non-selective beta- and selective alpha-1-adrenoceptor antagonist.","uses":"Hypertension including pregnancy and hypertensive emergencies.","adr":"Postural hypotension, dizziness, fatigue, bronchospasm, hepatotoxicity, scalp tingling."},"Carvedilol":{"adme":"Oral bioavailability ~25-35% with first-pass metabolism, highly protein bound, extensive hepatic CYP2D6/2C9 metabolism, mainly biliary excretion, half-life around 7-10 hours.","moa":"Non-selective beta-blocker with alpha-1 blockade and antioxidant activity.","uses":"Chronic heart failure, hypertension, post-MI left ventricular dysfunction.","adr":"Postural hypotension, dizziness, fatigue, bradycardia, worsening of asthma."},"Xylometazoline":{"adme":"Applied topically to nasal mucosa with mainly local action; systemic absorption is low.","moa":"Direct alpha-adrenoceptor agonist (imidazoline) producing local vasoconstriction.","uses":"Nasal decongestion in rhinitis and sinusitis.","adr":"Rebound congestion (rhinitis medicamentosa), local irritation, stinging, systemic effects on overdose."},"Phenoxybenzamine":{"adme":"Variable oral absorption, hepatic metabolism, renal and biliary excretion, slow onset with long duration owing to covalent binding.","moa":"Irreversible non-selective alpha-adrenoceptor antagonist.","uses":"Phaeochromocytoma preoperative preparation, Raynaud phenomenon.","adr":"Postural hypotension, reflex tachycardia, nasal congestion, miosis, failure of ejaculation."},"Phentolamine":{"adme":"Inactive orally, given parenterally, hepatic metabolism, renally excreted, short duration of action.","moa":"Reversible competitive non-selective alpha-adrenoceptor antagonist.","uses":"Phaeochromocytoma hypertensive crisis, vasopressor extravasation, clonidine withdrawal.","adr":"Hypotension, reflex tachycardia, arrhythmias, nasal congestion, GI stimulation."},"Tolazoline":{"adme":"Absorbed orally and parenterally, minimal protein binding, largely excreted unchanged in urine, short half-life.","moa":"Reversible competitive non-selective alpha-adrenoceptor antagonist with vasodilator action.","uses":"Persistent pulmonary hypertension of the newborn (historical), peripheral vasospasm.","adr":"Hypotension, tachycardia, arrhythmias, GI stimulation, flushing."},"Terazosin":{"adme":"Well absorbed orally (high bioavailability ~90%), highly protein bound, hepatic metabolism, faecal and renal excretion, half-life around 12 hours.","moa":"Selective long-acting competitive alpha-1 adrenoceptor antagonist.","uses":"Hypertension, benign prostatic hyperplasia.","adr":"First-dose postural hypotension, dizziness, headache, asthenia, nasal congestion."},"Yohimbine":{"adme":"Absorbed orally, hepatic metabolism, renally excreted, short half-life of about 1 hour.","moa":"Selective competitive alpha-2 adrenoceptor antagonist.","uses":"Erectile dysfunction (limited evidence), research tool.","adr":"Anxiety, hypertension, tachycardia, tremor, insomnia."},"Ergotamine":{"adme":"Poor and erratic oral bioavailability, extensive first-pass hepatic CYP3A4 metabolism, biliary excretion, long-lasting tissue effect despite short plasma half-life.","moa":"Partial agonist/antagonist at alpha-adrenergic and serotonin (5-HT1) receptors causing vasoconstriction.","uses":"Acute migraine attacks.","adr":"Nausea, vomiting, peripheral vasospasm/ischaemia (ergotism), gangrene, fibrosis on overuse."},"Ergometrine":{"adme":"Rapidly absorbed orally and parenterally, hepatic metabolism, renally excreted, half-life around 1-2 hours.","moa":"Partial agonist at alpha-adrenergic and 5-HT receptors causing uterine smooth muscle contraction.","uses":"Prevention and treatment of postpartum haemorrhage.","adr":"Hypertension, nausea, vomiting, headache, coronary vasospasm, uterine cramps."},"Pindolol":{"adme":"Well absorbed orally (high bioavailability), moderate protein binding, partly hepatic metabolism with significant renal excretion, half-life around 3-4 hours.","moa":"Non-selective beta-blocker with intrinsic sympathomimetic (partial agonist) activity.","uses":"Hypertension, angina (where less bradycardia desired).","adr":"Less bradycardia, insomnia, vivid dreams, fatigue, bronchospasm."},"Sotalol":{"adme":"Well absorbed orally (high bioavailability), low protein binding, minimal hepatic metabolism, largely excreted unchanged renally, half-life around 12 hours.","moa":"Non-selective beta-blocker with additional class III (potassium channel) antiarrhythmic action.","uses":"Ventricular and supraventricular arrhythmias, atrial fibrillation.","adr":"Bradycardia, QT prolongation, torsades de pointes, fatigue, bronchospasm."},"Bisoprolol":{"adme":"Well absorbed orally (high bioavailability ~90%), moderate protein binding, balanced hepatic and renal elimination, half-life around 10-12 hours.","moa":"Highly selective competitive beta-1 (cardioselective) adrenoceptor antagonist.","uses":"Chronic heart failure, hypertension, angina.","adr":"Bradycardia, fatigue, cold extremities, dizziness, hypotension."},"Nebivolol":{"adme":"Oral bioavailability depends on CYP2D6 phenotype, highly protein bound, extensive hepatic metabolism, renal and faecal excretion, half-life around 10-12 hours.","moa":"Highly selective beta-1 antagonist with nitric-oxide-mediated vasodilatation.","uses":"Hypertension, chronic heart failure (especially elderly).","adr":"Headache, fatigue, dizziness, bradycardia, peripheral oedema."},"Reserpine":{"adme":"Variable oral absorption, highly protein bound, slow hepatic metabolism, faecal and renal excretion, very long duration of action.","moa":"Irreversibly inhibits the vesicular monoamine transporter (VMAT), depleting noradrenaline, dopamine and serotonin stores.","uses":"Hypertension (now rarely used).","adr":"Depression, sedation, nasal congestion, bradycardia, diarrhoea, parkinsonism."},"Guanethidine":{"adme":"Incomplete and variable oral absorption, low protein binding, partly hepatic metabolism, largely excreted unchanged renally, long half-life of several days.","moa":"Adrenergic neuron blocker that is taken up by the noradrenaline transporter and prevents noradrenaline release while depleting stores.","uses":"Severe hypertension (now rarely used).","adr":"Severe postural and exercise hypotension, failure of ejaculation, diarrhoea, fluid retention."}},"diagrams":[{"title":"Adrenergic (noradrenergic) synapse","caption":"Tyrosine → DOPA → dopamine → noradrenaline (stored via VMAT). Released NA acts on α/β receptors; action ends mainly by reuptake (NET, blocked by cocaine/TCAs); MAO & COMT degrade it. Indirect sympathomimetics displace stored NA.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Adrenergic synapse\">\n      <path d=\"M40,30 H300 V120 Q300,150 250,150 H40 Z\" fill=\"#e8550a\" opacity=\"0.07\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <rect x=\"40\" y=\"186\" width=\"360\" height=\"44\" rx=\"8\" fill=\"#14a06a\" opacity=\"0.08\" stroke=\"currentColor\" stroke-width=\"1.2\"/>\n      <text x=\"52\" y=\"48\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Tyr → DOPA → DA → NA</text>\n      <text x=\"60\" y=\"70\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">VMAT (stores NA)</text>\n      <circle cx=\"150\" cy=\"120\" r=\"5\" fill=\"#e8550a\"/><circle cx=\"178\" cy=\"132\" r=\"5\" fill=\"#e8550a\"/><circle cx=\"206\" cy=\"124\" r=\"5\" fill=\"#e8550a\"/>\n      <line x1=\"178\" y1=\"137\" x2=\"178\" y2=\"186\" stroke=\"#e8550a\" stroke-width=\"1\" opacity=\"0.6\"/>\n      <rect x=\"158\" y=\"186\" width=\"40\" height=\"10\" fill=\"#14a06a\"/><text x=\"150\" y=\"216\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">α / β receptors</text>\n      <path d=\"M230,128 C250,150 250,110 232,104\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"1.4\"/>\n      <text x=\"244\" y=\"120\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">NET reuptake</text>\n      <text x=\"244\" y=\"136\" fill=\"#c0392b\" font-size=\"9\" font-family=\"sans-serif\">MAO / COMT</text>\n      <text x=\"44\" y=\"22\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">sympathetic nerve terminal</text>\n    </svg>"}]},{"id":"cvs","name":"CVS","theme_line":"Heart plaza · hospital with a heart on the roof","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 28–37","groups":[{"heading":"A. Antiarrhythmic drugs (Vaughan-Williams)","groups":[{"heading":"Class I — Na+ channel blockers","groups":[{"heading":"IA (intermediate kinetics)","drugs":["Quinidine","Procainamide","Disopyramide"]},{"heading":"IB (fast kinetics)","drugs":["Lidocaine","Mexiletine","Phenytoin"]},{"heading":"IC (slow kinetics)","drugs":["Flecainide","Propafenone"]}]},{"heading":"Class II — β-adrenergic blockers","drugs":["Propranolol","Esmolol","Metoprolol"]},{"heading":"Class III — K+ channel blockers","drugs":["Amiodarone","Sotalol","Dronedarone","Dofetilide","Ibutilide"]},{"heading":"Class IV — Calcium channel blockers","drugs":["Verapamil","Diltiazem"]},{"heading":"Miscellaneous","drugs":["Adenosine","Digoxin","Magnesium sulfate"]}]},{"heading":"B. Drugs for heart failure","groups":[{"heading":"ACE inhibitors","drugs":["Enalapril","Ramipril","Lisinopril"]},{"heading":"Angiotensin receptor blockers (ARBs)","drugs":["Losartan","Valsartan"]},{"heading":"Angiotensin receptor–neprilysin inhibitor (ARNI)","drugs":["Sacubitril/valsartan"]},{"heading":"β-blockers","drugs":["Carvedilol","Bisoprolol","Metoprolol"]},{"heading":"Aldosterone antagonists","drugs":["Spironolactone","E ,"drugs":["Enoxaparin"]},{"heading":"Indirect Xa inhibitor","drugs":["Fondaparinux"]},{"heading":"Direct thrombin inhibitors","drugs":["Bivalirudin"]}]},{"heading":"Oral","groups":[{"heading":"Vitamin K antagonist","drugs":["Warfarin"]},{"heading":"Direct oral anticoagulants (DOACs)","drugs":["Dabigatran","Apixaban","Rivaroxaban","Edoxaban"]}]}]},{"heading":"G. Thrombolytics (fibrinolytics)","drugs":["Streptokinase","Alteplase","Tenecteplase","Reteplase"]},{"heading":"H. Hypolipidaemic drugs","groups":[{"heading":"Statins (HMG-CoA reductase inhibitors)","drugs":["Atorvastatin","Rosuvastatin","Simvastatin"]},{"heading":"Cholesterol-absorption inhibitor","drugs":["Ezetimibe"]},{"heading":"PCSK9 inhibitors","drugs":["Evolocumab","Alirocumab","Inclisiran"]},{"heading":"Fibrates","drugs":["Fenofibrate","Gemfibrozil"]},{"heading":"Bile-acid sequestrants","drugs":["Cholestyramine"]},{"heading":"Others","drugs":["Niacin","Omega-3 fatty acids"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 37–48","groups":[{"heading":"A. Antiarrhythmic drugs","groups":[{"heading":"Class I — membrane stabilizers (Na+ channel blockers)","groups":[{"heading":"IA","drugs":["Quinidine","Procainamide","Disopyramide"]},{"heading":"IB","drugs":["Lignocaine","Mexiletine","Phenytoin"]},{"heading":"IC","drugs":["Flecainide","Propafenone"]}]},{"heading":"Class II — β-adrenergic blockers","drugs":["Propranolol","Esmolol","Metoprolol"]},{"heading":"Class III — agents prolonging repolarization","drugs":["Amiodarone","Sotalol","Dronedarone","Dofetilide","Ibutilide"]},{"heading":"Class IV — calcium channel blockers","drugs":["Verapamil","Diltiazem"]},{"heading":"Miscellaneous","drugs":["Adenosine","Digoxin","Magnesium sulfate"]}]},{"heading":"B. Drugs used in congestive heart failure","groups":[{"heading":"Inhibitors of RAAS — ACE inhibitors","drugs":["Enalapril","Ramipril","Lisinopril"]},{"heading":"Angiotensin receptor blockers","drugs":["Losartan","Valsartan"]},{"heading":"Angiotensin receptor–neprilysin inhibitor","drugs":["Sacubitril/valsartan"]},{"heading":"β-adrenergic blockers","drugs":["Carvedilol","Bisoprolol","Metoprolol"]},{"heading":"Aldosterone antagonists","drugs":["Spironolactone","Eplerenone"]},{"heading":"SGLT2 inhibitors","drugs":["Dapagliflozin","Empagliflozin"]},{"heading":"Diuretics","drugs":["Furosemide"]},{"heading":"Cardiac glycosides","drugs":["Digoxin"]},{"heading":"If-channel inhibitor","drugs":["Ivabradine"]},{"heading":"Vasodilators","drugs":["Hydralazine + Isosorbide dinitrate"]}]},{"heading":"C. Antihypertensive drugs","groups":[{"heading":"Diuretics","drugs":["Hydrochlorothiazide","Chlorthalidone","Furosemide"]},{"heading":"ACE inhibitors","drugs":["Enalapril","Ramipril","Lisinopril"]},{"heading":"Angiotensin receptor blockers","drugs":["Losartan","Valsartan"]},{"heading":"Calcium channel blockers","groups":[{"heading":"Dihydropyridines","drugs":["Amlodipine","Nifedipine"]},{"heading":"Non-dihydropyridines","drugs":["Verapamil","Diltiazem"]}]},{"heading":"β-adrenergic blockers","drugs":["Metoprolol","Atenolol","Propranolol"]},{"heading":"α-adrenergic blockers","drugs":["Prazosin","Doxazosin"]},{"heading":"Central sympatholytics","drugs":["Clonidine","Methyldopa"]},{"heading":"Direct vasodilators","drugs":["Hydralazine","Minoxidil","Sodium nitroprusside"]}]},{"heading":"D. Antianginal drugs","groups":[{"heading":"Nitrates","drugs":["Glyceryl trinitrate (nitroglycerin)","Isosorbide dinitrate","Isosorbide mononitrate"]},{"heading":"β-blockers","drugs":["Metoprolol","Atenolol"]},{"heading":"Calcium channel blockers","drugs":["Amlodipine","Verapamil","Diltiazem"]},{"heading":"Others (potassium channel opener / metabolic / If-blocker)","drugs":["Ranolazine","Nicorandil","Ivabradine","Trimetazidine"]}]},{"heading":"E. Antiplatelet drugs","groups":[{"heading":"COX inhibitor","drugs":["Aspirin"]},{"heading":"P2Y12 (ADP) antagonists","drugs":["Clopidogrel","Prasugrel","Ticagrelor"]},{"heading":"GP IIb/IIIa antagonists","drugs":["Abciximab","Tirofiban"]},{"heading":"Phosphodiesterase inhibitors","drugs":["Dipyridamole","Cilostazol"]}]},{"heading":"F. Anticoagulants","groups":[{"heading":"Parenteral","groups":[{"heading":"Unfractionated heparin","drugs":["Heparin"]},{"heading":"Low-molecular-weight heparins","drugs":["Enoxaparin"]},{"heading":"Indirect factor Xa inhibitor","drugs":["Fondaparinux"]},{"heading":"Direct thrombin inhibitors","drugs":["Bivalirudin"]}]},{"heading":"Oral","groups":[{"heading":"Vitamin K antagonist (coumarin)","drugs":["Warfarin"]},{"heading":"Newer oral anticoagulants (DOACs)","drugs":["Dabigatran","Apixaban","Rivaroxaban","Edoxaban"]}]}]},{"heading":"G. Fibrinolytics (thrombolytics)","drugs":["Streptokinase","Alteplase","Tenecteplase","Reteplase"]},{"heading":"H. Hypolipidaemic drugs","groups":[{"heading":"HMG-CoA reductase inhibitors (statins)","drugs":["Atorvastatin","Rosuvastatin","Simvastatin"]},{"heading":"Cholesterol-absorption inhibitor","drugs":["Ezetimibe"]},{"heading":"PCSK9 inhibitors","drugs":["Evolocumab","Alirocumab","Inclisiran"]},{"heading":"Fibric acid derivatives","drugs":["Fenofibrate","Gemfibrozil"]},{"heading":"Bile-acid sequestrants","drugs":["Cholestyramine"]},{"heading":"Others","drugs":["Nicotinic acid (niacin)","Omega-3 fatty acids"]}]}]}]},"details":{"Quinidine":{"adme":"Oral bioavailability ~70-80%, ~80% protein-bound, hepatic metabolism via CYP3A4 with renal excretion and a half-life of ~6-8 h.","moa":"Class Ia antiarrhythmic blocking fast sodium channels (and K+ channels), slowing conduction and prolonging repolarization.","uses":"Atrial fibrillation/flutter, Brugada syndrome, ventricular arrhythmias, severe malaria.","adr":"Cinchonism, QT prolongation/torsades, diarrhea, thrombocytopenia, hypotension."},"Procainamide":{"adme":"Good oral absorption, low protein binding (~15%), hepatic N-acetylation to active NAPA plus renal excretion, half-life ~3-4 h.","moa":"Class Ia antiarrhythmic blocking sodium channels and prolonging action potential duration.","uses":"Ventricular tachycardia, atrial fibrillation, WPW-related arrhythmias.","adr":"Drug-induced lupus, agranulocytosis, hypotension, QT prolongation, torsades."},"Disopyramide":{"adme":"Well absorbed orally with ~60-90% bioavailability, concentration-dependent protein binding, hepatic metabolism and renal excretion, half-life ~6-8 h.","moa":"Class Ia antiarrhythmic blocking sodium channels with marked anticholinergic and negative inotropic effects.","uses":"Ventricular arrhythmias, hypertrophic cardiomyopathy, vagally mediated atrial fibrillation.","adr":"Anticholinergic effects (dry mouth, urinary retention), heart failure, QT prolongation."},"Lidocaine":{"adme":"High first-pass metabolism so given IV, ~70% protein-bound, hepatic CYP1A2/3A4 metabolism, half-life ~1.5-2 h.","moa":"Class Ib antiarrhythmic selectively blocking inactivated/open sodium channels in ischemic ventricular tissue.","uses":"Ventricular arrhythmias (especially post-MI), local anesthesia.","adr":"CNS toxicity (seizures, confusion), perioral numbness, bradycardia, hypotension."},"Mexiletine":{"adme":"Good oral bioavailability (~90%), ~50-60% protein-bound, hepatic CYP2D6/1A2 metabolism, half-life ~10-12 h.","moa":"Class Ib antiarrhythmic oral lidocaine analog blocking inactivated sodium channels.","uses":"Ventricular arrhythmias, neuropathic pain, myotonia.","adr":"Tremor, nausea, dizziness, dysarthria, hepatotoxicity."},"Phenytoin":{"adme":"Variable oral absorption, ~90% protein-bound, saturable (zero-order) hepatic CYP metabolism, half-life ~7-42 h.","moa":"Class Ib-like sodium channel blocker shortening action potential, especially useful in digoxin-induced arrhythmias.","uses":"Digoxin-induced arrhythmias, seizures.","adr":"Gingival hyperplasia, ataxia, nystagmus, hirsutism, hypotension on IV infusion."},"Flecainide":{"adme":"Oral bioavailability ~90%, ~40% protein-bound, hepatic CYP2D6 metabolism with renal excretion, half-life ~12-27 h.","moa":"Class Ic antiarrhythmic potently blocking sodium channels and markedly slowing conduction.","uses":"Paroxysmal atrial fibrillation/SVT (pill-in-pocket), structurally normal-heart arrhythmias.","adr":"Proarrhythmia, negative inotropy, dizziness, visual disturbance, worsens post-MI mortality."},"Propafenone":{"adme":"Oral bioavailability is dose- and metabolizer-dependent, >95% protein-bound, hepatic CYP2D6 metabolism, half-life ~2-10 h.","moa":"Class Ic sodium channel blocker with weak beta-blocking activity.","uses":"Paroxysmal atrial fibrillation/flutter, SVT in structurally normal hearts.","adr":"Metallic taste, proarrhythmia, bronchospasm, bradycardia, dizziness."},"Propranolol":{"adme":"Extensive first-pass metabolism (bioavailability ~25%), ~90% protein-bound, hepatic CYP2D6/1A2 metabolism, half-life ~3-5 h.","moa":"Non-selective beta-blocker (Class II) reducing heart rate, contractility and renin release.","uses":"Hypertension, angina, arrhythmias, migraine prophylaxis, thyrotoxicosis, essential tremor.","adr":"Bradycardia, bronchospasm, fatigue, cold extremities, masked hypoglycemia."},"Esmolol":{"adme":"IV only, rapidly hydrolyzed by red-cell esterases, low protein binding, ultra-short half-life ~9 min.","moa":"Ultra-short-acting cardioselective beta-1 blocker (Class II).","uses":"Perioperative hypertension/tachycardia, acute SVT, thyroid storm.","adr":"Hypotension, bradycardia, infusion-site reactions, bronchospasm."},"Metoprolol":{"adme":"Oral bioavailability ~50% with first-pass effect, ~12% protein-bound, hepatic CYP2D6 metabolism, half-life ~3-7 h.","moa":"Cardioselective beta-1 blocker (Class II) reducing heart rate and contractility.","uses":"Hypertension, angina, heart failure, post-MI, arrhythmias.","adr":"Bradycardia, fatigue, hypotension, depression, bronchospasm at high doses."},"Amiodarone":{"adme":"Variable oral bioavailability (~30-50%), highly protein-bound and lipophilic, hepatic CYP3A4 metabolism, very long half-life ~25-100 days.","moa":"Class III antiarrhythmic blocking K+ channels (plus Na+, Ca2+, beta effects) prolonging repolarization.","uses":"Ventricular and atrial arrhythmias, atrial fibrillation.","adr":"Pulmonary fibrosis, thyroid dysfunction, hepatotoxicity, corneal deposits, blue-gray skin."},"Sotalol":{"adme":"Oral bioavailability ~90-100%, negligible protein binding, eliminated unchanged renally, half-life ~12 h.","moa":"Class III antiarrhythmic combining non-selective beta-blockade with K+ channel blockade.","uses":"Ventricular arrhythmias, maintenance of sinus rhythm in atrial fibrillation.","adr":"QT prolongation/torsades, bradycardia, fatigue, bronchospasm."},"Dronedarone":{"adme":"Low oral bioavailability (~15% with food), >98% protein-bound, hepatic CYP3A4 metabolism, half-life ~24 h.","moa":"Non-iodinated amiodarone analog with multichannel (Class I-IV) blocking activity.","uses":"Maintenance of sinus rhythm in paroxysmal/persistent atrial fibrillation.","adr":"Hepatotoxicity, worsening heart failure, QT prolongation, GI upset, contraindicated in permanent AF."},"Dofetilide":{"adme":"Oral bioavailability ~90%, ~70% protein-bound, partly renal and partly CYP3A4 elimination, half-life ~10 h.","moa":"Selective Class III antiarrhythmic blocking the rapid delayed-rectifier K+ current (IKr).","uses":"Conversion and maintenance of sinus rhythm in atrial fibrillation/flutter.","adr":"QT prolongation/torsades (requires inpatient initiation), headache, dizziness."},"Ibutilide":{"adme":"IV only due to high first-pass metabolism, ~40% protein-bound, hepatic metabolism, short half-life ~6 h.","moa":"Class III antiarrhythmic that prolongs repolarization by activating slow inward Na+ current and blocking IKr.","uses":"Acute pharmacologic cardioversion of atrial fibrillation/flutter.","adr":"QT prolongation/torsades, hypotension, nausea."},"Verapamil":{"adme":"Oral bioavailability ~20-35% (first-pass), ~90% protein-bound, hepatic CYP3A4 metabolism, half-life ~3-7 h.","moa":"Non-dihydropyridine Class IV calcium channel blocker slowing AV nodal conduction and contractility.","uses":"SVT, atrial fibrillation rate control, hypertension, angina.","adr":"Constipation, bradycardia, AV block, heart failure, hypotension."},"Diltiazem":{"adme":"Oral bioavailability ~40% (first-pass), ~80% protein-bound, hepatic CYP3A4 metabolism, half-life ~3-5 h.","moa":"Non-dihydropyridine Class IV calcium channel blocker slowing AV conduction with vasodilation.","uses":"SVT, atrial fibrillation rate control, hypertension, angina.","adr":"Bradycardia, AV block, hypotension, peripheral edema, constipation."},"Adenosine":{"adme":"Given IV as rapid bolus, taken up by red cells/endothelium, ultra-short half-life <10 seconds.","moa":"Activates A1 receptors opening K+ channels and inhibiting AV nodal conduction.","uses":"Termination of paroxysmal SVT, diagnostic for wide-complex tachycardia.","adr":"Flushing, chest pain, dyspnea, transient asystole, bronchospasm."},"Digoxin":{"adme":"Oral bioavailability ~70-80%, ~25% protein-bound, mainly renal excretion unchanged, long half-life ~36-48 h.","moa":"Inhibits Na+/K+-ATPase raising intracellular calcium (positive inotropy) and enhances vagal tone.","uses":"Heart failure, atrial fibrillation rate control.","adr":"Nausea, visual disturbances (yellow halos), arrhythmias, narrow therapeutic index, toxicity with hypokalemia."},"Magnesium sulfate":{"adme":"Given IV/IM, minimal protein binding, eliminated unchanged by the kidneys.","moa":"Stabilizes excitable membranes and modulates calcium/potassium channels suppressing arrhythmias.","uses":"Torsades de pointes, digoxin-induced arrhythmias, eclampsia, severe asthma.","adr":"Hypotension, flushing, respiratory depression, loss of reflexes, bradycardia."},"Enalapril":{"adme":"Prodrug with oral bioavailability ~60%, hydrolyzed to active enalaprilat, mainly renal excretion, half-life ~11 h.","moa":"ACE inhibitor blocking conversion of angiotensin I to II and reducing aldosterone.","uses":"Hypertension, heart failure, diabetic nephropathy.","adr":"Dry cough, hyperkalemia, angioedema, hypotension, renal impairment, teratogenic."},"Ramipril":{"adme":"Prodrug, oral bioavailability ~50-60%, converted to ramiprilat, hepatic/renal elimination, effective half-life ~13-17 h.","moa":"ACE inhibitor reducing angiotensin II formation and aldosterone secretion.","uses":"Hypertension, heart failure, post-MI, cardiovascular risk reduction.","adr":"Cough, hyperkalemia, angioedema, hypotension, renal dysfunction, teratogenic."},"Lisinopril":{"adme":"Not a prodrug, oral bioavailability ~25%, negligible protein binding, excreted unchanged renally, half-life ~12 h.","moa":"ACE inhibitor decreasing angiotensin II and aldosterone.","uses":"Hypertension, heart failure, post-MI, diabetic nephropathy.","adr":"Cough, hyperkalemia, angioedema, hypotension, renal impairment, teratogenic."},"Losartan":{"adme":"Oral bioavailability ~33%, highly protein-bound, hepatic CYP2C9/3A4 to active E-3174, half-life ~6-9 h.","moa":"Angiotensin II receptor (AT1) blocker preventing vasoconstriction and aldosterone release.","uses":"Hypertension, heart failure, diabetic nephropathy, ACE-inhibitor intolerant patients.","adr":"Hyperkalemia, hypotension, dizziness, renal impairment, teratogenic (less cough than ACEi)."},"Valsartan":{"adme":"Oral bioavailability ~25%, ~95% protein-bound, minimal metabolism with biliary excretion, half-life ~6-9 h.","moa":"Angiotensin II receptor (AT1) blocker.","uses":"Hypertension, heart failure, post-MI.","adr":"Hyperkalemia, hypotension, dizziness, renal impairment, teratogenic."},"Sacubitril/valsartan":{"adme":"Sacubitril is a neprilysin-inhibitor prodrug (active sacubitrilat) combined with the ARB valsartan, both highly protein-bound, half-lives ~10-12 h.","moa":"Combines neprilysin inhibition (raising natriuretic peptides) with AT1 receptor blockade.","uses":"Heart failure with reduced ejection fraction.","adr":"Hypotension, hyperkalemia, angioedema, renal impairment, contraindicated with ACE inhibitors."},"Carvedilol":{"adme":"Oral bioavailability ~25-35%, >95% protein-bound, hepatic CYP2D6/2C9 metabolism, half-life ~7-10 h.","moa":"Non-selective beta-blocker with alpha-1 blockade and antioxidant effects.","uses":"Heart failure, hypertension, post-MI left ventricular dysfunction.","adr":"Bradycardia, hypotension, dizziness, fatigue, bronchospasm."},"Bisoprolol":{"adme":"High oral bioavailability ~90%, ~30% protein-bound, balanced hepatic and renal elimination, half-life ~10-12 h.","moa":"Highly cardioselective beta-1 blocker.","uses":"Heart failure, hypertension, angina.","adr":"Bradycardia, fatigue, hypotension, cold extremities, dizziness."},"Spironolactone":{"adme":"Oral bioavailability ~65-90% with food, highly protein-bound, hepatic metabolism to active canrenone, half-life ~1.4 h (active metabolites longer).","moa":"Aldosterone receptor antagonist (potassium-sparing diuretic) in the distal tubule.","uses":"Heart failure, resistant hypertension, primary hyperaldosteronism, ascites.","adr":"Hyperkalemia, gynecomastia, menstrual irregularity, GI upset."},"Eplerenone":{"adme":"Oral bioavailability ~70%, ~50% protein-bound, hepatic CYP3A4 metabolism, half-life ~4-6 h.","moa":"Selective aldosterone receptor antagonist with less anti-androgen effect than spironolactone.","uses":"Heart failure post-MI, hypertension.","adr":"Hyperkalemia, hypertriglyceridemia, dizziness, less gynecomastia than spironolactone."},"Dapagliflozin":{"adme":"Oral bioavailability ~78%, ~91% protein-bound, hepatic UGT1A9 metabolism, half-life ~12 h.","moa":"SGLT2 inhibitor reducing renal glucose reabsorption with natriuretic and cardiorenal benefits.","uses":"Heart failure, type 2 diabetes, chronic kidney disease.","adr":"Genital/urinary infections, volume depletion, euglycemic ketoacidosis, hypotension."},"Empagliflozin":{"adme":"Oral bioavailability good, ~86% protein-bound, hepatic glucuronidation with renal/fecal excretion, half-life ~12 h.","moa":"SGLT2 inhibitor decreasing renal glucose reabsorption with cardiorenal protection.","uses":"Heart failure, type 2 diabetes, chronic kidney disease.","adr":"Genital mycotic infections, volume depletion, ketoacidosis, urinary infections."},"Furosemide":{"adme":"Oral bioavailability ~50% (variable), highly protein-bound, partly renal and partly hepatic elimination, half-life ~1.5-2 h.","moa":"Loop diuretic inhibiting the Na+/K+/2Cl- cotransporter in the thick ascending limb.","uses":"Heart failure, edema, hypertension, hypercalcemia, acute pulmonary edema.","adr":"Hypokalemia, hypovolemia, ototoxicity, hyperuricemia, hypocalcemia, metabolic alkalosis."},"Ivabradine":{"adme":"Oral bioavailability ~40% (first-pass), ~70% protein-bound, hepatic CYP3A4 metabolism, half-life ~2 h (effective ~11 h).","moa":"Selective inhibitor of the If pacemaker current in the SA node, slowing heart rate without affecting contractility.","uses":"Chronic heart failure, chronic stable angina (in sinus rhythm).","adr":"Bradycardia, luminous phenomena (phosphenes), atrial fibrillation, hypertension."},"Hydralazine + Isosorbide dinitrate":{"adme":"Hydralazine undergoes hepatic acetylation (half-life ~3-7 h) and isosorbide dinitrate is a nitrate prodrug with active metabolites; combination acts on both arterial and venous beds.","moa":"Hydralazine provides arterial vasodilation while isosorbide dinitrate gives venous/nitric-oxide-mediated dilation.","uses":"Heart failure with reduced ejection fraction (notably in self-identified Black patients), ACEi/ARB-intolerant patients.","adr":"Headache, hypotension, reflex tachycardia, lupus-like syndrome, tolerance to nitrate."},"Hydrochlorothiazide":{"adme":"Oral bioavailability ~65-70%, ~40-68% protein-bound, excreted unchanged renally, half-life ~6-15 h.","moa":"Thiazide diuretic inhibiting the Na+/Cl- cotransporter in the distal convoluted tubule.","uses":"Hypertension, edema, nephrolithiasis prevention, nephrogenic diabetes insipidus.","adr":"Hypokalemia, hyponatremia, hyperglycemia, hyperuricemia, hypercalcemia, hyperlipidemia."},"Chlorthalidone":{"adme":"Oral bioavailability ~65%, highly protein-bound (concentrated in red cells), renal excretion, long half-life ~40-60 h.","moa":"Thiazide-like diuretic inhibiting the distal tubule Na+/Cl- cotransporter.","uses":"Hypertension, edema, heart failure.","adr":"Hypokalemia, hyponatremia, hyperglycemia, hyperuricemia, hypercalcemia."},"Amlodipine":{"adme":"Oral bioavailability ~60-65%, highly protein-bound, slow hepatic CYP3A4 metabolism, long half-life ~30-50 h.","moa":"Dihydropyridine calcium channel blocker causing peripheral arterial vasodilation.","uses":"Hypertension, chronic stable and vasospastic angina.","adr":"Peripheral edema, flushing, headache, reflex tachycardia, gingival hyperplasia."},"Nifedipine":{"adme":"Oral bioavailability ~45-70%, highly protein-bound, hepatic CYP3A4 metabolism, half-life ~2 h (extended-release longer).","moa":"Dihydropyridine calcium channel blocker producing potent arterial vasodilation.","uses":"Hypertension, angina, Raynaud phenomenon, preterm labor (tocolysis).","adr":"Reflex tachycardia, peripheral edema, flushing, headache, hypotension (avoid short-acting in CAD)."},"Atenolol":{"adme":"Oral bioavailability ~50%, low protein binding (~5%), excreted largely unchanged renally, half-life ~6-7 h.","moa":"Cardioselective beta-1 blocker reducing heart rate and contractility.","uses":"Hypertension, angina, arrhythmias, post-MI.","adr":"Bradycardia, fatigue, cold extremities, hypotension, bronchospasm at high doses."},"Prazosin":{"adme":"Oral bioavailability ~50-70%, ~95% protein-bound, hepatic metabolism, half-life ~2-3 h.","moa":"Selective alpha-1 adrenergic blocker causing arterial and venous vasodilation.","uses":"Hypertension, benign prostatic hyperplasia, PTSD-related nightmares, Raynaud.","adr":"First-dose hypotension/syncope, dizziness, reflex tachycardia, nasal congestion."},"Doxazosin":{"adme":"Oral bioavailability ~65%, ~98% protein-bound, hepatic metabolism, long half-life ~22 h.","moa":"Long-acting selective alpha-1 adrenergic blocker producing vasodilation.","uses":"Hypertension, benign prostatic hyperplasia.","adr":"First-dose hypotension, dizziness, fatigue, peripheral edema, reflex tachycardia."},"Clonidine":{"adme":"Oral bioavailability ~75-95%, ~20-40% protein-bound, partly hepatic and partly renal elimination, half-life ~12-16 h.","moa":"Central alpha-2 adrenergic agonist reducing sympathetic outflow.","uses":"Hypertension, ADHD, opioid/alcohol withdrawal, menopausal flushing.","adr":"Sedation, dry mouth, bradycardia, rebound hypertension on withdrawal, constipation."},"Methyldopa":{"adme":"Oral bioavailability ~25-50%, low protein binding, converted centrally to alpha-methylnorepinephrine, renal excretion, half-life ~1.5-2 h.","moa":"Central alpha-2 agonist (via active metabolite) reducing sympathetic outflow.","uses":"Hypertension in pregnancy.","adr":"Sedation, positive Coombs test/hemolytic anemia, hepatotoxicity, drug-induced lupus, dry mouth."},"Hydralazine":{"adme":"Oral bioavailability ~30-50% (acetylator-dependent), ~85% protein-bound, hepatic acetylation, half-life ~3-7 h.","moa":"Direct arteriolar vasodilator reducing afterload.","uses":"Hypertension, heart failure (with nitrates), hypertensive emergencies in pregnancy.","adr":"Reflex tachycardia, fluid retention, headache, drug-induced lupus, flushing."},"Minoxidil":{"adme":"Well absorbed orally (~90%), minimal protein binding, hepatic glucuronidation, half-life ~3-4 h (effect outlasts plasma level).","moa":"Opens ATP-sensitive K+ channels causing potent arteriolar vasodilation.","uses":"Severe refractory hypertension, androgenetic alopecia (topical).","adr":"Reflex tachycardia, fluid retention, hypertrichosis, pericardial effusion."},"Sodium nitroprusside":{"adme":"Given by IV infusion, immediate onset, metabolized to cyanide then thiocyanate (renally excreted), half-life ~2 min.","moa":"Releases nitric oxide causing balanced arterial and venous vasodilation.","uses":"Hypertensive emergencies, acute heart failure, controlled hypotension during surgery.","adr":"Hypotension, cyanide/thiocyanate toxicity, reflex tachycardia, methemoglobinemia."},"Nitroglycerin":{"adme":"Extensive first-pass metabolism so given sublingual/IV/transdermal, ~60% protein-bound, hepatic metabolism, half-life ~1-4 min.","moa":"Releases nitric oxide producing predominantly venous (and some arterial) vasodilation, reducing preload.","uses":"Acute angina, acute coronary syndrome, acute heart failure, hypertensive emergency.","adr":"Headache, hypotension, reflex tachycardia, flushing, tolerance, contraindicated with PDE5 inhibitors."},"Isosorbide dinitrate":{"adme":"Oral bioavailability low (~20-25%) due to first-pass, metabolized to active mononitrates, half-life ~1 h (metabolites longer).","moa":"Nitric oxide donor causing venodilation and reduced preload.","uses":"Chronic angina prophylaxis, heart failure (with hydralazine).","adr":"Headache, hypotension, reflex tachycardia, flushing, nitrate tolerance."},"Isosorbide mononitrate":{"adme":"Nearly 100% oral bioavailability (no first-pass), minimal protein binding, hepatic metabolism, half-life ~5 h.","moa":"Active metabolite of isosorbide dinitrate; nitric oxide donor causing venodilation.","uses":"Chronic stable angina prophylaxis.","adr":"Headache, hypotension, dizziness, flushing, nitrate tolerance."},"Ranolazine":{"adme":"Oral bioavailability ~30-55%, ~62% protein-bound, hepatic CYP3A4 metabolism, half-life ~7 h.","moa":"Inhibits the late inward sodium current, reducing calcium overload and myocardial oxygen demand.","uses":"Chronic stable angina (especially refractory).","adr":"QT prolongation, constipation, dizziness, nausea, headache."},"Nicorandil":{"adme":"Oral bioavailability ~75-80%, low protein binding, hepatic metabolism, half-life ~1 h.","moa":"Combined nitric oxide donor and ATP-sensitive K+ channel opener causing balanced vasodilation.","uses":"Chronic stable angina.","adr":"Headache, flushing, hypotension, oral/GI/anal ulceration, dizziness."},"Trimetazidine":{"adme":"High oral bioavailability (~90%), low protein binding, largely renal excretion unchanged, half-life ~6 h.","moa":"Inhibits fatty-acid oxidation (3-KAT) shifting cardiac metabolism toward glucose, optimizing energy use.","uses":"Chronic stable angina (metabolic anti-anginal).","adr":"GI upset, parkinsonism/movement disorders, dizziness, contraindicated in Parkinson disease."},"Aspirin":{"adme":"Rapid oral absorption, hydrolyzed to salicylate, protein binding dose-dependent, hepatic metabolism with saturable kinetics, antiplatelet effect lasts platelet lifespan.","moa":"Irreversibly inhibits COX-1, reducing thromboxane A2 and platelet aggregation.","uses":"Acute coronary syndrome, secondary prevention of MI/stroke, antiplatelet therapy.","adr":"GI bleeding, dyspepsia, bronchospasm, Reye syndrome, tinnitus at high dose."},"Clopidogrel":{"adme":"Prodrug with good absorption, ~98% protein-bound, hepatic CYP2C19 activation, irreversible platelet effect over their lifespan.","moa":"Irreversibly blocks the platelet P2Y12 ADP receptor inhibiting aggregation.","uses":"Acute coronary syndrome, post-stent (dual antiplatelet), secondary stroke prevention.","adr":"Bleeding, bruising, reduced efficacy in CYP2C19 poor metabolizers, rarely TTP."},"Prasugrel":{"adme":"Prodrug rapidly hydrolyzed and CYP-activated, ~98% protein-bound, hepatic metabolism, irreversible platelet effect.","moa":"Irreversible P2Y12 ADP receptor blocker, more potent and consistent than clopidogrel.","uses":"Acute coronary syndrome managed with PCI.","adr":"Major bleeding (avoid in prior stroke/TIA, elderly, low body weight), bruising."},"Ticagrelor":{"adme":"Oral bioavailability ~36%, >99% protein-bound, hepatic CYP3A4 metabolism (active metabolite), half-life ~7-9 h.","moa":"Reversible, direct-acting P2Y12 receptor antagonist (not a prodrug).","uses":"Acute coronary syndrome, secondary prevention after MI.","adr":"Bleeding, dyspnea, bradyarrhythmias, increased uric acid."},"Abciximab":{"adme":"Given IV, a monoclonal antibody Fab fragment with rapid platelet binding, platelet-bound for days though free half-life ~30 min.","moa":"Blocks the platelet glycoprotein IIb/IIIa receptor preventing fibrinogen-mediated aggregation.","uses":"Adjunct to PCI in acute coronary syndrome.","adr":"Bleeding, thrombocytopenia, hypotension."},"Tirofiban":{"adme":"Given IV, ~65% protein-bound, largely renal excretion, half-life ~2 h.","moa":"Reversible non-peptide glycoprotein IIb/IIIa receptor antagonist.","uses":"Acute coronary syndrome, adjunct to PCI.","adr":"Bleeding, thrombocytopenia, hypotension."},"Dipyridamole":{"adme":"Variable oral absorption, highly protein-bound (~99%), hepatic glucuronidation with biliary excretion, half-life ~10-12 h.","moa":"Inhibits phosphodiesterase and adenosine uptake, raising cAMP and causing vasodilation and reduced platelet aggregation.","uses":"Secondary stroke prevention (with aspirin), pharmacologic cardiac stress testing.","adr":"Headache, dizziness, flushing, hypotension, GI upset."},"Cilostazol":{"adme":"Oral absorption enhanced by food, highly protein-bound (~95%), hepatic CYP3A4/2C19 metabolism, half-life ~11-13 h.","moa":"Phosphodiesterase-3 inhibitor causing vasodilation and inhibiting platelet aggregation.","uses":"Intermittent claudication in peripheral arterial disease.","adr":"Headache, palpitations, diarrhea, contraindicated in heart failure."},"Heparin":{"adme":"Given IV/SC (not absorbed orally), highly protein-bound, cleared by reticuloendothelial system and renally, dose-dependent half-life ~1-2 h.","moa":"Activates antithrombin III, accelerating inactivation of thrombin and factor Xa.","uses":"Venous thromboembolism, acute coronary syndrome, anticoagulation in PCI/dialysis.","adr":"Bleeding, heparin-induced thrombocytopenia, osteoporosis (long-term), reversed by protamine."},"Enoxaparin":{"adme":"Given SC with ~90% bioavailability, less protein binding than heparin, renal elimination, half-life ~4-7 h.","moa":"Low-molecular-weight heparin preferentially activating antithrombin against factor Xa.","uses":"Venous thromboembolism prophylaxis/treatment, acute coronary syndrome.","adr":"Bleeding, thrombocytopenia (lower risk than heparin), accumulates in renal failure."},"Fondaparinux":{"adme":"Given SC with ~100% bioavailability, highly antithrombin-bound, excreted unchanged renally, long half-life ~17-21 h.","moa":"Synthetic pentasaccharide that selectively inhibits factor Xa via antithrombin.","uses":"Venous thromboembolism prophylaxis/treatment, acute coronary syndrome.","adr":"Bleeding, contraindicated in severe renal impairment, not reversed by protamine."},"Bivalirudin":{"adme":"Given IV, minimal protein binding, partly proteolytic and partly renal clearance, short half-life ~25 min.","moa":"Direct thrombin inhibitor binding reversibly to thrombin.","uses":"Anticoagulation during PCI, heparin-induced thrombocytopenia.","adr":"Bleeding, hypotension, back pain."},"Warfarin":{"adme":"Nearly complete oral absorption, ~99% protein-bound, hepatic CYP2C9/3A4 metabolism, long half-life ~20-60 h.","moa":"Inhibits vitamin K epoxide reductase, reducing synthesis of factors II, VII, IX, X.","uses":"Atrial fibrillation, venous thromboembolism, mechanical heart valves.","adr":"Bleeding, skin necrosis, teratogenic, numerous drug/food interactions, narrow therapeutic index."},"Dabigatran":{"adme":"Prodrug (dabigatran etexilate) with low oral bioavailability ~6%, low protein binding, ~80% renal excretion, half-life ~12-17 h.","moa":"Direct oral thrombin (factor IIa) inhibitor.","uses":"Non-valvular atrial fibrillation, venous thromboembolism treatment/prevention.","adr":"Bleeding, dyspepsia, reversed by idarucizumab, accumulates in renal failure."},"Apixaban":{"adme":"Oral bioavailability ~50%, ~87% protein-bound, hepatic CYP3A4 metabolism with ~27% renal excretion, half-life ~12 h.","moa":"Direct oral factor Xa inhibitor.","uses":"Non-valvular atrial fibrillation, venous thromboembolism treatment/prevention.","adr":"Bleeding, reversed by andexanet alfa, lower GI bleeding risk than other DOACs."},"Rivaroxaban":{"adme":"Oral bioavailability dose- and food-dependent (~66-100%), ~92% protein-bound, hepatic CYP3A4 and renal elimination, half-life ~5-9 h.","moa":"Direct oral factor Xa inhibitor.","uses":"Non-valvular atrial fibrillation, venous thromboembolism, coronary/peripheral artery disease.","adr":"Bleeding, reversed by andexanet alfa, GI bleeding."},"Edoxaban":{"adme":"Oral bioavailability ~62%, ~55% protein-bound, mainly renal excretion, half-life ~10-14 h.","moa":"Direct oral factor Xa inhibitor.","uses":"Non-valvular atrial fibrillation, venous thromboembolism.","adr":"Bleeding, reduced efficacy at high creatinine clearance, anemia."},"Streptokinase":{"adme":"Given IV, a bacterial protein cleared by antibodies and the reticuloendothelial system, half-life ~20-30 min.","moa":"Forms a complex with plasminogen that converts plasminogen to plasmin, causing fibrinolysis.","uses":"Acute STEMI, massive pulmonary embolism, arterial thrombosis (where PCI unavailable).","adr":"Bleeding, allergic/anaphylactic reactions, hypotension, antibody formation (no re-use)."},"Alteplase":{"adme":"Given IV, recombinant tissue plasminogen activator, hepatic clearance, very short half-life ~4-5 min.","moa":"Fibrin-specific plasminogen activator converting plasminogen to plasmin on the clot.","uses":"Acute ischemic stroke, STEMI, massive pulmonary embolism.","adr":"Bleeding (including intracranial), angioedema, reperfusion arrhythmias."},"Tenecteplase":{"adme":"Given as single IV bolus, hepatic clearance, half-life ~20-24 min (longer than alteplase).","moa":"Bioengineered fibrin-specific tissue plasminogen activator with greater fibrin specificity.","uses":"Acute STEMI, increasingly acute ischemic stroke.","adr":"Bleeding (including intracranial), reperfusion arrhythmias, hypotension."},"Reteplase":{"adme":"Given as double IV bolus, a deletion-mutant tPA, renal/hepatic clearance, half-life ~13-16 min.","moa":"Recombinant plasminogen activator converting plasminogen to plasmin (less fibrin-specific than alteplase).","uses":"Acute STEMI.","adr":"Bleeding (including intracranial), reperfusion arrhythmias."},"Atorvastatin":{"adme":"Oral bioavailability ~14% (high first-pass), >98% protein-bound, hepatic CYP3A4 metabolism with active metabolites, long effective half-life ~20-30 h.","moa":"Inhibits HMG-CoA reductase, the rate-limiting enzyme of cholesterol synthesis, upregulating LDL receptors.","uses":"Hyperlipidemia, primary and secondary cardiovascular prevention.","adr":"Myalgia/myopathy, raised transaminases, rarely rhabdomyolysis, new-onset diabetes."},"Rosuvastatin":{"adme":"Oral bioavailability ~20%, ~88% protein-bound, minimal hepatic metabolism (mainly excreted unchanged), half-life ~19 h.","moa":"Potent HMG-CoA reductase inhibitor reducing cholesterol synthesis.","uses":"Hyperlipidemia, cardiovascular risk reduction.","adr":"Myalgia/myopathy, raised transaminases, proteinuria, new-onset diabetes."},"Simvastatin":{"adme":"Prodrug with oral bioavailability <5% (high first-pass), ~95% protein-bound, hepatic CYP3A4 metabolism, half-life ~2-3 h.","moa":"HMG-CoA reductase inhibitor lowering cholesterol synthesis.","uses":"Hyperlipidemia, cardiovascular prevention.","adr":"Myalgia/myopathy, raised transaminases, rhabdomyolysis (dose-related, CYP3A4 interactions)."},"Ezetimibe":{"adme":"Oral absorption variable, highly protein-bound (>90%), glucuronidated with enterohepatic recirculation, long half-life ~22 h.","moa":"Inhibits intestinal cholesterol absorption via the NPC1L1 transporter.","uses":"Hyperlipidemia (alone or added to statins).","adr":"Diarrhea, myalgia, raised transaminases (especially with statins), fatigue."},"Evolocumab":{"adme":"Given SC, a monoclonal antibody with target-mediated and proteolytic clearance, half-life ~11-17 days.","moa":"Monoclonal antibody inhibiting PCSK9, increasing LDL receptor recycling and lowering LDL.","uses":"Familial hypercholesterolemia, statin-intolerant or high-risk patients.","adr":"Injection-site reactions, nasopharyngitis, myalgia."},"Alirocumab":{"adme":"Given SC, a monoclonal antibody with target-mediated clearance, half-life ~17-20 days.","moa":"Monoclonal antibody inhibiting PCSK9, raising LDL receptor availability and lowering LDL.","uses":"Familial hypercholesterolemia, statin-intolerant or high-risk patients.","adr":"Injection-site reactions, nasopharyngitis, myalgia, flu-like symptoms."},"Inclisiran":{"adme":"Given SC twice yearly after loading, a small interfering RNA conjugated to GalNAc for hepatic uptake, rapidly cleared from plasma but durable hepatic effect.","moa":"Small interfering RNA that silences hepatic PCSK9 synthesis, lowering LDL.","uses":"Hypercholesterolemia/familial hypercholesterolemia as add-on to statins.","adr":"Injection-site reactions, arthralgia, bronchitis."},"Fenofibrate":{"adme":"Oral absorption improved with food, highly protein-bound (~99%), hydrolyzed to active fenofibric acid, renal excretion, half-life ~20 h.","moa":"PPAR-alpha agonist increasing lipoprotein lipase activity and lowering triglycerides.","uses":"Hypertriglyceridemia, mixed dyslipidemia.","adr":"Myopathy (especially with statins), raised transaminases, gallstones, raised creatinine."},"Gemfibrozil":{"adme":"Well absorbed orally, ~95% protein-bound, hepatic glucuronidation (CYP2C8 inhibitor), half-life ~1.5 h.","moa":"PPAR-alpha agonist (fibrate) lowering triglycerides and raising HDL.","uses":"Hypertriglyceridemia, mixed dyslipidemia.","adr":"Myopathy (high risk with statins), GI upset, gallstones, raised transaminases."},"Cholestyramine":{"adme":"Not absorbed from the GI tract, acts within the gut lumen and is excreted in feces.","moa":"Bile acid sequestrant binding intestinal bile acids, increasing hepatic LDL receptor expression.","uses":"Hypercholesterolemia, pruritus of cholestasis, bile-acid diarrhea.","adr":"Constipation, bloating, fat-soluble vitamin malabsorption, impaired absorption of other drugs."},"Niacin":{"adme":"Well absorbed orally, low protein binding, hepatic metabolism with both conjugative and oxidative pathways, short half-life ~20-45 min.","moa":"Inhibits hepatic VLDL synthesis and lipolysis, lowering triglycerides/LDL and raising HDL.","uses":"Dyslipidemia (low HDL, high triglycerides).","adr":"Flushing, pruritus, hyperglycemia, hyperuricemia/gout, hepatotoxicity."},"Omega-3 fatty acids":{"adme":"Absorbed from the gut and incorporated into lipids, metabolized like dietary fats.","moa":"Reduce hepatic triglyceride synthesis and VLDL secretion.","uses":"Severe hypertriglyceridemia, cardiovascular risk reduction (icosapent ethyl).","adr":"Fishy aftertaste, GI upset, increased bleeding risk, atrial fibrillation at high dose."},"Lignocaine":{"adme":"High first-pass metabolism so given IV, ~70% protein-bound, hepatic CYP1A2/3A4 metabolism, half-life ~1.5-2 h.","moa":"Class Ib antiarrhythmic selectively blocking inactivated/open sodium channels in ischemic ventricular tissue.","uses":"Ventricular arrhythmias (especially post-MI), local anesthesia.","adr":"CNS toxicity (seizures, confusion), perioral numbness, bradycardia, hypotension."},"Glyceryl trinitrate (nitroglycerin)":{"adme":"Extensive first-pass metabolism so given sublingual/IV/transdermal, ~60% protein-bound, hepatic metabolism, half-life ~1-4 min.","moa":"Releases nitric oxide producing predominantly venous (and some arterial) vasodilation, reducing preload.","uses":"Acute angina, acute coronary syndrome, acute heart failure, hypertensive emergency.","adr":"Headache, hypotension, reflex tachycardia, flushing, tolerance, contraindicated with PDE5 inhibitors."},"Nicotinic acid (niacin)":{"adme":"Well absorbed orally, low protein binding, hepatic metabolism with conjugative and oxidative pathways, short half-life ~20-45 min.","moa":"Inhibits hepatic VLDL synthesis and lipolysis, lowering triglycerides/LDL and raising HDL.","uses":"Dyslipidemia (low HDL, high triglycerides).","adr":"Flushing, pruritus, hyperglycemia, hyperuricemia/gout, hepatotoxicity."}},"diagrams":[{"title":"Cardiac action potential & antiarrhythmics","caption":"Phase 0 (Na influx) — Class I; Phase 1 (transient K); Phase 2 plateau (Ca influx) — Class IV at nodes; Phase 3 repolarisation (K efflux) — Class III prolongs it; Phase 4. Class II (β-blockers) act on nodal SA/AV tissue.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Cardiac action potential phases\">\n      <line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"210\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <line x1=\"50\" y1=\"210\" x2=\"420\" y2=\"210\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <path d=\"M50,190 L110,190 L118,46 L138,70 L150,80 L300,86 L330,200 L420,200\" fill=\"none\" stroke=\"#2e7be0\" stroke-width=\"2.6\"/>\n      <text x=\"118\" y=\"40\" fill=\"#c0392b\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">0</text>\n      <text x=\"146\" y=\"66\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">1</text>\n      <text x=\"210\" y=\"78\" fill=\"#d98c00\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">2</text>\n      <text x=\"330\" y=\"150\" fill=\"#14a06a\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">3</text>\n      <text x=\"380\" y=\"200\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">4</text>\n      <text x=\"120\" y=\"232\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">Class I: Na⁺</text>\n      <text x=\"200\" y=\"232\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">Class IV: Ca²⁺</text>\n      <text x=\"312\" y=\"232\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">Class III: K⁺</text>\n      <text x=\"60\" y=\"44\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Class II (β-block) → nodes</text>\n    </svg>"},{"title":"Renin–angiotensin–aldosterone system","caption":"Angiotensinogen →(renin)→ ATI →(ACE)→ ATII → AT1 receptor (vasoconstriction) + aldosterone (Na/water retention). Blocked by: renin inhibitors (aliskiren), ACE inhibitors, ARBs, aldosterone antagonists; ARNI adds neprilysin inhibition.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"RAAS pathway\">\n      <text x=\"20\" y=\"50\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Angiotensinogen</text>\n      <line x1=\"60\" y1=\"58\" x2=\"60\" y2=\"92\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah)\"/>\n      <text x=\"66\" y=\"80\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">renin ✕ aliskiren</text>\n      <text x=\"40\" y=\"108\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Angiotensin I</text>\n      <line x1=\"60\" y1=\"116\" x2=\"60\" y2=\"150\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah)\"/>\n      <text x=\"66\" y=\"138\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">ACE ✕ -prils</text>\n      <text x=\"36\" y=\"166\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">Angiotensin II</text>\n      <line x1=\"110\" y1=\"162\" x2=\"200\" y2=\"120\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah)\"/>\n      <line x1=\"110\" y1=\"170\" x2=\"200\" y2=\"200\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah)\"/>\n      <text x=\"206\" y=\"118\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">AT1 → vasoconstriction</text>\n      <text x=\"206\" y=\"100\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">✕ ARBs (-sartans)</text>\n      <text x=\"206\" y=\"200\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Aldosterone → Na⁺/H₂O</text>\n      <text x=\"206\" y=\"218\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">✕ spironolactone</text>\n      <defs><marker id=\"ah\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"currentColor\"/></marker></defs>\n    </svg>"},{"title":"Coagulation cascade & anticoagulants","caption":"Intrinsic + extrinsic pathways converge on factor X → Xa → thrombin (IIa) → fibrin. Heparin (via antithrombin) inhibits Xa & IIa; LMWH/fondaparinux mainly Xa; warfarin blocks vitamin-K factors II, VII, IX, X; DOACs directly inhibit Xa (-xabans) or IIa (dabigatran); fibrinolytics lyse formed clot.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Coagulation cascade\">\n      <text x=\"20\" y=\"44\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Intrinsic (XII→XI→IX→VIII)</text>\n      <text x=\"270\" y=\"44\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Extrinsic (TF→VII)</text>\n      <line x1=\"110\" y1=\"52\" x2=\"200\" y2=\"92\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah2)\"/>\n      <line x1=\"320\" y1=\"52\" x2=\"240\" y2=\"92\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah2)\"/>\n      <text x=\"206\" y=\"108\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">X → Xa</text>\n      <text x=\"300\" y=\"104\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">✕ -xabans, LMWH</text>\n      <line x1=\"224\" y1=\"116\" x2=\"224\" y2=\"150\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah2)\"/>\n      <text x=\"180\" y=\"168\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">Prothrombin → Thrombin (IIa)</text>\n      <text x=\"300\" y=\"186\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">✕ dabigatran, heparin</text>\n      <line x1=\"224\" y1=\"176\" x2=\"224\" y2=\"206\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah2)\"/>\n      <text x=\"196\" y=\"224\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">Fibrin clot</text>\n      <text x=\"40\" y=\"120\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">warfarin ✕ II, VII, IX, X</text>\n      <text x=\"40\" y=\"200\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">fibrinolytics lyse clot</text>\n      <defs><marker id=\"ah2\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"currentColor\"/></marker></defs>\n    </svg>"}]},{"id":"respiratory","name":"Respiratory","theme_line":"Airway avenue · lung-shaped balloon docks","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 44","groups":[{"heading":"A. Bronchodilators","groups":[{"heading":"β2 adrenoceptor agonists","groups":[{"heading":"Short-acting (SABA)","drugs":["Salbutamol","Terbutaline"]},{"heading":"Long-acting (LABA)","drugs":["Salmeterol","Formoterol","Vilanterol"]}]},{"heading":"Anticholinergics (muscarinic antagonists)","groups":[{"heading":"Short-acting (SAMA)","drugs":["Ipratropium"]},{"heading":"Long-acting (LAMA)","drugs":["Tiotropium","Glycopyrronium","Umeclidinium"]}]},{"heading":"Methylxanthines","drugs":["Theophylline","Aminophylline","Doxofylline"]}]},{"heading":"B. Anti-inflammatory / controllers","groups":[{"heading":"Inhaled corticosteroids (ICS)","drugs":["Budesonide","Fluticasone","Beclometasone","Ciclesonide"]},{"heading":"Leukotriene modifiers","groups":[{"heading":"LTRA (CysLT1 antagonists)","drugs":["Montelukast","Zafirlukast"]},{"heading":"5-LOX inhibitor","drugs":["Zileuton"]}]},{"heading":"Mast-cell stabilizers","drugs":["Sodium cromoglicate","Nedocromil"]},{"heading":"PDE-4 inhibitor","drugs":["Roflumilast"]},{"heading":"Biologics","groups":[{"heading":"Anti-IgE","drugs":["Omalizumab"]},{"heading":"Anti-IL5 / IL5R","drugs":["Mepolizumab","Reslizumab","Benralizumab"]},{"heading":"Anti-IL4 / IL13","drugs":["Dupilumab"]}]}]},{"heading":"C. Mucolytics / mucoactive agents","drugs":["N-acetylcysteine","Carbocisteine","Bromhexine","Ambroxol","Dornase alfa"]}]},{"label":"KDT 8e/9e","cite":"ch. 16–17","groups":[{"heading":"A. Drugs for bronchial asthma & COPD","groups":[{"heading":"Bronchodilators","groups":[{"heading":"Sympathomimetics (β2 agonists)","drugs":["Salbutamol","Terbutaline","Salmeterol","Formoterol"]},{"heading":"Anticholinergics","drugs":["Ipratropium bromide","Tiotropium bromide","Glycopyrronium"]},{"heading":"Methylxanthines","drugs":["Theophylline","Aminophylline","Doxofylline"]}]},{"heading":"Leukotriene antagonists","drugs":["Montelukast","Zafirlukast"]},{"heading":"Mast cell stabilizers","drugs":["Sodium cromoglicate","Ketotifen"]},{"heading":"Corticosteroids (inhaled)","drugs":["Budesonide","Fluticasone","Beclometasone","Ciclesonide"]},{"heading":"Anti-IgE / biologics","drugs":["Omalizumab","Mepolizumab","Benralizumab","Dupilumab"]},{"heading":"PDE-4 inhibitor","drugs":["Roflumilast"]}]},{"heading":"B. Drugs for cough","groups":[{"heading":"Antitussives","groups":[{"heading":"Central — opioid","drugs":["Codeine","Pholcodine"]},{"heading":"Central — non-opioid","drugs":["Dextromethorphan","Noscapine"]},{"heading":"Peripheral","drugs":["Prenoxdiazine"]}]},{"heading":"Expectorants & mucolytics","groups":[{"heading":"Bronchial secretion enhancers (expectorants)","drugs":["Guaifenesin","Ammonium chloride","Potassium iodide"]},{"heading":"Mucolytics","drugs":["N-acetylcysteine","Carbocisteine","Bromhexine","Ambroxol","Dornase alfa"]}]}]}]}]},"details":{"Salbutamol":{"adme":"Inhaled with low systemic absorption (oral bioavailability ~50%, swallowed fraction undergoes gut/hepatic sulfate conjugation), minimal protein binding, excreted in urine as drug and metabolite, with a half-life of ~4-6 hours.","moa":"Short-acting beta-2 adrenoceptor agonist that stimulates Gs-cAMP signalling to relax bronchial smooth muscle.","uses":"Acute asthma, exercise-induced bronchospasm, COPD, hyperkalaemia.","adr":"Tremor, tachycardia, palpitations, hypokalaemia, headache."},"Terbutaline":{"adme":"Inhaled or oral/parenteral with low systemic absorption when inhaled (oral bioavailability ~10-15%), low protein binding, partly sulfate-conjugated and excreted in urine, half-life ~3-4 hours.","moa":"Short-acting selective beta-2 agonist increasing cAMP to cause bronchodilation.","uses":"Acute asthma, bronchospasm in COPD, tocolysis (off-label).","adr":"Tremor, tachycardia, palpitations, hypokalaemia, restlessness."},"Salmeterol":{"adme":"Inhaled with very low systemic absorption, highly protein bound (~96%), extensively metabolised by CYP3A4 to hydroxy-salmeterol and excreted mainly in faeces, with a slow onset and ~5-hour half-life.","moa":"Long-acting beta-2 agonist whose lipophilic tail anchors in the membrane for prolonged receptor stimulation and bronchodilation.","uses":"Maintenance of asthma (with ICS) and COPD.","adr":"Tremor, palpitations, headache, muscle cramps, throat irritation."},"Formoterol":{"adme":"Inhaled with low systemic absorption, moderate protein binding (~60%), metabolised by glucuronidation and O-demethylation (CYP2D6/2C19) with renal excretion, half-life ~10-14 hours and rapid onset.","moa":"Long-acting but fast-onset beta-2 agonist stimulating cAMP for sustained bronchodilation.","uses":"Maintenance and reliever therapy of asthma (with ICS) and COPD.","adr":"Tremor, tachycardia, palpitations, hypokalaemia, headache."},"Vilanterol":{"adme":"Inhaled once daily with low systemic absorption, highly protein bound (~94%), metabolised mainly by CYP3A4 with faecal excretion, half-life ~11 hours.","moa":"Ultra-long-acting beta-2 agonist providing 24-hour bronchodilation via cAMP.","uses":"Maintenance of COPD and asthma (in fixed combinations).","adr":"Tremor, palpitations, headache, nasopharyngitis, hypokalaemia."},"Ipratropium":{"adme":"Inhaled quaternary ammonium compound with very low systemic absorption and poor oral bioavailability, minimal protein binding, partly metabolised and excreted in urine/faeces, half-life ~2 hours.","moa":"Short-acting non-selective muscarinic antagonist blocking M3 receptors to reduce vagally-mediated bronchoconstriction and secretions.","uses":"COPD, acute severe asthma (adjunct), rhinorrhoea.","adr":"Dry mouth, cough, urinary retention, blurred vision, paradoxical bronchospasm."},"Tiotropium":{"adme":"Inhaled with low systemic absorption, highly protein bound (~72%), minimally metabolised (CYP2D6/3A4) and largely renally excreted, with a long half-life of ~25 hours.","moa":"Long-acting muscarinic antagonist with kinetic selectivity for M3 receptors giving prolonged bronchodilation.","uses":"Maintenance of COPD and severe asthma.","adr":"Dry mouth, constipation, urinary retention, blurred vision, glaucoma precipitation."},"Glycopyrronium":{"adme":"Inhaled quaternary amine with low oral bioavailability and modest protein binding (~40%), partly metabolised by CYP2D6 and renally excreted, half-life ~33-57 hours.","moa":"Long-acting muscarinic antagonist blocking M3 receptors for sustained bronchodilation.","uses":"Maintenance of COPD, hyperhidrosis (other formulations).","adr":"Dry mouth, constipation, urinary retention, nasopharyngitis, headache."},"Umeclidinium":{"adme":"Inhaled once daily with low systemic absorption, highly protein bound (~89%), metabolised mainly by CYP2D6 with predominantly faecal excretion, half-life ~11 hours.","moa":"Long-acting muscarinic antagonist giving 24-hour M3-mediated bronchodilation.","uses":"Maintenance of COPD (alone or with LABA/ICS).","adr":"Dry mouth, cough, nasopharyngitis, urinary retention, palpitations."},"Theophylline":{"adme":"Oral with near-complete bioavailability, ~40% protein bound, extensively hepatically metabolised by CYP1A2/3A4 (narrow therapeutic index, many interactions) with renal excretion, half-life ~6-12 hours.","moa":"Non-selective phosphodiesterase inhibitor and adenosine receptor antagonist increasing cAMP to cause bronchodilation and mild anti-inflammatory action.","uses":"Chronic asthma, COPD, apnoea of prematurity.","adr":"Nausea, insomnia, tremor, tachyarrhythmias, seizures (toxicity)."},"Aminophylline":{"adme":"Given IV or oral as the ethylenediamine salt of theophylline, ~40% protein bound, hepatically metabolised by CYP1A2/3A4 to theophylline with renal excretion, half-life ~6-12 hours.","moa":"A theophylline salt acting as a phosphodiesterase inhibitor and adenosine antagonist to relax bronchial smooth muscle.","uses":"Acute severe asthma, COPD, neonatal apnoea.","adr":"Nausea, palpitations, arrhythmias, seizures, hypotension on rapid IV."},"Doxofylline":{"adme":"Oral with good absorption and lower protein binding than theophylline, hepatically metabolised with renal excretion, half-life ~6-7 hours and wider safety margin.","moa":"Xanthine bronchodilator inhibiting phosphodiesterase with weak adenosine antagonism, giving bronchodilation with fewer cardiac effects.","uses":"Chronic asthma, COPD.","adr":"Nausea, headache, palpitations, gastric irritation, insomnia."},"Budesonide":{"adme":"Inhaled with low systemic absorption and extensive first-pass metabolism of swallowed drug (oral bioavailability ~10%), highly protein bound (~88%), metabolised by CYP3A4 to weak metabolites and renally excreted, half-life ~2-3 hours.","moa":"Inhaled corticosteroid that binds glucocorticoid receptors to suppress airway inflammatory gene transcription.","uses":"Maintenance of asthma and COPD, allergic rhinitis.","adr":"Oral candidiasis, dysphonia, throat irritation, adrenal suppression at high doses."},"Fluticasone":{"adme":"Inhaled with very low oral bioavailability (<1%, high first-pass), highly protein bound (~90%), metabolised by CYP3A4 to inactive metabolite and faecally excreted, half-life ~8-14 hours.","moa":"Potent inhaled corticosteroid suppressing inflammatory gene transcription via glucocorticoid receptors.","uses":"Maintenance of asthma and COPD, allergic rhinitis.","adr":"Oral candidiasis, dysphonia, throat irritation, adrenal suppression, pneumonia in COPD."},"Beclometasone":{"adme":"Inhaled prodrug with low oral bioavailability, activated to beclometasone-17-monopropionate, highly protein bound, hepatically/esterase metabolised and excreted in faeces, half-life of active metabolite ~2-3 hours.","moa":"Inhaled corticosteroid binding glucocorticoid receptors to reduce airway inflammation.","uses":"Maintenance of asthma, allergic rhinitis.","adr":"Oral candidiasis, hoarseness, throat irritation, growth suppression in children."},"Ciclesonide":{"adme":"Inhaled prodrug with negligible oral bioavailability, activated by airway esterases to des-ciclesonide, very highly protein bound (~99%), CYP3A4-metabolised and faecally excreted, half-life ~3-6 hours.","moa":"On-site-activated inhaled corticosteroid binding glucocorticoid receptors to suppress airway inflammation with low oropharyngeal effect.","uses":"Maintenance of asthma, allergic rhinitis.","adr":"Headache, nasopharyngitis, occasional dysphonia, low risk of oral candidiasis."},"Montelukast":{"adme":"Oral with good bioavailability (~64%), highly protein bound (>99%), extensively metabolised by CYP2C8/3A4 and excreted mainly in bile/faeces, half-life ~3-6 hours.","moa":"Cysteinyl leukotriene CysLT1 receptor antagonist blocking leukotriene-mediated bronchoconstriction and inflammation.","uses":"Prophylaxis of asthma, exercise-induced bronchospasm, allergic rhinitis.","adr":"Headache, abdominal pain, neuropsychiatric effects (mood changes), rarely Churg-Strauss."},"Zafirlukast":{"adme":"Oral with reduced bioavailability when taken with food, highly protein bound (~99%), metabolised by CYP2C9 (inhibits CYP2C9/3A4) and faecally excreted, half-life ~10 hours.","moa":"CysLT1 receptor antagonist blocking leukotriene-induced bronchoconstriction and inflammation.","uses":"Prophylaxis and chronic treatment of asthma.","adr":"Headache, GI upset, hepatotoxicity, rarely Churg-Strauss syndrome."},"Zileuton":{"adme":"Oral with good absorption, ~93% protein bound, hepatically metabolised b
