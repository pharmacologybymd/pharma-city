e ~22 h.","moa":"Highly selective COX-2 inhibitor reducing prostaglandin synthesis.","uses":"Osteoarthritis, rheumatoid arthritis, acute gout, pain","adr":"Hypertension, cardiovascular/thrombotic risk, edema, renal impairment"},"Parecoxib":{"adme":"Given parenterally as a prodrug rapidly hydrolyzed to active valdecoxib, highly protein bound, hepatically (CYP3A4/2C9) metabolized, renally excreted, half-life ~8 h.","moa":"Selective COX-2 inhibitor (prodrug of valdecoxib) reducing prostaglandin synthesis.","uses":"Short-term postoperative pain","adr":"Cardiovascular/thrombotic risk, serious skin reactions, hypotension, renal impairment"},"Paracetamol (acetaminophen)":{"adme":"Well absorbed orally with high bioavailability, low protein binding (~10-25%), hepatically conjugated (glucuronidation/sulfation; minor CYP2E1 to toxic NAPQI), renally excreted, half-life ~2-3 h.","moa":"Central inhibition of prostaglandin synthesis (weak peripheral COX action) producing analgesia and antipyresis.","uses":"Pain, fever (minimal anti-inflammatory effect)","adr":"Hepatotoxicity in overdose, rash, rare blood dyscrasias"},"Metamizol":{"adme":"Orally absorbed as a prodrug rapidly hydrolyzed to active 4-methylaminoantipyrine, moderately protein bound, hepatically metabolized, renally excreted, half-life ~2-4 h.","moa":"Non-opioid analgesic/antipyretic that inhibits prostaglandin synthesis (central and peripheral) with spasmolytic action.","uses":"Severe pain, fever, spasmodic pain (banned in some countries)","adr":"Agranulocytosis (notable), hypotension, allergic reactions, rare aplastic anemia"},"Montelukast (LTRA)":{"adme":"Well absorbed orally with ~64% bioavailability, highly protein bound (~99%), hepatically (CYP3A4/2C8) metabolized, biliary/fecally excreted, half-life ~3-6 h.","moa":"Selective cysteinyl leukotriene CysLT1 receptor antagonist blocking bronchoconstriction and inflammation.","uses":"Asthma prophylaxis, exercise-induced bronchospasm, allergic rhinitis","adr":"Headache, GI upset, neuropsychiatric effects (mood/behavior changes), elevated liver enzymes"},"Zafirlukast (LTRA)":{"adme":"Orally absorbed (reduced by food), highly protein bound (~99%), hepatically (CYP2C9) metabolized, fecally excreted, half-life ~10 h.","moa":"Selective cysteinyl leukotriene CysLT1 receptor antagonist blocking bronchoconstriction and inflammation.","uses":"Asthma prophylaxis and maintenance","adr":"Headache, GI upset, hepatotoxicity, drug interactions (CYP inhibition)"},"Zileuton (5-LOX inhibitor)":{"adme":"Well absorbed orally, highly protein bound (~93%), hepatically (CYP1A2/2C9/3A4) metabolized, renally excreted, short half-life ~2.5 h (requires frequent dosing).","moa":"Inhibits 5-lipoxygenase, blocking leukotriene synthesis from arachidonic acid.","uses":"Chronic asthma prophylaxis and maintenance","adr":"Hepatotoxicity (requires LFT monitoring), headache, dyspepsia, drug interactions"}},"diagrams":[{"title":"Arachidonic-acid (eicosanoid) pathway","caption":"Membrane phospholipid →(phospholipase A2; blocked by corticosteroids)→ arachidonic acid. COX → prostaglandins & thromboxane (blocked by NSAIDs / coxibs / aspirin). 5-LOX → leukotrienes (zileuton blocks 5-LOX; montelukast/zafirlukast block CysLT1 receptors).","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Arachidonic acid pathway\">\n      <text x=\"150\" y=\"36\" fill=\"currentColor\" font-size=\"11\" font-family=\"sans-serif\">Membrane phospholipids</text>\n      <line x1=\"220\" y1=\"42\" x2=\"220\" y2=\"74\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah3)\"/>\n      <text x=\"226\" y=\"62\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">PLA₂ ✕ steroids</text>\n      <text x=\"172\" y=\"92\" fill=\"currentColor\" font-size=\"12\" font-family=\"sans-serif\" font-weight=\"600\">Arachidonic acid</text>\n      <line x1=\"200\" y1=\"100\" x2=\"120\" y2=\"140\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah3)\"/>\n      <line x1=\"240\" y1=\"100\" x2=\"320\" y2=\"140\" stroke=\"currentColor\" stroke-width=\"1.4\" marker-end=\"url(#ah3)\"/>\n      <text x=\"70\" y=\"156\" fill=\"#2e7be0\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">COX</text>\n      <text x=\"40\" y=\"172\" fill=\"#2e7be0\" font-size=\"9\" font-family=\"sans-serif\">✕ NSAIDs / coxibs</text>\n      <text x=\"60\" y=\"196\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Prostaglandins, TXA₂</text>\n      <text x=\"300\" y=\"156\" fill=\"#14a06a\" font-size=\"11\" font-family=\"sans-serif\" font-weight=\"600\">5-LOX</text>\n      <text x=\"284\" y=\"172\" fill=\"#14a06a\" font-size=\"9\" font-family=\"sans-serif\">✕ zileuton</text>\n      <text x=\"290\" y=\"196\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Leukotrienes</text>\n      <text x=\"276\" y=\"212\" fill=\"#d98c00\" font-size=\"9\" font-family=\"sans-serif\">CysLT1 ✕ -lukasts</text>\n      <defs><marker id=\"ah3\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"currentColor\"/></marker></defs>\n    </svg>"}]},{"id":"cns","name":"CNS quarter","theme_line":"Mind & nerves · sedation, fits, mood, anaesthetics, opioids","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 16–24","groups":[{"heading":"A. Sedative-hypnotics & anxiolytics","groups":[{"heading":"Benzodiazepines","drugs":["Diazepam","Lorazepam","Midazolam","Alprazolam"]},{"heading":"Non-benzodiazepine hypnotics (Z-drugs)","drugs":["Zolpidem","Zaleplon","Eszopiclone"]},{"heading":"Azapirones","drugs":["Buspirone"]},{"heading":"Barbiturates","drugs":["Phenobarbital"]},{"heading":"Melatonergic","drugs":["Ramelteon"]},{"heading":"Benzodiazepine antagonist","drugs":["Flumazenil"]}]},{"heading":"B. Antidepressants","groups":[{"heading":"SSRIs","drugs":["Fluoxetine","Sertraline","Escitalopram","Paroxetine"]},{"heading":"SNRIs","drugs":["Venlafaxine","Duloxetine"]},{"heading":"Tricyclic antidepressants (TCAs)","drugs":["Amitriptyline","Imipramine","Nortriptyline"]},{"heading":"MAO inhibitors","drugs":["Phenelzine","Tranylcypromine","Moclobemide"]},{"heading":"Atypical antidepressants","drugs":["Bupropion","Mirtazapine","Trazodone","Vortioxetine"]}]},{"heading":"C. Antipsychotics","groups":[{"heading":"Typical (first-generation)","drugs":["Haloperidol","Chlorpromazine","Fluphenazine","Trifluoperazine"]},{"heading":"Atypical (second-generation)","drugs":["Clozapine","Olanzapine","Risperidone","Quetiapine","Aripiprazole","Ziprasidone"]}]},{"heading":"D. Antiepileptics (by clinical use)","groups":[{"heading":"Generalized tonic-clonic & partial seizures","drugs":["Phenytoin","Carbamazepine","Valproate","Lamotrigine","Levetiracetam","Topiramate","Lacosamide"]},{"heading":"Absence seizures","drugs":["Ethosuximide","Valproate"]},{"heading":"Status epilepticus","drugs":["Lorazepam","Diazepam","Phenytoin","Fosphenytoin"]}]},{"heading":"E. Antiparkinsonian drugs","groups":[{"heading":"Dopamine precursor","drugs":["Levodopa + Carbidopa"]},{"heading":"Dopamine agonists","drugs":["Pramipexole","Ropinirole","Bromocriptine"]},{"heading":"MAO-B inhibitors","drugs":["Selegiline","Rasagiline"]},{"heading":"COMT inhibitors","drugs":["Entacapone","Tolcapone"]},{"heading":"Anticholinergics","drugs":["Trihexyphenidyl","Benztropine"]},{"heading":"Antiviral / NMDA antagonist","drugs":["Amantadine"]}]},{"heading":"F. General anaesthetics","groups":[{"heading":"Intravenous","drugs":["Propofol","Ketamine","Thiopentone","Etomidate","Midazolam"]},{"heading":"Inhalational","drugs":["Sevoflurane","Isoflurane","Desflurane","Nitrous oxide","Halothane"]}]},{"heading":"G. Local anaesthetics","groups":[{"heading":"Amides","drugs":["Lidocaine","Bupivacaine","Ropivacaine"]},{"heading":"Esters","drugs":["Procaine","Cocaine","Benzocaine","Tetracaine"]}]},{"heading":"H. Opioid analgesics","groups":[{"heading":"Strong agonists","drugs":["Morphine","Fentanyl","Methadone","Pethidine","Oxycodone"]},{"heading":"Mild-to-moderate agonists","drugs":["Codeine","Tramadol"]},{"heading":"Partial agonist / mixed agonist-antagonist","drugs":["Buprenorphine","Pentazocine","Nalbuphine"]},{"heading":"Antagonists","drugs":["Naloxone","Naltrexone"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 27–36","groups":[{"heading":"A. Sedative-hypnotics & anxiolytics","groups":[{"heading":"Benzodiazepines","drugs":["Diazepam","Lorazepam","Midazolam","Alprazolam"]},{"heading":"Newer non-benzodiazepine hypnotics (Z-drugs)","drugs":["Zolpidem","Zaleplon","Eszopiclone"]},{"heading":"Azapirones","drugs":["Buspirone"]},{"heading":"Barbiturates","drugs":["Phenobarbital"]},{"heading":"Melatonin receptor agonist","drugs":["Ramelteon"]},{"heading":"Benzodiazepine antagonist","drugs":["Flumazenil"]}]},{"heading":"B. Antidepressants","groups":[{"heading":"Selective serotonin reuptake inhibitors (SSRIs)","drugs":["Fluoxetine","Sertraline","Escitalopram","Paroxetine"]},{"heading":"Serotonin-noradrenaline reuptake inhibitors (SNRIs)","drugs":["Venlafaxine","Duloxetine"]},{"heading":"Tricyclic antidepressants (TCAs)","drugs":["Amitriptyline","Imipramine","Nortriptyline"]},{"heading":"Monoamine oxidase inhibitors (MAOIs)","drugs":["Phenelzine","Tranylcypromine","Moclobemide"]},{"heading":"Atypical antidepressants","drugs":["Bupropion","Mirtazapine","Trazodone","Vortioxetine"]}]},{"heading":"C. Antipsychotics (neuroleptics)","groups":[{"heading":"Typical (first-generation)","drugs":["Haloperidol","Chlorpromazine","Fluphenazine","Trifluoperazine"]},{"heading":"Atypical (second-generation)","drugs":["Clozapine","Olanzapine","Risperidone","Quetiapine","Aripiprazole","Ziprasidone"]}]},{"heading":"D. Antiepileptic drugs (by clinical use)","groups":[{"heading":"Generalized tonic-clonic & partial seizures","drugs":["Phenytoin","Carbamazepine","Valproate","Lamotrigine","Levetiracetam","Topiramate","Lacosamide"]},{"heading":"Absence seizures","drugs":["Ethosuximide","Valproate"]},{"heading":"Status epilepticus","drugs":["Lorazepam","Diazepam","Phenytoin","Fosphenytoin"]}]},{"heading":"E. Antiparkinsonian drugs","groups":[{"heading":"Dopamine precursor","drugs":["Levodopa + Carbidopa"]},{"heading":"Dopaminergic agonists","drugs":["Pramipexole","Ropinirole","Bromocriptine"]},{"heading":"MAO-B inhibitors","drugs":["Selegiline","Rasagiline"]},{"heading":"COMT inhibitors","drugs":["Entacapone","Tolcapone"]},{"heading":"Central anticholinergics","drugs":["Trihexyphenidyl","Benztropine"]},{"heading":"Amantadine","drugs":["Amantadine"]}]},{"heading":"F. General anaesthetics","groups":[{"heading":"Intravenous","drugs":["Propofol","Ketamine","Thiopentone","Etomidate","Midazolam"]},{"heading":"Inhalational","drugs":["Sevoflurane","Isoflurane","Desflurane","Nitrous oxide","Halothane"]}]},{"heading":"G. Local anaesthetics","groups":[{"heading":"Amides","drugs":["Lidocaine","Bupivacaine","Ropivacaine"]},{"heading":"Esters","drugs":["Procaine","Cocaine","Benzocaine","Tetracaine"]}]},{"heading":"H. Opioid analgesics","groups":[{"heading":"Strong agonists","drugs":["Morphine","Fentanyl","Methadone","Pethidine","Oxycodone"]},{"heading":"Mild-to-moderate agonists","drugs":["Codeine","Tramadol"]},{"heading":"Partial / mixed agonist-antagonist","drugs":["Buprenorphine","Pentazocine","Nalbuphine"]},{"heading":"Antagonists","drugs":["Naloxone","Naltrexone"]}]}]}]},"details":{"Diazepam":{"adme":"Well-absorbed orally with high lipid solubility and rapid CNS entry, ~98% protein-bound, hepatic CYP2C19/3A4 oxidation to active desmethyldiazepam, renally excreted, long half-life 20-50h.","moa":"Binds the benzodiazepine site on GABA-A receptors to increase frequency of chloride channel opening, enhancing GABA-mediated inhibition.","uses":"Anxiety, status epilepticus, alcohol withdrawal, muscle spasm, sedation","adr":"Sedation, dependence, ataxia, respiratory depression, anterograde amnesia"},"Lorazepam":{"adme":"Good oral bioavailability, intermediate lipid solubility, ~90% protein-bound, hepatic glucuronidation (no active metabolites, no CYP), renal excretion, half-life ~12-15h.","moa":"Potentiates GABA-A receptor chloride conductance via the benzodiazepine site, increasing inhibitory tone.","uses":"Status epilepticus, anxiety, preanaesthetic medication, alcohol withdrawal","adr":"Sedation, dependence, ataxia, respiratory depression, amnesia"},"Midazolam":{"adme":"High first-pass metabolism limits oral bioavailability, very lipid-soluble (water-soluble at low pH), ~96% protein-bound, hepatic CYP3A4 metabolism, renal excretion, short half-life 2-4h.","moa":"Enhances GABA-A receptor-mediated chloride influx at the benzodiazepine site, producing rapid sedation.","uses":"Procedural sedation, anaesthesia induction, status epilepticus","adr":"Respiratory depression, hypotension, sedation, paradoxical excitation"},"Alprazolam":{"adme":"Well-absorbed orally, moderately lipophilic, ~80% protein-bound, hepatic CYP3A4 metabolism, renal excretion, intermediate half-life 11-16h.","moa":"Acts at the benzodiazepine site of GABA-A receptors to enhance GABA-mediated inhibition.","uses":"Panic disorder, generalised anxiety disorder","adr":"Sedation, dependence, rebound anxiety, withdrawal, ataxia"},"Zolpidem":{"adme":"Rapid oral absorption with ~70% bioavailability, lipophilic, ~92% protein-bound, hepatic CYP3A4 metabolism, renal excretion, short half-life ~2-3h.","moa":"Selective agonist at the alpha-1 subunit (BZ1) of GABA-A receptors, producing hypnosis with little anxiolytic effect.","uses":"Short-term treatment of insomnia","adr":"Sleep-walking, amnesia, dizziness, next-day drowsiness, dependence"},"Zaleplon":{"adme":"Rapid oral absorption with low ~30% bioavailability due to first-pass, lipophilic, ~60% protein-bound, hepatic aldehyde oxidase and CYP3A4 metabolism, renal excretion, very short half-life ~1h.","moa":"Selective alpha-1 subunit GABA-A receptor agonist producing rapid, short-lived hypnosis.","uses":"Sleep-onset insomnia","adr":"Dizziness, headache, amnesia, rebound insomnia"},"Eszopiclone":{"adme":"Rapidly absorbed orally, lipophilic, ~52-59% protein-bound, hepatic CYP3A4/2E1 metabolism, renal excretion of metabolites, half-life ~6h.","moa":"Non-benzodiazepine GABA-A receptor positive modulator acting at the benzodiazepine site to promote sleep.","uses":"Insomnia (sleep onset and maintenance)","adr":"Bitter/metallic taste, headache, dizziness, somnolence"},"Buspirone":{"adme":"Extensive first-pass metabolism gives low ~4% bioavailability, lipophilic, ~95% protein-bound, hepatic CYP3A4 metabolism, renal excretion, short half-life ~2-3h.","moa":"Partial agonist at 5-HT1A receptors producing anxiolysis without sedation or dependence.","uses":"Generalised anxiety disorder","adr":"Dizziness, headache, nausea, nervousness, delayed onset (1-2 weeks)"},"Phenobarbital":{"adme":"Good oral bioavailability, moderately lipid-soluble crossing BBB, ~50% protein-bound, hepatic CYP metabolism with potent enzyme induction (CYP2B/3A), substantial renal excretion (alkalinisation enhances it), long half-life ~80-100h.","moa":"Binds the barbiturate site on GABA-A receptors to prolong chloride channel opening duration and inhibit glutamate (AMPA) responses.","uses":"Epilepsy, status epilepticus, neonatal seizures, sedation","adr":"Sedation, enzyme induction, dependence, megaloblastic anaemia, respiratory depression in overdose"},"Ramelteon":{"adme":"Rapid oral absorption with low ~2% bioavailability from high first-pass, lipophilic, ~82% protein-bound, hepatic CYP1A2 metabolism, renal excretion, short half-life 1-2.6h.","moa":"Selective agonist at MT1 and MT2 melatonin receptors promoting sleep onset.","uses":"Insomnia (sleep-onset difficulty)","adr":"Somnolence, dizziness, fatigue, raised prolactin"},"Flumazenil":{"adme":"Given IV (low oral bioavailability from first-pass), moderately lipophilic, ~50% protein-bound, rapid hepatic metabolism, renal excretion of metabolites, very short half-life ~1h.","moa":"Competitive antagonist at the benzodiazepine site of GABA-A receptors, reversing benzodiazepine effects.","uses":"Reversal of benzodiazepine sedation/overdose","adr":"Seizures (in dependence), anxiety, agitation, resedation"},"Fluoxetine":{"adme":"Well-absorbed orally, highly lipophilic, ~95% protein-bound, hepatic CYP2D6 metabolism to active norfluoxetine (potent CYP2D6 inhibitor), renal excretion, very long half-life 1-4 days (norfluoxetine longer).","moa":"Selectively inhibits presynaptic serotonin (5-HT) reuptake, increasing synaptic serotonin.","uses":"Depression, OCD, bulimia, panic disorder, PMDD","adr":"Nausea, insomnia, sexual dysfunction, anxiety, serotonin syndrome"},"Sertraline":{"adme":"Well-absorbed orally, lipophilic, ~98% protein-bound, hepatic CYP metabolism (mild CYP2D6 inhibition), renal/faecal excretion, half-life ~26h.","moa":"Selective serotonin reuptake inhibitor raising synaptic 5-HT.","uses":"Depression, OCD, panic disorder, PTSD, social anxiety","adr":"Diarrhoea, nausea, sexual dysfunction, insomnia, serotonin syndrome"},"Escitalopram":{"adme":"Good oral bioavailability ~80%, moderately lipophilic, ~56% protein-bound, hepatic CYP2C19/3A4 metabolism, renal excretion, half-life ~27-32h.","moa":"Highly selective S-enantiomer serotonin reuptake inhibitor increasing synaptic 5-HT.","uses":"Depression, generalised anxiety disorder","adr":"Nausea, insomnia, sexual dysfunction, QT prolongation, serotonin syndrome"},"Paroxetine":{"adme":"Well-absorbed orally, highly lipophilic, ~95% protein-bound, hepatic CYP2D6 metabolism (potent CYP2D6 inhibitor), renal excretion, half-life ~21h.","moa":"Potent selective serotonin reuptake inhibitor with mild anticholinergic action.","uses":"Depression, OCD, panic disorder, social anxiety, PTSD","adr":"Sedation, weight gain, sexual dysfunction, anticholinergic effects, marked discontinuation syndrome"},"Venlafaxine":{"adme":"Well-absorbed orally, moderately lipophilic, ~27-30% protein-bound, hepatic CYP2D6 metabolism to active desvenlafaxine, renal excretion, half-life ~5h (parent).","moa":"Inhibits both serotonin and noradrenaline reuptake (SNRI), with dopamine reuptake inhibition at high doses.","uses":"Depression, generalised anxiety disorder, panic disorder","adr":"Nausea, hypertension at high doses, sweating, sexual dysfunction, discontinuation syndrome"},"Duloxetine":{"adme":"Well-absorbed orally, lipophilic, ~90% protein-bound, hepatic CYP1A2 and CYP2D6 metabolism, renal excretion, half-life ~12h.","moa":"Balanced serotonin-noradrenaline reuptake inhibitor (SNRI).","uses":"Depression, diabetic neuropathic pain, fibromyalgia, generalised anxiety, stress incontinence","adr":"Nausea, dry mouth, hepatotoxicity, hypertension, sexual dysfunction"},"Amitriptyline":{"adme":"Well-absorbed orally with significant first-pass, highly lipophilic, ~95% protein-bound, hepatic CYP2D6/2C19 metabolism to active nortriptyline, renal excretion, half-life ~10-28h.","moa":"Blocks reuptake of serotonin and noradrenaline; also antagonises muscarinic, H1 and alpha-1 receptors.","uses":"Depression, neuropathic pain, migraine prophylaxis, nocturnal enuresis","adr":"Anticholinergic effects, sedation, postural hypotension, weight gain, cardiotoxicity in overdose"},"Imipramine":{"adme":"Well-absorbed orally with first-pass, lipophilic, ~90% protein-bound, hepatic CYP2D6 demethylation to active desipramine, renal excretion, half-life ~11-25h.","moa":"Inhibits noradrenaline and serotonin reuptake with antimuscarinic, antihistaminic and alpha-blocking actions.","uses":"Depression, nocturnal enuresis, panic disorder, neuropathic pain","adr":"Anticholinergic effects, sedation, orthostatic hypotension, arrhythmias, weight gain"},"Nortriptyline":{"adme":"Well-absorbed orally, lipophilic, ~92% protein-bound, hepatic CYP2D6 metabolism, renal excretion, half-life ~18-44h.","moa":"Secondary-amine tricyclic that predominantly inhibits noradrenaline reuptake with fewer anticholinergic effects.","uses":"Depression, neuropathic pain, migraine prophylaxis","adr":"Anticholinergic effects, sedation, orthostatic hypotension, cardiotoxicity in overdose"},"Phenelzine":{"adme":"Well-absorbed orally, lipophilic, hepatic acetylation/metabolism, renal excretion, short plasma half-life but irreversible enzyme inhibition gives prolonged effect (weeks).","moa":"Irreversible non-selective inhibitor of monoamine oxidase A and B, increasing brain monoamines.","uses":"Atypical/treatment-resistant depression","adr":"Hypertensive crisis with tyramine foods, orthostatic hypotension, insomnia, hepatotoxicity, serotonin syndrome"},"Tranylcypromine":{"adme":"Well-absorbed orally, lipophilic, hepatic metabolism, renal excretion, short half-life ~2h but irreversible inhibition prolongs effect.","moa":"Irreversible non-selective MAO-A and MAO-B inhibitor with mild amphetamine-like action.","uses":"Treatment-resistant and atypical depression","adr":"Hypertensive crisis with tyramine, insomnia, orthostatic hypotension, serotonin syndrome"},"Moclobemide":{"adme":"Well-absorbed orally with first-pass, moderately lipophilic, ~50% protein-bound, hepatic CYP metabolism, renal excretion, short half-life ~1-3h.","moa":"Reversible selective inhibitor of MAO-A (RIMA), increasing serotonin, noradrenaline and dopamine.","uses":"Depression, social anxiety disorder","adr":"Insomnia, nausea, dizziness, lower tyramine risk than irreversible MAOIs"},"Bupropion":{"adme":"Well-absorbed orally with extensive first-pass, lipophilic, ~84% protein-bound, hepatic CYP2B6 metabolism to active hydroxybupropion (CYP2D6 inhibitor), renal excretion, half-life ~21h.","moa":"Inhibits noradrenaline and dopamine reuptake (NDRI) with no serotonergic action.","uses":"Depression, smoking cessation, seasonal affective disorder","adr":"Seizures (dose-related), insomnia, agitation, dry mouth, weight loss"},"Mirtazapine":{"adme":"Well-absorbed orally ~50% bioavailability, lipophilic, ~85% protein-bound, hepatic CYP1A2/2D6/3A4 metabolism, renal excretion, half-life ~20-40h.","moa":"Blocks central alpha-2 autoreceptors plus 5-HT2 and 5-HT3 receptors, enhancing noradrenergic and serotonergic transmission.","uses":"Depression, especially with insomnia or anorexia","adr":"Sedation, weight gain, increased appetite, dry mouth, rare agranulocytosis"},"Trazodone":{"adme":"Well-absorbed orally, lipophilic, ~89-95% protein-bound, hepatic CYP3A4 metabolism to active mCPP, renal excretion, half-life ~5-9h.","moa":"Serotonin antagonist and reuptake inhibitor (SARI) blocking 5-HT2A and inhibiting 5-HT reuptake.","uses":"Depression, insomnia (low dose)","adr":"Sedation, orthostatic hypotension, priapism, dizziness"},"Vortioxetine":{"adme":"Oral bioavailability ~75%, lipophilic, ~98% protein-bound, hepatic CYP2D6 metabolism, renal excretion, long half-life ~66h.","moa":"Inhibits serotonin reuptake and modulates multiple 5-HT receptors (5-HT1A agonist, 5-HT3/7 antagonist).","uses":"Major depressive disorder","adr":"Nausea, sexual dysfunction, constipation, serotonin syndrome"},"Haloperidol":{"adme":"Oral bioavailability ~60%, highly lipophilic, ~90% protein-bound, hepatic CYP3A4/2D6 metabolism, renal/biliary excretion, half-life ~12-36h (depot longer).","moa":"High-potency butyrophenone D2 dopamine receptor antagonist.","uses":"Schizophrenia, acute psychosis, mania, Tourette syndrome, delirium","adr":"Extrapyramidal symptoms, tardive dyskinesia, hyperprolactinaemia, neuroleptic malignant syndrome, QT prolongation"},"Chlorpromazine":{"adme":"Erratic oral absorption with high first-pass, highly lipophilic, ~95% protein-bound, hepatic CYP2D6 metabolism, renal excretion, half-life ~16-30h.","moa":"Low-potency phenothiazine blocking D2 (plus muscarinic, H1, alpha-1) receptors.","uses":"Schizophrenia, intractable hiccups, nausea/vomiting, mania","adr":"Sedation, postural hypotension, anticholinergic effects, photosensitivity, EPS, cholestatic jaundice"},"Fluphenazine":{"adme":"Variable oral absorption with first-pass, highly lipophilic, ~90% protein-bound, hepatic metabolism, renal excretion, half-life ~15h (decanoate depot weeks).","moa":"High-potency phenothiazine D2 receptor antagonist.","uses":"Schizophrenia (including long-acting depot maintenance)","adr":"Marked extrapyramidal symptoms, tardive dyskinesia, hyperprolactinaemia, NMS"},"Trifluoperazine":{"adme":"Well-absorbed orally, highly lipophilic, extensively protein-bound, hepatic metabolism, renal excretion, half-life ~10-20h.","moa":"High-potency phenothiazine D2 dopamine receptor antagonist.","uses":"Schizophrenia, short-term severe anxiety","adr":"Extrapyramidal symptoms, tardive dyskinesia, hyperprolactinaemia, sedation"},"Clozapine":{"adme":"Oral bioavailability ~50-60%, highly lipophilic, ~95% protein-bound, hepatic CYP1A2 metabolism (smoking induces), renal/faecal excretion, half-life ~12h.","moa":"Atypical antipsychotic with weak D2 and strong 5-HT2A, D4, muscarinic and H1 blockade.","uses":"Treatment-resistant schizophrenia, reducing suicidality","adr":"Agranulocytosis, weight gain, metabolic syndrome, seizures, myocarditis, sialorrhoea"},"Olanzapine":{"adme":"Good oral absorption with first-pass, lipophilic, ~93% protein-bound, hepatic CYP1A2 and glucuronidation (smoking induces), renal excretion, half-life ~30h.","moa":"Atypical antipsychotic blocking D2 and 5-HT2A (plus H1, muscarinic) receptors.","uses":"Schizophrenia, bipolar mania, acute agitation","adr":"Weight gain, metabolic syndrome, sedation, dyslipidaemia, hyperglycaemia"},"Risperidone":{"adme":"Oral bioavailability ~70%, moderately lipophilic, ~90% protein-bound, hepatic CYP2D6 metabolism to active paliperidone, renal excretion, half-life ~20h (active moiety).","moa":"Atypical antipsychotic with potent 5-HT2A and D2 antagonism.","uses":"Schizophrenia, bipolar mania, irritability in autism","adr":"Hyperprolactinaemia, EPS at higher doses, weight gain, orthostatic hypotension"},"Quetiapine":{"adme":"Rapid oral absorption, lipophilic, ~83% protein-bound, hepatic CYP3A4 metabolism to active norquetiapine, renal excretion, half-life ~6-7h.","moa":"Atypical antipsychotic with D2, 5-HT2A, H1 and alpha-1 blockade.","uses":"Schizophrenia, bipolar disorder, depression adjunct, insomnia (off-label)","adr":"Sedation, weight gain, orthostatic hypotension, metabolic effects, QT prolongation"},"Aripiprazole":{"adme":"Oral bioavailability ~87%, lipophilic, ~99% protein-bound, hepatic CYP3A4/2D6 metabolism, renal/faecal excretion, long half-life ~75h.","moa":"D2 and 5-HT1A partial agonist with 5-HT2A antagonism (dopamine system stabiliser).","uses":"Schizophrenia, bipolar mania, adjunct in depression, irritability in autism","adr":"Akathisia, insomnia, nausea, impulse-control disorders, less weight gain"},"Ziprasidone":{"adme":"Oral bioavailability ~60% (doubled with food), lipophilic, >99% protein-bound, hepatic aldehyde oxidase and CYP3A4 metabolism, faecal/renal excretion, half-life ~7h.","moa":"Atypical antipsychotic with potent 5-HT2A and D2 antagonism plus some monoamine reuptake inhibition.","uses":"Schizophrenia, bipolar mania, acute agitation","adr":"QT prolongation, sedation, akathisia, nausea, dizziness"},"Phenytoin":{"adme":"Slow erratic oral absorption, lipophilic crossing BBB, ~90% protein-bound, hepatic CYP2C9/2C19 metabolism with zero-order (saturable) kinetics and enzyme induction, renal excretion, variable half-life ~7-42h.","moa":"Blocks voltage-gated sodium channels in their inactivated state, stabilising neuronal membranes.","uses":"Generalised tonic-clonic and partial seizures, status epilepticus, trigeminal neuralgia","adr":"Gum hyperplasia, hirsutism, nystagmus, ataxia, megaloblastic anaemia, enzyme induction, teratogenicity"},"Carbamazepine":{"adme":"Slow oral absorption, lipophilic, ~75% protein-bound, hepatic CYP3A4 metabolism to active epoxide with potent autoinduction and enzyme induction (CYP3A4/2C9), renal excretion, half-life ~12-17h (shortens with induction).","moa":"Blocks voltage-gated sodium channels, reducing high-frequency repetitive neuronal firing.","uses":"Partial and tonic-clonic seizures, trigeminal neuralgia, bipolar disorder","adr":"Diplopia, ataxia, hyponatraemia (SIADH), rash/SJS (HLA-B*1502), agranulocytosis, enzyme induction"},"Valproate":{"adme":"Well-absorbed orally, lipophilic, highly ~90% protein-bound (saturable), hepatic glucuronidation and beta-oxidation (enzyme inhibitor), renal excretion, half-life ~9-16h.","moa":"Enhances GABA, blocks sodium channels and T-type calcium channels.","uses":"Generalised and partial seizures, absence seizures, bipolar disorder, migraine prophylaxis","adr":"Hepatotoxicity, weight gain, tremor, alopecia, thrombocytopenia, pancreatitis, teratogenicity"},"Lamotrigine":{"adme":"Almost complete oral absorption, moderately lipophilic, ~55% protein-bound, hepatic glucuronidation (valproate inhibits, enzyme-inducers shorten), renal excretion, half-life ~24-35h.","moa":"Blocks voltage-gated sodium channels and inhibits glutamate release.","uses":"Partial and generalised seizures, Lennox-Gastaut, bipolar maintenance","adr":"Rash/SJS (especially with rapid titration), dizziness, diplopia, headache"},"Levetiracetam":{"adme":"Rapid near-complete oral absorption, low lipid solubility, <10% protein-bound, minimal hepatic metabolism (non-CYP hydrolysis), predominantly renal excretion, half-life ~6-8h.","moa":"Binds synaptic vesicle protein SV2A, modulating neurotransmitter release.","uses":"Partial, myoclonic and generalised tonic-clonic seizures, status epilepticus","adr":"Irritability, mood/behavioural changes, somnolence, dizziness"},"Topiramate":{"adme":"Rapidly absorbed orally ~80% bioavailability, moderately lipophilic, ~15% protein-bound, largely renal excretion unchanged (some hepatic), half-life ~21h.","moa":"Blocks sodium channels, enhances GABA, antagonises AMPA/kainate glutamate receptors and inhibits carbonic anhydrase.","uses":"Partial and generalised seizures, migraine prophylaxis","adr":"Cognitive slowing/paraesthesia, weight loss, renal stones, metabolic acidosis, glaucoma"},"Lacosamide":{"adme":"Nearly complete oral absorption ~100% bioavailability, moderately lipophilic, <15% protein-bound, hepatic CYP2C19 partial metabolism, renal excretion, half-life ~13h.","moa":"Enhances slow inactivation of voltage-gated sodium channels.","uses":"Partial-onset seizures (adjunct/monotherapy)","adr":"Dizziness, diplopia, PR-interval prolongation, ataxia, nausea"},"Ethosuximide":{"adme":"Well-absorbed orally, moderately lipophilic, negligible protein binding, hepatic CYP3A4 metabolism, renal excretion, long half-life ~40-60h.","moa":"Blocks T-type calcium channels in thalamic neurons, suppressing absence seizure rhythms.","uses":"Absence (petit mal) seizures","adr":"Nausea, anorexia, drowsiness, hiccups, rare blood dyscrasias"},"Fosphenytoin":{"adme":"Water-soluble phosphate prodrug given IV/IM, rapidly converted by plasma phosphatases to phenytoin (~98% protein-bound), then hepatic CYP2C9/2C19 metabolism and renal excretion.","moa":"After conversion to phenytoin, blocks voltage-gated sodium channels to stabilise neuronal membranes.","uses":"Status epilepticus, parenteral phenytoin substitution","adr":"Hypotension, arrhythmias on rapid infusion, paraesthesia, nystagmus, ataxia"},"Levodopa + Carbidopa":{"adme":"Levodopa absorbed in proximal small intestine (competes with dietary amino acids), crosses BBB via amino-acid transporter, short half-life ~1-2h; carbidopa (peripherally acting, does not cross BBB) inhibits peripheral DOPA decarboxylase to raise central levodopa availability.","moa":"Levodopa is converted to dopamine in the brain replenishing striatal dopamine; carbidopa blocks peripheral conversion, reducing peripheral side-effects.","uses":"Parkinson's disease","adr":"Dyskinesias, on-off and wearing-off fluctuations, nausea, postural hypotension, hallucinations"},"Pramipexole":{"adme":"Rapidly absorbed orally >90% bioavailability, moderately lipophilic, ~15% protein-bound, minimal hepatic metabolism, predominantly renal excretion, half-life ~8-12h.","moa":"Non-ergot dopamine agonist preferentially stimulating D3 (and D2) receptors.","uses":"Parkinson's disease, restless legs syndrome","adr":"Nausea, somnolence/sleep attacks, hallucinations, impulse-control disorders, orthostatic hypotension"},"Ropinirole":{"adme":"Oral bioavailability ~50%, lipophilic, ~40% protein-bound, hepatic CYP1A2 metabolism, renal excretion, half-life ~6h.","moa":"Non-ergot dopamine agonist acting mainly on D2/D3 receptors.","uses":"Parkinson's disease, restless legs syndrome","adr":"Nausea, somnolence/sleep attacks, dizziness, impulse-control disorders, hallucinations"},"Bromocriptine":{"adme":"Incomplete oral absorption with extensive first-pass (~6% bioavailability), lipophilic, ~90-96% protein-bound, hepatic CYP3A4 metabolism, biliary excretion, half-life ~3-7h.","moa":"Ergot-derived D2 dopamine receptor agonist (also inhibits prolactin).","uses":"Parkinson's disease, hyperprolactinaemia, acromegaly","adr":"Nausea, postural hypotension, hallucinations, fibrosis, vasospasm"},"Selegiline":{"adme":"Oral bioavailability low with high first-pass, highly lipophilic, well protein-bound, hepatic CYP metabolism to amphetamine metabolites, renal excretion, half-life ~1.5-10h.","moa":"Selective irreversible MAO-B inhibitor reducing dopamine breakdown in the brain.","uses":"Parkinson's disease (adjunct to levodopa)","adr":"Insomnia, dyskinesias, nausea, loss of MAO-B selectivity (hypertensive risk) at high doses"},"Rasagiline":{"adme":"Rapid oral absorption ~36% bioavailability, lipophilic, ~88-94% protein-bound, hepatic CYP1A2 metabolism (no amphetamine metabolites), renal excretion, half-life ~3h (irreversible action prolongs effect).","moa":"Selective irreversible MAO-B inhibitor decreasing dopamine metabolism.","uses":"Parkinson's disease (monotherapy or adjunct)","adr":"Dyskinesias, headache, orthostatic hypotension, tyramine reaction at high doses"},"Entacapone":{"adme":"Rapid oral absorption with low ~35% bioavailability, lipophilic, ~98% protein-bound, hepatic glucuronidation, biliary excretion, short half-life ~0.5-1h.","moa":"Peripheral catechol-O-methyltransferase (COMT) inhibitor that prolongs levodopa availability.","uses":"Parkinson's disease (adjunct to levodopa-carbidopa for wearing-off)","adr":"Dyskinesias, diarrhoea, orange urine discolouration, nausea, hallucinations"},"Tolcapone":{"adme":"Rapid oral absorption ~65% bioavailability, lipophilic crossing BBB (central + peripheral action), >99% protein-bound, hepatic glucuronidation, renal/biliary excretion, half-life ~2-3h.","moa":"Central and peripheral COMT inhibitor prolonging levodopa effect.","uses":"Parkinson's disease (adjunct to levodopa) when other agents fail","adr":"Hepatotoxicity (requires LFT monitoring), diarrhoea, dyskinesias, orange urine"},"Trihexyphenidyl":{"adme":"Well-absorbed orally, lipophilic crossing BBB, hepatic metabolism, renal excretion, half-life ~3-4h.","moa":"Central antimuscarinic (anticholinergic) agent restoring dopamine-acetylcholine balance in the striatum.","uses":"Parkinson's disease (tremor-predominant), drug-induced extrapyramidal symptoms","adr":"Dry mouth, blurred vision, constipation, urinary retention, confusion in elderly"},"Benztropine":{"adme":"Well-absorbed orally and parenterally, lipophilic crossing BBB, hepatic metabolism, renal excretion, long duration of action.","moa":"Central antimuscarinic (with mild antihistaminic) action correcting striatal cholinergic excess.","uses":"Parkinsonism, acute drug-induced dystonia and extrapyramidal reactions","adr":"Dry mouth, blurred vision, constipation, urinary retention, confusion"},"Amantadine":{"adme":"Well-absorbed orally, moderately lipophilic, ~67% protein-bound, minimal hepatic metabolism, predominantly renal excretion unchanged, half-life ~10-30h (longer in renal impairment).","moa":"Enhances dopamine release/reduces reuptake and blocks NMDA glutamate receptors.","uses":"Parkinson's disease, levodopa-induced dyskinesias, influenza A prophylaxis","adr":"Livedo reticularis, ankle oedema, confusion, hallucinations, insomnia"},"Propofol":{"adme":"Given IV, extremely lipophilic with rapid brain uptake and redistribution, ~98% protein-bound, hepatic and extrahepatic glucuronidation, renal excretion, short context-sensitive half-life.","moa":"Potentiates GABA-A receptor chloride currents producing rapid anaesthesia.","uses":"Induction and maintenance of anaesthesia, ICU sedation, procedural sedation","adr":"Hypotension, respiratory depression, injection pain, propofol infusion syndrome, no analgesia"},"Ketamine":{"adme":"Given IV/IM (oral low bioavailability from first-pass), highly lipophilic with rapid brain entry, ~27% protein-bound, hepatic CYP3A4/2B6 metabolism to active norketamine, renal excretion, half-life ~2-3h.","moa":"Non-competitive NMDA glutamate receptor antagonist producing dissociative anaesthesia.","uses":"Anaesthesia induction, analgesia, bronchospastic patients, treatment-resistant depression","adr":"Emergence hallucinations/delirium, hypertension, tachycardia, raised intracranial pressure, salivation"},"Thiopentone":{"adme":"Given IV, very lipid-soluble with rapid brain entry then redistribution to fat (short duration), ~80% protein-bound, slow hepatic metabolism (cumulative), renal excretion, long terminal half-life.","moa":"Barbiturate that prolongs GABA-A receptor chloride channel opening, depressing the CNS.","uses":"Rapid induction of anaesthesia, status epilepticus, raised intracranial pressure","adr":"Respiratory depression, hypotension, laryngospasm, tissue necrosis on extravasation, hangover"},"Etomidate":{"adme":"Given IV, lipophilic with rapid onset and redistribution, ~75% protein-bound, rapid hepatic ester hydrolysis, renal excretion, short half-life.","moa":"Enhances GABA-A receptor activity producing hypnosis with cardiovascular stability.","uses":"Anaesthesia induction in haemodynamically unstable patients","adr":"Adrenal suppression, myoclonus, injection pain, nausea/vomiting, no analgesia"},"Sevoflurane":{"adme":"Inhalational agent with low blood-gas partition coefficient giving rapid induction/recovery, minimal hepatic metabolism (~3%, fluoride release), mainly exhaled unchanged.","moa":"Volatile anaesthetic enhancing GABA-A and inhibiting excitatory channels to depress the CNS.","uses":"Inhalational induction and maintenance of general anaesthesia","adr":"Dose-dependent hypotension/respiratory depression, malignant hyperthermia, compound A formation, emergence agitation"},"Isoflurane":{"adme":"Inhalational agent with intermediate blood-gas solubility, minimal hepatic metabolism (~0.2%), predominantly exhaled unchanged.","moa":"Volatile anaesthetic potentiating GABA-A inhibition to produce general anaesthesia.","uses":"Maintenance of general anaesthesia","adr":"Pungent (unsuitable for inhalational induction), hypotension, respiratory depression, malignant hyperthermia, coronary steal"},"Desflurane":{"adme":"Inhalational agent with very low blood-gas solubility giving the fastest onset/offset, negligible metabolism (~0.02%), almost entirely exhaled.","moa":"Volatile anaesthetic enhancing inhibitory and depressing excitatory CNS transmission.","uses":"Maintenance of anaesthesia, especially rapid-recovery and bariatric surgery","adr":"Airway irritation/laryngospasm, tachycardia and hypertension on rapid increase, malignant hyperthermia"},"Nitrous oxide":{"adme":"Inhalational gas with very low blood solubility giving rapid onset/offset, essentially no metabolism, eliminated unchanged via lungs.","moa":"NMDA receptor antagonist with analgesic and weak anaesthetic properties.","uses":"Analgesia (labour, dentistry), adjunct carrier gas in anaesthesia","adr":"Diffusion hypoxia, megaloblastic anaemia/neuropathy with chronic use (B12 oxidation), expansion of air-filled spaces, nausea"},"Halothane":{"adme":"Inhalational agent with high blood-gas solubility (slower induction), substantial hepatic metabolism (~20%, oxidative), partly exhaled.","moa":"Volatile anaesthetic potentiating inhibitory and depressing excitatory CNS channels.","uses":"General anaesthesia maintenance (now largely superseded)","adr":"Halothane hepatitis, myocardial depression, arrhythmias (sensitises to catecholamines), malignant hyperthermia"},"Lidocaine":{"adme":"Given parenterally (high first-pass orally), moderately lipophilic, ~70% protein-bound, hepatic CYP1A2/3A4 metabolism, renal excretion, half-life ~1.5-2h.","moa":"Amide local anaesthetic that blocks voltage-gated sodium channels, preventing nerve impulse conduction.","uses":"Local/regional anaesthesia, ventricular arrhythmias, neuropathic pain (patch)","adr":"CNS excitation then depression (seizures), perioral numbness, hypotension, arrhythmias at high plasma levels"},"Bupivacaine":{"adme":"Given by injection, highly lipophilic and long-acting, ~95% protein-bound, hepatic metabolism, renal excretion, half-life ~2.7h.","moa":"Long-acting amide local anaesthetic blocking voltage-gated sodium channels.","uses":"Epidural, spinal and peripheral nerve blocks, prolonged surgical/labour analgesia","adr":"Cardiotoxicity (refractory arrhythmias), CNS toxicity/seizures, hypotension with neuraxial use"},"Ropivacaine":{"adme":"Given by injection, lipophilic, ~94% protein-bound, hepatic CYP1A2/3A4 metabolism, renal excretion, half-life ~1.8h.","moa":"Long-acting amide local anaesthetic (S-enantiomer) blocking voltage-gated sodium channels with sensory-motor differential.","uses":"Epidural and peripheral nerve blocks, labour and postoperative analgesia","adr":"CNS toxicity (seizures), less cardiotoxic than bupivacaine, hypotension, bradycardia"},"Procaine":{"adme":"Given by injection (rapidly hydrolysed, ineffective topically), low lipid solubility, hepatic/plasma esterase hydrolysis to PABA, renal excretion, very short duration.","moa":"Ester local anaesthetic blocking voltage-gated sodium channels.","uses":"Infiltration anaesthesia, diluent for penicillin","adr":"Allergic reactions (PABA metabolite), CNS toxicity, hypotension, short duration"},"Cocaine":{"adme":"Absorbed across mucous membranes (topical use), lipophilic, hepatic and plasma esterase metabolism, renal excretion, short half-life ~1h.","moa":"Ester local anaesthetic blocking sodium channels and also inhibiting monoamine reuptake (vasoconstriction).","uses":"Topical anaesthesia of ENT mucosa (now rare)","adr":"Hypertension, tachycardia, arrhythmias, vasoconstriction/ischaemia, CNS stimulation, dependence"},"Benzocaine":{"adme":"Used topically with poor systemic absorption, low water solubility, ester hydrolysis, minimal systemic levels.","moa":"Ester local anaesthetic blocking sodium channels for surface anaesthesia.","uses":"Topical anaesthesia of skin and mucous membranes, sore throat lozenges","adr":"Methaemoglobinaemia, local irritation, contact dermatitis/allergy"},"Tetracaine":{"adme":"Used topically and for spinal anaesthesia, highly lipophilic and potent, slow plasma esterase hydrolysis, longer duration than procaine.","moa":"Long-acting ester local anaesthetic blocking voltage-gated sodium channels.","uses":"Spinal anaesthesia, topical ophthalmic and mucosal anaesthesia","adr":"Systemic toxicity (CNS, cardiovascular), allergic reactions, methaemoglobinaemia"},"Morphine":{"adme":"Oral bioavailability low ~25% from first-pass, low lipid solubility (slow BBB entry), ~35% protein-bound, hepatic glucuronidation to active morphine-6-glucuronide, renal excretion (accumulates in renal failure), half-life ~2-4h.","moa":"Agonist at mu (and kappa) opioid receptors producing analgesia and CNS depression.","uses":"Severe acute and chronic/cancer pain, acute pulmonary oedema, MI pain","adr":"Respiratory depression, constipation, sedation, miosis, dependence, histamine release/itching"},"Fentanyl":{"adme":"Given parenterally/transdermal/transmucosal (high first-pass orally), highly lipophilic with rapid CNS entry, ~80% protein-bound, hepatic CYP3A4 metabolism, renal excretion, half-life ~3-7h.","moa":"Potent synthetic mu opioid receptor agonist.","uses":"Intraoperative analgesia, severe/chronic pain (patch), procedural sedation","adr":"Respiratory depression, chest-wall rigidity, bradycardia, sedation, dependence"},"Methadone":{"adme":"High oral bioavailability ~80%, highly lipophilic, ~85-90% protein-bound, hepatic CYP3A4/2B6 metabolism, renal/faecal excretion, very long variable half-life ~15-60h.","moa":"Synthetic mu opioid agonist with additional NMDA receptor antagonism.","uses":"Opioid maintenance/detoxification, chronic and neuropathic pain","adr":"QT prolongation/torsades, respiratory depression, sedation, constipation, accumulation toxicity"},"Pethidine":{"adme":"Oral bioavailability ~50-60% with first-pass, lipophilic, ~60% protein-bound, hepatic metabolism to neurotoxic norpethidine, renal excretion, half-life ~3-5h.","moa":"Synthetic mu opioid agonist with anticholinergic and local anaesthetic properties.","uses":"Acute pain, labour analgesia, post-anaesthetic shivering","adr":"Seizures (norpethidine accumulation), tachycardia, serotonin syndrome with MAOIs, respiratory depression, dependence"},"Oxycodone":{"adme":"High oral bioavailability ~60-87%, lipophilic, ~45% protein-bound, hepatic CYP2D6/3A4 metabolism to active oxymorphone, renal excretion, half-life ~3-5h.","moa":"Semisynthetic mu (and kappa) opioid receptor agonist.","uses":"Moderate to severe pain","adr":"Constipation, sedation, respiratory depression, nausea, dependence/abuse"},"Codeine":{"adme":"Good oral bioavailability, low lipid solubility, ~25% protein-bound, hepatic CYP2D6 demethylation to morphine (variable by genotype), renal excretion, half-life ~3h.","moa":"Weak mu opioid agonist that is a prodrug requiring conversion to morphine for analgesia.","uses":"Mild to moderate pain, cough suppression, diarrhoea","adr":"Constipation, sedation, nausea, dependence, variable/excess effect in ultra-rapid metabolisers"},"Tramadol":{"adme":"High oral bioavailability ~70%, moderately lipophilic, ~20% protein-bound, hepatic CYP2D6 metabolism to active O-desmethyltramadol, renal excretion, half-life ~6h.","moa":"Weak mu opioid agonist that also inhibits serotonin and noradrenaline reuptake.","uses":"Moderate pain, neuropathic pain","adr":"Nausea, dizziness, seizures, serotonin syndrome, lower respiratory depression/dependence than classic opioids"},"Buprenorphine":{"adme":"Extensive first-pass orally so given sublingual/transdermal/parenteral, highly lipophilic, ~96% protein-bound, hepatic CYP3A4 metabolism, biliary/renal excretion, long half-life ~24-37h.","moa":"Partial mu opioid agonist and kappa antagonist with high receptor affinity (ceiling effect).","uses":"Opioid dependence maintenance, moderate to severe pain","adr":"Respiratory depression (ceiling), sedation, precipitated withdrawal in dependent users, QT prolongation"},"Pentazocine":{"adme":"Oral bioavailability low from first-pass, lipophilic, hepatic metabolism, renal excretion, half-life ~2-3h.","moa":"Kappa opioid agonist and weak mu antagonist/partial agonist (mixed agonist-antagonist).","uses":"Moderate to severe pain","adr":"Dysphoria/hallucinations (kappa), tachycardia/raised BP, precipitated withdrawal in opioid-dependent patients"},"Nalbuphine":{"adme":"Given parenterally (high first-pass orally), lipophilic, ~50% protein-bound, hepatic metabolism, renal/biliary excretion, half-life ~5h.","moa":"Kappa opioid agonist and mu antagonist (mixed agonist-antagonist) with a respiratory ceiling effect.","uses":"Moderate to severe pain, obstetric and balanced anaesthesia analgesia","adr":"Sedation, dysphoria, sweating, precipitated withdrawal in opioid-dependent patients"},"Naloxone":{"adme":"Negligible oral bioavailability so given IV/IM/intranasal, lipophilic with rapid CNS entry, hepatic glucuronidation, renal excretion, short half-life ~1h (may require repeat dosing).","moa":"Competitive antagonist at mu, kappa and delta opioid receptors.","uses":"Reversal of opioid overdose and opioid-induced respiratory depression","adr":"Acute withdrawal in dependent patients, hypertension, tachycardia, pulmonary oedema, pain unmasking"},"Naltrexone":{"adme":"Good oral absorption with extensive first-pass, lipophilic, ~21% protein-bound, hepatic metabolism to active 6-beta-naltrexol, renal excretion, half-life ~4h (metabolite longer; depot lasts a month).","moa":"Long-acting competitive opioid receptor antagonist (mu predominant).","uses":"Maintenance of opioid abstinence, alcohol dependence","adr":"Hepatotoxicity at high doses, nausea, headache, precipitated withdrawal, dysphoria"}},"diagrams":[{"title":"GABA-A receptor–chloride channel","caption":"GABA opens the Cl⁻ channel → hyperpolarisation. Benzodiazepines increase the FREQUENCY of channel opening (need GABA); barbiturates increase the DURATION of opening (and open it directly at high dose). Flumazenil blocks the BZD site.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"GABA-A receptor\">\n      <rect x=\"150\" y=\"40\" width=\"140\" height=\"170\" rx=\"14\" fill=\"#2e7be0\" opacity=\"0.08\" stroke=\"currentColor\" stroke-width=\"1.4\"/>\n      <rect x=\"206\" y=\"40\" width=\"28\" height=\"170\" fill=\"#2e7be0\" opacity=\"0.12\"/>\n      <text x=\"196\" y=\"30\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">Cl⁻ channel</text>\n      <line x1=\"220\" y1=\"48\" x2=\"220\" y2=\"200\" stroke=\"#2e7be0\" stroke-width=\"1\" stroke-dasharray=\"3 4\"/>\n      <text x=\"224\" y=\"120\" fill=\"#2e7be0\" font-size=\"11\" font-family=\"sans-serif\">Cl⁻ →</text>\n      <circle cx=\"150\" cy=\"80\" r=\"7\" fill=\"#14a06a\"/><text x=\"40\" y=\"84\" fill=\"#14a06a\" font-size=\"10\" font-family=\"sans-serif\">GABA site</text>\n      <circle cx=\"150\" cy=\"140\" r=\"7\" fill=\"#d98c00\"/><text x=\"30\" y=\"144\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">BZD (↑ frequency)</text>\n      <circle cx=\"290\" cy=\"110\" r=\"7\" fill=\"#8b5cf6\"/><text x=\"300\" y=\"114\" fill=\"#8b5cf6\" font-size=\"10\" font-family=\"sans-serif\">barbiturate</text>\n      <text x=\"300\" y=\"130\" fill=\"#8b5cf6\" font-size=\"9\" font-family=\"sans-serif\">(↑ duration)</text>\n      <text x=\"30\" y=\"160\" fill=\"#c0392b\" font-size=\"9\" font-family=\"sans-serif\">flumazenil ✕ BZD site</text>\n    </svg>"}]},{"id":"endocrine","name":"Endocrine","theme_line":"Glandular heights · hormones above the city","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 45–52","groups":[{"heading":"A. Antidiabetic drugs","groups":[{"heading":"Insulins","groups":[{"heading":"Rapid-acting","drugs":["Insulin lispro","Insulin aspart","Insulin glulisine"]},{"heading":"Short-acting (regular)","drugs":["Regular insulin"]},{"heading":"Intermediate-acting","drugs":["NPH (isophane) insulin"]},{"heading":"Long-acting","drugs":["Insulin glargine","Insulin detemir","Insulin degludec"]}]},{"heading":"Biguanides","drugs":["Metformin"]},{"heading":"Sulfonylureas","drugs":["Glibenclamide","Glimepiride","Gliclazide"]},{"heading":"Meglitinides","drugs":["Repaglinide","Nateglinide"]},{"heading":"Thiazolidinediones","drugs":["Pioglitazone"]},{"heading":"DPP-4 inhibitors (gliptins)","drugs":["Sitagliptin","Vildagliptin","Linagliptin"]},{"heading":"GLP-1 receptor agonists","drugs":["Liraglutide","Exenatide","Dulaglutide","Semaglutide"]},{"heading":"SGLT2 inhibitors (gliflozins)","drugs":["Empagliflozin","Dapagliflozin","Canagliflozin"]},{"heading":"α-glucosidase inhibitors","drugs":["Acarbose","Miglitol","Voglibose"]},{"heading":"Amylin analogue","drugs":["Pramlintide"]}]},{"heading":"B. Thyroid & antithyroid drugs","groups":[{"heading":"Thyroid hormones","drugs":["Levothyroxine","Liothyronine"]},{"heading":"Antithyroid drugs","groups":[{"heading":"Thioamides","drugs":["Carbimazole","Methimazole","Propylthiouracil"]},{"heading":"Iodides","drugs":["Potassium iodide","Lugol's iodine"]},{"heading":"Radioactive iodine","drugs":["I-131"]}
