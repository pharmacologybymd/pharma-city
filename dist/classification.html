revention (pre- and postmenopausal).","adr":"Endometrial hyperplasia/cancer, venous thromboembolism, hot flushes, cataracts, increased bone density in postmenopausal women."},"Leuprolide":{"adme":"Parenteral (depot injection), peptide degraded by peptidases, sustained-release formulations for monthly dosing.","moa":"GnRH agonist causing initial flare then downregulation of pituitary receptors suppressing LH/FSH and sex steroids.","uses":"Prostate cancer, breast cancer, endometriosis, precocious puberty, uterine fibroids.","adr":"Initial tumor flare, hot flushes, decreased libido/impotence, osteoporosis, hyperglycemia."},"Anastrozole":{"adme":"Good oral bioavailability, moderate protein binding, hepatic metabolism, long half-life allowing once-daily dosing.","moa":"Nonsteroidal aromatase inhibitor blocking peripheral conversion of androgens to estrogen.","uses":"ER-positive breast cancer in postmenopausal women.","adr":"Arthralgia/musculoskeletal pain, osteoporosis/fractures, hot flushes, dyslipidemia, fatigue."},"Cyclosporine":{"adme":"Variable oral bioavailability, highly protein/lipoprotein bound, hepatic CYP3A4 metabolism (drug interactions, requires level monitoring), biliary excretion.","moa":"Binds cyclophilin to inhibit calcineurin, blocking NFAT-driven IL-2 transcription and T-cell activation.","uses":"Solid organ transplant rejection prophylaxis, GVHD, autoimmune disease (psoriasis, RA).","adr":"Nephrotoxicity (dose-limiting), hypertension, gingival hyperplasia, hirsutism, neurotoxicity/tremor, hyperkalemia."},"Tacrolimus":{"adme":"Variable oral bioavailability, highly protein bound, hepatic CYP3A4 metabolism (narrow window, level monitoring), drug interactions.","moa":"Binds FKBP-12 to inhibit calcineurin, blocking NFAT-mediated IL-2 transcription and T-cell activation.","uses":"Solid organ transplant rejection prophylaxis, GVHD, atopic dermatitis (topical).","adr":"Nephrotoxicity, neurotoxicity/tremor, new-onset diabetes (more than cyclosporine), hyperkalemia, hypertension (less gum/hair changes)."},"Mycophenolate":{"adme":"Good oral bioavailability (prodrug mycophenolate mofetil), hepatically glucuronidated with enterohepatic recirculation, renal excretion of metabolite.","moa":"Inhibits inosine monophosphate dehydrogenase blocking de novo guanosine synthesis on which lymphocytes depend.","uses":"Transplant rejection prophylaxis, lupus nephritis, autoimmune disease.","adr":"GI upset/diarrhea, myelosuppression/leukopenia, infections, teratogenic (pregnancy prevention required), PML."},"Azathioprine":{"adme":"Good oral bioavailability, prodrug converted to 6-mercaptopurine then metabolized by TPMT (genotype affects toxicity) and xanthine oxidase.","moa":"Purine analog that, via 6-MP metabolites, inhibits purine synthesis and lymphocyte proliferation.","uses":"Transplant rejection prophylaxis, inflammatory bowel disease, autoimmune hepatitis, RA, lupus.","adr":"Myelosuppression (severe in TPMT deficiency), hepatotoxicity, pancreatitis, increased malignancy/lymphoma; dangerous interaction with allopurinol (reduce dose)."},"Sirolimus":{"adme":"Variable oral bioavailability, highly protein bound, hepatic CYP3A4/P-gp metabolism (level monitoring), very long half-life.","moa":"Binds FKBP-12 to inhibit mTOR, blocking IL-2-driven T-cell proliferation (cell cycle arrest).","uses":"Transplant rejection prophylaxis (calcineurin-sparing), drug-eluting stents.","adr":"Hyperlipidemia, myelosuppression/thrombocytopenia, impaired wound healing, mouth ulcers, interstitial pneumonitis, proteinuria."},"Everolimus":{"adme":"Oral, highly protein bound, hepatic CYP3A4/P-gp metabolism (level monitoring), shorter half-life than sirolimus.","moa":"mTOR inhibitor (binds FKBP-12) blocking growth/proliferation signaling.","uses":"Transplant rejection prophylaxis, renal cell carcinoma, breast cancer, neuroendocrine tumors, SEGA in tuberous sclerosis.","adr":"Stomatitis/mouth ulcers, hyperglycemia, hyperlipidemia, non-infectious pneumonitis, immunosuppression/infection, impaired wound healing."},"Prednisolone":{"adme":"Good oral bioavailability, highly protein bound (transcortin/albumin), hepatic metabolism, active form of prednisone.","moa":"Glucocorticoid binding intracellular receptor altering gene transcription to broadly suppress inflammation and immune cell function.","uses":"Autoimmune/inflammatory disease, transplant immunosuppression, asthma/COPD, allergic reactions, leukemias/lymphomas.","adr":"Cushingoid features, hyperglycemia, osteoporosis, immunosuppression/infection, adrenal suppression, mood changes, peptic ulcer."},"Infliximab":{"adme":"Parenteral (IV) chimeric monoclonal antibody, long half-life of weeks, reticuloendothelial/target-mediated clearance.","moa":"Anti-TNF-alpha monoclonal antibody neutralizing soluble and membrane-bound TNF-alpha.","uses":"Rheumatoid arthritis, Crohn disease, ulcerative colitis, psoriasis, ankylosing spondylitis.","adr":"Infection/reactivation of latent TB (screen first), infusion reactions, hepatitis B reactivation, lymphoma risk, demyelination, heart failure worsening."},"Adalimumab":{"adme":"Parenteral (subcutaneous) fully human monoclonal antibody, long half-life (~2 weeks), reticuloendothelial clearance.","moa":"Anti-TNF-alpha monoclonal antibody neutralizing TNF-alpha.","uses":"Rheumatoid arthritis, psoriasis, Crohn disease, ulcerative colitis, ankylosing spondylitis, uveitis.","adr":"Increased infections/TB reactivation (screen first), injection-site reactions, lymphoma risk, demyelination, lupus-like syndrome."},"Basiliximab":{"adme":"Parenteral (IV) chimeric monoclonal antibody given perioperatively, long half-life (~1 week), target-mediated clearance.","moa":"Anti-CD25 (IL-2 receptor alpha) monoclonal antibody blocking IL-2-mediated T-cell activation/proliferation.","uses":"Induction immunosuppression to prevent acute rejection in renal transplantation.","adr":"Generally well tolerated, rare hypersensitivity/anaphylaxis, infection; no cytokine release syndrome (unlike older agents)."}},"diagrams":[{"title":"Antibacterial drug targets","caption":"Cell wall: β-lactams, glycopeptides. 30S ribosome: aminoglycosides, tetracyclines. 50S ribosome: macrolides, clindamycin, linezolid. DNA gyrase/topoisomerase: fluoroquinolones. RNA polymerase: rifampicin. Folate synthesis: sulfonamides + trimethoprim.","svg":"<svg viewBox=\"0 0 440 250\" role=\"img\" aria-label=\"Antibacterial targets in a bacterial cell\">\n      <ellipse cx=\"220\" cy=\"125\" rx=\"170\" ry=\"92\" fill=\"#14a06a\" opacity=\"0.06\" stroke=\"currentColor\" stroke-width=\"2\"/>\n      <ellipse cx=\"220\" cy=\"125\" rx=\"170\" ry=\"92\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"6\" opacity=\"0.25\"/>\n      <text x=\"150\" y=\"40\" fill=\"#2e7be0\" font-size=\"10\" font-family=\"sans-serif\">cell wall: β-lactams, glycopeptides</text>\n      <circle cx=\"160\" cy=\"110\" r=\"6\" fill=\"#d98c00\"/><text x=\"172\" y=\"114\" fill=\"#d98c00\" font-size=\"10\" font-family=\"sans-serif\">30S: aminoglycosides, tetracyclines</text>\n      <circle cx=\"160\" cy=\"140\" r=\"6\" fill=\"#8b5cf6\"/><text x=\"172\" y=\"144\" fill=\"#8b5cf6\" font-size=\"10\" font-family=\"sans-serif\">50S: macrolides, clindamycin, linezolid</text>\n      <circle cx=\"160\" cy=\"170\" r=\"6\" fill=\"#c0392b\"/><text x=\"172\" y=\"174\" fill=\"#c0392b\" font-size=\"10\" font-family=\"sans-serif\">DNA gyrase: fluoroquinolones</text>\n      <text x=\"120\" y=\"196\" fill=\"currentColor\" font-size=\"10\" font-family=\"sans-serif\">RNA pol: rifampicin · folate: sulfonamides+TMP</text>\n    </svg>"}]},{"id":"toxicology","name":"Toxicology","theme_line":"Hazmat silo · poisons + antidotes outside the wall","classification":{"sources":[{"label":"G&G 14e","cite":"ch. 4, 71–74","groups":[{"heading":"A. Specific antidotes (by poison)","groups":[{"heading":"Paracetamol (acetaminophen)","drugs":["N-acetylcysteine"]},{"heading":"Opioids","drugs":["Naloxone"]},{"heading":"Benzodiazepines","drugs":["Flumazenil"]},{"heading":"Digoxin / digitalis glycosides","drugs":["Digoxin-specific antibody (Fab) fragments"]},{"heading":"Organophosphates / carbamates","drugs":["Atropine","Pralidoxime (2-PAM)"]},{"heading":"Methaemoglobinaemia","drugs":["Methylene blue"]},{"heading":"Methanol / ethylene glycol","drugs":["Fomepizole","Ethanol"]},{"heading":"Cyanide","drugs":["Hydroxocobalamin","Sodium thiosulfate","Sodium nitrite"]},{"heading":"β-blocker overdose","drugs":["Glucagon"]},{"heading":"Calcium-channel blocker / hydrofluoric acid / hyperkalaemia","drugs":["Calcium gluconate"]},{"heading":"Warfarin","drugs":["Vitamin K1 (phytonadione)"]},{"heading":"Heparin","drugs":["Protamine sulfate"]},{"heading":"Methotrexate","drugs":["Folinic acid (leucovorin)"]}]},{"heading":"B. Chelating agents (heavy-metal poisoning)","groups":[{"heading":"Iron","drugs":["Deferoxamine"]},{"heading":"Lead","drugs":["Calcium disodium EDTA","Dimercaprol (BAL)","Succimer (DMSA)","D-penicillamine"]},{"heading":"Arsenic / mercury / gold","drugs":["Dimercaprol (BAL)","DMSA (succimer)","DMPS"]},{"heading":"Copper (Wilson's disease)","drugs":["D-penicillamine","Trientine"]}]}]},{"label":"KDT 8e/9e","cite":"ch. 64–67","groups":[{"heading":"A. Specific antidotes (by poison)","groups":[{"heading":"Paracetamol (acetaminophen)","drugs":["N-acetylcysteine"]},{"heading":"Opioids","drugs":["Naloxone"]},{"heading":"Benzodiazepines","drugs":["Flumazenil"]},{"heading":"Digoxin","drugs":["Digoxin-specific antibody (Fab) fragments"]},{"heading":"Organophosphates / carbamates","drugs":["Atropine","Pralidoxime (2-PAM)"]},{"heading":"Methaemoglobinaemia","drugs":["Methylene blue"]},{"heading":"Methanol / ethylene glycol","drugs":["Fomepizole","Ethanol"]},{"heading":"Cyanide","drugs":["Hydroxocobalamin","Sodium thiosulfate","Sodium nitrite"]},{"heading":"β-blocker overdose","drugs":["Glucagon"]},{"heading":"Calcium-channel blocker / hydrofluoric acid / hyperkalaemia","drugs":["Calcium gluconate"]},{"heading":"Warfarin","drugs":["Vitamin K1 (phytonadione)"]},{"heading":"Heparin","drugs":["Protamine sulfate"]},{"heading":"Methotrexate","drugs":["Folinic acid (leucovorin)"]}]},{"heading":"B. Chelating agents (heavy-metal poisoning)","groups":[{"heading":"Iron","drugs":["Deferoxamine"]},{"heading":"Lead","drugs":["Calcium disodium EDTA","Dimercaprol (BAL)","Succimer (DMSA)","D-penicillamine"]},{"heading":"Arsenic / mercury / gold","drugs":["Dimercaprol (BAL)","DMSA (succimer)","DMPS"]},{"heading":"Copper (Wilson's disease)","drugs":["D-penicillamine","Trientine"]}]},{"heading":"C. General principles of poisoning management","groups":[{"heading":"Decontamination","drugs":["Gastric lavage","Activated charcoal"]},{"heading":"Enhanced elimination","drugs":["Urinary alkalinization","Haemodialysis"]},{"heading":"Supportive care","drugs":["Airway / breathing / circulation support","Maintenance of vitals"]}]}]}]},"details":{"N-acetylcysteine":{"adme":"Given orally or IV, rapidly absorbed/distributed and metabolised, with a short plasma half-life of a few hours.","moa":"Replenishes hepatic glutathione and provides sulfhydryl groups that conjugate and detoxify the reactive paracetamol metabolite NAPQI.","uses":"Paracetamol (acetaminophen) poisoning; also adjunct in fulminant hepatic failure.","adr":"Anaphylactoid reactions (flushing, rash, bronchospasm) with IV use, nausea and vomiting orally."},"Naloxone":{"adme":"Given IV, IM, intranasal or SC with rapid onset but a short duration (~30-90 min), undergoing extensive hepatic metabolism.","moa":"Competitive pure opioid receptor antagonist that displaces opioids from mu receptors, reversing respiratory and CNS depression.","uses":"Opioid (morphine, heroin, fentanyl) overdose and reversal of opioid-induced respiratory depression.","adr":"Acute opioid withdrawal (agitation, tachycardia, hypertension, pulmonary oedema) in dependent patients."},"Flumazenil":{"adme":"Administered IV with rapid onset and short duration of action, cleared by hepatic metabolism.","moa":"Competitive antagonist at the benzodiazepine site of the GABA-A receptor, reversing benzodiazepine-induced sedation.","uses":"Benzodiazepine overdose and reversal of benzodiazepine sedation/anaesthesia.","adr":"Seizures (especially in benzodiazepine-dependent or mixed TCA overdose patients), agitation and re-sedation."},"Digoxin-specific antibody (Fab) fragments":{"adme":"Given IV, distributes into extracellular fluid and binds digoxin, with the complex cleared renally.","moa":"Antibody fragments bind free digoxin with high affinity, removing it from tissue-binding sites and reversing its effect.","uses":"Life-threatening digoxin (or digitoxin) toxicity with arrhythmias or hyperkalaemia.","adr":"Rebound of underlying heart failure or atrial fibrillation, hypokalaemia, and rare hypersensitivity."},"Atropine":{"adme":"Given IV/IM, rapid onset, partly metabolised hepatically and partly excreted unchanged in urine.","moa":"Competitive muscarinic receptor antagonist that blocks excess acetylcholine effects at muscarinic sites.","uses":"Organophosphate and carbamate (anticholinesterase) poisoning, and muscarinic mushroom poisoning.","adr":"Anticholinergic effects: dry mouth, tachycardia, mydriasis, urinary retention, hyperthermia, delirium."},"Pralidoxime (2-PAM)":{"adme":"Given IV/IM, distributes in extracellular water and is excreted largely unchanged by the kidneys.","moa":"Reactivates acetylcholinesterase by removing the organophosphate group before ageing of the enzyme occurs.","uses":"Organophosphate poisoning (used together with atropine), most effective at nicotinic muscle weakness.","adr":"Dizziness, blurred vision, nausea, and hypertension or muscle weakness with rapid infusion."},"Methylene blue":{"adme":"Given IV (or orally), widely distributed and reduced in tissues, excreted in urine and bile.","moa":"Acts as an electron carrier that, via NADPH-methaemoglobin reductase, reduces ferric methaemoglobin back to ferrous haemoglobin.","uses":"Methaemoglobinaemia (from nitrites, dapsone, aniline dyes, local anaesthetics).","adr":"Blue-green urine and skin discoloration, haemolysis in G6PD deficiency, and serotonin syndrome with serotonergic drugs."},"Fomepizole":{"adme":"Given IV with hepatic metabolism and induction of its own clearance on repeated dosing.","moa":"Competitively inhibits alcohol dehydrogenase, blocking conversion of toxic alcohols to their toxic acid metabolites.","uses":"Methanol and ethylene glycol poisoning.","adr":"Headache, nausea, dizziness, and mild transient transaminase elevation."},"Ethanol":{"adme":"Given orally or IV and titrated to a target blood level, metabolised by zero-order kinetics via alcohol dehydrogenase.","moa":"Competes with toxic alcohols for alcohol dehydrogenase, preventing formation of their toxic metabolites.","uses":"Methanol and ethylene glycol poisoning when fomepizole is unavailable.","adr":"CNS depression, intoxication, hypoglycaemia (especially in children), and need for level monitoring."},"Hydroxocobalamin":{"adme":"Given IV, binds cyanide to form cyanocobalamin which is excreted renally.","moa":"Binds free cyanide directly to form non-toxic cyanocobalamin (vitamin B12).","uses":"Cyanide poisoning, including smoke-inhalation victims.","adr":"Red discoloration of skin and urine, hypertension, and interference with colorimetric lab assays."},"Sodium thiosulfate":{"adme":"Given IV, distributes in extracellular fluid and is excreted by the kidneys.","moa":"Provides a sulfur donor for rhodanese to convert cyanide into less toxic thiocyanate, which is excreted renally.","uses":"Cyanide poisoning, often combined with sodium nitrite.","adr":"Nausea, hypotension, and thiocyanate accumulation in renal failure."},"Sodium nitrite":{"adme":"Given IV with rapid onset, generating methaemoglobin within minutes.","moa":"Oxidises haemoglobin to methaemoglobin, which preferentially binds cyanide forming cyanmethaemoglobin.","uses":"Cyanide poisoning, typically before sodium thiosulfate.","adr":"Hypotension, excessive methaemoglobinaemia, headache and syncope."},"Glucagon":{"adme":"Given IV/IM with rapid onset and short duration, degraded enzymatically in plasma, liver and kidney.","moa":"Activates cardiac adenylyl cyclase independently of beta-receptors, raising cAMP to increase heart rate and contractility.","uses":"Beta-blocker and calcium-channel-blocker overdose with bradycardia and hypotension.","adr":"Nausea, vomiting, hyperglycaemia and hypokalaemia."},"Calcium gluconate":{"adme":"Given IV (preferred over chloride peripherally), distributing into extracellular fluid.","moa":"Raises extracellular calcium to overcome channel blockade and antagonises membrane effects of hyperkalaemia.","uses":"Calcium-channel-blocker overdose, hyperkalaemia, hydrofluoric acid and fluoride toxicity, magnesium toxicity.","adr":"Hypercalcaemia, bradycardia, and tissue necrosis if extravasated."},"Vitamin K1 (phytonadione)":{"adme":"Given orally, IV or SC, undergoes hepatic conjugation with onset of effect over several hours.","moa":"Restores synthesis of vitamin-K-dependent clotting factors (II, VII, IX, X) blocked by warfarin or superwarfarins.","uses":"Warfarin or long-acting superwarfarin (rodenticide) poisoning and warfarin over-anticoagulation.","adr":"Anaphylactoid reactions with rapid IV injection; flushing and dyspnoea."},"Protamine sulfate":{"adme":"Given slow IV with immediate onset, forming an inert complex that is removed from circulation.","moa":"Strongly basic protein that binds and neutralises acidic heparin, forming an inactive stable salt.","uses":"Heparin (and partially low-molecular-weight heparin) overdose or reversal.","adr":"Hypotension, bradycardia, anaphylaxis, and paradoxical anticoagulation if overdosed."},"Folinic acid (leucovorin)":{"adme":"Given orally, IM or IV, readily converted to active reduced folates that enter cells.","moa":"Provides reduced folate that bypasses dihydrofolate reductase blockade, rescuing normal cell folate metabolism.","uses":"Methotrexate (and other folate-antagonist) toxicity, and methanol-associated folate depletion.","adr":"Generally well tolerated; rare allergic reactions and possible reduced antifolate efficacy if mistimed."},"Deferoxamine":{"adme":"Given IV/IM, chelates iron and the ferrioxamine complex is excreted renally giving urine a vin-rose colour.","moa":"Binds free ferric iron to form ferrioxamine, a stable water-soluble complex eliminated in urine.","uses":"Acute iron poisoning and chronic iron overload (e.g. thalassaemia).","adr":"Hypotension with rapid infusion, allergic reactions, pulmonary toxicity, and Yersinia infection risk."},"Calcium disodium EDTA":{"adme":"Given IV/IM, not absorbed orally, distributes extracellularly and is excreted unchanged by the kidneys.","moa":"Forms stable water-soluble chelates with lead, displacing it for renal excretion.","uses":"Lead poisoning, often with dimercaprol in severe lead encephalopathy.","adr":"Nephrotoxicity, hypocalcaemia, and zinc depletion."},"Dimercaprol (BAL)":{"adme":"Given by deep IM injection in oil, with rapid metabolism and renal/biliary excretion of complexes.","moa":"Provides sulfhydryl groups that chelate heavy metals, forming stable complexes that are excreted.","uses":"Arsenic, inorganic mercury, gold and (with EDTA) severe lead poisoning.","adr":"Hypertension, tachycardia, painful injection, fever, and contraindicated in iron/cadmium poisoning."},"Succimer (DMSA)":{"adme":"Given orally, water-soluble, with renal excretion of the metal complex.","moa":"Water-soluble dithiol that chelates heavy metals via sulfhydryl groups for urinary elimination.","uses":"Lead poisoning (especially in children), and arsenic and mercury poisoning.","adr":"Gastrointestinal upset, transient transaminase elevation, and rash."},"D-penicillamine":{"adme":"Well absorbed orally, relatively stable to metabolism, and excreted in urine.","moa":"Chelates copper and other heavy metals via its thiol group, promoting their urinary excretion.","uses":"Copper overload (Wilson disease) and lead, mercury and arsenic poisoning.","adr":"Hypersensitivity, nephrotoxicity, bone-marrow suppression, and autoimmune syndromes."},"DMSA (succimer)":{"adme":"Given orally, water-soluble, with predominantly renal excretion of the chelate.","moa":"Oral dithiol chelator whose sulfhydryl groups bind heavy metals to form excretable complexes.","uses":"Lead poisoning (notably paediatric) and arsenic and mercury poisoning.","adr":"Gastrointestinal disturbance, elevated transaminases, and rash."},"DMPS":{"adme":"Given orally or IV, water-soluble, distributing extracellularly with renal excretion.","moa":"Water-soluble dithiol chelator that binds heavy metals through sulfhydryl groups for urinary elimination.","uses":"Mercury, arsenic and lead poisoning.","adr":"Allergic skin reactions, mild hypotension and nausea."},"Trientine":{"adme":"Given orally with relatively poor absorption and renal excretion of the copper complex.","moa":"Chelates copper to form a complex that is excreted in urine, lowering copper burden.","uses":"Wilson disease, especially in patients intolerant of penicillamine.","adr":"Iron-deficiency anaemia, gastritis, and rare lupus-like reactions."},"Gastric lavage":{"note":"Decontamination by washing out the stomach via a wide-bore orogastric tube, useful only soon after a large/life-threatening ingestion."},"Activated charcoal":{"note":"Oral adsorbent that binds many ingested poisons in the gut to reduce their absorption."},"Urinary alkalinization":{"note":"IV sodium bicarbonate to raise urine pH and enhance renal elimination of weak acids such as salicylates and phenobarbital."},"Haemodialysis":{"note":"Extracorporeal removal of small, water-soluble, low-protein-bound toxins such as methanol, ethylene glycol, salicylates and lithium."},"Airway / breathing / circulation support":{"note":"Foundational supportive care securing the airway, ensuring ventilation, and maintaining circulation in the poisoned patient."},"Maintenance of vitals":{"note":"Ongoing supportive monitoring and correction of temperature, blood pressure, glucose and electrolytes to keep the patient stable."}},"diagrams":[]},{"id":"recent_advances","name":"Recent Advances","theme_line":"New town · clinical pharma, pharmacogenomics, biologics, trials","classification":{"sources":[{"label":"G&G 14e","cite":"cross-chapter","groups":[{"heading":"A. Cell & gene therapies","groups":[{"heading":"CAR-T cell therapy","drugs":["Tisagenlecleucel","Axicabtagene ciloleucel"]}]},{"heading":"B. Monoclonal antibodies","groups":[{"heading":"Anti-IL-6R","drugs":["Tocilizumab"]},{"heading":"Anti-amyloid for Alzheimer's","drugs":["Lecanemab","Aducanumab","Donanemab"]}]},{"heading":"C. Antibody–drug conjugates (ADCs)","drugs":["Sacituzumab govitecan","Trastuzumab emtansine"]},{"heading":"D. RNA-based therapeutics","groups":[{"heading":"siRNA","drugs":["Inclisiran","Patisiran"]},{"heading":"Antisense oligonucleotides","drugs":["Nusinersen"]},{"heading":"mRNA vaccines","drugs":["mRNA vaccines"]}]},{"heading":"E. Incretin-based & metabolic","groups":[{"heading":"Dual GIP/GLP-1 agonist","drugs":["Tirzepatide"]}]},{"heading":"F. Antiviral combinations","groups":[{"heading":"Oral SARS-CoV-2 protease inhibitor","drugs":["Nirmatrelvir/ritonavir"]}]},{"heading":"G. Precision medicine & drug safety","groups":[{"heading":"Pharmacogenomics","drugs":["CYP2C19","HLA-B*5701","TPMT"]},{"heading":"Pharmacovigilance","drugs":["Black-box warnings","REMS","Post-marketing surveillance"]}]}]},{"label":"KDT 8e/9e","cite":"cross-chapter / appendix","groups":[{"heading":"A. Cell & gene therapies","groups":[{"heading":"CAR-T cell therapy","drugs":["Tisagenlecleucel","Axicabtagene ciloleucel"]}]},{"heading":"B. Monoclonal antibodies","groups":[{"heading":"Anti-IL-6R","drugs":["Tocilizumab"]},{"heading":"Anti-amyloid for Alzheimer's","drugs":["Lecanemab","Aducanumab","Donanemab"]}]},{"heading":"C. Antibody–drug conjugates (ADCs)","drugs":["Sacituzumab govitecan","Trastuzumab emtansine"]},{"heading":"D. RNA-based therapeutics","groups":[{"heading":"siRNA","drugs":["Inclisiran","Patisiran"]},{"heading":"Antisense oligonucleotides","drugs":["Nusinersen"]},{"heading":"mRNA vaccines","drugs":["mRNA vaccines"]}]},{"heading":"E. Incretin-based & metabolic","groups":[{"heading":"Dual GIP/GLP-1 agonist","drugs":["Tirzepatide"]}]},{"heading":"F. Antiviral combinations","groups":[{"heading":"Oral SARS-CoV-2 protease inhibitor","drugs":["Nirmatrelvir/ritonavir"]}]},{"heading":"G. Precision medicine & drug safety","groups":[{"heading":"Pharmacogenomics","drugs":["CYP2C19","HLA-B*5701","TPMT"]},{"heading":"Pharmacovigilance","drugs":["Black-box warnings","REMS","Post-marketing surveillance"]}]}]}]},"details":{"Tisagenlecleucel":{"adme":"Single autologous IV infusion of CD19-directed CAR-T cells that traffic to lymphoid tissue and expand in vivo, with cellular persistence detectable for months to years rather than conventional pharmacokinetic clearance.","moa":"Genetically engineered autologous T cells expressing a chimeric antigen receptor against CD19, redirecting cytotoxic T cells to lyse CD19-positive B cells.","uses":"Relapsed/refractory B-cell acute lymphoblastic leukaemia in children/young adults and relapsed/refractory diffuse large B-cell lymphoma.","adr":"Cytokine release syndrome (CRS), immune effector cell-associated neurotoxicity (ICANS), prolonged cytopenias, B-cell aplasia with hypogammaglobulinaemia and infection risk."},"Axicabtagene ciloleucel":{"adme":"Single autologous IV infusion of CD19-directed CAR-T cells that expand in vivo and persist as a living drug, monitored by cellular kinetics rather than classical plasma concentrations.","moa":"Autologous T cells engineered with a chimeric antigen receptor targeting CD19, redirecting T-cell cytotoxicity against CD19-positive malignant B cells.","uses":"Relapsed/refractory large B-cell lymphoma and follicular lymphoma.","adr":"Cytokine release syndrome (CRS), neurotoxicity (ICANS), severe cytopenias, B-cell aplasia, serious infections."},"Tocilizumab":{"adme":"Given IV or SC as a humanised monoclonal antibody with limited tissue distribution confined largely to plasma/extracellular fluid, catabolised by proteolysis to peptides and amino acids, with a long concentration-dependent half-life of up to ~1-2 weeks.","moa":"Humanised monoclonal antibody that blocks the interleukin-6 receptor (IL-6R), inhibiting IL-6-mediated pro-inflammatory signalling.","uses":"Rheumatoid arthritis, giant cell arteritis, juvenile idiopathic arthritis, and CAR-T-induced cytokine release syndrome.","adr":"Serious infections, neutropenia, thrombocytopenia, raised transaminases, dyslipidaemia, GI perforation, infusion reactions."},"Lecanemab":{"adme":"Administered by IV infusion as a humanised IgG1 monoclonal antibody with distribution mainly to plasma and limited CNS penetration, cleared by proteolytic catabolism to peptides, with a half-life of around 1-2 weeks.","moa":"Humanised monoclonal antibody that binds soluble amyloid-beta protofibrils, promoting their clearance from the brain.","uses":"Early symptomatic Alzheimer disease (mild cognitive impairment or mild dementia with confirmed amyloid pathology).","adr":"Amyloid-related imaging abnormalities (ARIA-E oedema and ARIA-H haemorrhage), infusion reactions, headache; higher risk in ApoE4 homozygotes."},"Aducanumab":{"adme":"Given by IV infusion as a human IgG1 monoclonal antibody distributed predominantly in plasma with limited brain entry, eliminated by proteolytic catabolism, with a half-life of approximately 1 month.","moa":"Human monoclonal antibody targeting aggregated (fibrillar and oligomeric) amyloid-beta to reduce amyloid plaque burden.","uses":"Early Alzheimer disease (accelerated/controversial approval; subsequently withdrawn from market).","adr":"Amyloid-related imaging abnormalities (ARIA-E and ARIA-H), headache, falls, infusion reactions."},"Donanemab":{"adme":"Administered by IV infusion as a humanised IgG1 monoclonal antibody distributed mainly in plasma with limited CNS access, cleared by catabolism to peptides, with a half-life of around 1.5-2 weeks.","moa":"Humanised monoclonal antibody directed against a modified N-terminal pyroglutamate form of amyloid-beta deposited in plaques, driving plaque removal.","uses":"Early symptomatic Alzheimer disease with confirmed amyloid pathology.","adr":"Amyloid-related imaging abnormalities (ARIA-E and ARIA-H, occasionally serious), infusion reactions, headache."},"Sacituzumab govitecan":{"adme":"Given by IV infusion as an antibody-drug conjugate; the antibody distributes in plasma and is internalised by tumour cells, the hydrolysable linker releases the SN-38 payload, with the antibody catabolised and SN-38 hepatically glucuronidated, half-life ~16 h.","moa":"Anti-Trop-2 monoclonal antibody conjugated to SN-38 (active metabolite of irinotecan, a topoisomerase I inhibitor) delivering cytotoxic payload to Trop-2-expressing tumour cells.","uses":"Metastatic triple-negative breast cancer and HR-positive/HER2-negative breast cancer; metastatic urothelial carcinoma.","adr":"Severe neutropenia, diarrhoea, nausea, anaemia, alopecia, fatigue; risk increased in UGT1A1-poor metabolisers."},"Trastuzumab emtansine":{"adme":"Administered by IV infusion as an antibody-drug conjugate; the antibody distributes in plasma and binds HER2, is internalised and lysosomally degraded to release DM1, the antibody catabolised to peptides, half-life of the conjugate ~4 days.","moa":"Anti-HER2 monoclonal antibody (trastuzumab) conjugated to the microtubule inhibitor emtansine (DM1), combining HER2 blockade with targeted delivery of cytotoxin to HER2-positive cells.","uses":"HER2-positive metastatic breast cancer and adjuvant therapy after residual invasive disease.","adr":"Thrombocytopenia, hepatotoxicity, peripheral neuropathy, cardiotoxicity (reduced LVEF), infusion reactions, interstitial lung disease."},"Inclisiran":{"adme":"Given by SC injection as a GalNAc-conjugated small interfering RNA that is rapidly taken up by hepatocytes via the asialoglycoprotein receptor, with a plasma half-life of ~9 h but a prolonged intracellular duration permitting twice-yearly dosing.","moa":"Small interfering RNA (siRNA) that silences PCSK9 mRNA in hepatocytes, increasing LDL-receptor recycling and lowering LDL cholesterol.","uses":"Primary hypercholesterolaemia and mixed dyslipidaemia, as an adjunct to statins.","adr":"Injection-site reactions (pain, erythema, rash), arthralgia, and generally mild systemic effects."},"Patisiran":{"adme":"Administered by IV infusion as a lipid-nanoparticle-formulated small interfering RNA that delivers the siRNA to hepatocytes, with the siRNA cleared by nucleases and the half-life governed by the formulation; premedication required to limit infusion reactions.","moa":"Lipid-nanoparticle small interfering RNA that degrades hepatic transthyretin (TTR) mRNA, reducing production of both mutant and wild-type TTR protein.","uses":"Polyneuropathy of hereditary transthyretin-mediated (hATTR) amyloidosis.","adr":"Infusion-related reactions, peripheral oedema, and reduced serum vitamin A (requiring supplementation)."},"Nusinersen":{"adme":"Given by intrathecal injection to act within the CNS, distributing in cerebrospinal fluid and CNS tissue with slow clearance and a long CSF half-life of several months, undergoing nuclease-mediated metabolism.","moa":"Antisense oligonucleotide that modulates SMN2 pre-mRNA splicing to include exon 7, increasing production of functional survival motor neuron (SMN) protein.","uses":"Spinal muscular atrophy (SMA) in paediatric and adult patients.","adr":"Post-lumbar-puncture syndrome (headache, back pain), thrombocytopenia, coagulation abnormalities, renal toxicity (proteinuria)."},"mRNA vaccines":{"note":"Vaccines delivering lipid-nanoparticle-encapsulated messenger RNA that instructs host cells to express an antigen (e.g. SARS-CoV-2 spike protein) to elicit a protective immune response."},"Tirzepatide":{"adme":"Administered by SC injection as a dual incretin peptide agonist that is slowly absorbed, distributes in extracellular fluid, is degraded by proteolysis, and has a long half-life of ~5 days allowing once-weekly dosing.","moa":"Dual agonist at glucose-dependent insulinotropic polypeptide (GIP) and GLP-1 receptors, enhancing glucose-dependent insulin secretion, suppressing glucagon, slowing gastric emptying and reducing appetite.","uses":"Type 2 diabetes mellitus and chronic weight management (obesity).","adr":"Nausea, vomiting, diarrhoea, constipation, decreased appetite, pancreatitis, gallbladder disease; thyroid C-cell tumour signal in rodents (boxed warning)."},"Nirmatrelvir/ritonavir":{"adme":"Taken orally; nirmatrelvir is co-administered with low-dose ritonavir as a CYP3A4 inhibitor to boost and sustain nirmatrelvir plasma levels, with both drugs hepatically handled and nirmatrelvir half-life of ~6 h.","moa":"Nirmatrelvir is a SARS-CoV-2 main protease (Mpro/3CLpro) inhibitor blocking viral polyprotein processing, while ritonavir is a pharmacokinetic booster that inhibits its CYP3A4 metabolism.","uses":"Mild-to-moderate COVID-19 in patients at high risk of progression to severe disease.","adr":"Dysgeusia (altered taste), diarrhoea, hypertension, myalgia, and numerous serious CYP3A4-mediated drug-drug interactions from ritonavir."},"CYP2C19":{"note":"A hepatic cytochrome P450 enzyme whose genetic polymorphisms (poor or rapid metaboliser status) influence drug activation/clearance, e.g. reduced clopidogrel activation and altered proton-pump inhibitor metabolism."},"HLA-B*5701":{"note":"An HLA class I allele that is a pharmacogenomic marker for abacavir hypersensitivity; screening before abacavir use is mandated to prevent severe reactions."},"TPMT":{"note":"Thiopurine methyltransferase, an enzyme whose deficiency (genetic polymorphism) predisposes to severe myelosuppression with thiopurines such as azathioprine and mercaptopurine, prompting pre-treatment testing."},"Black-box warnings":{"note":"The strongest FDA-mandated warning on a drug label, highlighting serious or life-threatening risks identified for that medicine."},"REMS":{"note":"Risk Evaluation and Mitigation Strategy, an FDA-required programme of safety measures (e.g. registries, restricted dispensing, monitoring) to ensure a drug's benefits outweigh its risks."},"Post-marketing surveillance":{"note":"Phase IV monitoring of a drug's safety and effectiveness after approval through spontaneous reporting and pharmacovigilance to detect rare or long-term adverse effects."}},"diagrams":[]}];</script>
  <script>(function () {
  const DATA = (typeof window !== 'undefined' && window.PHARMA_CLASSIFICATION_DATA) || [];
  const SRC_KEYS = ['gng', 'kdt'];

  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]); }
  function normKey(s) { return String(s).toLowerCase().replace(/\([^)]*\)/g, '').replace(/[^a-z0-9]+/g, ' ').trim(); }

  // Build a normalized lookup index for a district's details once.
  function detailIndex(details) {
    const idx = {};
    for (const k of Object.keys(details || {})) idx[normKey(k)] = details[k];
    return idx;
  }
  function lookup(name, details, idx) {
    if (details && Object.prototype.hasOwnProperty.call(details, name)) return details[name];
    return idx[normKey(name)] || null;
  }
  function hasCard(d) { return d && (d.adme || d.moa || d.uses || d.adr || d.note); }

  function detailCardHTML(name, d, klass) {
    if (d && d.note && !d.adme && !d.moa && !d.uses && !d.adr) {
      return `<div class="cf-card"><div class="cf-card-head">${esc(name)}</div><div class="cf-note">${esc(d.note)}</div></div>`;
    }
    const row = (cls, label, val) => val ? `<div class="cf-row ${cls}"><div class="cf-k">${label}</div><div class="cf-v">${esc(val)}</div></div>` : '';
    return `<div class="cf-card">
      <div class="cf-card-head"><span>${esc(name)}</span>${klass ? `<span class="cf-klass">${esc(klass)}</span>` : ''}</div>
      ${row('adme', 'ADME', d.adme)}
      ${row('moa', 'Mechanism', d.moa)}
      ${row('uses', 'Uses', d.uses)}
      ${row('adr', 'Adverse effects', d.adr)}
    </div>`;
  }

  // Recursive tree builder. depth controls default-collapsed state.
  function buildGroup(group, srcKey, details, idx, depth) {
    const li = document.createElement('li');
    li.className = 'cf-group ' + srcKey + (depth >= 1 ? ' cf-collapsed' : '');
    const node = document.createElement('div');
    node.className = 'cf-node';
    node.innerHTML = `<span class="cf-caret">▼</span><span>${esc(group.heading)}</span>`;
    node.addEventListener('click', () => li.classList.toggle('cf-collapsed'));
    li.appendChild(node);

    const ul = document.createElement('ul');
    if (Array.isArray(group.groups)) group.groups.forEach(g => ul.appendChild(buildGroup(g, srcKey, details, idx, depth + 1)));
    if (Array.isArray(group.drugs)) group.drugs.forEach(name => ul.appendChild(buildDrug(name, details, idx)));
    li.appendChild(ul);
    return li;
  }

  function buildDrug(name, details, idx) {
    const li = document.createElement('li');
    const d = lookup(name, details, idx);
    const card = hasCard(d);
    li.className = 'cf-drug' + (card ? '' : ' nodata');
    li.dataset.name = name;
    const node = document.createElement('div');
    node.className = 'cf-node';
    node.innerHTML = `<span class="cf-dot"></span><span>${esc(name)}</span>`;
    li.appendChild(node);
    if (card) {
      node.addEventListener('click', () => {
        if (li.classList.contains('open')) { li.classList.remove('open'); const c = li.querySelector(':scope > .cf-card'); if (c) c.remove(); return; }
        li.classList.add('open');
        li.insertAdjacentHTML('beforeend', detailCardHTML(name, d, ''));
      });
    }
    return li;
  }

  function mount() {
    const root = document.getElementById('cf-root');
    root.innerHTML = `
      <div class="cf-app">
        <aside class="cf-sidebar" id="cf-sidebar">
          <div class="cf-brand">Pharmacology Classification<small>G&amp;G 14e + KDT · flowchart with ADME / MOA / uses / ADR</small></div>
          <ul class="cf-dlist" id="cf-dlist"></ul>
        </aside>
        <main class="cf-main">
          <div class="cf-topbar">
            <h1 class="cf-title" id="cf-title"></h1>
            <input class="cf-search" id="cf-search" placeholder="Find a drug…" />
            <div class="cf-tabs" id="cf-tabs">
              <button class="cf-tab gng active" data-src="gng">G&amp;G 14e</button>
              <button class="cf-tab kdt" data-src="kdt">KDT</button>
            </div>
            <button class="cf-btn" id="cf-expand">Expand all</button>
            <button class="cf-btn" id="cf-collapse">Collapse all</button>
            <button class="cf-btn" id="cf-theme">🌙</button>
          </div>
          <div class="cf-cite" id="cf-cite"></div>
          <div class="cf-diagrams" id="cf-diagrams"></div>
          <ul class="cf-tree" id="cf-tree"></ul>
        </main>
      </div>`;

    const state = { di: 0, src: 'gng' };
    const dlist = document.getElementById('cf-dlist');
    DATA.forEach((d, i) => {
      const li = document.createElement('li');
      li.innerHTML = `${esc(d.name)}<small>${esc(d.theme_line || '')}</small>`;
      li.addEventListener('click', () => { state.di = i; renderDistrict(); });
      dlist.appendChild(li);
    });

    function renderDiagrams() {
      const d = DATA[state.di];
      const box = document.getElementById('cf-diagrams');
      const diags = d.diagrams || [];
      if (!diags.length) { box.innerHTML = ''; return; }
      box.innerHTML = `
        <div class="cf-diagrams-head" id="cf-diag-toggle"><span class="cf-caret">▼</span> 📊 Diagrams &amp; graphs (${diags.length})</div>
        <div class="cf-diagrams-grid" id="cf-diag-grid">
          ${diags.map(g => `<figure class="cf-fig"><div class="cf-fig-title">${esc(g.title)}</div><div class="cf-fig-svg">${g.svg}</div><figcaption>${esc(g.caption)}</figcaption></figure>`).join('')}
        </div>`;
      document.getElementById('cf-diag-toggle').addEventListener('click', () => box.classList.toggle('cf-collapsed'));
    }

    function renderDistrict() {
      const d = DATA[state.di];
      document.getElementById('cf-title').textContent = d.name;
      [...dlist.children].forEach((li, i) => li.classList.toggle('active', i === state.di));
      renderDiagrams();
      renderSource();
    }
    function renderSource() {
      const d = DATA[state.di];
      const src = (d.classification.sources || []).find(s => srcLabelKey(s.label) === state.src) || d.classification.sources[0];
      document.getElementById('cf-cite').textContent = src ? `${src.label} — ${src.cite}` : '';
      document.querySelectorAll('.cf-tab').forEach(t => t.classList.toggle('active', t.dataset.src === state.src));
      const tree = document.getElementById('cf-tree');
      tree.innerHTML = '';
      const idx = detailIndex(d.details);
      (src ? src.groups : []).forEach(g => tree.appendChild(buildGroup(g, state.src, d.details, idx, 0)));
      const q = document.getElementById('cf-search').value.trim();
      if (q) runSearch(q);
    }
    function srcLabelKey(label) { return /kdt/i.test(label) ? 'kdt' : 'gng'; }

    document.getElementById('cf-tabs').addEventListener('click', e => {
      const b = e.target.closest('.cf-tab'); if (!b) return;
      state.src = b.dataset.src; renderSource();
    });
    document.getElementById('cf-expand').addEventListener('click', () => document.querySelectorAll('#cf-tree .cf-group').forEach(g => g.classList.remove('cf-collapsed')));
    document.getElementById('cf-collapse').addEventListener('click', () => document.querySelectorAll('#cf-tree .cf-group').forEach(g => g.classList.add('cf-collapsed')));
    const themeBtn = document.getElementById('cf-theme');
    themeBtn.addEventListener('click', () => { document.body.classList.toggle('cf-night'); themeBtn.textContent = document.body.classList.contains('cf-night') ? '☀️' : '🌙'; });

    const search = document.getElementById('cf-search');
    search.addEventListener('input', () => runSearch(search.value.trim()));
    function runSearch(q) {
      const tree = document.getElementById('cf-tree');
      tree.querySelectorAll('.cf-hit').forEach(n => n.classList.remove('cf-hit'));
      if (!q) return;
      const needle = q.toLowerCase();
      let first = null;
      tree.querySelectorAll('.cf-drug').forEach(li => {
        if ((li.dataset.name || '').toLowerCase().includes(needle)) {
          li.classList.add('cf-hit');
          if (!first) first = li;
          // expand all ancestor groups
          let p = li.parentElement;
          while (p && p !== tree) { if (p.classList && p.classList.contains('cf-group')) p.classList.remove('cf-collapsed'); p = p.parentElement; }
        }
      });
      if (first) first.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }

    renderDistrict();
  }

  if (document.readyState !== 'loading') mount();
  else document.addEventListener('DOMContentLoaded', mount);
})();
</script>
